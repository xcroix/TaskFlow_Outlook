<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Flow for Outlook</title>

  <!-- Office.js -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <!-- Google Font: Figtree (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --blue-header : #2B5BB8;   /* blau mitjà, no massa fosc */
      --blue-dark   : #1E3F8A;
      --blue-light  : #EBF1FB;
      --blue-mid    : #3A6DD8;
      --accent      : #4F8EF7;
      --green       : #18A96A;
      --green-light : #E6F7F1;
      --red         : #E3483A;
      --red-light   : #FDF0EF;
      --orange      : #F59E0B;
      --orange-light: #FEF3C7;
      --text-main   : #1A1F36;
      --text-soft   : #5A6380;
      --text-muted  : #9EA8C6;
      --border      : #DDE3F0;
      --bg          : #F4F6FB;
      --white       : #FFFFFF;
      --radius      : 10px;
      --radius-sm   : 6px;
      --shadow-card : 0 2px 10px rgba(43,91,184,.10);
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Capçalera ──────────────────────────────────────── */
    header {
      background: var(--blue-header);
      color: var(--white);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    header svg { flex-shrink: 0; }
    header .title-block { flex: 1; }
    header h1 {
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .3px;
      line-height: 1.2;
    }
    header .subtitle {
      font-size: 11px;
      opacity: .75;
      margin-top: 1px;
    }

    /* ── Cos principal ──────────────────────────────────── */
    main { flex: 1; padding: 14px 14px 24px; }

    /* ── Targeta d'email ────────────────────────────────── */
    .email-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .email-card .ec-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .email-card .ec-subject {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-main);
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .email-card .ec-meta {
      font-size: 11px;
      color: var(--text-soft);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .email-card .ec-meta span { display: flex; align-items: center; gap: 3px; }

    /* ── Spinner / estat de càrrega ─────────────────────── */
    #state-loading {
      text-align: center;
      padding: 40px 0;
      color: var(--text-soft);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--blue-header);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Secció NOVA TASCA ──────────────────────────────── */
    #state-create { display: none; }
    #state-create .section-title {
      font-family: 'Figtree', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Grups de formulari */
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .form-group label .req { color: var(--red); margin-left: 2px; }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      transition: border-color .15s;
      outline: none;
      appearance: none;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }
    textarea { resize: vertical; min-height: 64px; }

    /* Select arrow personalitzada */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: "▾";
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 11px;
    }

    /* Pills de prioritat */
    .priority-row { display: flex; gap: 6px; }
    .prio-btn {
      flex: 1;
      padding: 6px 4px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      text-align: center;
      transition: all .15s;
    }
    .prio-btn:hover { border-color: var(--accent); color: var(--accent); }
    .prio-btn.active-low    { border-color: var(--green);  background: var(--green-light);  color: var(--green); }
    .prio-btn.active-medium { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
    .prio-btn.active-high   { border-color: var(--red);    background: var(--red-light);    color: var(--red); }

    /* Botons d'acció */
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary {
      background: var(--blue-header);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:active { transform: scale(.98); }
    .btn-secondary {
      background: var(--white);
      color: var(--text-soft);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Secció TASCA EXISTENT ──────────────────────────── */
    #state-existing { display: none; }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-pending  { background: var(--orange-light); color: #B45309; }
    .badge-done     { background: var(--green-light);  color: #0D7A4E; }
    .badge-canceled { background: #F0F0F5;              color: #6B7280; }

    .task-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
    }
    .task-card .tc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .task-card .tc-title {
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      flex: 1;
      margin-right: 8px;
      line-height: 1.3;
    }
    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid var(--bg);
      font-size: 12px;
      color: var(--text-soft);
    }
    .task-row svg { flex-shrink: 0; color: var(--text-muted); }
    .task-row .tr-value { color: var(--text-main); font-weight: 500; }

    .prio-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .prio-dot.low    { background: var(--green); }
    .prio-dot.medium { background: var(--orange); }
    .prio-dot.high   { background: var(--red); }

    .task-notes {
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .info-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--blue-light);
      border: 1px solid #C5D6F8;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 11.5px;
      color: var(--blue-dark);
      margin-bottom: 14px;
    }
    .info-banner svg { flex-shrink: 0; }

    /* ── Toast de confirmació ───────────────────────────── */
    #toast {
      position: fixed;
      bottom: 18px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text-main);
      color: var(--white);
      padding: 9px 18px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.green { background: var(--green); }
    #toast.red   { background: var(--red); }

    /* ── Peu ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 10px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>
<div class="layout">

  <!-- ══ CAPÇALERA ══════════════════════════════════════ -->
  <header>
    <!-- icona clip+check -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="7" fill="rgba(255,255,255,.18)"/>
      <path d="M8 14.5L12 18.5L20 10" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 7H9a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"
            stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none" opacity=".6"/>
    </svg>
    <div class="title-block">
      <h1>Task Flow for Outlook</h1>
      <div class="subtitle">Gestió de tasques des del correu</div>
    </div>
  </header>

  <!-- ══ CONTINGUT PRINCIPAL ════════════════════════════ -->
  <main>

    <!-- Targeta del correu actual -->
    <div class="email-card" id="email-card">
      <div class="ec-label">Correu actiu</div>
      <div class="ec-subject" id="email-subject">Carregant…</div>
      <div class="ec-meta">
        <span>
          <!-- persona -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span id="email-sender">—</span>
        </span>
        <span>
          <!-- calendari -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="email-date">—</span>
        </span>
      </div>
    </div>

    <!-- ── Estat: carregant ── -->
    <div id="state-loading">
      <div class="spinner"></div>
      <div>Carregant dades del correu…</div>
    </div>

    <!-- ── Estat: crear tasca ── -->
    <div id="state-create">
      <div class="section-title">
        <!-- plus -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nova tasca per a aquest correu
      </div>

      <!-- Títol -->
      <div class="form-group">
        <label>Títol <span class="req">*</span></label>
        <input type="text" id="task-title" placeholder="Descripció de la tasca…" maxlength="120"/>
      </div>

      <!-- Data de venciment -->
      <div class="form-group">
        <label>Data de venciment</label>
        <input type="date" id="task-due"/>
      </div>

      <!-- Prioritat -->
      <div class="form-group">
        <label>Prioritat</label>
        <div class="priority-row">
          <button class="prio-btn" data-prio="low"    onclick="setPrio(this)">▼ Baixa</button>
          <button class="prio-btn active-medium" data-prio="medium" onclick="setPrio(this)">■ Mitjana</button>
          <button class="prio-btn" data-prio="high"   onclick="setPrio(this)">▲ Alta</button>
        </div>
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label>Notes</label>
        <textarea id="task-notes" placeholder="Informació addicional…"></textarea>
      </div>

      <!-- Botons -->
      <div class="action-row">
        <button class="btn btn-secondary" onclick="cancel()">
          <!-- x -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Cancel·lar
        </button>
        <button class="btn btn-primary" onclick="saveTask()">
          <!-- check -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Desar tasca
        </button>
      </div>
    </div>

    <!-- ── Estat: tasca existent ── -->
    <div id="state-existing">
      <div class="info-banner">
        <!-- info -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Aquest correu ja té una tasca assignada.
      </div>

      <div class="task-card">
        <div class="tc-header">
          <div class="tc-title" id="ex-title">—</div>
          <span class="badge-status badge-pending" id="ex-status">Pendent</span>
        </div>

        <div class="task-row">
          <!-- calendari -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Venciment:&nbsp;<span class="tr-value" id="ex-due">—</span>
        </div>

        <div class="task-row">
          <!-- bandera -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          Prioritat:&nbsp;<span class="tr-value" id="ex-prio">—</span>
        </div>

        <div class="task-row">
          <!-- clock -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Creada:&nbsp;<span class="tr-value" id="ex-created">—</span>
        </div>

        <div class="task-notes" id="ex-notes" style="display:none"></div>
      </div>
    </div>

  </main>

  <!-- ══ PEU ══════════════════════════════════════════════ -->
  <footer>Task Flow for Outlook · v1.0</footer>

</div><!-- /layout -->

<!-- Toast -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════
     LÒGICA
══════════════════════════════════════════════════════ -->
<script>
/* ── Estat global ─────────────────────────────────────── */
let currentItemId  = null;
let selectedPrio   = 'medium';
const STORAGE_KEY  = 'taskflow_tasks_v1';

/* ── Utilitats d'emmagatzematge (localStorage) ─────────
   En producció substituir per RoamingSettings d'Office.js
────────────────────────────────────────────────────────── */
function loadTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveTasks(tasks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}
function getTaskForItem(itemId) {
  return loadTasks()[normalizeId(itemId)] || null;
}
function setTaskForItem(itemId, task) {
  const tasks = loadTasks();
  tasks[normalizeId(itemId)] = task;
  saveTasks(tasks);
}

/* Normalitza l'itemId (elimina sufixos de versió, etc.) */
function normalizeId(id) {
  return (id || '').split('?')[0].split('#')[0].trim();
}

/* ── Prioritat ──────────────────────────────────────── */
function setPrio(btn) {
  document.querySelectorAll('.prio-btn').forEach(b => {
    b.classList.remove('active-low', 'active-medium', 'active-high');
  });
  const p = btn.dataset.prio;
  btn.classList.add(`active-${p}`);
  selectedPrio = p;
}

/* ── Format de data ─────────────────────────────────── */
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('ca-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function prioLabel(p) {
  return p === 'low' ? '▼ Baixa' : p === 'high' ? '▲ Alta' : '■ Mitjana';
}

function statusBadge(s) {
  const map = {
    pending : { cls: 'badge-pending',  txt: 'Pendent'   },
    done    : { cls: 'badge-done',     txt: 'Completada' },
    canceled: { cls: 'badge-canceled', txt: 'Cancel·lada'},
  };
  return map[s] || map.pending;
}

/* ── Mostrar estat ──────────────────────────────────── */
function showState(which) {
  ['loading','create','existing'].forEach(s => {
    document.getElementById(`state-${s}`).style.display = (s === which ? '' : 'none');
  });
}

/* ── Omplir targeta de correu ───────────────────────── */
function fillEmailCard(item) {
  document.getElementById('email-subject').textContent =
    item.subject || '(sense assumpte)';

  // Remitent
  let sender = '—';
  if (item.from && item.from.emailAddress) {
    sender = item.from.emailAddress.displayName ||
             item.from.emailAddress.address || '—';
  }
  document.getElementById('email-sender').textContent = sender;

  // Data
  if (item.dateTimeCreated) {
    document.getElementById('email-date').textContent =
      new Date(item.dateTimeCreated).toLocaleDateString('ca-ES',
        { day:'2-digit', month:'short', year:'numeric' });
  }
}

/* ── Omplir targeta de tasca existent ───────────────── */
function fillExistingTask(task) {
  document.getElementById('ex-title').textContent = task.title || '—';

  const { cls, txt } = statusBadge(task.status);
  const badge = document.getElementById('ex-status');
  badge.className = `badge-status ${cls}`;
  badge.textContent = txt;

  document.getElementById('ex-due').textContent =
    task.due ? formatDate(task.due) : 'Sense data';

  // Prioritat amb punt de color
  const prioEl = document.getElementById('ex-prio');
  prioEl.innerHTML =
    `<span class="prio-dot ${task.priority || 'medium'}"></span>${prioLabel(task.priority)}`;

  document.getElementById('ex-created').textContent = formatDate(task.created);

  const notesEl = document.getElementById('ex-notes');
  if (task.notes) {
    notesEl.textContent = task.notes;
    notesEl.style.display = '';
  } else {
    notesEl.style.display = 'none';
  }
}

/* ── Desar tasca ────────────────────────────────────── */
function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) {
    showToast('El títol és obligatori.', 'red');
    document.getElementById('task-title').focus();
    return;
  }
  const task = {
    title,
    due      : document.getElementById('task-due').value || null,
    priority : selectedPrio,
    notes    : document.getElementById('task-notes').value.trim() || null,
    status   : 'pending',
    created  : new Date().toISOString().split('T')[0],
    itemId   : currentItemId,
  };
  setTaskForItem(currentItemId, task);
  fillExistingTask(task);
  showState('existing');
  showToast('Tasca desada correctament ✓', 'green');
}

/* ── Cancel·lar ────────────────────────────────────── */
function cancel() {
  document.getElementById('task-title').value = '';
  document.getElementById('task-due').value   = '';
  document.getElementById('task-notes').value = '';
  selectedPrio = 'medium';
  document.querySelectorAll('.prio-btn').forEach(b => {
    b.classList.remove('active-low','active-medium','active-high');
    if (b.dataset.prio === 'medium') b.classList.add('active-medium');
  });
  showToast('Operació cancel·lada.', '');
}

/* ── Toast ─────────────────────────────────────────── */
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = ''; }, 2800);
}

/* ── Preomplir títol amb assumpte del correu ─────────── */
function prefillFromEmail(subject) {
  const titleInput = document.getElementById('task-title');
  if (subject && !titleInput.value) titleInput.value = subject;

  // Data de venciment: demà per defecte
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('task-due').value =
    tomorrow.toISOString().split('T')[0];
}

/* ── Inicialització amb Office.js ───────────────────── */
function initOffice() {
  Office.onReady(() => {
    const item = Office.context.mailbox.item;
    currentItemId = item.itemId;

    // Omplir targeta de correu
    fillEmailCard(item);

    // Comprovar si ja existeix una tasca
    const existing = getTaskForItem(currentItemId);
    if (existing) {
      fillExistingTask(existing);
      showState('existing');
    } else {
      prefillFromEmail(item.subject);
      showState('create');
    }
  });
}

/* ── Mode demo (fora d'Outlook) ─────────────────────── */
function initDemo() {
  const demoItem = {
    itemId          : 'demo-item-001',
    subject         : 'Reunió de seguiment Q2 — Revisió de pressupostos',
    from            : { emailAddress: { displayName: 'Anna Puig', address: 'anna.puig@empresa.cat' } },
    dateTimeCreated : new Date().toISOString(),
  };
  currentItemId = demoItem.itemId;
  fillEmailCard(demoItem);

  const existing = getTaskForItem(currentItemId);
  if (existing) {
    fillExistingTask(existing);
    showState('existing');
  } else {
    prefillFromEmail(demoItem.subject);
    showState('create');
  }
}

/* ── Punt d'entrada ─────────────────────────────────── */
if (typeof Office !== 'undefined') {
  initOffice();
} else {
  // Fora d'Outlook: mode previsualització
  initDemo();
}
</script>
