// Comentarios en castellano
function normalizeThreadSubject(subject) {
  return String(subject || '')
    .replace(/^(\s*(re|fw|fwd)\s*:\s*)+/ig, '')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

// Comentarios en castellano
function getTaskIdsLinkedToEmailId(emailId) {
  if (!emailId) return [];
  return (Array.isArray(RELATIONS) ? RELATIONS : [])
    .filter(r => r?.relation_type === 'task_email' && r?.related2_id === emailId && r?.related1_id)
    .map(r => r.related1_id);
}

// Comentarios en castellano
function getSuggestedTasksForActiveEmailThread() {
  const activeEmail = getActiveEmail();
  if (!activeEmail) return [];
  const currentEmailId = activeEmail.email_id || null;
  const threadSubject = normalizeThreadSubject(activeEmail.subject);
  if (!threadSubject) return [];
  const alreadyLinked = new Set(getSelectedEmailContextTaskIds());
  const suggested = new Map();
  (Array.isArray(EMAILS) ? EMAILS : []).forEach(email => {
    if (!email || !email.email_id) return;
    if (currentEmailId && email.email_id === currentEmailId) return;
    if (normalizeThreadSubject(email.subject) !== threadSubject) return;
    getTaskIdsLinkedToEmailId(email.email_id).forEach(taskId => {
      if (!taskId || alreadyLinked.has(taskId)) return;
      const task = TASKS.find(t => t.task_id === taskId);
      if (!task || String(task.status || '').toLowerCase() === 'completed') return;
      if (!suggested.has(taskId)) suggested.set(taskId, task);
    });
  });
  return Array.from(suggested.values()).sort((a, b) =>
    (a.priority || 99) - (b.priority || 99) || String(a.title || '').localeCompare(String(b.title || ''))
  );
}

// Comentarios en castellano
function removeThreadSuggestedTaskChip(taskId) {
  const panel = document.getElementById('email-panel');
  if (!panel || !taskId) return;
  const chip = panel.querySelector(`[data-thread-suggested-task-id="${taskId}"]`);
  if (chip) chip.remove();
  const wrap = panel.querySelector('[data-thread-suggested-wrap="1"]');
  if (wrap && !wrap.querySelector('[data-thread-suggested-task-id]')) wrap.remove();
}

// Comentarios en castellano
function linkActiveEmailToTask(taskId, sourceEl) {
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  const ae = getActiveEmail();
  if (!ae || !taskId || ae.isOutlookLoading) return false;

  // Comentarios en castellano: si el email activo todavía no existe en la tabla local, se crea antes de vincular.
  let emailId = ae.email_id || findExistingEmailId(ae.subject, ae.from, ae.message_id || ae.messageId, ae.office_item_id);
  if (!emailId && typeof findOrCreateEmail === 'function') {
    emailId = findOrCreateEmail(
      ae.subject,
      ae.from,
      ae.fromName,
      ae.dateLabel,
      ae.attachments || 0,
      ae.message_id || ae.messageId || ae.office_item_id
    );
    ae.email_id = emailId;
  }
  if (!emailId) return false;

  if (relationExists(taskId, emailId, 'task_email')) {
    try { closeQaDrop(); } catch (e) {}
    return false;
  }

  addRelation(taskId, emailId, 'task_email');
  const email = (Array.isArray(EMAILS) ? EMAILS : []).find(e => e.email_id === emailId);
  if (email) {
    if (!Array.isArray(email.linked_task_ids)) email.linked_task_ids = [];
    if (!email.linked_task_ids.includes(taskId)) email.linked_task_ids.push(taskId);
  }
  removeThreadSuggestedTaskChip(taskId);
  if (sourceEl) {
    try {
      sourceEl.setAttribute('aria-disabled', 'true');
      sourceEl.style.pointerEvents = 'none';
      sourceEl.style.opacity = '.55';
    } catch (e) {}
  }
  schedulePersistence();
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeQaDrop(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  try { render(); } catch (e) {}
  return true;
}

function renderLinkList(filterText) {

  // Get the emailId of the active email so we can exclude already-linked tasks

  const filtered = TASKS.filter(t => {

    const proj = getRelated(t.task_id, 'task_project')[0];
    const haystack = ((t.title || '') + ' ' + (proj ? proj.name : '')).toLowerCase();
    return haystack.includes(q);

function showLinkFlash(msg, kind) {
  const el = document.getElementById('link-flash');
  if (!el) return;
  el.className = 'link-flash ' + (kind || 'info');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);

// Link the active email to a task — creates EML record + REL if not already linked
function linkEmailToTask(taskId) {
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeQaDrop(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  const ae = getActiveEmail();
  const t = TASKS.find(x => x.task_id === taskId);
  if (!t) return;

  // Find or create the EML record
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  // Check via RELATIONS whether this email is already linked to this task
  if (relationExists(taskId, emailId, 'task_email')) {
    showLinkFlash(tr('EMAIL_ALREADY_LINKED'), 'info');
    return;
  }

  addRelation(taskId, emailId, 'task_email');
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeQaDrop(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  try { render(); } catch(e) {}
}

// FOLLOW-UP RECURRENCE HELPERS
// =============================================================================
function cloneJson(value) {
 return JSON.parse(JSON.stringify(value || {}));
}
function addDaysIsoLegacy(dateStr, daysToAdd) {
 if (!dateStr) return null;
 const [y, m, d] = String(dateStr).split('-').map(Number);
 const baseDate = new Date(y, (m || 1) - 1, d || 1);
 baseDate.setDate(baseDate.getDate() + (parseInt(daysToAdd || '0', 10) || 0));
 return dateToIsoLocal(baseDate);
}

function getWeekdayIndex(code) {
 const map = { su:0, mo:1, tu:2, we:3, th:4, fr:5, sa:6 };
 return map[code] != null ? map[code] : 1;
}
function getOrdinalNumber(ordinal) {
 const map = { '1':1, '2':2, '3':3, '4':4 };
 return map[String(ordinal)] || 1;
}
function getRepeatSummaryFromConfig(config) {
 if (!config || !config.enabled) return '';
 const wdMap = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
 const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
 const weekdayName = code => tr(wdMap[code] || 'WD_MO');
 if (config.type === 'weekly') return tr('REP_SUM_WEEKS')(parseInt(config.intervalWeeks || '1', 10) || 1, weekdayName(config.weekday || 'mo'));
 if (config.type === 'monthly_dom') return tr('REP_SUM_DOM')(parseInt(config.dayOfMonth || '1', 10) || 1);
 if (config.type === 'monthly_ordinal') return tr('REP_SUM_ORDINAL')(tr(ordMap[String(config.ordinal || '1')] || 'ORD_1'), weekdayName(config.weekday || 'mo'));
 return tr('REP_SUM_DAYS')(parseInt(config.intervalDays || '1', 10) || 1);
}
function getMonthOrdinalDate(yearValue, monthValue, ordinal, weekdayCode) {
 const weekdayIndex = getWeekdayIndex(weekdayCode);
 const ordinalValue = String(ordinal || '1');
 if (ordinalValue === 'last') {
  const cursor = new Date(yearValue, monthValue + 1, 0);
  while (cursor.getDay() !== weekdayIndex) cursor.setDate(cursor.getDate() - 1);
  return cursor;
 }
 const targetOrdinal = getOrdinalNumber(ordinalValue);
 const cursor = new Date(yearValue, monthValue, 1);
 while (cursor.getDay() !== weekdayIndex) cursor.setDate(cursor.getDate() + 1);
 cursor.setDate(cursor.getDate() + (targetOrdinal - 1) * 7);
 if (cursor.getMonth() !== monthValue) return null;
 return cursor;
}
function computeNextRecurringDate(config, fromDate) {
 if (!config || !config.enabled) return null;
 const startDate = fromDate || config.startDate || todayIso();
 const safeDate = new Date(startDate + 'T00:00:00');
 if (Number.isNaN(safeDate.getTime())) return null;
 if (config.type === 'weekly') {
  const weeks = parseInt(config.intervalWeeks || '1', 10) || 1;
  const weekdayIndex = getWeekdayIndex(config.weekday || 'mo');
  const cursor = new Date(safeDate);
  cursor.setDate(cursor.getDate() + 1);
  for (let step = 0; step < 370; step++) {
   if (cursor.getDay() === weekdayIndex) {
    const diffDays = Math.round((cursor - safeDate) / 86400000);
    if (diffDays >= 7 && diffDays % (weeks * 7) === 0) return nextWorkday(dateToIsoLocal(cursor));
   }
   cursor.setDate(cursor.getDate() + 1);
  }
  return null;
 }
 if (config.type === 'monthly_dom') {
  const dayOfMonth = Math.min(31, Math.max(1, parseInt(config.dayOfMonth || '1', 10) || 1));
  let yearValue = safeDate.getFullYear();
  let monthValue = safeDate.getMonth() + 1;
  if (monthValue > 11) { monthValue = 0; yearValue += 1; }
  const lastDay = new Date(yearValue, monthValue + 1, 0).getDate();
  const nextDate = new Date(yearValue, monthValue, Math.min(dayOfMonth, lastDay));
  return nextWorkday(dateToIsoLocal(nextDate));
 }
 if (config.type === 'monthly_ordinal') {
  let yearValue = safeDate.getFullYear();
  let monthValue = safeDate.getMonth() + 1;
  if (monthValue > 11) { monthValue = 0; yearValue += 1; }
  const nextDate = getMonthOrdinalDate(yearValue, monthValue, config.ordinal || '1', config.weekday || 'mo');
  return nextDate ? nextWorkday(dateToIsoLocal(nextDate)) : null;
 }
 const days = parseInt(config.intervalDays || '1', 10) || 1;
 return nextWorkday(window.TaskFlow.utils.addDaysIso(startDate, days));
}
function normalizeFollowupConfig(config, fallbackDate, fallbackDays) {
 const followup = cloneJson(config);
 if (!followup.enabled) {
  return { enabled:false, finalized:false, done:false, type:'interval_days', intervalDays: parseInt(fallbackDays || '2', 10) || 2, startDate: fallbackDate || (fallbackDays > 0 ? window.TaskFlow.utils.addDaysIso(todayIso(), fallbackDays) : ''), nextDate:null, summary:'', lastCompletedAt:null };
 }
 followup.type = followup.type || 'interval_days';
 followup.intervalDays = parseInt(followup.intervalDays || '2', 10) || 2;
 followup.intervalWeeks = parseInt(followup.intervalWeeks || '1', 10) || 1;
 followup.dayOfMonth = parseInt(followup.dayOfMonth || '2', 10) || 2;
 followup.weekday = followup.weekday || 'mo';
 followup.ordinal = followup.ordinal || '1';
 followup.finalized = !!followup.finalized;
 followup.done = !!followup.done;
 followup.startDate = followup.startDate || followup.nextDate || fallbackDate || (fallbackDays > 0 ? window.TaskFlow.utils.addDaysIso(todayIso(), fallbackDays) : '');
 followup.summary = getRepeatSummaryFromConfig(followup);
 followup.lastCompletedAt = followup.lastCompletedAt || null;
 if (followup.finalized) {
  followup.nextDate = null;
  followup.done = false;
 } else {
  followup.nextDate = followup.nextDate || followup.startDate || fallbackDate || null;
 }
 return followup;
}
function syncTaskFollowupFields(task) {
 if (!task) return;
 task.followup = normalizeFollowupConfig(task.followup, task.followup_date, task.followup_days);
 task.followup_date = task.followup.finalized ? null : (task.followup.nextDate || null);
 if (task.followup_date) {
  const diffDays = Math.round((new Date(task.followup_date) - new Date(todayIso())) / 86400000);
  task.followup_days = Math.max(0, diffDays);
 } else {
  task.followup_days = 0;
 }
}
function getTaskFollowup(task) {
 if (!task) return normalizeFollowupConfig({ enabled:false }, null, 0);
 syncTaskFollowupFields(task);
 return task.followup;
}
let SHOW_SYSTEM_COMMENTS = false;

function getUserCommentCount(taskId) {

function normalizeAuditValue(value) {
 if (value == null) return '';
 if (typeof value === 'boolean') return value ? 'true' : 'false';
 if (typeof value === 'number') return String(value);
 if (typeof value === 'string') return value.trim();
 return JSON.stringify(value);
}
function addTaskSystemComment(taskId, fieldLabel, oldValue, newValue) {
 const previousValue = normalizeAuditValue(oldValue);
 const nextValue = normalizeAuditValue(newValue);
 if (!previousValue || previousValue === nextValue) return;
 const commentId = nextId('CMT');
 const text = `SYSTEM - ${getCurrentUserDisplayName()} - ${currentDateTimeLocal()} - ${fieldLabel} - ${previousValue} - ${nextValue}`;
 COMMENTS.push({ comment_id: commentId, text, created_at: new Date().toISOString(), comment_type: 'system' });
 addRelation(taskId, commentId, 'task_comment');
 refreshTaskCommentCount(taskId);
}

function collectTaskAuditState(taskId) {

 const followup = getTaskFollowup(task);

function onFollowupToggle() {

  weekly: document.getElementById('fup-weekly'),

  monthly_ordinal: document.getElementById('fup-monthly-ordinal'),
 };
 Object.values(blocks).forEach(block => { if (block) block.style.display = 'none'; });

function updateFollowupSummary() {
 const enabled = !!document.getElementById('cf-followup-enabled')?.checked;
 const summaryField = document.getElementById('cf-followup-summary');
 const warning = document.getElementById('cf-followup-warning');
 if (!summaryField) return;
 if (!enabled) {
  summaryField.value = '';
  if (warning) warning.style.display = 'none';
  return;
 }
 const config = getFollowupConfigFromForm();
 config.summary = getRepeatSummaryFromConfig(config);
 summaryField.value = config.summary;
 if (warning) {
  const dueDate = document.getElementById('cf-due')?.value || '';
  const nextDate = config.finalized ? '' : (config.nextDate || config.startDate || '');
  if (dueDate && nextDate && nextDate > dueDate) {
   warning.textContent = tr('CF_FOLLOWUP_AFTER_DUE');
   warning.style.display = 'block';
  } else {
   warning.style.display = 'none';
  }
 }
}
function getFollowupConfigFromForm() {
 const enabled = !!document.getElementById('cf-followup-enabled')?.checked;
 if (!enabled) return { enabled:false, finalized:false, done:false, summary:'' };
 const type = document.getElementById('cf-followup-type')?.value || 'interval_days';
 const finalized = !!document.getElementById('cf-followup-finalized')?.checked;
 const currentDate = document.getElementById('cf-followup-current-date')?.value || todayIso();
 const config = {
  enabled:true,
  type,
  startDate: currentDate,
  finalized,
  done:false,
  intervalDays: parseInt(document.getElementById('cf-followup-interval-days')?.value || '2', 10) || 2,
  intervalWeeks: parseInt(document.getElementById('cf-followup-interval-weeks')?.value || '1', 10) || 1,
  weekday: document.getElementById('cf-followup-weekday')?.value || document.getElementById('cf-followup-ordinal-weekday')?.value || 'mo',
  dayOfMonth: parseInt(document.getElementById('cf-followup-dom')?.value || '2', 10) || 2,
  ordinal: document.getElementById('cf-followup-ordinal')?.value || '1',
  lastCompletedAt: null,
 };
 if (type === 'monthly_ordinal') config.weekday = document.getElementById('cf-followup-ordinal-weekday')?.value || 'mo';
 if (type === 'weekly') config.weekday = document.getElementById('cf-followup-weekday')?.value || 'mo';
 config.summary = getRepeatSummaryFromConfig(config);
 config.nextDate = finalized ? null : currentDate;
 return config;
}
function advanceTaskFollowup(taskId, action) {
 const task = TASKS.find(item => item.task_id === taskId);
 if (!task) { closeQePop(); return; }
 const beforeState = collectTaskAuditState(taskId);
 const followup = getTaskFollowup(task);
 if (!followup.enabled) {
  closeQePop();
  return;
 }
 if (action === 'finish') {
  followup.finalized = true;
  followup.done = false;
  followup.nextDate = null;
  followup.lastCompletedAt = todayIso();
 } else if (action === 'done') {
  const completionDate = todayIso();
  followup.lastCompletedAt = completionDate;
  followup.done = false;
  if (followup.type) {
   followup.nextDate = computeNextRecurringDate(followup, completionDate);
   followup.startDate = completionDate;
  } else {
   followup.nextDate = null;
   followup.enabled = false;
  }
 }
 task.followup = normalizeFollowupConfig(followup, followup.nextDate, task.followup_days || 0);
 syncTaskFollowupFields(task);
 if (task.followup_date) {
  task.followup_date = nextWorkday(task.followup_date);
  if (task.followup) task.followup.nextDate = task.followup_date;
 }
 const afterState = collectTaskAuditState(taskId);
 logTaskAuditChanges(taskId, beforeState, afterState);
 schedulePersistence();
 closeQePop();
 try { render(); } catch(error) {}
}

function getEstimatedTimeDisplay(totalMinutes) {
  const safeMinutes = parseInt(totalMinutes || '0', 10) || 0;
  if (safeMinutes > 0 && safeMinutes % (8 * 60) === 0) return { value: safeMinutes / (8 * 60), unit: 'd' };
  if (safeMinutes > 0 && safeMinutes % 60 === 0) return { value: safeMinutes / 60, unit: 'h' };
  return { value: safeMinutes, unit: 'min' };
}

function getActiveEmailSummary() {
  const activeEmail = getActiveEmail();
  return tr('NOTES_SUBJECT') + ': ' + (activeEmail.subject || '') + '\n' +
         tr('NOTES_FROM') + ': ' + (activeEmail.from || '') + '\n' +
         tr('NOTES_DATE') + ': ' + (activeEmail.dateLabel || '') + '\n' +
         tr('NOTES_ATTACHMENTS') + ': ' + (activeEmail.attachments != null ? activeEmail.attachments : '');
}

function removeTaskRelationsByType(taskId, relationType) {
  RELATIONS = RELATIONS.filter(relation => !(relation.related1_id === taskId && relation.relation_type === relationType));
}

function getTaskFormConfig(mode, taskId) {
  const projectNames = PROJECTS.map(project => project.name);
  const peopleNames = PEOPLE.map(person => person.name);
  const providerNames = PROVIDERS.map(provider => provider.name);

  if (mode === 'edit') {
    const task = TASKS.find(item => item.task_id === taskId);
    if (!task) return null;
    const taskProject = getTaskProject(taskId);
    const taskPeople = getTaskPeople(taskId);
    const taskProviders = getTaskProviders(taskId);
    const taskOwner = taskPeople.find(person => person.person_id !== MY_PERSON_ID) || taskPeople[0] || null;
    const taskProvider = taskProviders[0] || null;
    const estimatedTime = getEstimatedTimeDisplay(task.time_minutes || 0);
    const followupConfig = getTaskFollowup(task);
    return {
      mode: 'edit',
      taskId,
      overlayTitle: tr('OV_EDIT_TASK'),
      overlaySubtitle: task.title || '',
      saveLabel: tr('CF_SAVE_CHANGES'),
      saveAction: `saveTaskForm('edit','${taskId}')`,
      backAction: 'closeOv()',
      notesReadOnly: false,
      projectNames,
      peopleNames,
      providerNames,
      values: {
        title: task.title || '',
        project: taskProject ? taskProject.name : '',
        category: task.outlook_category || 'Task',
        priority: task.priority || 3,
        status: task.status || 'pending',
        owner: taskOwner ? taskOwner.name : '',
        provider: taskProvider ? taskProvider.name : '',
        followupDays: task.followup_days || 0,
        followup: followupConfig,
        dueDate: task.due_date || '',
        repeat: task.repeat || { enabled: false },
        timeValue: estimatedTime.value,
        timeUnit: estimatedTime.unit,
        notes: task.notes || '',
        comment: ''
      }
    };
  }

  const activeEmail = getActiveEmail() || {};
  return {
    mode: 'create',
    taskId: null,
    overlayTitle: tr('OV_CREATE_TASK'),
    overlaySubtitle: activeEmail.subject || tr('OV_CREATE_TASK'),
    saveLabel: tr('CF_SAVE'),
    saveAction: "saveTaskForm('create')",
    backAction: 'openQuickActions()',
    notesReadOnly: true,
    projectNames,
    peopleNames,
    providerNames,
    values: {
      title: activeEmail.subject || '',
      project: '',
      category: 'Task',
      priority: 2,
      status: 'pending',
      owner: '',
      provider: '',
      followupDays: 2,
      followup: { enabled: true, finalized: false, done: false, type: 'interval_days', intervalDays: 2, startDate: todayIso(), nextDate: todayIso(), summary: tr('REP_SUM_DAYS')(2), lastCompletedAt: null },
      dueDate: '',
      repeat: { enabled: false, type: 'interval_days', intervalDays: 5 },
      timeValue: 30,
      timeUnit: 'min',
      notes: activeEmail.subject ? getActiveEmailSummary() : '',
      comment: ''
    }
  };
}

        <input class="cf-input" id="cf-owner" list="cf-people" value="${escapeHtml(values.owner || '')}" placeholder="${tr('CF_RESPONSIBLE_PH')}" />

    <div class="cf-section cf-grid3">
      <div>
        <div class="cf-label">${tr('CF_DUE')}</div>
        <input class="cf-input" id="cf-due" type="date" value="${values.dueDate || ''}" oninput="handleDueDateChange(this)" onchange="handleDueDateChange(this)" />
        <div id="cf-due-weekend-warn" class="cf-hint" style="display:none;color:var(--am);margin-top:5px"></div>
      </div>
      <div>
        <div class="cf-label">${tr('CF_TIME')}</div>
        <input class="cf-input" id="cf-time-val" type="number" min="0" max="9999" value="${values.timeValue || 0}" />
      </div>
      <div>
        <div class="cf-label">${tr('CF_TIME_UNIT')}</div>
        <select class="cf-unit" id="cf-time-unit">
          <option value="min" ${values.timeUnit === 'min' ? 'selected' : ''}>${tr('UNIT_MIN')}</option>
          <option value="h" ${values.timeUnit === 'h' ? 'selected' : ''}>${tr('UNIT_H')}</option>
          <option value="d" ${values.timeUnit === 'd' ? 'selected' : ''}>${tr('UNIT_D')}</option>
        </select>
      </div>
    </div>
    <div class="cf-section" id="cf-followup-section">
      <div class="cf-label">${tr('CF_FOLLOWUP')} <span class="cf-hint">${tr('CF_FOLLOWUP_SECTION_HINT')}</span></div>
      <div class="rep-box" id="fup-box">
        <div class="rep-row">
          <input type="checkbox" id="cf-followup-enabled" onchange="onFollowupToggle()" ${followupConfig.enabled ? 'checked' : ''} />
          <span>${tr('CF_FOLLOWUP_LABEL')}</span>
        </div>
        <div class="rep-opts" id="cf-followup-opts">
          <div class="cf-grid2" style="margin-top:10px">
            <div>
              <div class="cf-label">${tr('CF_FOLLOWUP_TYPE')}</div>
              <select class="cf-select" id="cf-followup-type" onchange="onFollowupTypeChange()">
                <option value="interval_days" ${(!followupConfig.type || followupConfig.type === 'interval_days') ? 'selected' : ''}>${tr('REP_INTERVAL_DAYS')}</option>
                <option value="weekly" ${followupConfig.type === 'weekly' ? 'selected' : ''}>${tr('REP_WEEKLY')}</option>
                <option value="monthly_dom" ${followupConfig.type === 'monthly_dom' ? 'selected' : ''}>${tr('REP_MONTHLY_DOM')}</option>
                <option value="monthly_ordinal" ${followupConfig.type === 'monthly_ordinal' ? 'selected' : ''}>${tr('REP_MONTHLY_ORDINAL')}</option>
              </select>
            </div>
            <div>
              <div class="cf-label">${tr('CF_FOLLOWUP_SUMMARY')}</div>
              <input class="cf-input" id="cf-followup-summary" value="${escapeHtml(followupConfig.summary || '')}" readonly />
            </div>
          </div>
          <input type="hidden" id="cf-followup-current-date" value="${currentFollowupDate}" />
          <div id="fup-interval-days" style="margin-top:10px">
            <div class="cf-label">${tr('CF_REPEAT_DAYS_Q')}</div>
            <input class="cf-input" id="cf-followup-interval-days" type="number" min="1" max="365" value="${followupConfig.intervalDays || 2}" oninput="updateFollowupSummary()" />
          </div>
          <div id="fup-weekly" style="margin-top:10px;display:none">
            <div class="cf-grid2">
              <div>
                <div class="cf-label">${tr('CF_REPEAT_WEEKS_Q')}</div>
                <input class="cf-input" id="cf-followup-interval-weeks" type="number" min="1" max="52" value="${followupConfig.intervalWeeks || 1}" oninput="updateFollowupSummary()" />
              </div>
              <div>
                <div class="cf-label">${tr('CF_WEEKDAY')}</div>
                <select class="cf-select" id="cf-followup-weekday" onchange="updateFollowupSummary()">
                  <option value="mo" ${(followupConfig.weekday || 'mo') === 'mo' ? 'selected' : ''}>${tr('WD_MO')}</option>
                  <option value="tu" ${followupConfig.weekday === 'tu' ? 'selected' : ''}>${tr('WD_TU')}</option>
                  <option value="we" ${followupConfig.weekday === 'we' ? 'selected' : ''}>${tr('WD_WE')}</option>
                  <option value="th" ${followupConfig.weekday === 'th' ? 'selected' : ''}>${tr('WD_TH')}</option>
                  <option value="fr" ${followupConfig.weekday === 'fr' ? 'selected' : ''}>${tr('WD_FR')}</option>
                  <option value="sa" ${followupConfig.weekday === 'sa' ? 'selected' : ''}>${tr('WD_SA')}</option>
                  <option value="su" ${followupConfig.weekday === 'su' ? 'selected' : ''}>${tr('WD_SU')}</option>
                </select>
              </div>
            </div>
          </div>
          <div id="fup-monthly-dom" style="margin-top:10px;display:none">
            <div class="cf-label">${tr('CF_DOM')}</div>
            <input class="cf-input" id="cf-followup-dom" type="number" min="1" max="31" value="${followupConfig.dayOfMonth || 2}" oninput="updateFollowupSummary()" />
          </div>
          <div id="fup-monthly-ordinal" style="margin-top:10px;display:none">
            <div class="cf-grid2">
              <div>
                <div class="cf-label">${tr('CF_ORDINAL')}</div>
                <select class="cf-select" id="cf-followup-ordinal" onchange="updateFollowupSummary()">
                  <option value="1" ${String(followupConfig.ordinal || '1') === '1' ? 'selected' : ''}>${tr('ORD_1')}</option>
                  <option value="2" ${String(followupConfig.ordinal || '1') === '2' ? 'selected' : ''}>${tr('ORD_2')}</option>
                  <option value="3" ${String(followupConfig.ordinal || '1') === '3' ? 'selected' : ''}>${tr('ORD_3')}</option>
                  <option value="4" ${String(followupConfig.ordinal || '1') === '4' ? 'selected' : ''}>${tr('ORD_4')}</option>
                  <option value="last" ${String(followupConfig.ordinal || '1') === 'last' ? 'selected' : ''}>${tr('ORD_LAST')}</option>
                </select>
              </div>
              <div>
                <div class="cf-label">${tr('CF_WEEKDAY2')}</div>
                <select class="cf-select" id="cf-followup-ordinal-weekday" onchange="updateFollowupSummary()">
                  <option value="mo" ${(followupConfig.weekday || 'mo') === 'mo' ? 'selected' : ''}>${tr('WD_MO')}</option>
                  <option value="tu" ${followupConfig.weekday === 'tu' ? 'selected' : ''}>${tr('WD_TU')}</option>
                  <option value="we" ${followupConfig.weekday === 'we' ? 'selected' : ''}>${tr('WD_WE')}</option>
                  <option value="th" ${followupConfig.weekday === 'th' ? 'selected' : ''}>${tr('WD_TH')}</option>
                  <option value="fr" ${followupConfig.weekday === 'fr' ? 'selected' : ''}>${tr('WD_FR')}</option>
                  <option value="sa" ${followupConfig.weekday === 'sa' ? 'selected' : ''}>${tr('WD_SA')}</option>
                  <option value="su" ${followupConfig.weekday === 'su' ? 'selected' : ''}>${tr('WD_SU')}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="rep-row" style="padding:8px 0 0;margin-top:10px">
            <input type="checkbox" id="cf-followup-finalized" onchange="updateFollowupSummary()" ${followupConfig.finalized ? 'checked' : ''} />
            <span>${tr('CF_FOLLOWUP_FINALIZED')}</span>
          </div>
          <div class="cf-hint" id="cf-followup-warning" style="display:none;color:var(--re);margin-top:8px"></div>
        </div>
      </div>
    </div>

  OV_RETURN_FOCUS_ID  = LAST_FOCUS_ID;
  document.getElementById('ovt').textContent = formConfig.overlayTitle;
  document.getElementById('ovs').textContent = formConfig.overlaySubtitle || '';
  document.getElementById('ovl').innerHTML = renderTaskForm(formConfig);
  document.getElementById('ov').classList.add('open');
  document.getElementById('bk').classList.add('open');
  onRepeatToggle();
  onRepeatTypeChange();
  updateRepeatSummary();
  onFollowupToggle();
  onFollowupTypeChange();
  updateFollowupSummary();
  onCreateStatusChange();
}

function getTaskFormPayload() {
  const statusValue = document.getElementById('cf-status')?.value || 'pending';
  const isCompleted = statusValue === 'completed';
  const rawDueDate = isCompleted ? null : (document.getElementById('cf-due')?.value || null);
  const adjustedDueResult = rawDueDate ? adjustToWeekdayIfWeekend(rawDueDate) : { adjusted: rawDueDate, wasWeekend: false };
  if (adjustedDueResult.wasWeekend) {
    const dueInput = document.getElementById('cf-due');
    if (dueInput) dueInput.value = adjustedDueResult.adjusted;
    showDueWeekendWarning();
  }
  const dueDate = isCompleted ? null : (adjustedDueResult.adjusted || null);
  const followupConfig = isCompleted ? { enabled:false, finalized:false, done:false, summary:'' } : getFollowupConfigFromForm();
  const followupDays = isCompleted ? 0 : (() => {
    const nextDate = followupConfig.finalized ? null : (followupConfig.nextDate || followupConfig.startDate || null);
    if (!nextDate) return 0;
    const diff = Math.round((new Date(nextDate) - new Date(todayIso())) / 86400000);
    return Math.max(0, diff);
  })();
  const timeValue = parseInt(document.getElementById('cf-time-val')?.value || '0', 10) || 0;
  const timeUnit = document.getElementById('cf-time-unit')?.value || 'min';
  return {
    title: (document.getElementById('cf-title')?.value || '').trim(),
    projectName: (document.getElementById('cf-project')?.value || '').trim() || tr('NO_PROJECT'),
    category: document.getElementById('cf-category')?.value || 'Task',
    priority: parseInt(document.getElementById('cf-priority')?.value || '3', 10),
    statusValue,
    isCompleted,
    ownerName: (document.getElementById('cf-owner')?.value || '').trim(),
    providerName: (document.getElementById('cf-provider')?.value || '').trim(),
    followupDays,
    followupConfig,
    dueDate,
    timeValue,
    timeUnit,
    timeMinutes: minutesFrom(timeValue, timeUnit),
    notes: document.getElementById('cf-notes')?.value || '',
    commentText: (document.getElementById('cf-comment')?.value || '').trim(),
    repeatConfig: isCompleted ? { enabled: false } : getRepeatConfig()
  };
}

function buildExistingActionsInfo(emailId) {
  const linked = TASKS.filter(t =>
    ['Task','Meeting','Call'].includes(t.outlook_category || t.category) &&
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  if (!linked.length) return '';
  const chips = linked.map(t => {
    const cat = t.outlook_category || t.category || '';
    const isFu = cat === 'Task';
    const isMt = cat === 'Meeting';
    const cls  = isFu ? 'fu' : isMt ? 'mt' : '';
    const icon = isFu ? '👁️' : isMt ? '📅' : '📞';
    const label = isFu ? tr('EXIST_FOLLOWUP') : isMt ? tr('EXIST_MEETING') : tr('EXIST_CALL');
    const date  = t.due_date ? ' · ' + fmtDate(t.due_date) : t.followup_date ? ' · ' + fmtDate(t.followup_date) : '';
    return `<span class="exist-chip ${cls}">${icon} ${label}${escapeHtml(date)}: ${escapeHtml(t.title)}</span>`;
  }).join('');
  return `<div class="exist-info"><div class="exist-info-msg">${tr('EXIST_INFO')}</div><div class="exist-chips">${chips}</div></div>`;
}

function openCreateTaskForm(ev) {
  const formConfig = getTaskFormConfig('create');
  if (!formConfig) return;

  const ae = getActiveEmail();
  if (!ae) return;
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  // Find existing linked tasks by category
  const linkedTasks = TASKS.filter(t =>
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  const existFu = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return (cat === 'Task') && (t.followup_date || t.due_date);
  });
  const existMt = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return cat === 'Meeting' || cat === 'Call';
  });

  if (existFu) {
    const existingFollowup = getTaskFollowup(existFu);
    formConfig.values.followup = existingFollowup;
    if (existFu.followup_date) {
      const diff = Math.round((new Date(existFu.followup_date) - new Date(todayIso())) / 86400000);
      formConfig.values.followupDays = Math.max(0, diff);
    } else if (existFu.followup_days != null) {
      formConfig.values.followupDays = existFu.followup_days;
    }
    if (existFu.due_date && !formConfig.values.dueDate) {
      formConfig.values.dueDate = existFu.due_date;
    }
  }

  if (existMt && existMt.due_date && !formConfig.values.dueDate) {
    formConfig.values.dueDate = existMt.due_date;
  }

  formConfig._existBanner = buildExistingActionsInfo(emailId);
  formConfig.emailId = emailId;
  formConfig.mode = 'create';
  formConfig.backAction = 'closeTaskCreatePopdown()';

  toggleTaskCreatePopdown(formConfig, ev && ev.currentTarget ? ev.currentTarget : null);
}

function proceedOpenEditTask(taskId) {
  const formConfig = getTaskFormConfig('edit', taskId);
  if (!formConfig) return;
  mountTaskForm(formConfig);
}

function openEditTask(taskId) {
  const task = TASKS.find(item => item.task_id === taskId);
  if (task && task.status === 'completed') {
    openOv(
      tr('EDIT_DONE_TITLE'),
      tr('EDIT_DONE_SUB'),
      `<div class="cf-wrap">
        <div style="font-size:13px;color:var(--t);line-height:1.45">${tr('EDIT_DONE_MSG')}</div>
        <div class="cf-actions">
          <button class="cf-btn" type="button" onclick="closeOv()">${tr('EDIT_DONE_CANCEL')}</button>
          <button class="cf-btn primary" type="button" onclick="closeOv();proceedOpenEditTask('${taskId}')">${tr('EDIT_DONE_CONTINUE')}</button>
        </div>
      </div>`
    );
    return;
  }
  proceedOpenEditTask(taskId);
}

function saveTaskForm(mode, taskId) {
  const payload = getTaskFormPayload();
  if (!payload.title) {
    showCreateFlash(tr('EMPTY_TITLE'), 'err');
    return;
  }

  if (mode === 'edit') {
    const task = TASKS.find(item => item.task_id === taskId);
    if (!task) return;
    const beforeState = collectTaskAuditState(taskId);
    task.title = payload.title;
    task.outlook_category = payload.category;
    task.priority = payload.priority;
    task.status = payload.statusValue;
    task.followup_days = payload.followupDays;
    task.due_date = payload.dueDate;
    task.followup = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
    task.time_minutes = payload.timeMinutes;
    task.notes = payload.notes;
    task.repeat = payload.repeatConfig;
    syncTaskFollowupFields(task);
    const projectId = findOrCreateProject(payload.projectName);
    removeTaskRelationsByType(taskId, 'task_project');
    addRelation(taskId, projectId, 'task_project');
    removeTaskRelationsByType(taskId, 'task_provider');
    if (payload.providerName) {
      const providerId = findOrCreateProvider(payload.providerName);
      addRelation(taskId, providerId, 'task_provider');
    }
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (payload.ownerName) {
      const ownerId = findOrCreatePerson(payload.ownerName);
      if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskId, ownerId, 'task_person');
    }
    const afterState = collectTaskAuditState(taskId);
    logTaskAuditChanges(taskId, beforeState, afterState);
    if (payload.commentText) {
      const commentId = nextId('CMT');
      COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
      addRelation(taskId, commentId, 'task_comment');
    }
    refreshTaskCommentCount(taskId);
    try { render(); } catch (error) {}
    schedulePersistence();
    showCreateFlash(tr('EDIT_SAVED'), 'ok');
    setTimeout(() => { try { closeOv(); } catch (error) {} }, 800);
    return;
  }

  const activeEmail = getActiveEmail();
  const projectId = findOrCreateProject(payload.projectName);
  const ownerId = payload.ownerName ? findOrCreatePerson(payload.ownerName) : null;
  const providerId = payload.providerName ? findOrCreateProvider(payload.providerName) : null;
  const emailId = findOrCreateEmail(activeEmail.subject, activeEmail.from, activeEmail.fromName, activeEmail.dateLabel, activeEmail.attachments, activeEmail.messageId);
  let timeEntryId = null;
  if (payload.timeMinutes > 0) {
    timeEntryId = nextId('TIM');
    const unitLabel = payload.timeUnit === 'h' ? 'hours' : payload.timeUnit === 'd' ? 'days' : 'minutes';
    TIME_ENTRIES.push({ entry_id: timeEntryId, entry_date: todayIso(), amount: payload.timeValue, unit: unitLabel });
  }
  let commentId = null;
  if (payload.commentText) {
    commentId = nextId('CMT');
    COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
  }
  const taskIdNew = nextId('TSK');
  const followupState = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
  const followupDate = payload.isCompleted ? null : (followupState.finalized ? null : (followupState.nextDate || null));
  TASKS.unshift({
    task_id: taskIdNew,
    title: payload.title,
    priority: payload.priority,
    status: payload.statusValue,
    due_date: payload.dueDate,
    followup_date: followupDate,
    followup_days: payload.followupDays,
    followup: followupState,
    time_minutes: payload.timeMinutes,
    comment_count: payload.commentText ? 1 : 0,
    outlook_category: payload.category,
    notes: payload.notes,
    repeat: payload.repeatConfig,
    created_at: new Date().toISOString(),
  });
  addRelation(taskIdNew, projectId, 'task_project');
  addRelation(taskIdNew, emailId, 'task_email');
  addRelation(taskIdNew, MY_PERSON_ID, 'task_person');
  if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskIdNew, ownerId, 'task_person');
  if (providerId) addRelation(taskIdNew, providerId, 'task_provider');
  if (timeEntryId) {
    addRelation(taskIdNew, timeEntryId, 'task_time_entry');
    addRelation(MY_PERSON_ID, timeEntryId, 'person_time_entry');
  }
  if (commentId) addRelation(taskIdNew, commentId, 'task_comment');
  try { render(); } catch (error) {}
  schedulePersistence();
  showCreateFlash(tr('TASK_CREATED'), 'ok');
  setTimeout(() => { try { closeOv(); } catch (error) {} }, 900);
}

function onRepeatToggle() {
  const chk  = document.getElementById('cf-repeat-enabled');
  const opts = document.getElementById('cf-repeat-opts');
  if (!chk || !opts) return;
  opts.classList.toggle('visible', !!chk.checked && !chk.disabled);

function onRepeatTypeChange() {
  const sel = document.getElementById('cf-repeat-type');
  if (!sel) return;
  const v = sel.value;
  const blocks = {
    interval_days:   document.getElementById('rep-interval-days'),
    weekly:          document.getElementById('rep-weekly'),
    monthly_dom:     document.getElementById('rep-monthly-dom'),
    monthly_ordinal: document.getElementById('rep-monthly-ordinal'),
  };
  Object.values(blocks).forEach(b => { if (b) b.style.display = 'none'; });
  if (blocks[v]) blocks[v].style.display = 'block';
  updateRepeatSummary();
}

function updateRepeatSummary() {
  const sel = document.getElementById('cf-repeat-type');
  const out = document.getElementById('cf-repeat-summary');
  if (!sel || !out) return;
  const wdMap  = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
  const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
  const wdName = code => tr(wdMap[code] || 'WD_MO');
  let text = '';
  if (sel.value === 'interval_days') {
    const n = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
    text = tr('REP_SUM_DAYS')(n);
  } else if (sel.value === 'weekly') {
    const n  = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10);
    const wd = document.getElementById('cf-repeat-weekday')?.value || 'mo';
    text = tr('REP_SUM_WEEKS')(n, wdName(wd));
  } else if (sel.value === 'monthly_dom') {
    const d = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
    text = tr('REP_SUM_DOM')(d);
  } else if (sel.value === 'monthly_ordinal') {
    const ord = document.getElementById('cf-repeat-ordinal')?.value || '1';
    const wd  = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo';
    text = tr('REP_SUM_ORDINAL')(tr(ordMap[ord] || 'ORD_1'), wdName(wd));
  }
  out.value = text;
}

function getRepeatConfig() {
  const enabled = !!document.getElementById('cf-repeat-enabled')?.checked;
  const type    = document.getElementById('cf-repeat-type')?.value || 'interval_days';
  if (!enabled) return { enabled: false };
  const cfg = { enabled: true, type };
  if (type === 'interval_days')   cfg.intervalDays  = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
  if (type === 'weekly')          { cfg.intervalWeeks = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10); cfg.weekday = document.getElementById('cf-repeat-weekday')?.value || 'mo'; }
  if (type === 'monthly_dom')     cfg.dayOfMonth = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
  if (type === 'monthly_ordinal') { cfg.ordinal = document.getElementById('cf-repeat-ordinal')?.value || '1'; cfg.weekday = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo'; }
  cfg.summary = document.getElementById('cf-repeat-summary')?.value || '';
  return cfg;
}

// Comentarios en castellano
function getTaskDueDateForFollowup(sourceTaskId) {
  const task = sourceTaskId ? findById(sourceTaskId) : null;
  return task ? (task.due_date || null) : null;
}

// Comentarios en castellano
function getTaskFollowupConflict(sourceTaskId) {
  const task = sourceTaskId ? findById(sourceTaskId) : null;
  if (!task || task.status === 'completed') return null;

  const followup = task.followup || {};
  if (followup.enabled && !followup.finalized && (followup.nextDate || followup.startDate || task.followup_date)) return task;
  if (task.followup_date) return task;

  const relatedIds = new Set();
  (RELATIONS || []).forEach(rel => {
    if (rel.type !== 'task_task') return;
    if (rel.from_id === sourceTaskId) relatedIds.add(rel.to_id);
    if (rel.to_id === sourceTaskId) relatedIds.add(rel.from_id);
  });

  for (const relId of relatedIds) {
    const relTask = findById(relId);
    if (!relTask || relTask.status === 'completed') continue;
    const actionType = normalizeActionTypeKey(relTask.action_type || window.TaskFlow.utils.getActionTypeFromCategory(relTask.outlook_category || relTask.category || 'Task'));
    if (actionType === 'followup' || relTask.followup_date || relTask.followup?.enabled) return relTask;
  }

  return null;
}

// Comentarios en castellano
function computeFollowupFirstDateFromInputs() {
  const explicitDate = document.getElementById('fu-date')?.value || '';
  const rawDays = document.getElementById('fu-days')?.value || '';
  const days = parseInt(rawDays, 10);
  let originalDate = explicitDate;
  let fromDays = false;

  if (!originalDate && Number.isFinite(days) && days > 0) {
    originalDate = window.TaskFlow.utils.addDaysIso(todayIso(), days);
    fromDays = true;
  }

  if (!originalDate) return { ok:false, reason:'empty' };

  const adjustedDate = typeof nextWorkday === 'function' ? nextWorkday(originalDate) : originalDate;
  return {
    ok:true,
    originalDate,
    adjustedDate,
    wasWeekendAdjusted: adjustedDate !== originalDate,
    days: Number.isFinite(days) && days > 0 ? days : null,
    fromDays
  };
}

// Comentarios en castellano
function refreshFollowupDerivedDate() {
  const box = document.getElementById('fu-derived-date');
  if (!box) return;
  const result = computeFollowupFirstDateFromInputs();
  if (!result.ok) {
    box.style.display = 'none';
    box.textContent = '';
    return;
  }

  const todayStr = todayIso();
  const sourceTaskId = document.getElementById('qa-drop')?.dataset?.followupSourceTaskId || '';
  const dueDate = getTaskDueDateForFollowup(sourceTaskId);
  box.textContent = `${tr('FU_DERIVED_DATE')}: ${result.adjustedDate}` + (result.wasWeekendAdjusted ? ` · ${tr('FU_WEEKEND_ADJUSTED')}` : '');

  const invalid = result.adjustedDate < todayStr || (!!dueDate && result.adjustedDate > dueDate);
  if (invalid) {
    box.textContent += result.adjustedDate < todayStr ? ` · ${tr('FU_DATE_BEFORE_TODAY')}` : ` · ${tr('FU_DATE_AFTER_DUE')}`;
    box.style.background = 'rgba(220,38,38,.10)';
    box.style.color = 'var(--re)';
    box.style.borderColor = 'rgba(220,38,38,.22)';
  } else {
    box.style.background = 'var(--ac-s)';
    box.style.color = 'var(--ac)';
    box.style.borderColor = 'rgba(43,92,230,.20)';
  }
  box.style.display = 'block';
}

// Comentarios en castellano
function findOpenInteractionForPerson(personId, categories = ['Meeting','Call'], excludeTaskId = null) {
  if (!personId) return null;
  const allowed = new Set(categories.map(c => String(c || '').toLowerCase()));
  return (TASKS || []).find(task => {
    if (!task || task.task_id === excludeTaskId || task.status === 'completed') return false;
    const legacyCategory = String(task.outlook_category || task.category || '').toLowerCase();
    const actionType = normalizeActionTypeKey(task.action_type || window.TaskFlow.utils.getActionTypeFromCategory(task.outlook_category || task.category || 'Task'));
    const matchesType = allowed.has(legacyCategory) || (allowed.has('meeting') && actionType === 'meeting') || (allowed.has('call') && actionType === 'call');
    if (!matchesType) return false;
    return getRelatedIds(task.task_id, 'task_person').includes(personId);
  }) || null;
}

function saveFollowUpTask(sourceTaskId = null, sourceKind = 'email') {
  sourceTaskId = sourceTaskId || null;
  const ae = sourceKind === 'email' ? getActiveEmail() : null;
  const title = (document.getElementById('fu-title')?.value || '').trim();
  if (!title) {
    showFollowupFlash(tr('EMPTY_TITLE'), 'err');
    return;
  }

  if (sourceTaskId && getTaskFollowupConflict(sourceTaskId)) {
    showFollowupFlash(tr('FU_ALREADY_EXISTS'), 'err');
    return;
  }

  const computed = computeFollowupFirstDateFromInputs();
  if (!computed.ok) {
    showFollowupFlash(tr('FU_EMPTY_DATE_OR_DAYS'), 'err');
    return;
  }

  const followDate = computed.adjustedDate;
  const todayStr = todayIso();
  if (followDate < todayStr) {
    showFollowupFlash(tr('FU_DATE_BEFORE_TODAY'), 'err');
    return;
  }

  const dueDate = getTaskDueDateForFollowup(sourceTaskId);
  if (dueDate && followDate > dueDate) {
    showFollowupFlash(tr('WARN_FOLLOWUP_AFTER_DUE_BLOCK') || tr('FU_DATE_AFTER_DUE'), 'err');
    return;
  }

  const note = (document.getElementById('fu-note')?.value || '').trim();
  const today = new Date(todayStr);
  const fDate = new Date(followDate);
  const diffDays = Math.max(0, Math.round((fDate - today) / 86400000));
  const intervalDays = computed.days || Math.max(1, diffDays || 1);

  const taskId = nextId('TSK');
  const sourceProject = sourceTaskId ? getRelated(sourceTaskId, 'task_project')[0] : null;
  const projId = sourceProject ? sourceProject.project_id : findOrCreateProject(tr('NO_PROJECT'));
  const emailId = ae ? findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId) : null;

  const fullNote = [
    computed.wasWeekendAdjusted ? tr('FU_WEEKEND_ADJUSTED') : '',
    computed.fromDays ? `${tr('FU_PERIODIC_DAYS_LBL')}: ${intervalDays}` : '',
    note
  ].filter(Boolean).join('\n');

  TASKS.push({
    task_id: taskId,
    title: title,
    status: 'pending',
    priority: 3,
    category: 'Task',
    due_date: followDate,
    followup_date: followDate,
    followup_days: diffDays,
    followup: { enabled:true, finalized:false, done:false, type:'interval_days', intervalDays: intervalDays, startDate: followDate, nextDate: followDate, summary: tr('REP_SUM_DAYS')(intervalDays), lastCompletedAt:null },
    time_minutes: 0,
    comment_count: fullNote ? 1 : 0,
    created_at: new Date().toISOString(),
    outlook_category: 'Task',
    action_type: 'followup',
    repeat: { enabled: false },
    notes: fullNote || '',
  });

  addRelation(taskId, projId, 'task_project');
  if (emailId) addRelation(taskId, emailId, 'task_email');
  addRelation(taskId, MY_PERSON_ID, 'task_person');

  if (sourceTaskId) {
    addRelation(sourceTaskId, taskId, 'task_task');
    addRelation(taskId, sourceTaskId, 'task_task');
  }

  if (fullNote) {
    const cmtId = nextId('CMT');
    COMMENTS.push({ comment_id: cmtId, text: fullNote, created_at: new Date().toISOString(), comment_type:'user' });
    addRelation(taskId, cmtId, 'task_comment');
  }

  showFollowupFlash(tr('TASK_CREATED') || '✅', 'ok');
  try { render(); } catch(e) {}
  schedulePersistence();
  setTimeout(() => {
    try { closeQaDrop(); } catch(e) {}
    try { closeOv(); } catch(e) {}
  }, 900);
}

function saveMeetingFromTask(sourceTaskId) {

    outlook_category: cat,

    time_minutes: 0,

    created_at: new Date().toISOString(),
    repeat: { enabled: false },
    notes: noteText || '',

  try { render(); } catch(e) {}
  schedulePersistence();
  setTimeout(() => { try { closeOv(); } catch(e) {} }, 900);

function getDefaultCallExpectedMinutes() {

// =============================================================================
// LOCAL PERSISTENCE (INDEXEDDB) + MAINTENANCE
// =============================================================================
const TF_INDEXEDDB_CONFIG = {
  enabled: true,
  dbName: 'TaskFlowLocalDB',
  version: 1,
  stores: {
    projects: { keyPath: 'project_id' },
    people: { keyPath: 'person_id' },
    providers: { keyPath: 'provider_id' },
    emails: { keyPath: 'email_id' },
    comments: { keyPath: 'comment_id' },
    time_entries: { keyPath: 'entry_id' },
    tasks: { keyPath: 'task_id' },
    relations: { keyPath: 'relation_id' }
  }
};

let TF_persistTimer = null;
let TF_persistenceHooksAttached = false;

function canUseIndexedDb() {
  return TF_INDEXEDDB_CONFIG.enabled && typeof indexedDB !== 'undefined';
}

function openTaskFlowDb() {
  return new Promise((resolve, reject) => {
    if (!canUseIndexedDb()) {
      resolve(null);
      return;
    }
    const request = indexedDB.open(TF_INDEXEDDB_CONFIG.dbName, TF_INDEXEDDB_CONFIG.version);
    request.onupgradeneeded = event => {
      const db = event.target.result;
      Object.entries(TF_INDEXEDDB_CONFIG.stores).forEach(([storeName, storeConfig]) => {
        if (!db.objectStoreNames.contains(storeName)) {
          db.createObjectStore(storeName, { keyPath: storeConfig.keyPath });
        }
      });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
  });
}

function getPersistenceSnapshot() {
  return {
    projects: PROJECTS.map(item => ({ ...item })),
    people: PEOPLE.map(item => ({ ...item })),
    providers: PROVIDERS.map(item => ({ ...item })),
    emails: EMAILS.map(item => ({ ...item })),
    comments: COMMENTS.map(item => ({ ...item })),
    time_entries: TIME_ENTRIES.map(item => ({ ...item })),
    tasks: TASKS.map(item => ({ ...item })),
    relations: RELATIONS.map(item => ({ ...item }))
  };
}

function getPersistenceStats() {
  const snapshot = getPersistenceSnapshot();
  return {
    projects: snapshot.projects.length,
    people: snapshot.people.length,
    providers: snapshot.providers.length,
    emails: snapshot.emails.length,
    comments: snapshot.comments.length,
    time_entries: snapshot.time_entries.length,
    tasks: snapshot.tasks.length,
    relations: snapshot.relations.length
  };
}

function hasPersistenceData(snapshot) {
  if (!snapshot) return false;
  return Object.values(snapshot).some(value => Array.isArray(value) && value.length > 0);
}

function applyPersistenceSnapshot(snapshot) {
  if (!snapshot) return;
  PROJECTS = Array.isArray(snapshot.projects) ? snapshot.projects : PROJECTS;
  PEOPLE = Array.isArray(snapshot.people) ? snapshot.people : PEOPLE;
  PROVIDERS = Array.isArray(snapshot.providers) ? snapshot.providers : PROVIDERS;
  EMAILS = Array.isArray(snapshot.emails) ? snapshot.emails : EMAILS;
  COMMENTS = Array.isArray(snapshot.comments) ? snapshot.comments : COMMENTS;
  TIME_ENTRIES = Array.isArray(snapshot.time_entries) ? snapshot.time_entries : TIME_ENTRIES;
  TASKS = Array.isArray(snapshot.tasks) ? snapshot.tasks : TASKS;
  RELATIONS = Array.isArray(snapshot.relations) ? snapshot.relations : RELATIONS;
  if (MY_PERSON_ID && !PEOPLE.find(person => person.person_id === MY_PERSON_ID) && PEOPLE.length) {
    MY_PERSON_ID = PEOPLE[0].person_id;
  }
}

async function loadPersistenceSnapshot() {
  const db = await openTaskFlowDb();
  if (!db) return null;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readonly');
    const snapshot = {};
    let pending = storeNames.length;
    storeNames.forEach(storeName => {
      const request = transaction.objectStore(storeName).getAll();
      request.onsuccess = () => {
        snapshot[storeName] = request.result || [];
        pending -= 1;
        if (pending === 0) resolve(snapshot);
      };
      request.onerror = () => reject(request.error || new Error('IndexedDB read failed'));
    });
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB transaction failed'));
  });
}

async function savePersistenceSnapshot() {
  const db = await openTaskFlowDb();
  if (!db) return;
  const snapshot = getPersistenceSnapshot();
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB write failed'));
    storeNames.forEach(storeName => {
      const store = transaction.objectStore(storeName);
      const clearRequest = store.clear();
      clearRequest.onsuccess = () => {
        (snapshot[storeName] || []).forEach(record => store.put(record));
      };
      clearRequest.onerror = () => reject(clearRequest.error || new Error('IndexedDB clear failed'));
    });
  });
}

function schedulePersistence() {
  if (!canUseIndexedDb()) return;
  if (TF_persistTimer) clearTimeout(TF_persistTimer);
  TF_persistTimer = setTimeout(() => {
    savePersistenceSnapshot().catch(error => console.error('TaskFlow IndexedDB save failed', error));
  }, 120);
}

function wrapPersistenceFunction(functionName) {
  const originalFunction = window[functionName];
  if (typeof originalFunction !== 'function' || originalFunction.__tfWrapped) return;
  const wrappedFunction = function(...args) {
    const result = originalFunction.apply(this, args);
    schedulePersistence();
    return result;
  };
  wrappedFunction.__tfWrapped = true;
  window[functionName] = wrappedFunction;
}

function attachPersistenceHooks() {
  if (TF_persistenceHooksAttached) return;
  TF_persistenceHooksAttached = true;
  ['toggleDone', 'linkEmailToTask', 'saveComment', 'saveTimeEntry', 'saveFollowUpTask', 'saveMeetingTask'].forEach(wrapPersistenceFunction);
}

async function clearIndexedDbStores() {
  const db = await openTaskFlowDb();
  if (!db) return;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB reset failed'));
    storeNames.forEach(storeName => transaction.objectStore(storeName).clear());
  });
}

function downloadSnapshotJson(snapshot) {
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });

  link.href = url;
  link.download = 'taskflow-indexeddb-backup.json';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// Comentarios en castellano
function getDailySummaryDateFromEmail(email) {
  const candidates = [
    email?.received_at_local,
    email?.receivedAt,
    email?.received_at,
    email?.sent_at_local,
    email?.sentAt,
    email?.sent_at,
    email?.created_at_local,
    email?.created_at,
    email?.date
  ].filter(Boolean);
  for (const value of candidates) {
    const str = String(value);
    const match = str.match(/\d{4}-\d{2}-\d{2}/);
    if (match) return match[0];
  }
  return '';
}

// Comentarios en castellano
function getDailySummaryTaskDate(task, fieldName) {
  const value = task && task[fieldName] ? String(task[fieldName]) : '';
  const match = value.match(/\d{4}-\d{2}-\d{2}/);
  return match ? match[0] : '';
}

// Comentarios en castellano
function getDailySummaryTaskPriorityWeight(task) {
  const raw = String(task?.priority || task?.task_priority || task?.prio || '').trim().toUpperCase();
  if (raw === 'P1' || raw === '1') return 1;
  if (raw === 'P2' || raw === '2') return 2;
  if (raw === 'P3' || raw === '3') return 3;
  if (raw === 'P4' || raw === '4') return 4;
  return 99;
}

// Comentarios en castellano
function buildDailySummary() {
  const today = todayIso();
  const pending = (Array.isArray(TASKS) ? TASKS : []).filter(t => String(t?.status || '').toLowerCase() !== 'completed');
  const overdueFollowups = pending.filter(t => {
    const followup = getDailySummaryTaskDate(t, 'followup_date');
    return !!followup && followup < today;
  });
  const todayFollowups = pending.filter(t => getDailySummaryTaskDate(t, 'followup_date') === today);
  const todayMeetings = pending.filter(t => String(t?.action_type || '').toLowerCase() === 'meeting' && getDailySummaryTaskDate(t, 'due_date') === today);
  const todayCalls = pending.filter(t => String(t?.action_type || '').toLowerCase() === 'call' && getDailySummaryTaskDate(t, 'due_date') === today);
  const todayDeadlines = pending.filter(t => {
    const actionType = String(t?.action_type || '').toLowerCase();
    return getDailySummaryTaskDate(t, 'due_date') === today && actionType !== 'meeting' && actionType !== 'call';
  });

  const topPriorityTasks = pending
    .slice()
    .sort((a, b) => {
      const pa = getDailySummaryTaskPriorityWeight(a);
      const pb = getDailySummaryTaskPriorityWeight(b);
      if (pa !== pb) return pa - pb;
      const fa = getDailySummaryTaskDate(a, 'followup_date') || '9999-12-31';
      const fb = getDailySummaryTaskDate(b, 'followup_date') || '9999-12-31';
      if (fa !== fb) return fa.localeCompare(fb);
      return String(a?.title || '').localeCompare(String(b?.title || ''));
    })
    .slice(0, 5);

  const linkedEmailIds = new Set(
    (Array.isArray(RELATIONS) ? RELATIONS : [])
      .filter(r => r?.relation_type === 'task_email' && r?.related2_id)
      .map(r => r.related2_id)
  );
  const todayEmails = (Array.isArray(EMAILS) ? EMAILS : []).filter(email => getDailySummaryDateFromEmail(email) === today);
  const unlinkedTodayEmails = todayEmails.filter(email => !linkedEmailIds.has(email?.email_id));

  return {
    today,
    pendingCount: pending.length,
    overdueFollowupsCount: overdueFollowups.length,
    todayFollowupsCount: todayFollowups.length,
    todayMeetingsCount: todayMeetings.length,
    todayCallsCount: todayCalls.length,
    todayDeadlinesCount: todayDeadlines.length,
    unlinkedTodayEmailsCount: unlinkedTodayEmails.length,
    overdueFollowups,
    todayFollowups,
    todayMeetings,
    todayCalls,
    topPriorityTasks,
    unlinkedTodayEmails
  };
}

let ANCHORED_QEPOP_LAST_TRIGGER = null;

function getAnchoredPanelQepop() {
  // Comentarios en castellano: qepop compartido para contenidos que antes se abrían como overlay.
  let pop = document.getElementById('anchoredPanelQepop');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'anchoredPanelQepop';
    pop.className = 'qepop anchored-panel-qepop';
    pop.setAttribute('role', 'dialog');
    pop.setAttribute('aria-modal', 'false');
    pop.setAttribute('aria-hidden', 'true');
    pop.setAttribute('tabindex', '-1');
    const root = document.querySelector('.phone') || document.body;
    root.appendChild(pop);
  }
  return pop;
}

function positionAnchoredPanel(pop, triggerEl) {
  // Comentarios en castellano: posiciona el qepop junto al elemento que lo abre y lo mantiene dentro del panel.
  if (!pop || !triggerEl) return;
  const appRoot = triggerEl.closest('.phone') || document.querySelector('.phone') || document.body;
  const appRect = appRoot.getBoundingClientRect();
  const triggerRect = triggerEl.getBoundingClientRect();
  const margin = 10;
  const viewportH = window.innerHeight || document.documentElement.clientHeight;
  const maxAllowedWidth = Math.max(260, appRect.width - (margin * 2));

  pop.style.width = Math.min(390, maxAllowedWidth) + 'px';
  pop.style.maxWidth = maxAllowedWidth + 'px';
  pop.style.right = 'auto';
  pop.style.bottom = 'auto';

  // Abrimos antes de medir para obtener dimensiones reales.
  pop.classList.add('open');
  pop.setAttribute('aria-hidden', 'false');

  const popRect = pop.getBoundingClientRect();
  const minLeft = appRect.left + margin + window.scrollX;
  const maxLeft = appRect.right - popRect.width - margin + window.scrollX;
  let left = triggerRect.left + window.scrollX;
  left = Math.max(minLeft, Math.min(left, maxLeft));

  let top = triggerRect.bottom + window.scrollY + 6;
  if (top + popRect.height > viewportH - margin + window.scrollY) {
    top = Math.max(margin + window.scrollY, triggerRect.top + window.scrollY - popRect.height - 6);
  }

  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function closeAnchoredPanelQepop(returnFocus = true) {
  const pop = document.getElementById('anchoredPanelQepop');
  if (!pop) return;
  pop.classList.remove('open');
  pop.setAttribute('aria-hidden', 'true');
  pop.innerHTML = '';
  if (returnFocus && ANCHORED_QEPOP_LAST_TRIGGER && typeof ANCHORED_QEPOP_LAST_TRIGGER.focus === 'function') {
    requestAnimationFrame(() => ANCHORED_QEPOP_LAST_TRIGGER.focus());
  }
}

function openAnchoredPanelQepop(triggerEl, title, subtitle, contentHtml) {
  // Comentarios en castellano: renderiza contenido de tipo panel dentro de un qepop anclado.
  if (!triggerEl) triggerEl = ANCHORED_QEPOP_LAST_TRIGGER || document.activeElement;
  ANCHORED_QEPOP_LAST_TRIGGER = triggerEl;
  closeQaDrop();
  closeSecondaryMenu();
  try { closeOv(); } catch (e) {}
  try { closePrefs(false); } catch (e) {}
  document.querySelectorAll('.qepop.open').forEach(p => {
    if (p.id !== 'anchoredPanelQepop') {
      p.classList.remove('open');
      p.setAttribute('aria-hidden', 'true');
    }
  });
  const pop = getAnchoredPanelQepop();
  pop.innerHTML = `
    <div class="anchored-qepop-head">
      <div>
        <div class="anchored-qepop-title">${escapeHtml(title || '')}</div>
        ${subtitle ? `<div class="anchored-qepop-sub">${escapeHtml(subtitle)}</div>` : ''}
      </div>

    </div>
    <div class="anchored-qepop-body">${contentHtml || ''}</div>
  `;
  positionAnchoredPanel(pop, triggerEl);
  requestAnimationFrame(() => pop.focus());
}

if (!window.__anchoredPanelQepopHandlersBound) {
  window.__anchoredPanelQepopHandlersBound = true;
  document.addEventListener('keydown', function(ev) {
    if (ev.key !== 'Escape') return;
    const panel = document.getElementById('anchoredPanelQepop');
    const prefs = document.getElementById('prefs-ov');
    if (panel && panel.classList.contains('open')) {
      ev.preventDefault();
      ev.stopPropagation();
      closeAnchoredPanelQepop(true);
    } else if (prefs && prefs.classList.contains('prefs-qepop') && prefs.classList.contains('open')) {
      ev.preventDefault();
      ev.stopPropagation();
      closePrefs(true);
    }
  }, true);
  document.addEventListener('click', function(ev) {

    const clickedTrigger = trigger && trigger.contains && trigger.contains(ev.target);
    if (panel && panel.classList.contains('open')) {
      if (!panel.contains(ev.target) && !clickedTrigger) closeAnchoredPanelQepop(false);

  pop.style.top = '0';
  const popW = pop.offsetWidth || 160;
  const popH = pop.offsetHeight || 120;
  left = Math.max(8, Math.min(left, phoneRect.width - popW - 8));

  // Prefer below the clicked icon; flip above only if there is not enough space
  if (top + popH > phoneRect.height - 12) top = aRect.top - phoneRect.top - popH - 4;
  top = Math.max(8, top);
  if (top + popH > phoneRect.height - 8) pop.style.maxHeight = Math.max(140, phoneRect.height - top - 8) + 'px';
  else pop.style.maxHeight = '';

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('open');
  QE_ACTIVE = { type, taskId };

  const inp = pop.querySelector('input[type="date"], input[type="text"], textarea, select, button');
  setTimeout(() => { if (inp) inp.focus(); else pop.focus(); }, 40);
}

// V91 — Confirmaciones y validaciones para fechas directas de renderCard
// =============================================================================

// Comentarios en castellano
function showQeDateAdjustmentConfirm(kind, taskId, originalDate, adjustedDate) {
  const pop = document.getElementById('qepop');
  if (!pop) return;
  const isDue = kind === 'duedate';
  const messageKey = isDue ? 'WARN_WEEKEND_DUE_CONFIRM' : 'WARN_WEEKEND_FOLLOWUP_CONFIRM';
  const acceptFn = isDue ? 'applyQeDueDate' : 'applyQeFollowDate';
  pop.innerHTML = `
    <div class="qepop-panel">
      <div class="qepop-lbl">${escapeHtml(isDue ? tr('CF_DUE') : tr('LEG_FOLLOWUP'))}</div>
      <div class="qepop-list-item">
        <div class="qepop-list-title">${escapeHtml(tr(messageKey))}</div>
        <div class="qepop-list-sub">${escapeHtml(fmtDate(originalDate))} → <strong>${escapeHtml(fmtDate(adjustedDate))}</strong></div>
      </div>
      <div class="qepop-row">
        <button class="qepop-btn" type="button" onclick="closeQePop()">${escapeHtml(tr('BTN_CANCEL_CHANGE'))}</button>
        <button class="qepop-btn primary" type="button" onclick="${acceptFn}('${taskId}','${adjustedDate}')">${escapeHtml(tr('BTN_ACCEPT_CHANGE'))}</button>
      </div>
    </div>`;
  pop.classList.add('open');
  pop.style.display = 'block';
}

// Comentarios en castellano
function showQeDateValidationMessage(messageKey) {
  const pop = document.getElementById('qepop');
  if (!pop) return;
  pop.innerHTML = `
    <div class="qepop-panel">
      <div class="qepop-list-item" style="border-color:rgba(220,38,38,.22);background:rgba(220,38,38,.07)">
        <div class="qepop-list-title" style="color:var(--re)">${escapeHtml(tr(messageKey))}</div>
      </div>
      <div class="qepop-row">
        <button class="qepop-btn primary" type="button" onclick="closeQePop()">OK</button>
      </div>
    </div>`;
  pop.classList.add('open');
  pop.style.display = 'block';
}

// Comentarios en castellano
function applyQeDueDate(taskId, dueDate) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  if (dueDate && task.followup_date && task.followup_date > dueDate) {
    showQeDateValidationMessage('WARN_DUE_BEFORE_FOLLOWUP_BLOCK');
    return;
  }
  const beforeState = collectTaskAuditState(taskId);
  task.due_date = dueDate || null;
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
}

// Comentarios en castellano
function applyQeFollowDate(taskId, followupDate) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  if (followupDate && task.due_date && followupDate > task.due_date) {
    showQeDateValidationMessage('WARN_FOLLOWUP_AFTER_DUE_BLOCK');
    return;
  }
  const beforeState = collectTaskAuditState(taskId);
  if (!followupDate) {
    task.followup_date = null;
    task.followup_days = 0;
    task.followup = normalizeFollowupConfig({ enabled:false }, null, 0);
  } else {
    const followup = getTaskFollowup(task);
    task.followup_date = followupDate;
    const diff = Math.round((new Date(followupDate) - new Date(todayIso())) / 86400000);
    task.followup_days = Math.max(0, diff);
    task.followup = normalizeFollowupConfig({ ...followup, enabled:true, finalized:false, done:false, startDate: followupDate, nextDate: followupDate }, followupDate, task.followup_days);
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
}
function saveQePop(type, action, taskId) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  const inp = document.getElementById('qepop-inp');

  if (type === 'duedate') {
    const rawDueDate = (action === 'clear') ? null : (inp?.value || null) || null;
    if (!rawDueDate) { applyQeDueDate(taskId, null); return; }
    const adjustedDue = adjustToWeekdayIfWeekend(rawDueDate);
    if (adjustedDue.wasWeekend) {
      showQeDateAdjustmentConfirm('duedate', taskId, rawDueDate, adjustedDue.adjusted);
      return;
    }
    applyQeDueDate(taskId, rawDueDate);
    return;
  }

  if (type === 'followdate') {
    const rawFollowupDate = (action === 'clear') ? null : (inp?.value || null) || null;
    if (!rawFollowupDate) { applyQeFollowDate(taskId, null); return; }
    const adjustedFollowupDate = nextWorkday(rawFollowupDate);
    if (adjustedFollowupDate !== rawFollowupDate) {
      showQeDateAdjustmentConfirm('followdate', taskId, rawFollowupDate, adjustedFollowupDate);
      return;
    }
    applyQeFollowDate(taskId, rawFollowupDate);
    return;
  }

  const beforeState = collectTaskAuditState(taskId);
  if (type === 'priority') {
    task.priority = parseInt(action);
  } else if (type === 'person') {
    const name = (inp?.value || '').trim();
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (name) {
      const pid = findOrCreatePerson(name);
      if (pid && pid !== MY_PERSON_ID) addRelation(taskId, pid, 'task_person');
    }
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
}

  const pop = document.getElementById('qepop');

  QE_ACTIVE = null;

}


// Keyboard support: Escape + focus trap
function handleGlobalKeydown(event) {
  if (event.key === 'Escape') {
    const pop = document.getElementById('qepop');
    const menu = document.getElementById('sec-menu');
    const ov = document.getElementById('ov');
    const drop = document.getElementById('qa-drop');

    if (drop && drop.classList.contains('open')) { event.preventDefault(); closeQaDrop(); return; }

    if (pop && pop.classList.contains('open')) { trapFocusIn(pop, event); return; }

  }
}

// ===== TaskFlow V93 · Tiempo por defecto según origen =====
// Comentarios en castellano

const _openTimeRegister = window.openTimeRegister;

window.openTimeRegister = function () {
  const result = _openTimeRegister
    ? _openTimeRegister.apply(this, arguments)
    : null;

  try {
    const prefs = window.userPreferences;
    if (!prefs || !prefs.defaultTimeMinutes) return result;

    // Detectar input de minutos de forma robusta sin depender de helper global
    const inputMinutes = (
      document.querySelector('#time-minutes') ||
      document.querySelector('input[name="time"]') ||
      document.querySelector('input[data-role="time-minutes"]') ||
      null
    );

    if (!inputMinutes) return result;

    // No sobrescribir si el usuario ya ha introducido un valor
    if (inputMinutes.value && Number(inputMinutes.value) > 0) return result;

    // Detección de origen
    let defaultMinutes = prefs.defaultTimeMinutes.task;

    // Si el registro viene desde un email activo real, usamos getActiveEmail().
    const activeEmailForMinutes = (typeof getActiveEmail === 'function') ? getActiveEmail() : null;
    if (activeEmailForMinutes && !activeEmailForMinutes.isOutlookLoading && activeEmailForMinutes.messageId !== 'demo') {
      // Heurística simple y robusta
      const subject = (activeEmailForMinutes.subject || '').toLowerCase();

      if (subject.includes('reunió') || subject.includes('reunión') || subject.includes('meeting')) {
        defaultMinutes = prefs.defaultTimeMinutes.meeting;
      } else if (subject.includes('trucada') || subject.includes('llamada') || subject.includes('call')) {
        defaultMinutes = prefs.defaultTimeMinutes.call;
      }
    }

    inputMinutes.value = defaultMinutes || 30;

  } catch (e) {
    console.warn('[TaskFlow V111] Error tiempo por defecto según origen', e);
  }

  return result;
};
</script>

<script>
// === Preferències modal accessibility & focus management (V3-38) ===
// Comentarios en castellano
(function(){
  const modal = document.getElementById('prefs-ov');
  const backdrop = document.getElementById('prefs-bk');
  let lastFocused = null;
  if (!modal || !backdrop) return;

  function setInert(state){
    if(state){ modal.setAttribute('inert',''); backdrop.setAttribute('inert',''); backdrop.setAttribute('aria-hidden','true'); }
    else { modal.removeAttribute('inert'); backdrop.removeAttribute('inert'); backdrop.setAttribute('aria-hidden','false'); }
  }
  function isFocusable(el){ return el && typeof el.focus === 'function' && el.offsetParent !== null; }
  function focusFallback(){ const b=document.getElementById('btn-menu'); if(isFocusable(b)) b.focus(); }

  function trapFocus(e){
    if(e.key!=='Tab') return;
    const f=modal.querySelectorAll('a,button,input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!f.length) return; const first=f[0], last=f[f.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
  function escHandler(e){ if(e.key==='Escape') window.closePreferencesPanel && window.closePreferencesPanel(); }

  const origOpen = window.openPreferencesPanel;
  const origClose = window.closePreferencesPanel;

  window.openPreferencesPanel = function(){
    lastFocused = document.activeElement; setInert(false);
    origOpen && origOpen.apply(this, arguments);
    modal.addEventListener('keydown', trapFocus);
    modal.addEventListener('keydown', escHandler);
    setTimeout(()=>{ const af=modal.querySelector('button,[tabindex]:not([tabindex="-1"])'); af&&af.focus(); },0);
  };

  window.closePreferencesPanel = function(){
    if(isFocusable(lastFocused)) lastFocused.focus(); else focusFallback();
    modal.removeEventListener('keydown', trapFocus);
    modal.removeEventListener('keydown', escHandler);
    origClose && origClose.apply(this, arguments);
    setInert(true);
  };

  setInert(true);
})();
</script>
