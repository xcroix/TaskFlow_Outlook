// Comentarios en castellano
function getTodayGroupTaskDate(value) {
  if (!value) return '';
  const match = String(value).match(/\d{4}-\d{2}-\d{2}/);
  return match ? match[0] : '';
}

// Comentarios en castellano
function getTodayGroupPriorityWeight(task) {
  const raw = String(task?.priority || '').trim();
  if (raw === '1' || /^P1$/i.test(raw)) return 1;
  if (raw === '2' || /^P2$/i.test(raw)) return 2;
  if (raw === '3' || /^P3$/i.test(raw)) return 3;
  if (raw === '4' || /^P4$/i.test(raw)) return 4;
  return null;
}

// Comentarios en castellano
function getTodayGroupActionRank(task) {
  const actionType = String(task?.action_type || '').toLowerCase();
  if (actionType === 'meeting' || actionType === 'followup') return 0;
  return 1;
}

// Comentarios en castellano
function isTaskForTodayGroup(task, today) {
  const followupDate = getTodayGroupTaskDate(task?.followup_date);
  const dueDate = getTodayGroupTaskDate(task?.due_date);
  return (
    (!!followupDate && followupDate <= today) ||
    (!!dueDate && dueDate <= today)
  );
}

// Comentarios en castellano
function sortTodayGroupTasks(tasks) {
  return tasks.slice().sort((a, b) => {
    const pA = getTodayGroupPriorityWeight(a);
    const pB = getTodayGroupPriorityWeight(b);
    const hasPA = pA != null;
    const hasPB = pB != null;
    if (hasPA && hasPB && pA !== pB) return pA - pB;
    if (hasPA && !hasPB) return -1;
    if (!hasPA && hasPB) return 1;

    if (!hasPA && !hasPB) {
      const actionRank = getTodayGroupActionRank(a) - getTodayGroupActionRank(b);
      if (actionRank !== 0) return actionRank;
    }

    const followA = getTodayGroupTaskDate(a?.followup_date) || '9999-12-31';
    const followB = getTodayGroupTaskDate(b?.followup_date) || '9999-12-31';
    if (followA !== followB) return followA.localeCompare(followB);
    const dueA = getTodayGroupTaskDate(a?.due_date) || '9999-12-31';
    const dueB = getTodayGroupTaskDate(b?.due_date) || '9999-12-31';
    if (dueA !== dueB) return dueA.localeCompare(dueB);
    return String(a?.title || '').localeCompare(String(b?.title || ''));
  });
}

// Comentarios en castellano
window.todayViewFilter = window.todayViewFilter || 'all';

// Comentarios en castellano
function isTodayMeetingTask(task, today) {
  const actionType = String(task?.action_type || '').toLowerCase();
  const dueDate = getTodayGroupTaskDate(task?.due_date);
  return actionType === 'meeting' && !!dueDate && dueDate <= today;
}

// Comentarios en castellano
function isTodayFollowupTask(task, today) {
  const followupDate = getTodayGroupTaskDate(task?.followup_date);
  return !!followupDate && followupDate <= today;
}

// Comentarios en castellano
function isTodayDeadlineTask(task, today) {
  const actionType = String(task?.action_type || '').toLowerCase();
  const dueDate = getTodayGroupTaskDate(task?.due_date);
  return !!dueDate && dueDate <= today && actionType !== 'meeting' && actionType !== 'call';
}

// Comentarios en castellano
function isTodayCallTask(task, today) {
  const actionType = String(task?.action_type || '').toLowerCase();
  const dueDate = getTodayGroupTaskDate(task?.due_date);
  return actionType === 'call' && !!dueDate && dueDate <= today;
}

// Comentarios en castellano

// Comentarios en castellano
function isTaskForTomorrowGroup(task, tomorrow) {
  const followupDate = getTodayGroupTaskDate(task?.followup_date);
  const dueDate = getTodayGroupTaskDate(task?.due_date);
  return (
    followupDate === tomorrow ||
    dueDate === tomorrow
  );
}

function matchesTodayViewFilter(task, today, filterKey) {
  const key = String(filterKey || 'all').toLowerCase();
  if (key === 'meeting') return isTodayMeetingTask(task, today);
  if (key === 'followup') return isTodayFollowupTask(task, today);
  if (key === 'deadline') return isTodayDeadlineTask(task, today);
  if (key === 'call') return isTodayCallTask(task, today);
  return true;
}

// Comentarios en castellano
function setTodayViewFilter(filterKey) {
  const nextKey = String(filterKey || 'all').toLowerCase();
  const currentKey = String(window.todayViewFilter || 'all').toLowerCase();
  window.todayViewFilter = currentKey === nextKey ? 'all' : nextKey;
  render();
}


// === Helper: reordenar tareas del grupo para email activo ===
// Comentarios en castellano
function reorderGroupTasksForActiveEmail(groups, linkedTaskIds) {
  if (!linkedTaskIds || linkedTaskIds.size === 0) return groups;

  (groups || []).forEach(group => {
    if (!group || !Array.isArray(group.tasks) || group.tasks.length < 2) return;

    const linkedTasks = [];
    const remainingTasks = [];

    group.tasks.forEach(task => {
      if (task && linkedTaskIds.has(task.task_id)) linkedTasks.push(task);
      else remainingTasks.push(task);
    });

    if (linkedTasks.length > 0) {
      // Mantiene el orden ya calculado por la agrupacion actual y solo adelanta la tarea vinculada al email activo.
      group.tasks = [...linkedTasks, ...remainingTasks];
    }
  });

  return groups;
}

// V86 — Ordenacion universal y agrupadores activos por email seleccionado
// =============================================================================

// Comentarios en castellano
function normalizeTaskPriority(task) {
  const value = Number(task?.priority);
  return Number.isFinite(value) && value >= 1 && value <= 4 ? value : 99;
}

// Comentarios en castellano
function getTaskDateForSort(value) {
  const normalized = getTodayGroupTaskDate(value);
  return normalized || '';
}
// Comentarios en castellano
function getTaskResponsibleSortValue(task) {
  if (!task || !MY_PERSON_ID) return 1;
  try {
    return getRelatedIds(task.task_id, 'task_person').includes(MY_PERSON_ID) ? 0 : 1;
  } catch (e) {
    return 1;
  }
}


// Comentarios en castellano
function getDueDateSortValue(task) {
  return getTaskDateForSort(task?.due_date) || '9999-12-31';
}

// Comentarios en castellano
function getFollowupDateSortValue(task) {
  return getTaskDateForSort(task?.followup_date) || '9999-12-31';
}

// Comentarios en castellano
// V120: orden universal dentro de agrupaciones: fecha limite, responsable actual, prioridad y fecha de seguimiento como desempate.
function sortTasksByPriorityAndDueDate(tasks) {
  return (tasks || []).slice().sort((a, b) => {
    const dueDiff = getDueDateSortValue(a).localeCompare(getDueDateSortValue(b));
    if (dueDiff !== 0) return dueDiff;

    const responsibleDiff = getTaskResponsibleSortValue(a) - getTaskResponsibleSortValue(b);
    if (responsibleDiff !== 0) return responsibleDiff;

    const priorityDiff = normalizeTaskPriority(a) - normalizeTaskPriority(b);
    if (priorityDiff !== 0) return priorityDiff;

    const followupDiff = getFollowupDateSortValue(a).localeCompare(getFollowupDateSortValue(b));
    if (followupDiff !== 0) return followupDiff;

    return String(a?.title || '').localeCompare(String(b?.title || ''), LANG || 'ca');
  });
}

// Comentarios en castellano
function getRestTaskDateRank(task) {
  const today = todayIso();
  const dueDate = getTaskDateForSort(task?.due_date);
  if (dueDate && dueDate > today) return { bucket: 0, date: dueDate };
  if (dueDate && dueDate < today) return { bucket: 1, date: dueDate };
  if (dueDate) return { bucket: 2, date: dueDate };

  const followupDate = getTaskDateForSort(task?.followup_date);
  if (followupDate && followupDate > today) return { bucket: 3, date: followupDate };
  if (followupDate && followupDate < today) return { bucket: 4, date: followupDate };

  return { bucket: 9, date: '9999-12-31' };
}

// Comentarios en castellano
function sortTasksByDueDateAndPriority(tasks) {
  return (tasks || []).slice().sort((a, b) => {
    const dateA = getRestTaskDateRank(a);
    const dateB = getRestTaskDateRank(b);

    if (dateA.bucket !== dateB.bucket) return dateA.bucket - dateB.bucket;
    const dateDiff = dateA.date.localeCompare(dateB.date);
    if (dateDiff !== 0) return dateDiff;

    const responsibleDiff = getTaskResponsibleSortValue(a) - getTaskResponsibleSortValue(b);
    if (responsibleDiff !== 0) return responsibleDiff;

    const priorityDiff = normalizeTaskPriority(a) - normalizeTaskPriority(b);
    if (priorityDiff !== 0) return priorityDiff;

    const followupDiff = getFollowupDateSortValue(a).localeCompare(getFollowupDateSortValue(b));
    if (followupDiff !== 0) return followupDiff;

    return String(a?.title || '').localeCompare(String(b?.title || ''), LANG || 'ca');
  });
}

// Comentarios en castellano
function normalizeActionTypeKey(value) {
  const raw = String(value || '').toLowerCase();
  if (raw === 'meeting' || raw === 'reunio' || raw === 'reunion' || raw === 'reunió') return 'meeting';
  if (raw === 'call' || raw === 'trucada' || raw === 'llamada') return 'call';
  if (raw === 'followup' || raw === 'seguiment' || raw === 'seguimiento') return 'followup';
  return 'task';
}

// Comentarios en castellano
function applyActiveEmailGroupState(groups, linkedTaskIds) {
  if (!linkedTaskIds || linkedTaskIds.size === 0) return groups;

  const activeGroupKeys = new Set(
    (groups || [])
      .filter(group => Array.isArray(group.tasks) && group.tasks.some(task => linkedTaskIds.has(task.task_id)))
      .map(group => group.k)
  );

  if (activeGroupKeys.size === 0) return groups;

  groups.forEach(group => {
    group.collapsedByDefault = !activeGroupKeys.has(group.k);
  });

  return groups.slice().sort((a, b) => {
    const aActive = activeGroupKeys.has(a.k) ? 0 : 1;
    const bActive = activeGroupKeys.has(b.k) ? 0 : 1;
    if (aActive !== bActive) return aActive - bActive;
    return String(a.s || '').localeCompare(String(b.s || ''));
  });
}

// === V161: filtres multiselecció FILTRA ===
let TASK_FILTER_GROUP_VALUES = ['ALL'];
let TASK_FILTER_STATUS_VALUES = ['PENDING','IN_PROGRESS'];
function getSelectedMultiValues(sel){return Array.from(sel?.selectedOptions||[]).map(o=>String(o.value));}
function setSelectedMultiValues(sel, values){if(!sel)return; const s=new Set((values&&values.length?values:['ALL']).map(String)); Array.from(sel.options||[]).forEach(o=>o.selected=s.has(String(o.value)));}
function enforceExclusiveAllSelection(sel, prev){let v=getSelectedMultiValues(sel); const had=(prev||[]).includes('ALL'); const has=v.includes('ALL'); if(has&&(!had||v.length===1)) v=['ALL']; else if(has&&v.length>1) v=v.filter(x=>x!=='ALL'); if(!v.length)v=['ALL']; setSelectedMultiValues(sel,v); return v;}
function onTaskFilterGroupChange(sel){TASK_FILTER_GROUP_VALUES=enforceExclusiveAllSelection(sel,TASK_FILTER_GROUP_VALUES); render();}
function onTaskFilterStatusChange(sel){TASK_FILTER_STATUS_VALUES=enforceExclusiveAllSelection(sel,TASK_FILTER_STATUS_VALUES); render();}
function getTaskStatusFilterKey(t){const raw=String(t?.status||'').toLowerCase(); if(raw==='completed'||raw==='done')return'DONE'; if(raw==='in_progress'||raw==='progress')return'IN_PROGRESS'; return'PENDING';}
function getTaskProjectFilterEntries(t){const ps=getRelated(t.task_id,'task_project'); return ps.length?ps.map(p=>({value:String(p.project_id),label:p.name})):[{value:'none',label:tr('NO_PROJECT')}];}
function taskMatchesAllFilters(t){const okStatus=(!TASK_FILTER_STATUS_VALUES||TASK_FILTER_STATUS_VALUES.includes('ALL')||TASK_FILTER_STATUS_VALUES.includes(getTaskStatusFilterKey(t))); const okGroup=(!TASK_FILTER_GROUP_VALUES||TASK_FILTER_GROUP_VALUES.includes('ALL')||getTaskProjectFilterEntries(t).some(e=>TASK_FILTER_GROUP_VALUES.includes(String(e.value)))); return okStatus&&okGroup;}
function renderTaskFilterSelectors(){const g=document.getElementById('filter-group-values'); const s=document.getElementById('filter-status-values'); if(!g||!s)return; const prev=new Set(TASK_FILTER_GROUP_VALUES||['ALL']); const map=new Map(); (TASKS||[]).forEach(t=>getTaskProjectFilterEntries(t).forEach(e=>{if(!map.has(e.value))map.set(e.value,e.label)})); g.innerHTML='<option value="ALL" data-i18n="FILTER_ALL_PROJECTS">'+escapeHtml(tr('FILTER_ALL_PROJECTS'))+'</option>'+Array.from(map.entries()).sort((a,b)=>String(a[1]).localeCompare(String(b[1]),LANG||'ca')).map(([v,l])=>`<option value="${escapeHtml(v)}">${escapeHtml(l)}</option>`).join(''); const valid=new Set(Array.from(g.options).map(o=>o.value)); TASK_FILTER_GROUP_VALUES=Array.from(prev).filter(v=>valid.has(v)); if(!TASK_FILTER_GROUP_VALUES.length)TASK_FILTER_GROUP_VALUES=['ALL']; setSelectedMultiValues(g,TASK_FILTER_GROUP_VALUES); setSelectedMultiValues(s,TASK_FILTER_STATUS_VALUES);}

function getGroups(gb) {
  const groupBy = String(gb || 'project').toLowerCase();
  const linkedTaskIds = getSelectedEmailContextTaskIds();

  // Comentarios en castellano
  // Base comun: se respetan finalizadas/no finalizadas y se evita duplicar reuniones/llamadas hijas.
  // Active-email linked tasks remain visible so they can always be highlighted at the top.
  const visibleTasks = TASKS.filter(t => {
    const isLinkedToActiveEmail = !!(t && linkedTaskIds.has(t.task_id));
    const isCompleted = t.status === 'completed';
    const statusValues = Array.isArray(TASK_FILTER_STATUS_VALUES) ? TASK_FILTER_STATUS_VALUES : ['PENDING','IN_PROGRESS'];
    const showCompletedByStatusFilter = statusValues.includes('ALL') || statusValues.includes('DONE');
    if (isCompleted && !showCompletedByStatusFilter) return false;
    if (!SHOW_PENDING_IN_GROUPS && !isCompleted && !isLinkedToActiveEmail) return false;

    if ((t.category === 'Meeting' || t.category === 'Call') && !isLinkedToActiveEmail) {
      if (getRelatedIds(t.task_id, 'task_task').length > 0) return false;
    }

    return true;
  });

  const filteredTasks = visibleTasks.filter(t => taskMatchesAllFilters(t) || linkedTaskIds.has(t.task_id));

  // Comentarios en castellano
  // Vista AVUI: solo muestra tareas vencidas/hoy y un segundo grupo con las de mañana.
  // No se incluyen tareas posteriores a mañana en esta vista. Esta restriccion NO afecta al resto de agrupadores.
  if (groupBy === 'today') {
    const today = todayIso();
    const tomorrow = getTomorrowForTodayView(today);
    const activeTodayFilter = String(window.todayViewFilter || 'all').toLowerCase();

    const todayBaseTasks = filteredTasks.filter(t => isTaskForTodayGroup(t, today));
    const activeEmailLinkedTasks = filteredTasks.filter(t => t && linkedTaskIds.has(t.task_id));
    const todayTasksBase = activeTodayFilter === 'all'
      ? todayBaseTasks
      : todayBaseTasks.filter(t => matchesTodayViewFilter(t, today, activeTodayFilter));
    const todayTasksById = new Map();
    [...activeEmailLinkedTasks, ...todayTasksBase].forEach(task => {
      if (task && !todayTasksById.has(task.task_id)) todayTasksById.set(task.task_id, task);
    });
    const todayTasks = Array.from(todayTasksById.values());

    const todayIds = new Set(todayTasks.map(t => t.task_id));
    const tomorrowTasks = filteredTasks.filter(t => !todayIds.has(t.task_id) && isTaskForTomorrowGroup(t, tomorrow));

    const todayGroups = [
      { k: 'today', l: tr('GRP_TODAY'), c: '#D97706', s: '0', tasks: sortTasksByPriorityAndDueDate(todayTasks) },
      { k: 'tomorrow', l: tr('GL_TOMORROW'), c: '#2B5CE6', s: '1', tasks: sortTasksByPriorityAndDueDate(tomorrowTasks) }
    ].filter(group => group.tasks.length > 0 || group.k === 'today');

    reorderGroupTasksForActiveEmail(todayGroups, linkedTaskIds);
    return applyActiveEmailGroupState(todayGroups, linkedTaskIds);
  }

  const groupsByKey = {};

  filteredTasks.forEach(t => {
    let entries = [];

    if (groupBy === 'provider') {
      const provs = getRelated(t.task_id, 'task_provider');
      entries = provs.length
        ? provs.map(p => ({ k: p.provider_id, l: p.name, c: p.color, s: p.name }))
        : [{ k: 'none', l: tr('GL_NO_PROVIDER'), c: '#A8A49D', s: 'z' }];
    } else if (groupBy === 'project') {
      const projects = getRelated(t.task_id, 'task_project');
      entries = projects.length
        ? projects.map(p => ({ k: p.project_id, l: p.name, c: p.color, s: p.name }))
        : [{ k: 'none', l: tr('NO_PROJECT'), c: '#A8A49D', s: 'z' }];
    } else {
      let k = 'none';
      let l = tr('NO_PROJECT');
      let c = '#A8A49D';
      let s = 'z';

      if (groupBy === 'actiontype') {
        const rawActionType = t.action_type || window.TaskFlow.utils.getActionTypeFromCategory(t.outlook_category || t.category || 'Task') || 'task';
        const actionTypeKey = normalizeActionTypeKey(rawActionType);
        if (actionTypeKey === 'meeting') {
          k = 'meeting'; l = tr('AT_MEETING'); c = '#16A34A'; s = '2';
        } else if (actionTypeKey === 'call') {
          k = 'call'; l = tr('AT_CALL'); c = '#2B5CE6'; s = '3';
        } else if (actionTypeKey === 'followup') {
          k = 'followup'; l = tr('AT_FOLLOWUP'); c = '#D97706'; s = '4';
        } else {
          k = 'task'; l = tr('AT_TASK'); c = '#6B7280'; s = '1';
        }
      } else if (groupBy === 'priority') {
        const la = ['', tr('PR1'), tr('PR2'), tr('PR3'), tr('PR4')];
        const ca = ['', '#DC2626', '#EA580C', '#D97706', '#6B7280'];
        const priority = normalizeTaskPriority(t);
        k = 'p' + priority;
        l = la[priority] || tr('PR4');
        c = ca[priority] || '#6B7280';
        s = String(priority);
      } else if (groupBy === 'duedate') {
        const st = dateStatus(t.due_date);
        const m = { ov:{l:tr('GL_OVERDUE'),c:'#DC2626',s:'0'}, td:{l:tr('GL_TODAY'),c:'#D97706',s:'1'}, sn:{l:tr('GL_TOMORROW'),c:'#D97706',s:'2'}, n:{l:tr('GL_UPCOMING'),c:'#16A34A',s:'3'} };
        if (!t.due_date) { k='none'; l=tr('GL_NO_DATE'); c='#A8A49D'; s='9'; }
        else { const v = m[st]; k = st; l = v.l; c = v.c; s = v.s; }
      } else if (groupBy === 'followdate') {
        const st = dateStatus(t.followup_date);
        const m = { ov:{l:tr('GL_OVERDUE'),c:'#DC2626',s:'0'}, td:{l:tr('GL_TODAY'),c:'#D97706',s:'1'}, sn:{l:tr('GL_TOMORROW'),c:'#D97706',s:'2'}, n:{l:tr('GL_UPCOMING'),c:'#16A34A',s:'3'} };
        if (!t.followup_date) { k='none'; l=tr('GL_NO_FOLLOWUP'); c='#A8A49D'; s='9'; }
        else { const v = m[st]; k = st; l = v.l; c = v.c; s = v.s; }
      } else if (groupBy === 'responsible') {
        if (MY_PERSON_ID && getRelatedIds(t.task_id, 'task_person').includes(MY_PERSON_ID)) {
          k='me'; l=getCurrentUserSelfLabel(); c=findById(MY_PERSON_ID)?.color||'#2B5CE6'; s='0';
        } else {
          const ppl = getRelated(t.task_id, 'task_person');
          if (ppl.length) { const p = ppl[0]; k = p.person_id; l = p.name; c = p.color; s = p.name; }
          else { k='none'; l=tr('GL_NO_ASSIGNED'); c='#A8A49D'; s='9'; }
        }
      }

      entries = [{ k, l, c, s }];
    }

    entries.forEach(entry => {
      if (!groupsByKey[entry.k]) {
        groupsByKey[entry.k] = { k: entry.k, l: entry.l, c: entry.c, s: entry.s, tasks: [] };
      }
      groupsByKey[entry.k].l = entry.l;
      groupsByKey[entry.k].c = entry.c;
      groupsByKey[entry.k].s = entry.s;
      if (!groupsByKey[entry.k].tasks.some(x => x.task_id === t.task_id)) {
        groupsByKey[entry.k].tasks.push(t);
      }
    });
  });

  let groups = Object.values(groupsByKey).sort((a, b) => String(a.s || '').localeCompare(String(b.s || '')));

  // Comentarios en castellano
  // En todas las vistas agrupadas, las tareas internas se ordenan por fecha limite, responsable actual, prioridad y fecha de seguimiento.
  groups.forEach(group => {
    group.tasks = sortTasksByPriorityAndDueDate(group.tasks);
  });

  // Comentarios en castellano
  // V96: si hay email seleccionado, la tarea vinculada aparece primero dentro de su grupo.
  // El resto de tareas conserva exactamente el orden ya calculado por la vista agrupada.
  reorderGroupTasksForActiveEmail(groups, linkedTaskIds);

  // Comentarios en castellano
  // Si hay email seleccionado, los grupos compartidos con sus tareas quedan arriba y abiertos.
  // El resto de agrupadores siguen disponibles, pero cerrados de entrada.
  groups = applyActiveEmailGroupState(groups, linkedTaskIds);

  return groups;
}

function tog(id, btnEl) {
  const el = document.getElementById(id);
  const btn = btnEl || document.querySelector(`[aria-controls="${id}"]`);
  const ch = btn ? btn.querySelector('.gch') : null;
  const wasOpen = el && el.style.display !== 'none';
  if (el) el.style.display = wasOpen ? 'none' : 'block';
  if (ch) ch.classList.toggle('open', !wasOpen);
  if (btn) btn.setAttribute('aria-expanded', String(!wasOpen));
  if (wasOpen) {
    collapsedGroups.add(id);
    expandedGroups.delete(id);
  } else {
    collapsedGroups.delete(id);
    expandedGroups.add(id);
  }
}

  const date    = document.getElementById('ov-tim-date')?.value || todayIso();

    if (flashEl) { flashEl.className = 'cf-flash err'; flashEl.textContent = tr('TIM_EMPTY'); flashEl.style.display='block'; }

  // Convert to a canonical unit label for storage

  const task = TASKS.find(t => t.task_id === taskId);

    task.time_minutes = allEntries.reduce((sum, e) => sum + minutesFrom(e.amount, e.unit === 'hours' ? 'h' : e.unit === 'days' ? 'd' : 'min'), 0);

  if (flashEl) { flashEl.className = 'cf-flash ok'; flashEl.textContent = tr('TIM_SAVED'); flashEl.style.display='block'; setTimeout(() => { flashEl.style.display='none'; }, 2000); }
  schedulePersistence();

// Comentarios en castellano
function normalizeThreadSubject(subject) {
  return String(subject || '')
    .replace(/^(\s*(re|fw|fwd)\s*:\s*)+/ig, '')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

// Comentarios en castellano
function getTaskIdsLinkedToEmailId(emailId) {
  if (!emailId) return [];
  return (Array.isArray(RELATIONS) ? RELATIONS : [])
    .filter(r => r?.relation_type === 'task_email' && r?.related2_id === emailId && r?.related1_id)
    .map(r => r.related1_id);
}

// Comentarios en castellano
function getSuggestedTasksForActiveEmailThread() {
  const activeEmail = getActiveEmail();
  if (!activeEmail) return [];
  const currentEmailId = activeEmail.email_id || null;
  const threadSubject = normalizeThreadSubject(activeEmail.subject);
  if (!threadSubject) return [];
  const alreadyLinked = new Set(getSelectedEmailContextTaskIds());
  const suggested = new Map();
  (Array.isArray(EMAILS) ? EMAILS : []).forEach(email => {
    if (!email || !email.email_id) return;
    if (currentEmailId && email.email_id === currentEmailId) return;
    if (normalizeThreadSubject(email.subject) !== threadSubject) return;
    getTaskIdsLinkedToEmailId(email.email_id).forEach(taskId => {
      if (!taskId || alreadyLinked.has(taskId)) return;
      const task = TASKS.find(t => t.task_id === taskId);
      if (!task || String(task.status || '').toLowerCase() === 'completed') return;
      if (!suggested.has(taskId)) suggested.set(taskId, task);
    });
  });
  return Array.from(suggested.values()).sort((a, b) =>
    (a.priority || 99) - (b.priority || 99) || String(a.title || '').localeCompare(String(b.title || ''))
  );
}

// Comentarios en castellano
function removeThreadSuggestedTaskChip(taskId) {
  const panel = document.getElementById('email-panel');
  if (!panel || !taskId) return;
  const chip = panel.querySelector(`[data-thread-suggested-task-id="${taskId}"]`);
  if (chip) chip.remove();
  const wrap = panel.querySelector('[data-thread-suggested-wrap="1"]');
  if (wrap && !wrap.querySelector('[data-thread-suggested-task-id]')) wrap.remove();
}

// Comentarios en castellano
function linkActiveEmailToTask(taskId, sourceEl) {
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  const ae = getActiveEmail();
  if (!ae || !taskId || ae.isOutlookLoading) return false;

  // Comentarios en castellano: si el email activo todavía no existe en la tabla local, se crea antes de vincular.
  let emailId = ae.email_id || findExistingEmailId(ae.subject, ae.from, ae.message_id || ae.messageId, ae.office_item_id);
  if (!emailId && typeof findOrCreateEmail === 'function') {
    emailId = findOrCreateEmail(
      ae.subject,
      ae.from,
      ae.fromName,
      ae.dateLabel,
      ae.attachments || 0,
      ae.message_id || ae.messageId || ae.office_item_id
    );
    ae.email_id = emailId;
  }
  if (!emailId) return false;

  if (relationExists(taskId, emailId, 'task_email')) {
    try { closeQaDrop(); } catch (e) {}
    return false;
  }

  addRelation(taskId, emailId, 'task_email');
  const email = (Array.isArray(EMAILS) ? EMAILS : []).find(e => e.email_id === emailId);
  if (email) {
    if (!Array.isArray(email.linked_task_ids)) email.linked_task_ids = [];

function getNextMailTaskId() {
  const max = (Array.isArray(TASKS) ? TASKS : []).reduce((m, task) => {
    const id = String(task && task.task_id || '');
    const match = id.match(/^MAIL(\d{6})$/);
    return match ? Math.max(m, parseInt(match[1], 10) || 0) : m;
  }, 0);
  return 'MAIL' + String(max + 1).padStart(6, '0');
}

function normalizeEmailMessageId(value) {
  return String(value || '').trim();
}

function isEmailTaskRecord(task) {
  if (!task) return false;
  const id = String(task.task_id || '');
  const type = String(task.Type || task.type || task.action_type || task.outlook_category || '').toLowerCase();
  return id.startsWith('MAIL') || type === 'email';
}

function getEmailTaskCandidatesForEmail(email) {
  const ae = email || getActiveEmail();
  const result = [];
  const seen = new Set();
  const add = task => {
    if (!task || !task.task_id || seen.has(task.task_id)) return;
    if (!isEmailTaskRecord(task)) return;
    seen.add(task.task_id);
    result.push(task);
  };

  const messageId = normalizeEmailMessageId(ae && (ae.messageId || ae.internetMessageId));
  const emailIds = [];
  if (messageId && Array.isArray(EMAILS)) {
    EMAILS.forEach(emailRow => {
      if (normalizeEmailMessageId(emailRow.internet_message_id || emailRow.internetMessageId || emailRow.messageId) === messageId) emailIds.push(emailRow.email_id);
    });
  }
  const existingEmailId = ae ? findExistingEmailId(ae.subject, ae.from, messageId) : null;
  if (existingEmailId) emailIds.push(existingEmailId);
  Array.from(new Set(emailIds.filter(Boolean))).forEach(emailId => getTasksLinkedToEmailId(emailId).forEach(add));

  if (messageId && Array.isArray(TASKS)) {
    TASKS.forEach(task => {
      if (!isEmailTaskRecord(task)) return;
      if (normalizeEmailMessageId(task.internet_message_id || task.internetMessageId || task.messageId) === messageId) add(task);
    });
  }

  const threadId = getActiveEmailThreadId(ae);
  if (threadId && Array.isArray(TASKS)) {
    TASKS.forEach(task => {
      if (!isEmailTaskRecord(task)) return;
      const taskThread = String(task.thread_id || task.threadId || task.thread_group_id || '').trim();
      if (taskThread && taskThread === threadId) add(task);
    });
  }

  const subject = String(ae && ae.subject || '').trim().toLowerCase();
  if (subject && Array.isArray(TASKS)) {
    TASKS.forEach(task => {
      if (!isEmailTaskRecord(task)) return;
      if (String(task.title || '').trim().toLowerCase() === subject) add(task);
    });
  }
  return result;
}

function findEmailTaskForEmail(email) {
  return getEmailTaskCandidatesForEmail(email)[0] || null;
}

function findEmailTaskByMessageId(messageId) {
  const normalized = normalizeEmailMessageId(messageId);
  if (!normalized) return null;
  return findEmailTaskForEmail({ messageId: normalized, internetMessageId: normalized, subject: '', from: '' });
}

function getBoundEmailPanelTask() {

function ensureEmailTask(email) {
  const ae = email || getActiveEmail();
  if (!ae) return null;
  const messageId = String(ae.messageId || ae.internetMessageId || '').trim();
  if (!messageId) return null;

  const existing = findEmailTaskForEmail(ae);
  if (existing) {
    existing.Type = existing.Type || 'email';
    existing.action_type = existing.action_type || 'email';
    existing.outlook_category = existing.outlook_category || 'Email';
    existing.internet_message_id = existing.internet_message_id || messageId;
    existing.internetMessageId = existing.internetMessageId || messageId;
    existing.thread_id = existing.thread_id || getActiveEmailThreadId(ae);
    existing.threadId = existing.threadId || getActiveEmailThreadId(ae);
    const existingEmailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, messageId);
    if (existingEmailId && !getRelatedIds(existing.task_id, 'task_email').includes(existingEmailId)) addRelation(existing.task_id, existingEmailId, 'task_email');
    bindEmailPanelToTask(existing.task_id);
    return existing;
  }

  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, messageId);
  const taskId = getNextMailTaskId();
  const nowIso = new Date().toISOString();
  const threadId = getActiveEmailThreadId(ae);
  const task = {
    task_id: taskId,
    title: ae.subject || tr('NO_SUBJECT'),
    priority: 4,
    status: 'pending',
    due_date: null,
    followup_date: null,
    followup_days: 0,
    followup: null,
    time_minutes: 0,
    comment_count: 0,
    outlook_category: 'Email',
    Type: 'email',
    action_type: 'email',
    notes: '',
    repeat: null,
    internet_message_id: messageId,
    internetMessageId: messageId,
    email_id: emailId,
    thread_id: threadId,
    threadId: threadId,
    created_at: nowIso,
    updated_at: nowIso
  };
  TASKS.unshift(task);
  if (emailId) addRelation(taskId, emailId, 'task_email');
  if (MY_PERSON_ID) addRelation(taskId, MY_PERSON_ID, 'task_person');
  if (threadId) {
    task.thread_group_id = threadId;
    (Array.isArray(TASKS) ? TASKS : []).forEach(other => {
      if (!other || other.task_id === taskId) return;
      const otherThreadId = String(other.thread_id || other.threadId || other.thread_group_id || '').trim();
      if (otherThreadId && otherThreadId === threadId) {
        addRelation(taskId, other.task_id, 'task_thread');
        addRelation(other.task_id, taskId, 'task_thread');
      }
    });
  }
  bindEmailPanelToTask(task.task_id);
  schedulePersistence();
  return task;
}

function renderLinkList(filterText) {
  const q = (filterText || '').toLowerCase().trim();
  const list = document.getElementById('link-list');
  if (!list) return;
  // Get the emailId of the active email so we can exclude already-linked tasks
  const _ae = getActiveEmail();
  const _activeEmailId = _ae ? findOrCreateEmail(_ae.subject, _ae.from, _ae.fromName, _ae.dateLabel, _ae.attachments, _ae.messageId) : null;
  const filtered = TASKS.filter(t => {
    if (_activeEmailId && relationExists(t.task_id, _activeEmailId, 'task_email')) return false;
    const proj = getRelated(t.task_id, 'task_project')[0];
    const haystack = ((t.title || '') + ' ' + (proj ? proj.name : '')).toLowerCase();
    return haystack.includes(q);
  });
  const pcMap = {1:'p1',2:'p2',3:'p3',4:'p4'};
  if (!filtered.length) {
    list.innerHTML = `<div style="padding:12px 16px;color:var(--t3);font-size:12px">${tr('NO_TASKS_FOUND')}</div>`;
    return;
  }
  list.innerHTML = filtered.map(t => {
    const proj = getRelated(t.task_id, 'task_project')[0];
    const emailCount = getRelatedIds(t.task_id, 'task_email').length;
    return `
      <div class="ovrow" onclick="linkEmailToTask('${t.task_id}')" style="align-items:flex-start">
        <div class="ovico" style="background:var(--sf3);color:var(--t2)">
          <div class="pb ${pcMap[t.priority] || 'p4'}" style="width:22px;height:16px">P${t.priority}</div>
        </div>
        <div class="ovinf">
          <div class="ovfr">${escapeHtml(t.title)}</div>
          <div class="ovsb">${escapeHtml(proj ? proj.name : tr('NO_PROJECT'))} · ✉️ ${emailCount}</div>
        </div>
        <div class="ovdt">›</div>
      </div>`;
  }).join('');
}

function showLinkFlash(msg, kind) {
  const el = document.getElementById('link-flash');
  if (!el) return;
  el.className = 'link-flash ' + (kind || 'info');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);

// Link the active email to a task — creates EML record + REL if not already linked
function linkEmailToTask(taskId) {
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeQaDrop(); } catch (e) {}
  try { closeAnchoredPanelQepop(false); } catch (e) {}
  try { closeOv(); } catch (e) {}
  const ae = getActiveEmail();
  const t = TASKS.find(x => x.task_id === taskId);
  if (!t) return;

  // Find or create the EML record
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  // Check via RELATIONS whether this email is already linked to this task
  if (relationExists(taskId, emailId, 'task_email')) {
    showLinkFlash(tr('EMAIL_ALREADY_LINKED'), 'info');
    return;
  }

  addRelation(taskId, emailId, 'task_email');
  try { closeTaskCreatePopdown(); } catch (e) {}
  try { closeQaDrop(); } catch (e) {}
  try { closeOv(); } catch (e) {}
  try { render(); } catch(e) {}
}

// =============================================================================
function cloneJson(value) {
 return JSON.parse(JSON.stringify(value || {}));
}
function addDaysIsoLegacy(dateStr, daysToAdd) {
 if (!dateStr) return null;
 const [y, m, d] = String(dateStr).split('-').map(Number);
 const baseDate = new Date(y, (m || 1) - 1, d || 1);
 baseDate.setDate(baseDate.getDate() + (parseInt(daysToAdd || '0', 10) || 0));
 return dateToIsoLocal(baseDate);
}

function getWeekdayIndex(code) {
 const map = { su:0, mo:1, tu:2, we:3, th:4, fr:5, sa:6 };
 return map[code] != null ? map[code] : 1;
}
function getOrdinalNumber(ordinal) {
 const map = { '1':1, '2':2, '3':3, '4':4 };
 return map[String(ordinal)] || 1;
}
function getRepeatSummaryFromConfig(config) {
 if (!config || !config.enabled) return '';
 if (config.type === 'single') return '';
 const wdMap = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
 const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
 const weekdayName = code => tr(wdMap[code] || 'WD_MO');
 if (config.type === 'weekly') return tr('REP_SUM_WEEKS')(parseInt(config.intervalWeeks || '1', 10) || 1, weekdayName(config.weekday || 'mo'));
 if (config.type === 'monthly_dom') return tr('REP_SUM_DOM')(parseInt(config.dayOfMonth || '1', 10) || 1);
 if (config.type === 'monthly_ordinal') return tr('REP_SUM_ORDINAL')(tr(ordMap[String(config.ordinal || '1')] || 'ORD_1'), weekdayName(config.weekday || 'mo'));
 return tr('REP_SUM_DAYS')(parseInt(config.intervalDays || '1', 10) || 1);
}
function getMonthOrdinalDate(yearValue, monthValue, ordinal, weekdayCode) {
 const weekdayIndex = getWeekdayIndex(weekdayCode);
 const ordinalValue = String(ordinal || '1');

  document.getElementById('ovt').textContent = formConfig.overlayTitle;
  document.getElementById('ovs').textContent = formConfig.overlaySubtitle || '';
  document.getElementById('ovl').innerHTML = renderTaskForm(formConfig);
  captureTaskFormInitialState(document.getElementById('ovl'));
  document.getElementById('ov').classList.add('open');
  document.getElementById('bk').classList.add('open');
  onRepeatToggle();
  onRepeatTypeChange();
  updateRepeatSummary();
  onFollowupToggle();
  onFollowupTypeChange();
  updateFollowupSummary();
  onCreateStatusChange();
}

function getTaskFormPayload() {
  const statusValue = document.getElementById('cf-status')?.value || 'pending';
  const isCompleted = statusValue === 'completed';
  const rawDueDate = isCompleted ? null : (document.getElementById('cf-due')?.value || null);
  const adjustedDueResult = rawDueDate ? adjustToWeekdayIfWeekend(rawDueDate) : { adjusted: rawDueDate, wasWeekend: false };
  if (adjustedDueResult.wasWeekend) {
    const dueInput = document.getElementById('cf-due');
    if (dueInput) dueInput.value = adjustedDueResult.adjusted;
    showDueWeekendWarning();
  }
  const dueDate = isCompleted ? null : (adjustedDueResult.adjusted || null);
  const followupConfig = isCompleted ? { enabled:false, finalized:false, done:false, summary:'' } : getFollowupConfigFromForm();
  const followupDays = isCompleted ? 0 : (() => {
    const nextDate = followupConfig.finalized ? null : (followupConfig.nextDate || followupConfig.startDate || null);
    if (!nextDate) return 0;
    const diff = Math.round((new Date(nextDate) - new Date(todayIso())) / 86400000);
    return Math.max(0, diff);
  })();
  const timeValue = parseInt(document.getElementById('cf-time-val')?.value || '0', 10) || 0;
  const timeUnit = document.getElementById('cf-time-unit')?.value || 'min';
  return {
    title: (document.getElementById('cf-title')?.value || '').trim(),
    projectName: (document.getElementById('cf-project')?.value || '').trim() || tr('NO_PROJECT'),
    category: document.getElementById('cf-category')?.value || 'Task',
    priority: parseInt(document.getElementById('cf-priority')?.value || '3', 10),
    statusValue,
    isCompleted,
    ownerName: (document.getElementById('cf-owner')?.value || '').trim(),
    providerName: (document.getElementById('cf-provider')?.value || '').trim(),
    followupDays,
    followupConfig,
    dueDate,
    timeValue,
    timeUnit,
    timeMinutes: minutesFrom(timeValue, timeUnit),
    notes: document.getElementById('cf-notes')?.value || '',
    commentText: (document.getElementById('cf-comment')?.value || '').trim(),
    repeatConfig: isCompleted ? { enabled: false } : getRepeatConfig()
  };
}

function buildExistingActionsInfo(emailId) {
  const linked = TASKS.filter(t =>
    ['Task','Meeting','Call'].includes(t.outlook_category || t.category) &&
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  if (!linked.length) return '';
  const chips = linked.map(t => {
    const cat = t.outlook_category || t.category || '';
    const isFu = cat === 'Task';
    const isMt = cat === 'Meeting';
    const cls  = isFu ? 'fu' : isMt ? 'mt' : '';
    const icon = isFu ? '👁️' : isMt ? '📅' : '📞';
    const label = isFu ? tr('EXIST_FOLLOWUP') : isMt ? tr('EXIST_MEETING') : tr('EXIST_CALL');
    const date  = t.due_date ? ' · ' + fmtDate(t.due_date) : t.followup_date ? ' · ' + fmtDate(t.followup_date) : '';
    return `<span class="exist-chip ${cls}">${icon} ${label}${escapeHtml(date)}: ${escapeHtml(t.title)}</span>`;
  }).join('');
  return `<div class="exist-info"><div class="exist-info-msg">${tr('EXIST_INFO')}</div><div class="exist-chips">${chips}</div></div>`;
}

function openCreateTaskForm(ev) {
  const formConfig = getTaskFormConfig('create');
  if (!formConfig) return;

  const ae = getActiveEmail();
  if (!ae) return;
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  // Find existing linked tasks by category
  const linkedTasks = TASKS.filter(t =>
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  const existFu = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return (cat === 'Task') && (t.followup_date || t.due_date);
  });
  const existMt = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return cat === 'Meeting' || cat === 'Call';
  });

  if (existFu) {
    const existingFollowup = getTaskFollowup(existFu);
    formConfig.values.followup = existingFollowup;
    if (existFu.followup_date) {
      const diff = Math.round((new Date(existFu.followup_date) - new Date(todayIso())) / 86400000);
      formConfig.values.followupDays = Math.max(0, diff);
    } else if (existFu.followup_days != null) {
      formConfig.values.followupDays = existFu.followup_days;
    }
    if (existFu.due_date && !formConfig.values.dueDate) {
      formConfig.values.dueDate = existFu.due_date;
    }
  }

  if (existMt && existMt.due_date && !formConfig.values.dueDate) {
    formConfig.values.dueDate = existMt.due_date;
  }

  formConfig._existBanner = buildExistingActionsInfo(emailId);
  formConfig.emailId = emailId;
  formConfig._emailMode = 'linked';
  formConfig.saveAction = "saveTaskForm('create', null, 'linked')";
  formConfig.mode = 'create';
  formConfig.backAction = 'closeTaskCreatePopdown()';

  toggleTaskCreatePopdown(formConfig, ev && ev.currentTarget ? ev.currentTarget : null);
}

function proceedOpenEditTask(taskId) {

function openEditTask(taskId) {

function saveTaskForm(mode, taskId, emailMode) {
  const payload = getTaskFormPayload();
  if (!payload.title) {
    showCreateFlash(tr('EMPTY_TITLE'), 'err');
    return;
  }
  const today = todayIso();
  const nextFollowupDate = payload.followupConfig?.finalized ? null : (payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null);
  if ((payload.dueDate && payload.dueDate < today) || (nextFollowupDate && nextFollowupDate < today)) {
    showCreateFlash(tr('WARN_DATE_BEFORE_TODAY'), 'err');
    return;
  }
  if (payload.dueDate && nextFollowupDate && nextFollowupDate > payload.dueDate) {
    showCreateFlash(tr('WARN_FOLLOWUP_AFTER_DUE_BLOCK'), 'err');
    return;
  }

  if (mode === 'edit') {
    const task = TASKS.find(item => item.task_id === taskId);
    if (!task) return;
    const beforeState = collectTaskAuditState(taskId);
    task.title = payload.title;
    task.outlook_category = payload.category;
    task.priority = payload.priority;
    task.status = payload.statusValue;
    task.followup_days = payload.followupDays;
    task.due_date = payload.dueDate;
    task.followup = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
    task.time_minutes = payload.timeMinutes;
    task.notes = payload.notes;
    task.repeat = payload.repeatConfig;
    syncTaskFollowupFields(task);
    const projectId = findOrCreateProject(payload.projectName);
    removeTaskRelationsByType(taskId, 'task_project');
    addRelation(taskId, projectId, 'task_project');
    removeTaskRelationsByType(taskId, 'task_provider');
    if (payload.providerName) {
      const providerId = findOrCreateProvider(payload.providerName);
      addRelation(taskId, providerId, 'task_provider');
    }
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (payload.ownerName) {
      const ownerId = findOrCreatePerson(payload.ownerName);
      if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskId, ownerId, 'task_person');
    }
    const afterState = collectTaskAuditState(taskId);
    logTaskAuditChanges(taskId, beforeState, afterState);
    if (payload.commentText) {
      const commentId = nextId('CMT');
      COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
      addRelation(taskId, commentId, 'task_comment');
    }
    refreshTaskCommentCount(taskId);
    try { render(); } catch (error) {}
    schedulePersistence();
    showCreateFlash(tr('EDIT_SAVED'), 'ok');
    setTimeout(() => { try { closeOv(); } catch (error) {} }, 800);
    return;
  }

  const activeEmail = getActiveEmail();
  const shouldLinkEmail = emailMode !== 'none' && !!activeEmail;
  const projectId = findOrCreateProject(payload.projectName);
  const ownerId = payload.ownerName ? findOrCreatePerson(payload.ownerName) : null;
  const providerId = payload.providerName ? findOrCreateProvider(payload.providerName) : null;
  const emailId = shouldLinkEmail ? findOrCreateEmail(activeEmail.subject, activeEmail.from, activeEmail.fromName, activeEmail.dateLabel, activeEmail.attachments, activeEmail.messageId) : null;
  let timeEntryId = null;
  if (payload.timeMinutes > 0) {
    timeEntryId = nextId('TIM');
    const unitLabel = payload.timeUnit === 'h' ? 'hours' : payload.timeUnit === 'd' ? 'days' : 'minutes';
    TIME_ENTRIES.push({ entry_id: timeEntryId, entry_date: todayIso(), amount: payload.timeValue, unit: unitLabel });
  }
  let commentId = null;
  if (payload.commentText) {
    commentId = nextId('CMT');
    COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
  }
  const taskIdNew = nextId('TSK');
  const followupState = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
  const followupDate = payload.isCompleted ? null : (followupState.finalized ? null : (followupState.nextDate || null));
  TASKS.unshift({
    task_id: taskIdNew,
    title: payload.title,
    priority: payload.priority,
    status: payload.statusValue,
    due_date: payload.dueDate,
    followup_date: followupDate,
    followup_days: payload.followupDays,
    followup: followupState,
    time_minutes: payload.timeMinutes,
    comment_count: payload.commentText ? 1 : 0,
    outlook_category: payload.category,
    notes: payload.notes,
    repeat: payload.repeatConfig,
    created_at: new Date().toISOString(),
  });
  addRelation(taskIdNew, projectId, 'task_project');
  if (emailId) addRelation(taskIdNew, emailId, 'task_email');
  addRelation(taskIdNew, MY_PERSON_ID, 'task_person');
  if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskIdNew, ownerId, 'task_person');
  if (providerId) addRelation(taskIdNew, providerId, 'task_provider');
  if (timeEntryId) {
    addRelation(taskIdNew, timeEntryId, 'task_time_entry');
    addRelation(MY_PERSON_ID, timeEntryId, 'person_time_entry');
  }
  if (commentId) addRelation(taskIdNew, commentId, 'task_comment');
  try { render(); } catch (error) {}
  schedulePersistence();
  showCreateFlash(tr('TASK_CREATED'), 'ok');
  setTimeout(() => { try { closeTaskCreatePopdown(); } catch (error) {} }, 900);
}

function showCreateFlash(message, kind) {
  const flashElement = document.getElementById('cf-flash');
  if (!flashElement) return;
  flashElement.className = 'cf-flash ' + (kind || 'ok');
  flashElement.textContent = message;
  flashElement.style.display = 'block';
  clearTimeout(flashElement._t);
  flashElement._t = setTimeout(() => { flashElement.style.display = 'none'; }, 2400);
}

function onCreateStatusChange() {
  const st = document.getElementById('cf-status')?.value || 'pending';
  const isDone = st === 'completed';
  const due = document.getElementById('cf-due');
  const repChk = document.getElementById('cf-repeat-enabled');
  const repType = document.getElementById('cf-repeat-type');
  const repBox = document.getElementById('rep-box');
  const fupChk = document.getElementById('cf-followup-enabled');
  const fupType = document.getElementById('cf-followup-type');
  const fupBox = document.getElementById('fup-box');
  if (due) { due.disabled = isDone; if (isDone) due.value = ''; }
  if (repChk) { repChk.disabled = isDone; if (isDone) repChk.checked = false; }
  if (repType) repType.disabled = isDone;
  if (repBox) repBox.classList.toggle('disabled', isDone);
  if (isDone) { const repOpts = document.getElementById('cf-repeat-opts'); if (repOpts) repOpts.classList.remove('visible'); }
  if (fupChk) { fupChk.disabled = isDone; if (isDone) fupChk.checked = false; }

  if (fupBox) fupBox.classList.toggle('disabled', isDone);
  if (isDone) { const fupOpts = document.getElementById('cf-followup-opts'); if (fupOpts) fupOpts.classList.remove('visible'); }

  onFollowupToggle();
}

function onRepeatToggle() {
  const chk  = document.getElementById('cf-repeat-enabled');
  const opts = document.getElementById('cf-repeat-opts');
  if (!chk || !opts) return;
  opts.classList.toggle('visible', !!chk.checked && !chk.disabled);
}

function onRepeatTypeChange() {
  const sel = document.getElementById('cf-repeat-type');
  if (!sel) return;
  const v = sel.value;
  const blocks = {
    interval_days:   document.getElementById('rep-interval-days'),
    weekly:          document.getElementById('rep-weekly'),
    monthly_dom:     document.getElementById('rep-monthly-dom'),
    monthly_ordinal: document.getElementById('rep-monthly-ordinal'),
  };
  Object.values(blocks).forEach(b => { if (b) b.style.display = 'none'; });
  if (blocks[v]) blocks[v].style.display = 'block';
  updateRepeatSummary();
}

function updateRepeatSummary() {
  const sel = document.getElementById('cf-repeat-type');
  const out = document.getElementById('cf-repeat-summary');
  if (!sel || !out) return;
  const wdMap  = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
  const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
  const wdName = code => tr(wdMap[code] || 'WD_MO');
  let text = '';
  if (sel.value === 'interval_days') {
    const n = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
    text = tr('REP_SUM_DAYS')(n);
  } else if (sel.value === 'weekly') {
    const n  = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10);
    const wd = document.getElementById('cf-repeat-weekday')?.value || 'mo';
    text = tr('REP_SUM_WEEKS')(n, wdName(wd));
  } else if (sel.value === 'monthly_dom') {
    const d = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
    text = tr('REP_SUM_DOM')(d);
  } else if (sel.value === 'monthly_ordinal') {
    const ord = document.getElementById('cf-repeat-ordinal')?.value || '1';
    const wd  = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo';
    text = tr('REP_SUM_ORDINAL')(tr(ordMap[ord] || 'ORD_1'), wdName(wd));
  }
  out.value = text;
}

function getRepeatConfig() {
  const enabled = !!document.getElementById('cf-repeat-enabled')?.checked;
  const type    = document.getElementById('cf-repeat-type')?.value || 'interval_days';
  if (!enabled) return { enabled: false };
  const cfg = { enabled: true, type };
  if (type === 'interval_days')   cfg.intervalDays  = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
  if (type === 'weekly')          { cfg.intervalWeeks = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10); cfg.weekday = document.getElementById('cf-repeat-weekday')?.value || 'mo'; }
  if (type === 'monthly_dom')     cfg.dayOfMonth = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
  if (type === 'monthly_ordinal') { cfg.ordinal = document.getElementById('cf-repeat-ordinal')?.value || '1'; cfg.weekday = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo'; }
  cfg.summary = document.getElementById('cf-repeat-summary')?.value || '';
  return cfg;
}

// Comentarios en castellano
function getTaskDueDateForFollowup(sourceTaskId) {
  const task = sourceTaskId ? findById(sourceTaskId) : null;
  return task ? (task.due_date || null) : null;
}

// Comentarios en castellano
function getTaskFollowupConflict(sourceTaskId) {
  const task = sourceTaskId ? findById(sourceTaskId) : null;
  if (!task || task.status === 'completed') return null;

  const followup = task.followup || {};
  if (followup.enabled && !followup.finalized && (followup.nextDate || followup.startDate || task.followup_date)) return task;
  if (task.followup_date) return task;

  const relatedIds = new Set();
  (RELATIONS || []).forEach(rel => {
    if (rel.type !== 'task_task') return;
    if (rel.from_id === sourceTaskId) relatedIds.add(rel.to_id);
    if (rel.to_id === sourceTaskId) relatedIds.add(rel.from_id);
  });

  for (const relId of relatedIds) {
    const relTask = findById(relId);
    if (!relTask || relTask.status === 'completed') continue;
    const actionType = normalizeActionTypeKey(relTask.action_type || window.TaskFlow.utils.getActionTypeFromCategory(relTask.outlook_category || relTask.category || 'Task'));
    if (actionType === 'followup' || relTask.followup_date || relTask.followup?.enabled) return relTask;
  }

  return null;
}

// Comentarios en castellano
function computeFollowupFirstDateFromInputs() {
  const explicitDate = document.getElementById('fu-date')?.value || '';
  const rawDays = document.getElementById('fu-days')?.value || '';
  const days = parseInt(rawDays, 10);
  let originalDate = explicitDate;
  let fromDays = false;

  if (!originalDate && Number.isFinite(days) && days > 0) {
    originalDate = window.TaskFlow.utils.addDaysIso(todayIso(), days);
    fromDays = true;
  }

  if (!originalDate) return { ok:false, reason:'empty' };

  const adjustedDate = typeof nextWorkday === 'function' ? nextWorkday(originalDate) : originalDate;
  return {
    ok:true,
    originalDate,
    adjustedDate,
    wasWeekendAdjusted: adjustedDate !== originalDate,
    days: Number.isFinite(days) && days > 0 ? days : null,
    fromDays
  };
}

// Comentarios en castellano
function refreshFollowupDerivedDate() {
  const box = document.getElementById('fu-derived-date');
  if (!box) return;
  const result = computeFollowupFirstDateFromInputs();
  if (!result.ok) {
    box.style.display = 'none';
    box.textContent = '';
    return;
  }

  const todayStr = todayIso();
  const sourceTaskId = document.getElementById('qa-drop')?.dataset?.followupSourceTaskId || '';
  const dueDate = getTaskDueDateForFollowup(sourceTaskId);
  box.textContent = `${tr('FU_DERIVED_DATE')}: ${result.adjustedDate}` + (result.wasWeekendAdjusted ? ` · ${tr('FU_WEEKEND_ADJUSTED')}` : '');

  const invalid = result.adjustedDate < todayStr || (!!dueDate && result.adjustedDate > dueDate);
  if (invalid) {
    box.textContent += result.adjustedDate < todayStr ? ` · ${tr('FU_DATE_BEFORE_TODAY')}` : ` · ${tr('FU_DATE_AFTER_DUE')}`;
    box.style.background = 'rgba(220,38,38,.10)';
    box.style.color = 'var(--re)';
    box.style.borderColor = 'rgba(220,38,38,.22)';
  } else {
    box.style.background = 'var(--ac-s)';
    box.style.color = 'var(--ac)';
    box.style.borderColor = 'rgba(43,92,230,.20)';
  }
  box.style.display = 'block';
}

  drop.innerHTML = `

        <input class="cf-input" id="fu-title" value="${escapeHtml(tr('FU_TITLE_PH') + titleBase)}" placeholder="${tr('CF_TITLE_PH')}" />

// Comentarios en castellano
function findOpenInteractionForPerson(personId, categories = ['Meeting','Call'], excludeTaskId = null) {
  if (!personId) return null;
  const allowed = new Set(categories.map(c => String(c || '').toLowerCase()));
  return (TASKS || []).find(task => {
    if (!task || task.task_id === excludeTaskId || task.status === 'completed') return false;
    const legacyCategory = String(task.outlook_category || task.category || '').toLowerCase();
    const actionType = normalizeActionTypeKey(task.action_type || window.TaskFlow.utils.getActionTypeFromCategory(task.outlook_category || task.category || 'Task'));
    const matchesType = allowed.has(legacyCategory) || (allowed.has('meeting') && actionType === 'meeting') || (allowed.has('call') && actionType === 'call');
    if (!matchesType) return false;
    return getRelatedIds(task.task_id, 'task_person').includes(personId);
  }) || null;
}

function saveFollowUpTask(sourceTaskId = null, sourceKind = 'email') {
  sourceTaskId = sourceTaskId || null;
  const ae = sourceKind === 'email' ? getActiveEmail() : null;
  const title = (document.getElementById('fu-title')?.value || '').trim();
  if (!title) {
    showFollowupFlash(tr('EMPTY_TITLE'), 'err');
    return;
  }

  if (sourceTaskId && getTaskFollowupConflict(sourceTaskId)) {
    showFollowupFlash(tr('FU_ALREADY_EXISTS'), 'err');
    return;
  }

  const computed = computeFollowupFirstDateFromInputs();
  if (!computed.ok) {
    showFollowupFlash(tr('FU_EMPTY_DATE_OR_DAYS'), 'err');
    return;
  }

  const followDate = computed.adjustedDate;
  const todayStr = todayIso();
  if (followDate < todayStr) {
    showFollowupFlash(tr('FU_DATE_BEFORE_TODAY'), 'err');
    return;
  }

  const dueDate = getTaskDueDateForFollowup(sourceTaskId);
  if (dueDate && followDate > dueDate) {
    showFollowupFlash(tr('WARN_FOLLOWUP_AFTER_DUE_BLOCK') || tr('FU_DATE_AFTER_DUE'), 'err');
    return;
  }

  const note = (document.getElementById('fu-note')?.value || '').trim();
  const today = new Date(todayStr);
  const fDate = new Date(followDate);
  const diffDays = Math.max(0, Math.round((fDate - today) / 86400000));
  const intervalDays = computed.days || Math.max(1, diffDays || 1);

  const taskId = nextId('TSK');
  const sourceProject = sourceTaskId ? getRelated(sourceTaskId, 'task_project')[0] : null;
  const projId = sourceProject ? sourceProject.project_id : findOrCreateProject(tr('NO_PROJECT'));
  const emailId = ae ? findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId) : null;

  const fullNote = [
    computed.wasWeekendAdjusted ? tr('FU_WEEKEND_ADJUSTED') : '',
    computed.fromDays ? `${tr('FU_PERIODIC_DAYS_LBL')}: ${intervalDays}` : '',
    note
  ].filter(Boolean).join('\n');

  TASKS.push({
    task_id: taskId,
    title: title,
    status: 'pending',
    priority: 3,
    category: 'Task',
    due_date: followDate,
    followup_date: followDate,
    followup_days: diffDays,
    followup: { enabled:true, finalized:false, done:false, type:'interval_days', intervalDays: intervalDays, startDate: followDate, nextDate: followDate, summary: tr('REP_SUM_DAYS')(intervalDays), lastCompletedAt:null },
    time_minutes: 0,
    comment_count: fullNote ? 1 : 0,
    created_at: new Date().toISOString(),
    outlook_category: 'Task',
    action_type: 'followup',
    repeat: { enabled: false },
    notes: fullNote || '',
  });

  addRelation(taskId, projId, 'task_project');
  if (emailId) addRelation(taskId, emailId, 'task_email');
  addRelation(taskId, MY_PERSON_ID, 'task_person');

  if (sourceTaskId) {
    addRelation(sourceTaskId, taskId, 'task_task');
    addRelation(taskId, sourceTaskId, 'task_task');
  }

  if (fullNote) {
    const cmtId = nextId('CMT');
    COMMENTS.push({ comment_id: cmtId, text: fullNote, created_at: new Date().toISOString(), comment_type:'user' });
    addRelation(taskId, cmtId, 'task_comment');
  }

  showFollowupFlash(tr('TASK_CREATED') || '✅', 'ok');
  try { render(); } catch(e) {}
  schedulePersistence();
  setTimeout(() => {
    try { closeQaDrop(); } catch(e) {}
    try { closeOv(); } catch(e) {}
  }, 900);
}

function saveMeetingTask() {
  const ae    = getActiveEmail();
  const title = (document.getElementById('mt-title')?.value || '').trim();
  const flash = document.getElementById('mt-flash');
  if (!title) {
    if (flash) { flash.className='cf-flash err'; flash.textContent=tr('EMPTY_TITLE'); flash.style.display='block'; }
    return;
  }
  const meetDate  = document.getElementById('mt-date')?.value  || todayIso();
  const meetTime  = document.getElementById('mt-time')?.value  || '09:00';
  const personName = (document.getElementById('mt-person')?.value || '').trim();
  const place     = (document.getElementById('mt-place')?.value || '').trim();
  const note      = (document.getElementById('mt-note')?.value  || '').trim();
  const cat       = document.getElementById('mt-category')?.value || 'Meeting';
  const personId  = personName ? findOrCreatePerson(personName) : null;
  const duplicate = personId ? findOpenInteractionForPerson(personId, ['Meeting','Call']) : null;
  if (duplicate) {
    showInteractionDuplicateFlash('mt-flash', personName, duplicate);
    return;
  }
  const noteText  = [personName ? `${tr('MT_PERSON_LBL')}: ${personName}` : '', place ? '📍 ' + place : '', note].filter(Boolean).join('\n');

  const taskId  = nextId('TSK');
  const projId  = findOrCreateProject(tr('NO_PROJECT'));
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  TASKS.push({
    task_id: taskId,
    title: title,
    status: 'pending',
    priority: 2,
    category: cat,
    outlook_category: cat,
    action_type: normalizeActionTypeKey(cat),
    due_date: meetDate,
    followup_date: null,
    followup_days: 0,
    followup: { enabled:false, finalized:false, done:false, summary:'', lastCompletedAt:null },
    time_minutes: 0,
    comment_count: noteText ? 1 : 0,
    created_at: new Date().toISOString(),
    repeat: { enabled: false },
    notes: noteText || '',
  });

  addRelation(taskId, projId, 'task_project');
  addRelation(taskId, emailId, 'task_email');
  addRelation(taskId, MY_PERSON_ID, 'task_person');
  if (personId && personId !== MY_PERSON_ID) addRelation(taskId, personId, 'task_person');

  if (noteText) {
    const cmtId = nextId('CMT');
    COMMENTS.push({ comment_id: cmtId, text: meetTime + ' · ' + noteText, created_at: new Date().toISOString(), comment_type:'user' });
    addRelation(taskId, cmtId, 'task_comment');
  }

  if (flash) { flash.className='cf-flash ok'; flash.textContent=tr('TASK_CREATED')||'✅'; flash.style.display='block'; }
  try { render(); } catch(e) {}
  schedulePersistence();
  setTimeout(() => { try { closeOv(); } catch(e) {} }, 900);
}

function createEmptyPersistenceSnapshot() {
  return { projects: [], people: [], providers: [], emails: [], comments: [], time_entries: [], tasks: [], relations: [] };
}
function normalizePersistenceSnapshot(snapshot) {
  const normalized = createEmptyPersistenceSnapshot();
  Object.keys(normalized).forEach(storeName => {
    normalized[storeName] = Array.isArray(snapshot?.[storeName]) ? snapshot[storeName] : [];
  });
  return normalized;
}
function getTaskFlowRepositoryName() { return TASKFLOW_REPOSITORY_CONFIG.activeProvider || 'indexeddb'; }
function taskFlowFromSharePointFields(storeName, fields) {
  const map = TASKFLOW_REPOSITORY_CONFIG.sharePoint.fieldMaps[storeName] || {};
  const record = {};
  Object.entries(map).forEach(([taskFlowField, sharePointField]) => {
    if (fields && Object.prototype.hasOwnProperty.call(fields, sharePointField)) record[taskFlowField] = fields[sharePointField];
  });
  if (!record.Title && fields?.Title) record.Title = fields.Title;
  if (!record.title && fields?.Title) record.title = fields.Title;
  return record;
}
function taskFlowToSharePointFields(storeName, record) {
  const map = TASKFLOW_REPOSITORY_CONFIG.sharePoint.fieldMaps[storeName] || {};
  const fields = {};
  Object.entries(map).forEach(([taskFlowField, sharePointField]) => {
    if (record && Object.prototype.hasOwnProperty.call(record, taskFlowField)) {
      const value = record[taskFlowField];
      fields[sharePointField] = Array.isArray(value) || (value && typeof value === 'object') ? JSON.stringify(value) : value;
    }
  });
  if (!fields.Title) fields.Title = record?.Title || record?.title || record?.subject || record?.name || record?.task_id || 'TaskFlow item';
  return fields;
}
async function getSharePointAccessToken() {
  if (typeof window.TASKFLOW_SHAREPOINT_ACCESS_TOKEN === 'string' && window.TASKFLOW_SHAREPOINT_ACCESS_TOKEN) return window.TASKFLOW_SHAREPOINT_ACCESS_TOKEN;
  if (typeof window.TaskFlow?.getSharePointAccessToken === 'function') return await window.TaskFlow.getSharePointAccessToken();
  return null;
}
async function sharePointGraphFetch(path, options = {}) {
  const token = await getSharePointAccessToken();
  if (!token) throw new Error('SharePoint token no configurado en v200');
  const graphBaseUrl = TASKFLOW_REPOSITORY_CONFIG.sharePoint.graphBaseUrl.replace(/\/$/, '');
  const url = path.startsWith('http') ? path : `${graphBaseUrl}${path.startsWith('/') ? '' : '/'}${path}`;
  const response = await fetch(url, { ...options, headers: { Accept:'application/json', 'Content-Type':'application/json', Authorization:`Bearer ${token}`, ...(options.headers || {}) } });
  if (!response.ok) throw new Error(`SharePoint Graph error ${response.status}`);
  return await response.json();
}

let TF_persistTimer = null;
let TF_persistenceHooksAttached = false;

function canUseIndexedDb() {
  return TF_INDEXEDDB_CONFIG.enabled && typeof indexedDB !== 'undefined';
}

function openTaskFlowDb() {
  return new Promise((resolve, reject) => {
    if (!canUseIndexedDb()) {
      resolve(null);
      return;
    }
    const request = indexedDB.open(TF_INDEXEDDB_CONFIG.dbName, TF_INDEXEDDB_CONFIG.version);
    request.onupgradeneeded = event => {
      const db = event.target.result;
      Object.entries(TF_INDEXEDDB_CONFIG.stores).forEach(([storeName, storeConfig]) => {
        if (!db.objectStoreNames.contains(storeName)) {
          db.createObjectStore(storeName, { keyPath: storeConfig.keyPath });
        }
      });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
  });
}

function getPersistenceSnapshot() {
  return {
    projects: PROJECTS.map(item => ({ ...item })),
    people: PEOPLE.map(item => ({ ...item })),
    providers: PROVIDERS.map(item => ({ ...item })),
    emails: EMAILS.map(item => ({ ...item })),
    comments: COMMENTS.map(item => ({ ...item })),
    time_entries: TIME_ENTRIES.map(item => ({ ...item })),
    tasks: TASKS.map(item => ({ ...item })),
    relations: RELATIONS.map(item => ({ ...item }))
  };
}

function getPersistenceStats() {
  const snapshot = getPersistenceSnapshot();
  return {
    projects: snapshot.projects.length,
    people: snapshot.people.length,
    providers: snapshot.providers.length,
    emails: snapshot.emails.length,
    comments: snapshot.comments.length,
    time_entries: snapshot.time_entries.length,
    tasks: snapshot.tasks.length,
    relations: snapshot.relations.length
  };
}

function hasPersistenceData(snapshot) {
  if (!snapshot) return false;
  return Object.values(snapshot).some(value => Array.isArray(value) && value.length > 0);
}

function applyPersistenceSnapshot(snapshot) {
  if (!snapshot) return;
  PROJECTS = Array.isArray(snapshot.projects) ? snapshot.projects : PROJECTS;
  PEOPLE = Array.isArray(snapshot.people) ? snapshot.people : PEOPLE;
  PROVIDERS = Array.isArray(snapshot.providers) ? snapshot.providers : PROVIDERS;
  EMAILS = Array.isArray(snapshot.emails) ? snapshot.emails : EMAILS;
  COMMENTS = Array.isArray(snapshot.comments) ? snapshot.comments : COMMENTS;
  TIME_ENTRIES = Array.isArray(snapshot.time_entries) ? snapshot.time_entries : TIME_ENTRIES;
  TASKS = Array.isArray(snapshot.tasks) ? snapshot.tasks : TASKS;
  RELATIONS = Array.isArray(snapshot.relations) ? snapshot.relations : RELATIONS;
  if (MY_PERSON_ID && !PEOPLE.find(person => person.person_id === MY_PERSON_ID) && PEOPLE.length) {
    MY_PERSON_ID = PEOPLE[0].person_id;
  }
}

async function loadPersistenceSnapshotFromIndexedDb() {
  const db = await openTaskFlowDb();
  if (!db) return null;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readonly');
    const snapshot = {};
    let pending = storeNames.length;
    storeNames.forEach(storeName => {
      const request = transaction.objectStore(storeName).getAll();
      request.onsuccess = () => {
        snapshot[storeName] = request.result || [];
        pending -= 1;
        if (pending === 0) resolve(snapshot);
      };
      request.onerror = () => reject(request.error || new Error('IndexedDB read failed'));
    });
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB transaction failed'));
  });
}

async function savePersistenceSnapshotToIndexedDb(snapshotOverride) {
  const db = await openTaskFlowDb();
  if (!db) return;
  const snapshot = normalizePersistenceSnapshot(snapshotOverride || getPersistenceSnapshot());
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB write failed'));
    storeNames.forEach(storeName => {
      const store = transaction.objectStore(storeName);
      const clearRequest = store.clear();
      clearRequest.onsuccess = () => {
        (snapshot[storeName] || []).forEach(record => store.put(record));
      };
      clearRequest.onerror = () => reject(clearRequest.error || new Error('IndexedDB clear failed'));
    });
  });
}


async function loadPersistenceSnapshot() {
  const repository = getTaskFlowRepository();
  const snapshot = await repository.loadSnapshot();
  return normalizePersistenceSnapshot(snapshot);
}

async function savePersistenceSnapshot(snapshotOverride) {
  const repository = getTaskFlowRepository();
  const snapshot = normalizePersistenceSnapshot(snapshotOverride || getPersistenceSnapshot());
  return await repository.saveSnapshot(snapshot);
}

function schedulePersistence() {
  if (!canUseActiveRepository()) return;
  if (TF_persistTimer) clearTimeout(TF_persistTimer);
  TF_persistTimer = setTimeout(() => {
    const repositoryName = getTaskFlowRepositoryName();
    savePersistenceSnapshot().catch(error => console.error(`TaskFlow ${repositoryName} save failed`, error));
  }, 120);
}

function wrapPersistenceFunction(functionName) {
  const originalFunction = window[functionName];
  if (typeof originalFunction !== 'function' || originalFunction.__tfWrapped) return;
  const wrappedFunction = function(...args) {
    const result = originalFunction.apply(this, args);
    schedulePersistence();
    return result;
  };
  wrappedFunction.__tfWrapped = true;
  window[functionName] = wrappedFunction;
}

function attachPersistenceHooks() {
  if (TF_persistenceHooksAttached) return;
  TF_persistenceHooksAttached = true;
  ['toggleDone', 'linkEmailToTask', 'saveComment', 'saveTimeEntry', 'saveFollowUpTask', 'saveMeetingTask'].forEach(wrapPersistenceFunction);
}

function resetInMemoryTables() {
  PROJECTS = [];
  PROVIDERS = [];
  EMAILS = [];
  COMMENTS = [];
  TIME_ENTRIES = [];
  TASKS = [];
  RELATIONS = [];
  if (PEOPLE.length > 0 && MY_PERSON_ID) {
    PEOPLE = PEOPLE.filter(person => person.person_id === MY_PERSON_ID);
  }
}

async function clearIndexedDbStores() {
  const db = await openTaskFlowDb();
  if (!db) return;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB reset failed'));
    storeNames.forEach(storeName => transaction.objectStore(storeName).clear());
  });
}

function downloadSnapshotJson(snapshot) {

// Comentarios en castellano
function getDailySummaryDateFromEmail(email) {
  const candidates = [
    email?.received_at_local,
    email?.receivedAt,
    email?.received_at,
    email?.sent_at_local,
    email?.sentAt,
    email?.sent_at,
    email?.created_at_local,
    email?.created_at,
    email?.date
  ].filter(Boolean);
  for (const value of candidates) {
    const str = String(value);
    const match = str.match(/\d{4}-\d{2}-\d{2}/);
    if (match) return match[0];
  }
  return '';
}

// Comentarios en castellano
function getDailySummaryTaskDate(task, fieldName) {
  const value = task && task[fieldName] ? String(task[fieldName]) : '';
  const match = value.match(/\d{4}-\d{2}-\d{2}/);
  return match ? match[0] : '';
}

// Comentarios en castellano
function getDailySummaryTaskPriorityWeight(task) {
  const raw = String(task?.priority || task?.task_priority || task?.prio || '').trim().toUpperCase();
  if (raw === 'P1' || raw === '1') return 1;
  if (raw === 'P2' || raw === '2') return 2;
  if (raw === 'P3' || raw === '3') return 3;
  if (raw === 'P4' || raw === '4') return 4;
  return 99;
}

// Comentarios en castellano
function buildDailySummary() {
  const today = todayIso();
  const pending = (Array.isArray(TASKS) ? TASKS : []).filter(t => String(t?.status || '').toLowerCase() !== 'completed');
  const overdueFollowups = pending.filter(t => {
    const followup = getDailySummaryTaskDate(t, 'followup_date');
    return !!followup && followup < today;
  });
  const todayFollowups = pending.filter(t => getDailySummaryTaskDate(t, 'followup_date') === today);
  const todayMeetings = pending.filter(t => String(t?.action_type || '').toLowerCase() === 'meeting' && getDailySummaryTaskDate(t, 'due_date') === today);
  const todayCalls = pending.filter(t => String(t?.action_type || '').toLowerCase() === 'call' && getDailySummaryTaskDate(t, 'due_date') === today);
  const todayDeadlines = pending.filter(t => {
    const actionType = String(t?.action_type || '').toLowerCase();
    return getDailySummaryTaskDate(t, 'due_date') === today && actionType !== 'meeting' && actionType !== 'call';
  });

  const topPriorityTasks = pending
    .slice()
    .sort((a, b) => {
      const pa = getDailySummaryTaskPriorityWeight(a);
      const pb = getDailySummaryTaskPriorityWeight(b);
      if (pa !== pb) return pa - pb;
      const fa = getDailySummaryTaskDate(a, 'followup_date') || '9999-12-31';
      const fb = getDailySummaryTaskDate(b, 'followup_date') || '9999-12-31';
      if (fa !== fb) return fa.localeCompare(fb);
      return String(a?.title || '').localeCompare(String(b?.title || ''));
    })
    .slice(0, 5);

  const linkedEmailIds = new Set(
    (Array.isArray(RELATIONS) ? RELATIONS : [])
      .filter(r => r?.relation_type === 'task_email' && r?.related2_id)
      .map(r => r.related2_id)
  );
  const todayEmails = (Array.isArray(EMAILS) ? EMAILS : []).filter(email => getDailySummaryDateFromEmail(email) === today);
  const unlinkedTodayEmails = todayEmails.filter(email => !linkedEmailIds.has(email?.email_id));

  return {
    today,
    pendingCount: pending.length,
    overdueFollowupsCount: overdueFollowups.length,
    todayFollowupsCount: todayFollowups.length,
    todayMeetingsCount: todayMeetings.length,
    todayCallsCount: todayCalls.length,
    todayDeadlinesCount: todayDeadlines.length,
    unlinkedTodayEmailsCount: unlinkedTodayEmails.length,
    overdueFollowups,
    todayFollowups,
    todayMeetings,
    todayCalls,
    topPriorityTasks,
    unlinkedTodayEmails
  };
}

// Comentarios en castellano
let ANCHORED_QEPOP_LAST_TRIGGER = null;

function getAnchoredPanelQepop() {
  // Comentarios en castellano: qepop compartido para contenidos que antes se abrían como overlay.
  let pop = document.getElementById('anchoredPanelQepop');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'anchoredPanelQepop';
    pop.className = 'qepop anchored-panel-qepop';
    pop.setAttribute('role', 'dialog');
    pop.setAttribute('aria-modal', 'false');
    pop.setAttribute('aria-hidden', 'true');
    pop.setAttribute('tabindex', '-1');
    const root = document.querySelector('.phone') || document.body;
    root.appendChild(pop);
  }
  return pop;
}

function positionAnchoredPanel(pop, triggerEl) {
  // Comentarios en castellano: posiciona el qepop junto al elemento que lo abre y lo mantiene dentro del panel.
  if (!pop || !triggerEl) return;
  const appRoot = triggerEl.closest('.phone') || document.querySelector('.phone') || document.body;
  const appRect = appRoot.getBoundingClientRect();
  const triggerRect = triggerEl.getBoundingClientRect();
  const margin = 10;
  const viewportH = window.innerHeight || document.documentElement.clientHeight;
  const maxAllowedWidth = Math.max(260, appRect.width - (margin * 2));

  pop.style.width = Math.min(390, maxAllowedWidth) + 'px';
  pop.style.maxWidth = maxAllowedWidth + 'px';
  pop.style.right = 'auto';
  pop.style.bottom = 'auto';

  // Abrimos antes de medir para obtener dimensiones reales.
  pop.classList.add('open');
  pop.setAttribute('aria-hidden', 'false');

  const popRect = pop.getBoundingClientRect();
  const minLeft = appRect.left + margin + window.scrollX;
  const maxLeft = appRect.right - popRect.width - margin + window.scrollX;
  let left = triggerRect.left + window.scrollX;
  left = Math.max(minLeft, Math.min(left, maxLeft));

  let top = triggerRect.bottom + window.scrollY + 6;
  if (top + popRect.height > viewportH - margin + window.scrollY) {
    top = Math.max(margin + window.scrollY, triggerRect.top + window.scrollY - popRect.height - 6);
  }

  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function closeAnchoredPanelQepop(returnFocus = true) {
  const pop = document.getElementById('anchoredPanelQepop');
  if (!pop) return;
  pop.classList.remove('open');
  pop.setAttribute('aria-hidden', 'true');
  pop.innerHTML = '';
  if (returnFocus && ANCHORED_QEPOP_LAST_TRIGGER && typeof ANCHORED_QEPOP_LAST_TRIGGER.focus === 'function') {
    requestAnimationFrame(() => ANCHORED_QEPOP_LAST_TRIGGER.focus());
  }
}

function openAnchoredPanelQepop(triggerEl, title, subtitle, contentHtml) {
  // Comentarios en castellano: renderiza contenido de tipo panel dentro de un qepop anclado.
  if (!triggerEl) triggerEl = ANCHORED_QEPOP_LAST_TRIGGER || document.activeElement;
  ANCHORED_QEPOP_LAST_TRIGGER = triggerEl;
  closeQaDrop();
  closeSecondaryMenu();
  try { closeOv(); } catch (e) {}
  try { closePrefs(false); } catch (e) {}
  document.querySelectorAll('.qepop.open').forEach(p => {
    if (p.id !== 'anchoredPanelQepop') {
      p.classList.remove('open');
      p.setAttribute('aria-hidden', 'true');
    }
  });
  const pop = getAnchoredPanelQepop();
  pop.innerHTML = `
    <div class="anchored-qepop-head">
      <div>
        <div class="anchored-qepop-title">${escapeHtml(title || '')}</div>
        ${subtitle ? `<div class="anchored-qepop-sub">${escapeHtml(subtitle)}</div>` : ''}
      </div>
      <button type="button" class="anchored-qepop-close" onclick="return requestCloseAnchoredPanelQepopWithWarning(true)" aria-label="${escapeHtml(tr('BTN_CLOSE') || 'Tancar')}">×</button>
    </div>
    <div class="anchored-qepop-body">${contentHtml || ''}</div>
  `;
  positionAnchoredPanel(pop, triggerEl);
  requestAnimationFrame(() => pop.focus());
}

function openDailySummary(triggerEl) {
  const summary = buildDailySummary();
  openAnchoredPanelQepop(triggerEl || document.querySelector('.daily-summary-compact-btn'), tr('SUMMARY_TITLE'), summary.today, renderDailySummaryHtml(summary));
}

function openMaintenancePanel(triggerEl) {
  openAnchoredPanelQepop(triggerEl || ANCHORED_QEPOP_LAST_TRIGGER, tr('OV_DB_MAINT'), TF_INDEXEDDB_CONFIG.dbName, renderMaintenancePanel());
}


if (!window.__anchoredPanelQepopHandlersBound) {
  window.__anchoredPanelQepopHandlersBound = true;
  document.addEventListener('keydown', function(ev) {
    if (ev.key !== 'Escape') return;
    const panel = document.getElementById('anchoredPanelQepop');
    const prefs = document.getElementById('prefs-ov');
    if (panel && panel.classList.contains('open')) {
      ev.preventDefault();
      ev.stopPropagation();
      closeAnchoredPanelQepop(true);
    } else if (prefs && prefs.classList.contains('prefs-qepop') && prefs.classList.contains('open')) {
      ev.preventDefault();
      ev.stopPropagation();
      closePrefs(true);
    }
  }, true);
  document.addEventListener('click', function(ev) {
    const panel = document.getElementById('anchoredPanelQepop');
    const prefs = document.getElementById('prefs-ov');
    const trigger = ANCHORED_QEPOP_LAST_TRIGGER;
    const clickedTrigger = trigger && trigger.contains && trigger.contains(ev.target);
    if (panel && panel.classList.contains('open')) {
      if (!panel.contains(ev.target) && !clickedTrigger) {
        if (isTaskFormDirty(panel)) {
          ev.preventDefault();
          ev.stopPropagation();
          return;
        }
        closeAnchoredPanelQepop(false);
      }
    }
    if (prefs && prefs.classList.contains('prefs-qepop') && prefs.classList.contains('open')) {
      if (!prefs.contains(ev.target) && !clickedTrigger) closePrefs(false);
    }
  }, true);
}

async function handleIndexedDbImport(event) {
  const file = event.target?.files?.[0];
  if (!file) return;
  try {
    const textContent = await file.text();
    const snapshot = JSON.parse(textContent);
    applyPersistenceSnapshot(snapshot);
    await savePersistenceSnapshot();
    render();
    if (document.getElementById('ov').classList.contains('open')) {
      openMaintenancePanel();
    }
    showMaintenanceFlash(tr('DB_IMPORT_OK'), 'ok');
  } catch (error) {
    console.error('TaskFlow IndexedDB import failed', error);
    showMaintenanceFlash(tr('DB_RESET_ERR'), 'err');
  }
}
