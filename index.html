}

function openMaintenancePanel() {
  openOv(tr('OV_DB_MAINT'), TF_INDEXEDDB_CONFIG.dbName, renderMaintenancePanel());
}

function exportIndexedDbSnapshot() {
  const snapshot = getPersistenceSnapshot();
  downloadSnapshotJson(snapshot);
  showMaintenanceFlash(tr('DB_EXPORT_OK'), 'ok');
}

function triggerIndexedDbImport() {
  const fileInput = document.getElementById('db-import-input');
  if (!fileInput) return;
  fileInput.value = '';
  fileInput.click();
}

async function handleIndexedDbImport(event) {
  const file = event.target?.files?.[0];
  if (!file) return;
  try {
    const textContent = await file.text();
    const snapshot = JSON.parse(textContent);
    applyPersistenceSnapshot(snapshot);
    await savePersistenceSnapshot();
    render();
    if (document.getElementById('ov').classList.contains('open')) {
      openMaintenancePanel();
    }
    showMaintenanceFlash(tr('DB_IMPORT_OK'), 'ok');
  } catch (error) {
    console.error('TaskFlow IndexedDB import failed', error);
    showMaintenanceFlash(tr('DB_RESET_ERR'), 'err');
  }
}

async function resetIndexedDbAndMemory() {
  try {
    await clearIndexedDbStores();
    resetInMemoryTables();
    render();
    openMaintenancePanel();
    showMaintenanceFlash(tr('DB_RESET_OK'), 'ok');
  } catch (error) {
    console.error('TaskFlow IndexedDB reset failed', error);
    showMaintenanceFlash(tr('DB_SEED_ERR'), 'err');
  }
}

function seedIndexedDbDemoDataInMemory() {
  if (!MY_PERSON_ID && PEOPLE.length) {
    MY_PERSON_ID = PEOPLE[0].person_id;
  }
  const demoProjectId = findOrCreateProject('TaskFlow Demo', '#2B5CE6');
  const demoProviderId = findOrCreateProvider('Demo Supplier');
  const demoEmailId = findOrCreateEmail('Demo email subject', 'demo@taskflow.local', 'TaskFlow Demo', todayIso(), 1, 'demo-indexeddb-message');
  const demoCommentId = nextId('CMT');
  COMMENTS.push({ comment_id: demoCommentId, text: 'Demo comment stored in IndexedDB.', created_at: new Date().toISOString(), comment_type:'user' });
  const demoTimeEntryId = nextId('TIM');
  TIME_ENTRIES.push({ entry_id: demoTimeEntryId, entry_date: todayIso(), amount: 30, unit: 'minutes' });
  const demoTaskId = nextId('TSK');
  TASKS.unshift({
    task_id: demoTaskId,
    title: 'Validate IndexedDB maintenance flow',
    priority: 2,
    status: 'pending',
    due_date: todayIso(),
    followup_date: todayIso(),
    followup_days: 0,
    time_minutes: 30,
    comment_count: 1,
    outlook_category: 'Task',
    notes: 'Seeded locally to validate export/import/reset flows.',
    repeat: { enabled: true, type: 'interval_days', intervalDays: 7, summary: 'Every 7 days' },
    followup: { enabled:true, finalized:false, done:false, type:'interval_days', intervalDays:3, startDate: todayIso(), nextDate: todayIso(), summary: tr('REP_SUM_DAYS')(3) },
    created_at: new Date().toISOString(),
  });
  addRelation(demoTaskId, demoProjectId, 'task_project');
  addRelation(demoTaskId, demoEmailId, 'task_email');
  addRelation(demoTaskId, demoProviderId, 'task_provider');
  addRelation(demoTaskId, demoCommentId, 'task_comment');
  addRelation(demoTaskId, demoTimeEntryId, 'task_time_entry');
  if (MY_PERSON_ID) {
    addRelation(demoTaskId, MY_PERSON_ID, 'task_person');
    addRelation(MY_PERSON_ID, demoTimeEntryId, 'person_time_entry');
  }
}

async function seedIndexedDbDemoData() {
  try {
    if (!PEOPLE.length && typeof ensureCurrentUserInPeople === 'function') {
      ensureCurrentUserInPeople('Local User', 'local@taskflow', '#2B5CE6');
    }
    seedIndexedDbDemoDataInMemory();
    await savePersistenceSnapshot();
    render();
    openMaintenancePanel();
    showMaintenanceFlash(tr('DB_SEED_OK'), 'ok');
  } catch (error) {
    console.error('TaskFlow IndexedDB seed failed', error);
    showMaintenanceFlash(tr('DB_IMPORT_ERR'), 'err');
  }
}

async function bootTaskFlowApp() {
  loadLegendState();
  applyI18n();
  attachPersistenceHooks();
  try {
    const snapshot = await loadPersistenceSnapshot();
    if (hasPersistenceData(snapshot)) {
      applyPersistenceSnapshot(snapshot);
    }
  } catch (error) {
    console.error('TaskFlow IndexedDB load failed', error);
  }
  render();
  if (!hasPersistenceData(getPersistenceSnapshot())) {
    schedulePersistence();
  }
}

let QE_ACTIVE = null;

function openQePop(type, taskId, anchorEl) {
  QE_RETURN_FOCUS_KEY = anchorEl?.dataset?.focusKey || null;
  closeQePop();
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) return;
  const pop = document.getElementById('qepop');
  if (!pop) return;
  pop.setAttribute('role','dialog');
  pop.setAttribute('aria-modal','false');
  pop.setAttribute('tabindex','-1');
  pop.setAttribute('aria-label', tr('OV_EDIT_TASK'));
  pop.innerHTML = buildQePopContent(type, task);
  pop.style.display = 'block';

  // Position relative to .phone container
  const phoneEl = document.querySelector('.phone');
  const phoneRect = phoneEl.getBoundingClientRect();
  const aRect = anchorEl.getBoundingClientRect();
  let top = aRect.bottom - phoneRect.top + 4;
  let left = aRect.left - phoneRect.left;

  // Clamp horizontally
  pop.style.left = '0';
  pop.style.top = '0';
  const popW = pop.offsetWidth || 160;
  const popH = pop.offsetHeight || 120;
  left = Math.max(8, Math.min(left, phoneRect.width - popW - 8));

  // Prefer below the clicked icon; flip above only if there is not enough space
  if (top + popH > phoneRect.height - 12) top = aRect.top - phoneRect.top - popH - 4;
  top = Math.max(8, top);
  if (top + popH > phoneRect.height - 8) pop.style.maxHeight = Math.max(140, phoneRect.height - top - 8) + 'px';
  else pop.style.maxHeight = '';

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('open');
  QE_ACTIVE = { type, taskId };

  const inp = pop.querySelector('input[type="date"], input[type="text"], textarea, select, button');
  setTimeout(() => { if (inp) inp.focus(); else pop.focus(); }, 40);
}

function saveQePop(type, action, taskId) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  const beforeState = collectTaskAuditState(taskId);
  const inp = document.getElementById('qepop-inp');

  if (type === 'priority') {
    task.priority = parseInt(action);
  } else if (type === 'duedate') {
    task.due_date = (action === 'clear') ? null : (inp?.value || null) || null;
  } else if (type === 'followdate') {
    const val = (action === 'clear') ? null : (inp?.value || null) || null;
    const followup = getTaskFollowup(task);
    if (!val) {
      task.followup_date = null;
      task.followup_days = 0;
      task.followup = normalizeFollowupConfig({ enabled:false }, null, 0);
    } else {
      task.followup_date = val;
      const diff = Math.round((new Date(val) - new Date(todayIso())) / 86400000);
      task.followup_days = Math.max(0, diff);
      task.followup = normalizeFollowupConfig({ ...followup, enabled:true, finalized:false, done:false, startDate: val, nextDate: val }, val, task.followup_days);
    }
  } else if (type === 'person') {
    const name = (inp?.value || '').trim();
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (name) {
      const pid = findOrCreatePerson(name);
      if (pid && pid !== MY_PERSON_ID) addRelation(taskId, pid, 'task_person');
    }
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
}

function closeQePop() {
  const pop = document.getElementById('qepop');
  if (pop) { pop.classList.remove('open'); pop.style.display = 'none'; pop.style.maxHeight = ''; pop.innerHTML = ''; }
  QE_ACTIVE = null;
  focusByStoredTarget(QE_RETURN_FOCUS_KEY, null, '#cnt');
}


// Keyboard support: Escape + focus trap
function handleGlobalKeydown(event) {
  if (event.key === 'Escape') {
    const pop = document.getElementById('qepop');
    const menu = document.getElementById('sec-menu');
    const ov = document.getElementById('ov');
    const drop = document.getElementById('qa-drop');
    if (pop && pop.classList.contains('open')) { event.preventDefault(); closeQePop(); return; }
    if (menu && menu.classList.contains('open')) { event.preventDefault(); closeSecondaryMenu(); return; }
    if (drop && drop.classList.contains('open')) { event.preventDefault(); closeQaDrop(); return; }
    if (ov && ov.classList.contains('open')) { event.preventDefault(); closeOv(); return; }
  }
  if (event.key === 'Tab') {
    const pop = document.getElementById('qepop');
    const menu = document.getElementById('sec-menu');
    const ov = document.getElementById('ov');
    if (pop && pop.classList.contains('open')) { trapFocusIn(pop, event); return; }
    if (menu && menu.classList.contains('open')) { trapFocusIn(menu, event); return; }
    if (ov && ov.classList.contains('open')) { trapFocusIn(ov, event); return; }
  }
}
document.addEventListener('keydown', handleGlobalKeydown, true);

// Close popover / secondary menu / qa-drop on outside click
document.addEventListener('click', e => { 
 const pop = document.getElementById('qepop'); 
 if (pop && pop.classList.contains('open') && !pop.contains(e.target)) closeQePop();
 const menu = document.getElementById('sec-menu');
 const actions = document.querySelector('.header-actions');
 if (menu && menu.classList.contains('open') && actions && !actions.contains(e.target)) closeSecondaryMenu();
 const drop = document.getElementById('qa-drop');
 const panel = document.getElementById('email-panel');
 if (drop && drop.classList.contains('open') && !drop.contains(e.target) && panel && !panel.contains(e.target)) closeQaDrop();
}, true);

// =============================================================================
// BOOT
// =============================================================================

bootTaskFlowApp();

</script>
