<!DOCTYPE html>
<html lang="ca" id="html-root">
<head>
<!-- === OUTLOOK SAFE PATCH v10 === -->
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<script>
  /* Deshabilitar dialogs bloquejants (Outlook-safe) */
  window.alert = msg => console.log('[TaskFlow]', msg);
  window.confirm = msg => { console.log('[TaskFlow confirm]', msg); return true; };
  window.prompt = msg => { console.log('[TaskFlow prompt]', msg); return null; };

  function showToast(message, type = 'info') {
    console.log('[TaskFlow toast]', type, message);
  }

  const isOutlook =
    typeof Office !== 'undefined' &&
    Office.context &&
    Office.context.mailbox;

  if (isOutlook) {
    document.documentElement.classList.add('outlook-host');
  }

  function openExternal(url) {
    if (isOutlook && Office.context.ui) {
      Office.context.ui.openBrowserWindow(url);
    } else {
      window.open(url, '_blank');
    }
  }

  let currentEmailContext = null;
  Office?.onReady?.(() => {
    if (!isOutlook) return;
    try {
      const item = Office.context.mailbox.item;
      currentEmailContext = {
        subject: item.subject || null,
        from: item.from?.emailAddress?.address || null,
        internetMessageId: item.internetMessageId || null
      };
    } catch (e) {
      console.warn('No email context', e);
    }

    // Suport per a task pane ancorat (SupportsPinning):
    // quan l'usuari canvia de correu sense tancar el panell, recarreguem el context.
    try {
      Office.context.mailbox.addHandlerAsync(
        Office.EventType.ItemChanged,
        async function () {
          try {
            const item = Office.context.mailbox.item;
            if (item) {
              currentEmailContext = {
                subject: item.subject || null,
                from: item.from?.emailAddress?.address || null,
                internetMessageId: item.internetMessageId || null
              };
              await tfLoadEmailFromOffice();
            } else {
              currentEmailContext = null;
              CURRENT_EMAIL = null;
            }
          } catch (e) {
            console.warn('[TaskFlow] ItemChanged error', e);
          }
          try { render(); } catch (e) {}
        }
      );
    } catch (e) {
      console.warn('[TaskFlow] addHandlerAsync not available', e);
    }
  });
</script>
<!-- === END OUTLOOK SAFE PATCH === -->

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#F0EEE9;--sf:#FFF;--sf2:#F6F5F2;--sf3:#ECEAE5;
 --bd:#E3E0D8;--bd2:#CCC9C0;
 --t:#1C1917;--t2:#6B6760;--t3:#A8A49D;
 --ac:#2B5CE6;--ac-s:#EEF2FE;
 --re:#DC2626;--am:#D97706;--color-green:#16A34A;--pu:#7C3AED;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);margin:0;padding:0}
.phone{width:100%;max-width:480px;background:var(--bg);border-radius:18px;overflow:hidden;box-shadow:none;min-height:100vh;display:flex;flex-direction:column;position:relative}
.logo{display:flex;align-items:center;gap:7px}
.lm{width:27px;height:27px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center}
.lt{font-size:15px;font-weight:600;color:var(--t);letter-spacing:-.3px}
.gbar{padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.gl{font-size:10px;font-weight:600;color:var(--t3);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.gsw{position:relative;flex:1}
.gs{width:100%;padding:6px 28px 6px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);font-size:12px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;color:var(--t);cursor:pointer;appearance:none;outline:none;transition:border .15s}
.gs:focus{border-color:var(--ac)}

<script>

// =============================================================================
// UTILITY
// =============================================================================

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])
  );
}

function getInitials(name) {
  return String(name || '').trim().split(/\s+/).slice(0, 2)
    .map(p => p[0]?.toUpperCase() || '').join('');
}

function colorFromString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${(h % 360 + 360) % 360}, 60%, 45%)`;
}

function shortId(s) {
  if (!s) return '';
  const str = String(s);
  return str.length > 18 ? (str.slice(0,9) + '…' + str.slice(-8)) : str;
}

function dateToIsoLocal(dateObj) {
  if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return null;
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth() + 1).padStart(2, '0');
  const d = String(dateObj.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function currentDateTimeLocal() {
  const dt = new Date();
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  const hh = String(dt.getHours()).padStart(2, '0');
  const mm = String(dt.getMinutes()).padStart(2, '0');
  const ss = String(dt.getSeconds()).padStart(2, '0');
  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}
function todayIso() {
  return dateToIsoLocal(new Date());
}

// =============================================================================
// INDEPENDENT DATA TABLES  (all IDs use 3-char prefix + 6-digit zero-padded number)
// =============================================================================

/* ── Projects ── */
let PROJECTS = [];

/* ── People ── */
let PEOPLE = []; // populated at init — current user is always PRS000001

/* ── Providers ── */
let PROVIDERS = [];

/* ── Emails (one record per unique email) ── */
let EMAILS = [];

/* ── Comments ── */
let COMMENTS = [];

/* ── Time entries ── */
let TIME_ENTRIES = [];

/* ── Tasks (core fields only — relationships managed via RELATIONS) ── */
let TASKS = [];

/* ── Relations (central table — all cross-table links) ── */
let RELATIONS = [];

// =============================================================================
// ID SYSTEM — prefixed IDs with zero-padded 6-digit numbers
// =============================================================================

// Map prefix → table array and primary key field name
const TABLE_MAP = {
  TSK: { table: () => TASKS,        pk: 'task_id'     },
  PRJ: { table: () => PROJECTS,     pk: 'project_id'  },
  PRS: { table: () => PEOPLE,       pk: 'person_id'   },
  PRV: { table: () => PROVIDERS,    pk: 'provider_id' },
  EML: { table: () => EMAILS,       pk: 'email_id'    },
  CMT: { table: () => COMMENTS,     pk: 'comment_id'  },
  TIM: { table: () => TIME_ENTRIES, pk: 'entry_id'    },
  REL: { table: () => RELATIONS,    pk: 'relation_id' },
};

// Generate the next available prefixed ID for a given prefix
function nextId(prefix) {
  const cfg = TABLE_MAP[prefix];
  if (!cfg) return prefix + '000001';
  const table = cfg.table();
  const pk = cfg.pk;
  const max = table.reduce((m, r) => Math.max(m, parseInt(String(r[pk]).slice(3)) || 0), 0);
  return prefix + String(max + 1).padStart(6, '0');
}

// Find any record by its prefixed ID across all tables
function findById(id) {
  if (!id) return null;
  const prefix = String(id).slice(0, 3);
  const cfg = TABLE_MAP[prefix];
  if (!cfg) return null;
  const table = cfg.table();
  const pk = cfg.pk;
  return table.find(r => r[pk] === id) || null;
}

// =============================================================================
// RELATIONS API — all cross-table links go through RELATIONS
// =============================================================================

// Get IDs of records related FROM sourceId with a given relation type
function getRelatedIds(sourceId, relType) {
  return RELATIONS
    .filter(r => r.relation_type === relType && r.related1_id === sourceId)
    .map(r => r.related2_id);
}

// Get fully resolved records related to sourceId
function getRelated(sourceId, relType) {
  return getRelatedIds(sourceId, relType).map(findById).filter(Boolean);
}

// Check whether a relation already exists
function relationExists(id1, id2, relType) {
  return RELATIONS.some(r =>
    r.related1_id === id1 && r.related2_id === id2 && r.relation_type === relType
  );
}

// Add a new relation (returns the new relation_id, or null if it already exists)
function addRelation(id1, id2, relType) {
  if (relationExists(id1, id2, relType)) return null;
  const relId = nextId('REL');
  RELATIONS.push({ relation_id: relId, related1_id: id1, related2_id: id2, relation_type: relType });
  return relId;
}

// Remove a specific relation
function removeRelation(id1, id2, relType) {
  RELATIONS = RELATIONS.filter(r =>
    !(r.related1_id === id1 && r.related2_id === id2 && r.relation_type === relType)
  );
}

// Find or create a project by name; returns its project_id
function findOrCreateProject(name, color) {
  const normalized = String(name || '').trim() || tr('NO_PROJECT');
  const existing = PROJECTS.find(p => p.name.toLowerCase() === normalized.toLowerCase());
  if (existing) return existing.project_id;
  const newId = nextId('PRJ');
  PROJECTS.push({ project_id: newId, name: normalized, color: color || colorFromString(normalized) });
  return newId;
}

// Find or create a person by name; returns their person_id
function findOrCreatePerson(name) {
  const normalized = String(name || '').trim();
  if (!normalized) return null;
  const existing = PEOPLE.find(p => p.name.toLowerCase() === normalized.toLowerCase());
  if (existing) return existing.person_id;
  const newId = nextId('PRS');
  PEOPLE.push({ person_id: newId, name: normalized, color: colorFromString(normalized) });
  return newId;
}

// Find or create a provider by name; returns their provider_id
function findOrCreateProvider(name) {
  const normalized = String(name || '').trim();
  if (!normalized) return null;
  const existing = PROVIDERS.find(p => p.name.toLowerCase() === normalized.toLowerCase());
  if (existing) return existing.provider_id;
  const newId = nextId('PRV');
  const abbr = normalized.split(/\s+/).slice(0, 3).map(w => w[0]?.toUpperCase() || '').join('') || 'PR';
  PROVIDERS.push({ provider_id: newId, name: normalized, type: 'Altres', color: colorFromString(normalized), abbr });
  return newId;
}

// Find or create an email record; returns its email_id
// Deduplication: (1) by internet_message_id if provided, (2) by subject+from_address
function findOrCreateEmail(subject, fromAddress, fromName, dateLabel, attachments, messageId) {
  const subj  = String(subject || '').trim();
  const msgId = String(messageId || '').trim();
  const addr  = String(fromAddress || '').trim();
  // Deduplicate by internetMessageId
  if (msgId) {
    const byMsgId = EMAILS.find(e => e.internet_message_id === msgId);
    if (byMsgId) return byMsgId.email_id;
  }
  // Deduplicate by subject + from_address (fallback)
  if (subj && addr) {
    const bySubj = EMAILS.find(e => e.subject === subj && e.from_address === addr);
    if (bySubj) return bySubj.email_id;
  }
  const newId = nextId('EML');
  EMAILS.push({
    email_id:            newId,
    internet_message_id: msgId || '',   // internetMessageId from Outlook (PK semàntic)
    subject:             subj,
    from_address:        addr,          // email address (e.g. user@domain.com)
    from_name:           String(fromName || ''),
    date_label:          String(dateLabel || ''),
    attachments:         attachments || 0,
  });
  return newId;
}

function findExistingEmailId(subject, fromAddress, messageId) {
  const subj  = String(subject || '').trim();
  const msgId = String(messageId || '').trim();
  const addr  = String(fromAddress || '').trim();
  if (msgId) {
    const byMsgId = EMAILS.find(e => e.internet_message_id === msgId);
    if (byMsgId) return byMsgId.email_id;
  }
  if (subj && addr) {
    const bySubj = EMAILS.find(e => e.subject === subj && e.from_address === addr);
    if (bySubj) return bySubj.email_id;
  }
  return null;
}
function getTasksLinkedToEmailId(emailId) {
  if (!emailId) return [];
  return TASKS.filter(task => getRelatedIds(task.task_id, 'task_email').includes(emailId));
}
function getTasksLinkedToActiveEmail() {
  const ae = getActiveEmail();
  const emailId = findExistingEmailId(ae.subject, ae.from, ae.messageId);
  return getTasksLinkedToEmailId(emailId);
}
function getLinkedEmailStatusText(tasks) {
  if (!tasks || !tasks.length) return tr('EMAIL_TASK_NONE');
  if (tasks.length === 1) return tr('EMAIL_TASK_ONE');
  return tr('EMAIL_TASK_MANY')(tasks.length);
}
function openLinkedTaskEditor() {
  const linkedTasks = getTasksLinkedToActiveEmail();
  if (!linkedTasks.length) { openCreateTaskForm(); return; }
  if (linkedTasks.length === 1) { openEditTask(linkedTasks[0].task_id); return; }
  const rows = linkedTasks.map(task => {
    const proj = getRelated(task.task_id, 'task_project')[0];
    return `
    <div class="ovrow" onclick="openEditTask('${task.task_id}')" style="align-items:flex-start">
      <div class="ovico" style="background:var(--sf3);color:var(--t2)"><div class="pb p${task.priority}">P${task.priority}</div></div>
      <div class="ovinf">
        <div class="ovfr">${escapeHtml(task.title)}</div>
        <div class="ovsb">${escapeHtml(proj ? proj.name : tr('NO_PROJECT'))}</div>
      </div>
      <div class="ovdt">›</div>
    </div>`;
  }).join('');
  openOv(tr('QA_EDIT'), tr('EMAIL_TASK_PICKER'), rows);
}

// =============================================================================

let MY_PERSON_ID = null; // person_id of the authenticated user (e.g. 'PRS000001')

// Ensure the authenticated user exists in PEOPLE as the first record.
// Called once during Office.onReady / demo boot.
function ensureCurrentUserInPeople(displayName, email, color) {
  const safeName  = String(displayName || 'Unknown User').trim();
  const safeEmail = String(email || '').trim().toLowerCase();
  const safeColor = color || '#2B5CE6';

  // Already exists? (subsequent sessions)
  if (safeEmail) {
    const existing = PEOPLE.find(p => (p.email || '').toLowerCase() === safeEmail);
    if (existing) { MY_PERSON_ID = existing.person_id; return; }
  }

  // First run: insert as PRS000001 (table must be empty at this point)
  const newId = nextId('PRS'); // → PRS000001 when table is empty
  PEOPLE.unshift({
    person_id: newId,
    name:      safeName,
    color:     safeColor,
    email:     safeEmail,
  });
  MY_PERSON_ID = newId;
}

// Toggle task status between 'completed' and 'pending'
function toggleDone(taskId) {
  const t = TASKS.find(t => t.task_id === taskId);
  if (!t) return;
  const beforeState = collectTaskAuditState(taskId);
  t.status = (t.status === 'completed') ? 'pending' : 'completed';
  if (t.status === 'completed') {
    t.followup = normalizeFollowupConfig({ enabled:false }, null, 0);
    t.followup_date = null;
    t.repeat = { enabled: false };
  } else {
    syncTaskFollowupFields(t);
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  try { render(); } catch(e) {}
}

function tfHasAuth() {
  return !!(TF_CONFIG.clientId && TF_CONFIG.tenantId && TF_CONFIG.scopes.length);
}

async function tfInitAuth() {
  if (!tfHasAuth() || typeof msal === 'undefined') return;
  if (TF_msal) return;
  TF_msal = new msal.PublicClientApplication({
    auth: { clientId: TF_CONFIG.clientId, authority: `https://login.microsoftonline.com/${TF_CONFIG.tenantId}`, redirectUri: window.location.href },
    cache: { cacheLocation: 'sessionStorage' }
  });
}

async function tfGetToken() {
  await tfInitAuth();
  if (!TF_msal) return null;
  if (!TF_account) {
    const login = await TF_msal.loginPopup({ scopes: TF_CONFIG.scopes });
    TF_account = login.account;
  }
  try {
    const t = await TF_msal.acquireTokenSilent({ scopes: TF_CONFIG.scopes, account: TF_account });
    return t.accessToken;
  } catch(e) {
    const t = await TF_msal.acquireTokenPopup({ scopes: TF_CONFIG.scopes });
    return t.accessToken;
  }
}

async function tfFetchJson(url, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (TF_CONFIG.apiBaseUrl && tfHasAuth()) {
    const token = await tfGetToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
  }
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (!res.ok) { const txt = await res.text(); throw new Error(`API ${res.status}: ${txt}`); }
  return res.json();
}

let CURRENT_EMAIL = null;
const FALLBACK_EMAIL = { subject:'(Demo) Email de prova', from:'demo@company.com', fromName:'Demo', dateLabel:'', attachments:0, messageId:'demo', messageIdShort:'demo', receivedAt:null };

function getActiveEmail() { return CURRENT_EMAIL || FALLBACK_EMAIL; }

async function tfLoadEmailFromOffice() {
  try {
    if (typeof Office === 'undefined' || !Office.context?.mailbox) return;
    const item = Office.context.mailbox.item;
    const internetMessageId = item.internetMessageId || null;
    const itemId = item.itemId || null;
    const messageId = internetMessageId || itemId || '';
    CURRENT_EMAIL = {
      subject:         item.subject || '',
      from:            item.from?.emailAddress || '',
      fromName:        item.from?.displayName || '',
      receivedAt:      item.dateTimeCreated || null,
      dateLabel:       item.dateTimeCreated ? new Date(item.dateTimeCreated).toLocaleDateString() : '',
      attachments:     item.attachments?.length || 0,
      attachmentsLabel:item.attachments?.length ? (item.attachments.length + ' adjunt(s)') : '',
      messageId,
      messageIdShort:  shortId(messageId)
    };
    // Resolve current user from Graph API and ensure they exist in PEOPLE
    if (!MY_PERSON_ID && tfHasAuth()) {
      try {
        const me = await tfFetchJson('https://graph.microsoft.com/v1.0/me');
        ensureCurrentUserInPeople(me.displayName, me.mail || me.userPrincipalName, '#2B5CE6');
      } catch(e) {
        // Fallback: use Outlook item sender identity as approximation
        ensureCurrentUserInPeople(
          Office.context.mailbox.userProfile?.displayName || 'Unknown',
          Office.context.mailbox.userProfile?.emailAddress || '',
          '#2B5CE6'
        );
      }
    }
  } catch(e) { /* Keep fallback */ }
  try { renderEmailPanel(); } catch(e) {}
}

async function tfLoadTasksForEmail() {
  // In demo mode, keep mock data and render
  if (!TF_CONFIG.apiBaseUrl) { render(); return; }
  try {
    const ae = getActiveEmail();
    // 1) Resolve email entity on backend
    const email = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/emails/resolve`, {
      method: 'POST',
      body: JSON.stringify({ messageId: ae.messageId, subject: ae.subject, from: ae.from, receivedAt: ae.receivedAt })
    });
    // 2) Fetch all relations for this email
    const rels = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/relations?entityId=${encodeURIComponent(email.uid)}&relationType=task_email`);
    // 3) Hydrate tasks linked to this email
    const taskIds = (rels || []).map(r => r.related1_id || r.related2_id).filter(Boolean);
    for (const uid of taskIds) {
      if (!TASKS.find(t => t.task_id === uid)) {
        const t = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/tasks/${encodeURIComponent(uid)}`);
        // Map API shape → internal TASKS shape
        const taskId = t.uid || uid;
        const projId = findOrCreateProject(t.projectName || tr('NO_PROJECT'), '#2B5CE6');
        TASKS.push({
          task_id:          taskId,
          title:            t.title,
          priority:         ({ URGENT:1, HIGH:2, MEDIUM:3, LOW:4 }[t.priority] || 3),
          status:           (t.status || 'pending').toLowerCase(),
          due_date:         t.dates?.duePlanned || null,
          followup_date:    t.followUp?.nextDate || null,
          followup_days:    0,
          time_minutes:     t.time?.totalMinutes || 0,
          comment_count:    0,
          outlook_category: 'Email',
          notes:            '',
          repeat:           { enabled: false },
          created_at:       new Date().toISOString(),
        });
        addRelation(taskId, projId, 'task_project');
        addRelation(taskId, MY_PERSON_ID, 'task_person'); // loaded task linked to current user
      }
    }
    render();
  } catch(e) {
    try { render(); } catch(_) {}
  }
}

if (typeof Office !== 'undefined') {
  Office.onReady(async () => {
    await tfInitAuth();
    await tfLoadEmailFromOffice();
    // If MSAL was not available, try to resolve user via Office profile
    if (!MY_PERSON_ID) {
      const profile = Office.context.mailbox?.userProfile;
      ensureCurrentUserInPeople(
        profile?.displayName || 'User',
        profile?.emailAddress || '',
        '#2B5CE6'
      );
    }
    // Re-render now that MY_PERSON_ID is resolved (bootTaskFlowApp already
    // did a first render with MY_PERSON_ID = null; this corrects it)
    try { render(); } catch(e) {}
    await tfLoadTasksForEmail();
  });
} else {
  // Demo mode (no Office): boot with a temporary user as PRS000001
  ensureCurrentUserInPeople('Demo User', 'demo@local', '#2B5CE6');
}

function fmtDate(d) {
  if (!d) return null;
  const months = tr('MONTHS');
  const [, mm, dd] = d.split('-');
  return dd + ' ' + months[+mm - 1];
}

function dateStatus(d) {
  const today = todayIso();
  if (!d) return 'n';
  if (d < today) return 'ov';
  if (d === today) return 'td';
  if (new Date(d) - new Date(today) < 2 * 86400000) return 'sn';
  return 'n';
}

function fmtTime(minutes) {
  if (!minutes) return null;
  if (minutes < 60) return minutes + 'm';
  const h = Math.floor(minutes / 60), m = minutes % 60;
  return m ? h + 'h ' + m + 'm' : h + 'h';
}

function minutesFrom(val, unit) {
  const v = parseInt(val || '0', 10) || 0;
  if (unit === 'h') return v * 60;
  if (unit === 'd') return v * 8 * 60;
  return v;
}

function renderCard(t) {
  // Resolve related entities via RELATIONS
  const proj     = getRelated(t.task_id, 'task_project')[0];
  const people   = getRelated(t.task_id, 'task_person');

  const provs    = getRelated(t.task_id, 'task_provider');

  const projColor = proj ? proj.color : 'var(--ac)';

  // Col 1: Priority badge (quick-edit clickable)

  // Col 2: Avatars (me = XC first, then other people)

  let avH = '';
  if (isAssignedToMe && me) avH += `<div class="av" style="background:${me.color}">${escapeHtml(getInitials(me.name))}</div>`;

// HEADER MENU + COLLAPSIBLE LEGEND

let LEGEND_COLLAPSED = true;
let LAST_FOCUS_KEY = null;
let LAST_FOCUS_ID = null;
let QE_RETURN_FOCUS_KEY = null;
let OV_RETURN_FOCUS_KEY = null;
let OV_RETURN_FOCUS_ID = null;
function rememberFocusTarget(el) {
  if (!el) { LAST_FOCUS_KEY = null; LAST_FOCUS_ID = null; return; }
  LAST_FOCUS_KEY = el.dataset?.focusKey || null;
  LAST_FOCUS_ID = el.id || null;
}
function focusByStoredTarget(key, id, fallbackSelector) {
  const target = (key ? document.querySelector(`[data-focus-key="${key}"]`) : null) || (id ? document.getElementById(id) : null) || (fallbackSelector ? document.querySelector(fallbackSelector) : null);
  if (target && typeof target.focus === 'function') setTimeout(() => { try { target.focus(); } catch(e) {} }, 0);
}
function loadLegendState() {
  try {
    const saved = window.localStorage.getItem('taskflow.legend.collapsed');
    if (saved != null) LEGEND_COLLAPSED = saved === 'true';
  } catch(e) {}
}
function persistLegendState() {
  try { window.localStorage.setItem('taskflow.legend.collapsed', String(LEGEND_COLLAPSED)); } catch(e) {}
}
function syncLegendUi() {
  const body = document.getElementById('legend-body');
  const toggle = document.getElementById('legend-toggle');
  const head = document.getElementById('legend-head');
  if (body) body.classList.toggle('collapsed', LEGEND_COLLAPSED);
  if (toggle) toggle.classList.toggle('open', !LEGEND_COLLAPSED);
  if (head) head.setAttribute('aria-expanded', String(!LEGEND_COLLAPSED));
}
function toggleLegend() {
  LEGEND_COLLAPSED = !LEGEND_COLLAPSED;
  persistLegendState();
  syncLegendUi();
}
function getFocusableElements(container) {
  if (!container) return [];
  return Array.from(container.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')).filter(el => !el.disabled && el.offsetParent !== null);
}
function trapFocusIn(container, event) {
  const focusables = getFocusableElements(container);
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
  else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
}
function toggleSecondaryMenu(event) {
  if (event) event.stopPropagation();
  const menu = document.getElementById('sec-menu');
  const btn = document.getElementById('btn-menu');
  if (!menu || !btn) return;
  const willOpen = !menu.classList.contains('open');
  if (willOpen) {
    rememberFocusTarget(btn);
    menu.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
    const firstItem = menu.querySelector('[role="menuitem"]');
    if (firstItem) setTimeout(() => firstItem.focus(), 0);
  } else {
    closeSecondaryMenu();
  }
}
function closeSecondaryMenu() {
  const menu = document.getElementById('sec-menu');
  const btn = document.getElementById('btn-menu');
  if (menu) menu.classList.remove('open');
  if (btn) btn.setAttribute('aria-expanded', 'false');
  focusByStoredTarget(LAST_FOCUS_KEY, LAST_FOCUS_ID, '#btn-menu');
}

// =============================================================================
// GROUPING LOGIC (uses RELATIONS for project, person, provider lookups)
// =============================================================================

function getGroups(gb) {
  const g = {};
  TASKS.forEach(t => {
    let entries = [];
    if (gb === 'provider') {
      const provs = getRelated(t.task_id, 'task_provider');
      entries = provs.length
        ? provs.map(p => ({ k: p.provider_id, l: p.name, c: p.color, s: p.name }))
        : [{ k: 'none', l: tr('GL_NO_PROVIDER'), c: '#A8A49D', s: 'z' }];
    } else {
      let k, l, c, s;
      if (gb === 'project') {
        const proj = getRelated(t.task_id, 'task_project')[0];
        k = proj ? proj.project_id : 'none';
        l = proj ? proj.name : tr('NO_PROJECT');
        c = proj ? proj.color : '#A8A49D';
        s = proj ? proj.name : 'z';
      } else if (gb === 'priority') {
        const la = ['', tr('PR1'), tr('PR2'), tr('PR3'), tr('PR4')];
        const ca = ['','#DC2626','#EA580C','#D97706','#6B7280'];
        k = 'p' + t.priority; l = la[t.priority]; c = ca[t.priority]; s = String(t.priority);
      } else if (gb === 'duedate') {
        const st = dateStatus(t.due_date);
        const m = { ov:{l:tr('GL_OVERDUE'),c:'#DC2626',s:'0'}, td:{l:tr('GL_TODAY'),c:'#D97706',s:'1'}, sn:{l:tr('GL_TOMORROW'),c:'#D97706',s:'2'}, n:{l:tr('GL_UPCOMING'),c:'#16A34A',s:'3'} };
        if (!t.due_date) { k='none'; l=tr('GL_NO_DATE'); c='#A8A49D'; s='9'; }
        else { const v = m[st]; k = st; l = v.l; c = v.c; s = v.s; }

} else if (gb === 'followdate') {
        const st = dateStatus(t.followup_date);
        const m = { ov:{l:tr('GL_OVERDUE'),c:'#DC2626',s:'0'}, td:{l:tr('GL_TODAY'),c:'#D97706',s:'1'}, sn:{l:tr('GL_TOMORROW'),c:'#D97706',s:'2'}, n:{l:tr('GL_UPCOMING'),c:'#16A34A',s:'3'} };
        if (!t.followup_date) { k='none'; l=tr('GL_NO_FOLLOWUP'); c='#A8A49D'; s='9'; }
        else { const v = m[st]; k = st; l = v.l; c = v.c; s = v.s; }
      }

      else if (gb === 'responsible') {
        if (MY_PERSON_ID && getRelatedIds(t.task_id, 'task_person').includes(MY_PERSON_ID)) { k='me'; l=getCurrentUserSelfLabel(); c=findById(MY_PERSON_ID)?.color||'#2B5CE6'; s='0'; }
        else {
          const ppl = getRelated(t.task_id, 'task_person');
          if (ppl.length) { const p = ppl[0]; k = p.person_id; l = p.name; c = p.color; s = p.name; }
          else { k='none'; l=tr('GL_NO_ASSIGNED'); c='#A8A49D'; s='9'; }
        }
      }
      entries = [{ k, l, c, s }];
    }
    entries.forEach(e => {
      if (!g[e.k]) g[e.k] = { l: e.l, c: e.c, s: e.s, tasks: [] };
      if (!g[e.k].tasks.find(x => x.task_id === t.task_id)) g[e.k].tasks.push(t);
    });
  });
  return Object.values(g).sort((a, b) => a.s.localeCompare(b.s));
}

// RENDER ALL
// =============================================================================

let cur = 'project';
const collapsedGroups = new Set();

function render() {
  TASKS.forEach(syncTaskFollowupFields);
  renderEmailPanel();
  const groups = getGroups(cur);
  let html = '';
  groups.forEach((g, i) => {
    const id = 'gg' + i;
    const isCollapsed = collapsedGroups.has(id);
    html += `<button class="ghdr" type="button" onclick="tog('${id}', this)" aria-expanded="${!isCollapsed}" aria-controls="${id}" aria-label="${escapeHtml(g.l)}">
      <div class="gd" style="background:${g.c}"></div>
      <span class="gn">${escapeHtml(g.l)}</span>
      <span class="gc">${g.tasks.length}</span>
      <span class="gch${isCollapsed ? '' : ' open'}" aria-hidden="true">▶</span>
    </button><div id="${id}" ${isCollapsed ? 'style="display:none"' : ''}>`;
    g.tasks.forEach(t => html += renderCard(t));
    html += '</div>';
  });
  document.getElementById('cnt').innerHTML = html;
  applyI18n();
  syncLegendUi();
}

function tog(id, btnEl) {
  const el = document.getElementById(id);
  const btn = btnEl || document.querySelector(`[aria-controls="${id}"]`);
  const ch = btn ? btn.querySelector('.gch') : null;
  const wasOpen = el && el.style.display !== 'none';
  if (el) el.style.display = wasOpen ? 'none' : 'block';
  if (ch) ch.classList.toggle('open', !wasOpen);
  if (btn) btn.setAttribute('aria-expanded', String(!wasOpen));
  if (wasOpen) collapsedGroups.add(id); else collapsedGroups.delete(id);
}

function setGroup(v) { cur = v; render(); }

  const cmtId = nextId('CMT');
  COMMENTS.push({ comment_id: cmtId, text, created_at: new Date().toISOString(), comment_type:'user' });

// Save a new time entry and update RELATIONS + TIME_ENTRIES + task total
function saveTimeEntry(taskId) {
  const amount  = parseInt(document.getElementById('ov-tim-amount')?.value || '0', 10);
  const unitRaw = document.getElementById('ov-tim-unit')?.value || 'min';
  const date    = document.getElementById('ov-tim-date')?.value || todayIso();
  const flashEl = document.getElementById('ov-tim-flash');

  if (!amount || amount <= 0) {
    if (flashEl) { flashEl.className = 'cf-flash err'; flashEl.textContent = tr('TIM_EMPTY'); flashEl.style.display='block'; }
    return;
  }

  // Convert to a canonical unit label for storage
  const unitLabel = unitRaw === 'h' ? 'hours' : unitRaw === 'd' ? 'days' : 'minutes';
  const entryId = nextId('TIM');
  TIME_ENTRIES.push({ entry_id: entryId, entry_date: date, amount, unit: unitLabel });

  // Link time entry to task
  addRelation(taskId, entryId, 'task_time_entry');

  // Link time entry to current user (MY_PERSON_ID)
  if (MY_PERSON_ID) addRelation(MY_PERSON_ID, entryId, 'person_time_entry');

  // Update cached time_minutes on the task
  const task = TASKS.find(t => t.task_id === taskId);
  if (task) {
    const allEntries = getRelated(taskId, 'task_time_entry');
    task.time_minutes = allEntries.reduce((sum, e) => sum + minutesFrom(e.amount, e.unit === 'hours' ? 'h' : e.unit === 'days' ? 'd' : 'min'), 0);
  }

  // Refresh the list in the overlay
  const listEl = document.getElementById('tim-list');
  if (listEl) {
    const entries = getRelated(taskId, 'task_time_entry').sort((a, b) => a.entry_date > b.entry_date ? -1 : 1);
    listEl.innerHTML = entries.map(e => `
      <div class="tim-row">
        <span class="tim-badge">${e.amount} ${e.unit}</span>
        <span class="tim-date">${e.entry_date}</span>
              </div>`).join('');
  }

  if (flashEl) { flashEl.className = 'cf-flash ok'; flashEl.textContent = tr('TIM_SAVED'); flashEl.style.display='block'; setTimeout(() => { flashEl.style.display='none'; }, 2000); }
  try { render(); } catch(e) {}
}

// =============================================================================
// FOLLOW-UP RECURRENCE HELPERS
// =============================================================================
function cloneJson(value) {
 return JSON.parse(JSON.stringify(value || {}));
}
function addDaysIso(dateStr, daysToAdd) {
 if (!dateStr) return null;
 const [y, m, d] = String(dateStr).split('-').map(Number);
 const baseDate = new Date(y, (m || 1) - 1, d || 1);
 baseDate.setDate(baseDate.getDate() + (parseInt(daysToAdd || '0', 10) || 0));
 return dateToIsoLocal(baseDate);
}

function getWeekdayIndex(code) {
 const map = { su:0, mo:1, tu:2, we:3, th:4, fr:5, sa:6 };
 return map[code] != null ? map[code] : 1;
}
function getOrdinalNumber(ordinal) {
 const map = { '1':1, '2':2, '3':3, '4':4 };
 return map[String(ordinal)] || 1;
}
function getRepeatSummaryFromConfig(config) {
 if (!config || !config.enabled) return '';
 const wdMap = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
 const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
 const weekdayName = code => tr(wdMap[code] || 'WD_MO');
 if (config.type === 'weekly') return tr('REP_SUM_WEEKS')(parseInt(config.intervalWeeks || '1', 10) || 1, weekdayName(config.weekday || 'mo'));
 if (config.type === 'monthly_dom') return tr('REP_SUM_DOM')(parseInt(config.dayOfMonth || '1', 10) || 1);
 if (config.type === 'monthly_ordinal') return tr('REP_SUM_ORDINAL')(tr(ordMap[String(config.ordinal || '1')] || 'ORD_1'), weekdayName(config.weekday || 'mo'));
 return tr('REP_SUM_DAYS')(parseInt(config.intervalDays || '1', 10) || 1);
}
function getMonthOrdinalDate(yearValue, monthValue, ordinal, weekdayCode) {
 const weekdayIndex = getWeekdayIndex(weekdayCode);
 const ordinalValue = String(ordinal || '1');
 if (ordinalValue === 'last') {
  const cursor = new Date(yearValue, monthValue + 1, 0);
  while (cursor.getDay() !== weekdayIndex) cursor.setDate(cursor.getDate() - 1);
  return cursor;
 }
 const targetOrdinal = getOrdinalNumber(ordinalValue);
 const cursor = new Date(yearValue, monthValue, 1);
 while (cursor.getDay() !== weekdayIndex) cursor.setDate(cursor.getDate() + 1);
 cursor.setDate(cursor.getDate() + (targetOrdinal - 1) * 7);
 if (cursor.getMonth() !== monthValue) return null;
 return cursor;
}
function computeNextRecurringDate(config, fromDate) {
 if (!config || !config.enabled) return null;
 const startDate = fromDate || config.startDate || todayIso();
 const safeDate = new Date(startDate + 'T00:00:00');
 if (Number.isNaN(safeDate.getTime())) return null;
 if (config.type === 'weekly') {
  const weeks = parseInt(config.intervalWeeks || '1', 10) || 1;
  const weekdayIndex = getWeekdayIndex(config.weekday || 'mo');
  const cursor = new Date(safeDate);
  cursor.setDate(cursor.getDate() + 1);
  for (let step = 0; step < 370; step++) {
   if (cursor.getDay() === weekdayIndex) {
    const diffDays = Math.round((cursor - safeDate) / 86400000);
    if (diffDays >= 7 && diffDays % (weeks * 7) === 0) return dateToIsoLocal(cursor);
   }
   cursor.setDate(cursor.getDate() + 1);
  }
  return null;
 }
 if (config.type === 'monthly_dom') {
  const dayOfMonth = Math.min(31, Math.max(1, parseInt(config.dayOfMonth || '1', 10) || 1));
  let yearValue = safeDate.getFullYear();
  let monthValue = safeDate.getMonth() + 1;
  if (monthValue > 11) { monthValue = 0; yearValue += 1; }
  const lastDay = new Date(yearValue, monthValue + 1, 0).getDate();
  const nextDate = new Date(yearValue, monthValue, Math.min(dayOfMonth, lastDay));
  return dateToIsoLocal(nextDate);
 }
 if (config.type === 'monthly_ordinal') {
  let yearValue = safeDate.getFullYear();
  let monthValue = safeDate.getMonth() + 1;
  if (monthValue > 11) { monthValue = 0; yearValue += 1; }
  const nextDate = getMonthOrdinalDate(yearValue, monthValue, config.ordinal || '1', config.weekday || 'mo');
  return nextDate ? dateToIsoLocal(nextDate) : null;
 }
 const days = parseInt(config.intervalDays || '1', 10) || 1;
 return addDaysIso(startDate, days);
}
function normalizeFollowupConfig(config, fallbackDate, fallbackDays) {
 const followup = cloneJson(config);
 if (!followup.enabled) {
  return { enabled:false, finalized:false, done:false, type:'interval_days', intervalDays: parseInt(fallbackDays || '2', 10) || 2, startDate: fallbackDate || (fallbackDays > 0 ? addDaysIso(todayIso(), fallbackDays) : ''), nextDate:null, summary:'', lastCompletedAt:null };
 }
 followup.type = followup.type || 'interval_days';
 followup.intervalDays = parseInt(followup.intervalDays || '2', 10) || 2;
 followup.intervalWeeks = parseInt(followup.intervalWeeks || '1', 10) || 1;
 followup.dayOfMonth = parseInt(followup.dayOfMonth || '2', 10) || 2;
 followup.weekday = followup.weekday || 'mo';
 followup.ordinal = followup.ordinal || '1';
 followup.finalized = !!followup.finalized;
 followup.done = !!followup.done;
 followup.startDate = followup.startDate || followup.nextDate || fallbackDate || (fallbackDays > 0 ? addDaysIso(todayIso(), fallbackDays) : '');
 followup.summary = getRepeatSummaryFromConfig(followup);
 followup.lastCompletedAt = followup.lastCompletedAt || null;
 if (followup.finalized) {
  followup.nextDate = null;
  followup.done = false;
 } else {
  followup.nextDate = followup.nextDate || followup.startDate || fallbackDate || null;
 }
 return followup;
}
function syncTaskFollowupFields(task) {
 if (!task) return;
 task.followup = normalizeFollowupConfig(task.followup, task.followup_date, task.followup_days);
 task.followup_date = task.followup.finalized ? null : (task.followup.nextDate || null);
 if (task.followup_date) {
  const diffDays = Math.round((new Date(task.followup_date) - new Date(todayIso())) / 86400000);
  task.followup_days = Math.max(0, diffDays);
 } else {
  task.followup_days = 0;
 }
}
function getTaskFollowup(task) {
 if (!task) return normalizeFollowupConfig({ enabled:false }, null, 0);
 syncTaskFollowupFields(task);
 return task.followup;
}
let SHOW_SYSTEM_COMMENTS = false;
function isSystemComment(comment) {
 return !!(comment && comment.comment_type === 'system');
}
function getTaskComments(taskId, includeSystem = false) {
 return getRelated(taskId, 'task_comment')
 .filter(comment => includeSystem || !isSystemComment(comment))
 .sort((a, b) => (a.created_at > b.created_at ? -1 : 1));
}
function getUserCommentCount(taskId) {
 return getTaskComments(taskId, false).length;
}
function hasSystemComments(taskId) {
 return getRelated(taskId, 'task_comment').some(comment => isSystemComment(comment));
}
function refreshTaskCommentCount(taskId) {
 const task = TASKS.find(item => item.task_id === taskId);
 if (task) task.comment_count = getUserCommentCount(taskId);
}
function getCurrentUserDisplayName() {
 return findById(MY_PERSON_ID)?.name || 'User';
}
function getCurrentUserSelfLabel() {
 const suffix = LANG === 'es' ? ' (yo)' : LANG === 'en' ? ' (me)' : ' (jo)';
 return getCurrentUserDisplayName() + suffix;
}
function normalizeAuditValue(value) {
 if (value == null) return '';
 if (typeof value === 'boolean') return value ? 'true' : 'false';
 if (typeof value === 'number') return String(value);
 if (typeof value === 'string') return value.trim();
 return JSON.stringify(value);
}
function addTaskSystemComment(taskId, fieldLabel, oldValue, newValue) {
 const previousValue = normalizeAuditValue(oldValue);
 const nextValue = normalizeAuditValue(newValue);
 if (!previousValue || previousValue === nextValue) return;

function collectTaskAuditState(taskId) {
 const task = TASKS.find(item => item.task_id === taskId);
 if (!task) return null;
 const taskProject = getTaskProject(taskId);
 const taskPeople = getTaskPeople(taskId);
 const taskProviders = getTaskProviders(taskId);
 const taskOwner = taskPeople.find(person => person.person_id !== MY_PERSON_ID) || taskPeople[0] || null;
 const followup = getTaskFollowup(task);
 const repeatSummary = task.repeat && task.repeat.enabled ? (task.repeat.summary || getRepeatSummaryFromConfig(task.repeat)) : '';
 return {
  title: task.title || '',
  project: taskProject ? taskProject.name : '',
  category: task.outlook_category || task.category || '',
  priority: task.priority || '',
  status: task.status || '',
  owner: taskOwner ? taskOwner.name : '',
  provider: taskProviders[0] ? taskProviders[0].name : '',
  dueDate: task.due_date || '',
  followupDate: task.followup_date || '',
  followupSummary: followup.enabled ? (followup.summary || '') : '',
  timeMinutes: task.time_minutes || 0,
  notes: task.notes || '',
  repeatSummary: repeatSummary || ''
 };
}
function logTaskAuditChanges(taskId, beforeState, afterState) {
 if (!beforeState || !afterState) return;
 const fields = [
  { key:'title', label:tr('CF_TITLE') },
  { key:'project', label:tr('CF_PROJECT') },
  { key:'category', label:tr('CF_CATEGORY') },
  { key:'priority', label:tr('CF_PRIORITY') },
  { key:'status', label:tr('CF_STATUS') },
  { key:'owner', label:tr('CF_RESPONSIBLE') },
  { key:'provider', label:tr('CF_PROVIDER') },
  { key:'dueDate', label:tr('CF_DUE') },
  { key:'followupDate', label:tr('GRP_FOLLOWDATE') || tr('LEG_FOLLOWUP') },
  { key:'followupSummary', label:tr('CF_FOLLOWUP_SUMMARY') },
  { key:'timeMinutes', label:tr('CF_TIME') },
  { key:'notes', label:tr('CF_NOTES') },
  { key:'repeatSummary', label:tr('CF_REPEAT_SUMMARY') }
 ];
 fields.forEach(field => addTaskSystemComment(taskId, field.label, beforeState[field.key], afterState[field.key]));
}

function onFollowupToggle() {
 const checkbox = document.getElementById('cf-followup-enabled');
 const options = document.getElementById('cf-followup-opts');
 const isDone = (document.getElementById('cf-status')?.value || 'pending') === 'completed';
 if (!checkbox || !options) return;
 checkbox.disabled = isDone;
 options.classList.toggle('visible', !!checkbox.checked && !checkbox.disabled);
 const box = document.getElementById('fup-box');
 if (box) box.classList.toggle('disabled', isDone);
 updateFollowupSummary();
}
function onFollowupTypeChange() {
 const selector = document.getElementById('cf-followup-type');
 if (!selector) return;
 const blocks = {
  interval_days: document.getElementById('fup-interval-days'),
  weekly: document.getElementById('fup-weekly'),
  monthly_dom: document.getElementById('fup-monthly-dom'),
  monthly_ordinal: document.getElementById('fup-monthly-ordinal'),
 };
 Object.values(blocks).forEach(block => { if (block) block.style.display = 'none'; });
 if (blocks[selector.value]) blocks[selector.value].style.display = 'block';
 updateFollowupSummary();
}
function updateFollowupSummary() {
 const enabled = !!document.getElementById('cf-followup-enabled')?.checked;
 const summaryField = document.getElementById('cf-followup-summary');
 const warning = document.getElementById('cf-followup-warning');
 if (!summaryField) return;
 if (!enabled) {
  summaryField.value = '';
  if (warning) warning.style.display = 'none';
  return;
 }
 const config = getFollowupConfigFromForm();
 config.summary = getRepeatSummaryFromConfig(config);
 summaryField.value = config.summary;
 if (warning) {
  const dueDate = document.getElementById('cf-due')?.value || '';
  const nextDate = config.finalized ? '' : (config.nextDate || config.startDate || '');
  if (dueDate && nextDate && nextDate > dueDate) {
   warning.textContent = tr('CF_FOLLOWUP_AFTER_DUE');
   warning.style.display = 'block';
  } else {
   warning.style.display = 'none';
  }
 }
}
function getFollowupConfigFromForm() {
 const enabled = !!document.getElementById('cf-followup-enabled')?.checked;
 if (!enabled) return { enabled:false, finalized:false, done:false, summary:'' };
 const type = document.getElementById('cf-followup-type')?.value || 'interval_days';
 const finalized = !!document.getElementById('cf-followup-finalized')?.checked;
 const currentDate = document.getElementById('cf-followup-current-date')?.value || todayIso();
 const config = {
  enabled:true,
  type,
  startDate: currentDate,
  finalized,
  done:false,
  intervalDays: parseInt(document.getElementById('cf-followup-interval-days')?.value || '2', 10) || 2,
  intervalWeeks: parseInt(document.getElementById('cf-followup-interval-weeks')?.value || '1', 10) || 1,
  weekday: document.getElementById('cf-followup-weekday')?.value || document.getElementById('cf-followup-ordinal-weekday')?.value || 'mo',
  dayOfMonth: parseInt(document.getElementById('cf-followup-dom')?.value || '2', 10) || 2,
  ordinal: document.getElementById('cf-followup-ordinal')?.value || '1',
  lastCompletedAt: null,
 };
 if (type === 'monthly_ordinal') config.weekday = document.getElementById('cf-followup-ordinal-weekday')?.value || 'mo';
 if (type === 'weekly') config.weekday = document.getElementById('cf-followup-weekday')?.value || 'mo';
 config.summary = getRepeatSummaryFromConfig(config);
 config.nextDate = finalized ? null : currentDate;
 return config;
}
function advanceTaskFollowup(taskId, action) {
 const task = TASKS.find(item => item.task_id === taskId);
 if (!task) { closeQePop(); return; }
 const beforeState = collectTaskAuditState(taskId);
 const followup = getTaskFollowup(task);
 if (!followup.enabled) {
  closeQePop();
  return;
 }
 if (action === 'finish') {
  followup.finalized = true;
  followup.done = false;
  followup.nextDate = null;
  followup.lastCompletedAt = todayIso();
 } else if (action === 'done') {
  const completionDate = todayIso();
  followup.lastCompletedAt = completionDate;
  followup.done = false;
  if (followup.type) {
   followup.nextDate = computeNextRecurringDate(followup, completionDate);
   followup.startDate = completionDate;
  } else {
   followup.nextDate = null;
   followup.enabled = false;
  }
 }
 task.followup = normalizeFollowupConfig(followup, followup.nextDate, task.followup_days || 0);
 syncTaskFollowupFields(task);
 const afterState = collectTaskAuditState(taskId);
 logTaskAuditChanges(taskId, beforeState, afterState);
 schedulePersistence();
 closeQePop();
 try { render(); } catch(error) {}
}

function getTaskProject(taskId) {
  return getRelated(taskId, 'task_project')[0] || null;
}

function getTaskPeople(taskId) {
  return getRelated(taskId, 'task_person');
}

function getTaskProviders(taskId) {
  return getRelated(taskId, 'task_provider');
}

function getEstimatedTimeDisplay(totalMinutes) {
  const safeMinutes = parseInt(totalMinutes || '0', 10) || 0;
  if (safeMinutes > 0 && safeMinutes % (8 * 60) === 0) return { value: safeMinutes / (8 * 60), unit: 'd' };
  if (safeMinutes > 0 && safeMinutes % 60 === 0) return { value: safeMinutes / 60, unit: 'h' };
  return { value: safeMinutes, unit: 'min' };
}

function getActiveEmailSummary() {
  const activeEmail = getActiveEmail();
  return tr('NOTES_SUBJECT') + ': ' + (activeEmail.subject || '') + '\n' +
         tr('NOTES_FROM') + ': ' + (activeEmail.from || '') + '\n' +
         tr('NOTES_DATE') + ': ' + (activeEmail.dateLabel || '') + '\n' +
         tr('NOTES_ATTACHMENTS') + ': ' + (activeEmail.attachments != null ? activeEmail.attachments : '');
}

function removeTaskRelationsByType(taskId, relationType) {

}

function getTaskFormConfig(mode, taskId) {
  const projectNames = PROJECTS.map(project => project.name);
  const peopleNames = PEOPLE.map(person => person.name);
  const providerNames = PROVIDERS.map(provider => provider.name);

  if (mode === 'edit') {
    const task = TASKS.find(item => item.task_id === taskId);
    if (!task) return null;
    const taskProject = getTaskProject(taskId);
    const taskPeople = getTaskPeople(taskId);
    const taskProviders = getTaskProviders(taskId);
    const taskOwner = taskPeople.find(person => person.person_id !== MY_PERSON_ID) || taskPeople[0] || null;
    const taskProvider = taskProviders[0] || null;
    const estimatedTime = getEstimatedTimeDisplay(task.time_minutes || 0);
    const followupConfig = getTaskFollowup(task);
    return {
      mode: 'edit',
      taskId,
      overlayTitle: tr('OV_EDIT_TASK'),
      overlaySubtitle: task.title || '',
      saveLabel: tr('CF_SAVE_CHANGES'),
      saveAction: `saveTaskForm('edit','${taskId}')`,
      backAction: 'closeOv()',
      notesReadOnly: false,
      projectNames,
      peopleNames,
      providerNames,
      values: {
        title: task.title || '',
        project: taskProject ? taskProject.name : '',
        category: task.outlook_category || 'Email',
        priority: task.priority || 3,
        status: task.status || 'pending',
        owner: taskOwner ? taskOwner.name : '',
        provider: taskProvider ? taskProvider.name : '',
        followupDays: task.followup_days || 0,
        followup: followupConfig,
        dueDate: task.due_date || '',
        repeat: task.repeat || { enabled: false },
        timeValue: estimatedTime.value,
        timeUnit: estimatedTime.unit,
        notes: task.notes || '',
        comment: ''
      }

  const activeEmail = getActiveEmail();
  return {
    mode: 'create',
    taskId: null,
    overlayTitle: tr('OV_CREATE_TASK'),
    overlaySubtitle: activeEmail.subject || tr('EMAIL_ACTIVE'),
    saveLabel: tr('CF_SAVE'),
    saveAction: "saveTaskForm('create')",
    backAction: 'openQuickActions()',
    notesReadOnly: true,
    projectNames,
    peopleNames,
    providerNames,
    values: {
      title: activeEmail.subject || '',
      project: '',
      category: 'Email',
      priority: 2,
      status: 'pending',
      owner: '',
      provider: '',
      followupDays: 2,
      followup: { enabled: true, finalized: false, done: false, type: 'interval_days', intervalDays: 2, startDate: todayIso(), nextDate: todayIso(), summary: tr('REP_SUM_DAYS')(2), lastCompletedAt: null },
      dueDate: '',
      repeat: { enabled: false, type: 'interval_days', intervalDays: 5 },
      timeValue: 30,
      timeUnit: 'min',
      notes: getActiveEmailSummary(),
      comment: ''
    }
  };
}

function mountTaskForm(formConfig) {
  rememberFocusTarget(document.activeElement);
  OV_RETURN_FOCUS_KEY = LAST_FOCUS_KEY;
  OV_RETURN_FOCUS_ID  = LAST_FOCUS_ID;
  document.getElementById('ovt').textContent = formConfig.overlayTitle;
  document.getElementById('ovs').textContent = formConfig.overlaySubtitle || '';
  document.getElementById('ovl').innerHTML = renderTaskForm(formConfig);
  document.getElementById('ov').classList.add('open');
  document.getElementById('bk').classList.add('open');
  onRepeatToggle();
  onRepeatTypeChange();
  updateRepeatSummary();
  onFollowupToggle();
  onFollowupTypeChange();
  updateFollowupSummary();
  onCreateStatusChange();
}

function getTaskFormPayload() {
  const statusValue = document.getElementById('cf-status')?.value || 'pending';
  const isCompleted = statusValue === 'completed';
  const dueDate = isCompleted ? null : (document.getElementById('cf-due')?.value || null);
  const followupConfig = isCompleted ? { enabled:false, finalized:false, done:false, summary:'' } : getFollowupConfigFromForm();
  const followupDays = isCompleted ? 0 : (() => {
    const nextDate = followupConfig.finalized ? null : (followupConfig.nextDate || followupConfig.startDate || null);
    if (!nextDate) return 0;
    const diff = Math.round((new Date(nextDate) - new Date(todayIso())) / 86400000);
    return Math.max(0, diff);
  })();
  const timeValue = parseInt(document.getElementById('cf-time-val')?.value || '0', 10) || 0;
  const timeUnit = document.getElementById('cf-time-unit')?.value || 'min';
  return {
    title: (document.getElementById('cf-title')?.value || '').trim(),
    projectName: (document.getElementById('cf-project')?.value || '').trim() || tr('NO_PROJECT'),
    category: document.getElementById('cf-category')?.value || 'Email',
    priority: parseInt(document.getElementById('cf-priority')?.value || '3', 10),
    statusValue,
    isCompleted,
    ownerName: (document.getElementById('cf-owner')?.value || '').trim(),
    providerName: (document.getElementById('cf-provider')?.value || '').trim(),
    followupDays,
    followupConfig,
    dueDate,
    timeValue,
    timeUnit,
    timeMinutes: minutesFrom(timeValue, timeUnit),
    notes: document.getElementById('cf-notes')?.value || '',
    commentText: (document.getElementById('cf-comment')?.value || '').trim(),
    repeatConfig: isCompleted ? { enabled: false } : getRepeatConfig()
  };
}

function buildExistingActionsInfo(emailId) {
  const linked = TASKS.filter(t =>
    ['Email','Task','Meeting','Call'].includes(t.outlook_category || t.category) &&
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  if (!linked.length) return '';
  const chips = linked.map(t => {
    const cat = t.outlook_category || t.category || '';
    const isFu = cat === 'Email' || cat === 'Task';
    const isMt = cat === 'Meeting';
    const cls  = isFu ? 'fu' : isMt ? 'mt' : '';
    const icon = isFu ? '👁️' : isMt ? '📅' : '📞';
    const label = isFu ? tr('EXIST_FOLLOWUP') : isMt ? tr('EXIST_MEETING') : tr('EXIST_CALL');
    const date  = t.due_date ? ' · ' + fmtDate(t.due_date) : t.followup_date ? ' · ' + fmtDate(t.followup_date) : '';
    return `<span class="exist-chip ${cls}">${icon} ${label}${escapeHtml(date)}: ${escapeHtml(t.title)}</span>`;
  }).join('');
  return `<div class="exist-info"><div class="exist-info-msg">${tr('EXIST_INFO')}</div><div class="exist-chips">${chips}</div></div>`;
}

function openCreateTaskForm() {
  const formConfig = getTaskFormConfig('create');
  if (!formConfig) return;

  const ae = getActiveEmail();
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  // Find existing linked tasks by category
  const linkedTasks = TASKS.filter(t =>
    getRelatedIds(t.task_id, 'task_email').includes(emailId)
  );
  const existFu = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return (cat === 'Email' || cat === 'Task') && (t.followup_date || t.due_date);
  });
  const existMt = linkedTasks.find(t => {
    const cat = t.outlook_category || t.category || '';
    return cat === 'Meeting' || cat === 'Call';
  });

  // Pre-populate follow-up fields from existing follow-up task
  if (existFu) {
    const existingFollowup = getTaskFollowup(existFu);
    formConfig.values.followup = existingFollowup;
    if (existFu.followup_date) {
      const diff = Math.round((new Date(existFu.followup_date) - new Date(todayIso())) / 86400000);
      formConfig.values.followupDays = Math.max(0, diff);
    } else if (existFu.followup_days != null) {
      formConfig.values.followupDays = existFu.followup_days;
    }
    if (existFu.due_date && !formConfig.values.dueDate) {
      formConfig.values.dueDate = existFu.due_date;
    }
  }

  // Pre-populate due date from existing meeting task
  if (existMt && existMt.due_date && !formConfig.values.dueDate) {
    formConfig.values.dueDate = existMt.due_date;
  }

  // Inject informational banner
  formConfig._existBanner = buildExistingActionsInfo(emailId);
  mountTaskForm(formConfig);
}

function openEditTask(taskId) {
  const formConfig = getTaskFormConfig('edit', taskId);
  if (!formConfig) return;
  mountTaskForm(formConfig);
}

function saveTaskForm(mode, taskId) {
  const payload = getTaskFormPayload();
  if (!payload.title) {
    showCreateFlash(tr('EMPTY_TITLE'), 'err');
    return;
  }

  if (mode === 'edit') {
    const task = TASKS.find(item => item.task_id === taskId);
    if (!task) return;
    const beforeState = collectTaskAuditState(taskId);
    task.title = payload.title;
    task.outlook_category = payload.category;
    task.priority = payload.priority;
    task.status = payload.statusValue;
    task.followup_days = payload.followupDays;
    task.due_date = payload.dueDate;
    task.followup = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
    task.time_minutes = payload.timeMinutes;
    task.notes = payload.notes;
    task.repeat = payload.repeatConfig;
    syncTaskFollowupFields(task);
    const projectId = findOrCreateProject(payload.projectName);
    removeTaskRelationsByType(taskId, 'task_project');
    addRelation(taskId, projectId, 'task_project');
    removeTaskRelationsByType(taskId, 'task_provider');
    if (payload.providerName) {
      const providerId = findOrCreateProvider(payload.providerName);
      addRelation(taskId, providerId, 'task_provider');
    }
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (payload.ownerName) {
      const ownerId = findOrCreatePerson(payload.ownerName);
      if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskId, ownerId, 'task_person');
    }
    const afterState = collectTaskAuditState(taskId);
    logTaskAuditChanges(taskId, beforeState, afterState);
    if (payload.commentText) {
      const commentId = nextId('CMT');
      COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
      addRelation(taskId, commentId, 'task_comment');
    }
    refreshTaskCommentCount(taskId);
    try { render(); } catch (error) {}
    schedulePersistence();
    showCreateFlash(tr('EDIT_SAVED'), 'ok');
    setTimeout(() => { try { closeOv(); } catch (error) {} }, 800);
    return;
  }

  const activeEmail = getActiveEmail();
  const projectId = findOrCreateProject(payload.projectName);
  const ownerId = payload.ownerName ? findOrCreatePerson(payload.ownerName) : null;
  const providerId = payload.providerName ? findOrCreateProvider(payload.providerName) : null;
  const emailId = findOrCreateEmail(activeEmail.subject, activeEmail.from, activeEmail.fromName, activeEmail.dateLabel, activeEmail.attachments, activeEmail.messageId);
  let timeEntryId = null;
  if (payload.timeMinutes > 0) {
    timeEntryId = nextId('TIM');
    const unitLabel = payload.timeUnit === 'h' ? 'hours' : payload.timeUnit === 'd' ? 'days' : 'minutes';
    TIME_ENTRIES.push({ entry_id: timeEntryId, entry_date: todayIso(), amount: payload.timeValue, unit: unitLabel });
  }
  let commentId = null;
  if (payload.commentText) {
    commentId = nextId('CMT');
    COMMENTS.push({ comment_id: commentId, text: payload.commentText, created_at: new Date().toISOString(), comment_type:'user' });
  }
  const taskIdNew = nextId('TSK');
  const followupState = normalizeFollowupConfig(payload.followupConfig, payload.followupConfig?.nextDate || payload.followupConfig?.startDate || null, payload.followupDays);
  const followupDate = payload.isCompleted ? null : (followupState.finalized ? null : (followupState.nextDate || null));
  TASKS.unshift({
    task_id: taskIdNew,
    title: payload.title,
    priority: payload.priority,
    status: payload.statusValue,
    due_date: payload.dueDate,
    followup_date: followupDate,
    followup_days: payload.followupDays,
    followup: followupState,
    time_minutes: payload.timeMinutes,
    comment_count: payload.commentText ? 1 : 0,
    outlook_category: payload.category,
    notes: payload.notes,
    repeat: payload.repeatConfig,
    created_at: new Date().toISOString(),
  });
  addRelation(taskIdNew, projectId, 'task_project');
  addRelation(taskIdNew, emailId, 'task_email');
  addRelation(taskIdNew, MY_PERSON_ID, 'task_person');
  if (ownerId && ownerId !== MY_PERSON_ID) addRelation(taskIdNew, ownerId, 'task_person');
  if (providerId) addRelation(taskIdNew, providerId, 'task_provider');
  if (timeEntryId) {
    addRelation(taskIdNew, timeEntryId, 'task_time_entry');
    addRelation(MY_PERSON_ID, timeEntryId, 'person_time_entry');
  }
  if (commentId) addRelation(taskIdNew, commentId, 'task_comment');
  try { render(); } catch (error) {}
  schedulePersistence();
  showCreateFlash(tr('TASK_CREATED'), 'ok');
  setTimeout(() => { try { closeOv(); } catch (error) {} }, 900);
}

function showCreateFlash(message, kind) {
  const flashElement = document.getElementById('cf-flash');
  if (!flashElement) return;
  flashElement.className = 'cf-flash ' + (kind || 'ok');
  flashElement.textContent = message;
  flashElement.style.display = 'block';
  clearTimeout(flashElement._t);
  flashElement._t = setTimeout(() => { flashElement.style.display = 'none'; }, 2400);
}

function onCreateStatusChange() {
  const st = document.getElementById('cf-status')?.value || 'pending';
  const isDone = st === 'completed';
  const due = document.getElementById('cf-due');
  const repChk = document.getElementById('cf-repeat-enabled');
  const repType = document.getElementById('cf-repeat-type');
  const repBox = document.getElementById('rep-box');
  const fupChk = document.getElementById('cf-followup-enabled');
  const fupType = document.getElementById('cf-followup-type');
  const fupBox = document.getElementById('fup-box');
  if (due) { due.disabled = isDone; if (isDone) due.value = ''; }
  if (repChk) { repChk.disabled = isDone; if (isDone) repChk.checked = false; }
  if (repType) repType.disabled = isDone;
  if (repBox) repBox.classList.toggle('disabled', isDone);
  if (isDone) { const repOpts = document.getElementById('cf-repeat-opts'); if (repOpts) repOpts.classList.remove('visible'); }
  if (fupChk) { fupChk.disabled = isDone; if (isDone) fupChk.checked = false; }
  if (fupType) fupType.disabled = isDone;
  if (fupBox) fupBox.classList.toggle('disabled', isDone);
  if (isDone) { const fupOpts = document.getElementById('cf-followup-opts'); if (fupOpts) fupOpts.classList.remove('visible'); }
  onRepeatToggle();
  onFollowupToggle();
}

function onRepeatToggle() {
  const chk  = document.getElementById('cf-repeat-enabled');
  const opts = document.getElementById('cf-repeat-opts');
  if (!chk || !opts) return;
  opts.classList.toggle('visible', !!chk.checked && !chk.disabled);
}

function onRepeatTypeChange() {
  const sel = document.getElementById('cf-repeat-type');
  if (!sel) return;
  const v = sel.value;
  const blocks = {
    interval_days:   document.getElementById('rep-interval-days'),
    weekly:          document.getElementById('rep-weekly'),
    monthly_dom:     document.getElementById('rep-monthly-dom'),
    monthly_ordinal: document.getElementById('rep-monthly-ordinal'),
  };
  Object.values(blocks).forEach(b => { if (b) b.style.display = 'none'; });
  if (blocks[v]) blocks[v].style.display = 'block';
  updateRepeatSummary();
}

function updateRepeatSummary() {
  const sel = document.getElementById('cf-repeat-type');
  const out = document.getElementById('cf-repeat-summary');
  if (!sel || !out) return;
  const wdMap  = { mo:'WD_MO',tu:'WD_TU',we:'WD_WE',th:'WD_TH',fr:'WD_FR',sa:'WD_SA',su:'WD_SU' };
  const ordMap = { '1':'ORD_1','2':'ORD_2','3':'ORD_3','4':'ORD_4','last':'ORD_LAST' };
  const wdName = code => tr(wdMap[code] || 'WD_MO');
  let text = '';
  if (sel.value === 'interval_days') {
    const n = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
    text = tr('REP_SUM_DAYS')(n);
  } else if (sel.value === 'weekly') {
    const n  = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10);
    const wd = document.getElementById('cf-repeat-weekday')?.value || 'mo';
    text = tr('REP_SUM_WEEKS')(n, wdName(wd));
  } else if (sel.value === 'monthly_dom') {
    const d = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
    text = tr('REP_SUM_DOM')(d);
  } else if (sel.value === 'monthly_ordinal') {
    const ord = document.getElementById('cf-repeat-ordinal')?.value || '1';
    const wd  = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo';
    text = tr('REP_SUM_ORDINAL')(tr(ordMap[ord] || 'ORD_1'), wdName(wd));
  }
  out.value = text;
}

function getRepeatConfig() {
  const enabled = !!document.getElementById('cf-repeat-enabled')?.checked;
  const type    = document.getElementById('cf-repeat-type')?.value || 'interval_days';
  if (!enabled) return { enabled: false };
  const cfg = { enabled: true, type };
  if (type === 'interval_days')   cfg.intervalDays  = parseInt(document.getElementById('cf-repeat-interval-days')?.value || '1', 10);
  if (type === 'weekly')          { cfg.intervalWeeks = parseInt(document.getElementById('cf-repeat-interval-weeks')?.value || '1', 10); cfg.weekday = document.getElementById('cf-repeat-weekday')?.value || 'mo'; }
  if (type === 'monthly_dom')     cfg.dayOfMonth = parseInt(document.getElementById('cf-repeat-dom')?.value || '1', 10);
  if (type === 'monthly_ordinal') { cfg.ordinal = document.getElementById('cf-repeat-ordinal')?.value || '1'; cfg.weekday = document.getElementById('cf-repeat-ordinal-weekday')?.value || 'mo'; }
  cfg.summary = document.getElementById('cf-repeat-summary')?.value || '';
  return cfg;
}

function saveFollowUpTask() {
  const ae    = getActiveEmail();
  const title = (document.getElementById('fu-title')?.value || '').trim();
  const flash = document.getElementById('fu-flash');
  if (!title) {
    if (flash) { flash.className='cf-flash err'; flash.textContent=tr('EMPTY_TITLE'); flash.style.display='block'; }
    return;
  }
  const followDate = document.getElementById('fu-date')?.value || todayIso();
  const note       = (document.getElementById('fu-note')?.value || '').trim();

  // Calcular followup_days des d'avui fins a followDate
  const today = new Date(todayIso());
  const fDate = new Date(followDate);
  const diffDays = Math.max(0, Math.round((fDate - today) / 86400000));

  const taskId  = nextId('TSK');
  const projId  = findOrCreateProject(tr('NO_PROJECT'));
  const emailId = findOrCreateEmail(ae.subject, ae.from, ae.fromName, ae.dateLabel, ae.attachments, ae.messageId);

  TASKS.push({
    task_id:       taskId,
    title:         title,
    status:        'pending',
    priority:      3,
    category:      'Email',
    due_date:      followDate,
    followup_date: followDate,
    followup_days: diffDays,
    followup:      { enabled:true, finalized:false, done:false, type:'interval_days', intervalDays: Math.max(1, diffDays || 1), startDate: followDate, nextDate: followDate, summary: tr('REP_SUM_DAYS')(Math.max(1, diffDays || 1)), lastCompletedAt:null },
    time_minutes:  0,
    comment_count: note ? 1 : 0,
    created_at:    new Date().toISOString(),
    outlook_category: 'Email',
    repeat:           { enabled: false },
    notes:            note || '',
  });

  addRelation(taskId, projId,   'task_project');
  addRelation(taskId, emailId,  'task_email');
  addRelation(taskId, MY_PERSON_ID, 'task_person');

  if (note) {
    const cmtId = nextId('CMT');
    COMMENTS.push({ comment_id: cmtId, text: note, created_at: new Date().toISOString(), comment_type:'user' });
    addRelation(taskId, cmtId, 'task_comment');
  }

  if (flash) { flash.className='cf-flash ok'; flash.textContent=tr('TASK_CREATED')||'✅'; flash.style.display='block'; }
  try { render(); } catch(e) {}
  setTimeout(() => { try { closeOv(); } catch(e) {} }, 900);
}

// =============================================================================
// LOCAL PERSISTENCE (INDEXEDDB) + MAINTENANCE
// =============================================================================
const TF_INDEXEDDB_CONFIG = {
  enabled: true,
  dbName: 'TaskFlowLocalDB',
  version: 1,
  stores: {
    projects: { keyPath: 'project_id' },
    people: { keyPath: 'person_id' },
    providers: { keyPath: 'provider_id' },
    emails: { keyPath: 'email_id' },
    comments: { keyPath: 'comment_id' },
    time_entries: { keyPath: 'entry_id' },
    tasks: { keyPath: 'task_id' },
    relations: { keyPath: 'relation_id' }
  }
};

let TF_persistTimer = null;
let TF_persistenceHooksAttached = false;

function canUseIndexedDb() {
  return TF_INDEXEDDB_CONFIG.enabled && typeof indexedDB !== 'undefined';
}

function openTaskFlowDb() {
  return new Promise((resolve, reject) => {
    if (!canUseIndexedDb()) {
      resolve(null);
      return;
    }
    const request = indexedDB.open(TF_INDEXEDDB_CONFIG.dbName, TF_INDEXEDDB_CONFIG.version);
    request.onupgradeneeded = event => {
      const db = event.target.result;
      Object.entries(TF_INDEXEDDB_CONFIG.stores).forEach(([storeName, storeConfig]) => {
        if (!db.objectStoreNames.contains(storeName)) {
          db.createObjectStore(storeName, { keyPath: storeConfig.keyPath });
        }
      });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
  });
}

function getPersistenceSnapshot() {
  return {
    projects: PROJECTS.map(item => ({ ...item })),
    people: PEOPLE.map(item => ({ ...item })),
    providers: PROVIDERS.map(item => ({ ...item })),
    emails: EMAILS.map(item => ({ ...item })),
    comments: COMMENTS.map(item => ({ ...item })),
    time_entries: TIME_ENTRIES.map(item => ({ ...item })),
    tasks: TASKS.map(item => ({ ...item })),
    relations: RELATIONS.map(item => ({ ...item }))
  };
}

function getPersistenceStats() {
  const snapshot = getPersistenceSnapshot();
  return {
    projects: snapshot.projects.length,
    people: snapshot.people.length,
    providers: snapshot.providers.length,
    emails: snapshot.emails.length,
    comments: snapshot.comments.length,
    time_entries: snapshot.time_entries.length,
    tasks: snapshot.tasks.length,
    relations: snapshot.relations.length
  };
}

function hasPersistenceData(snapshot) {
  if (!snapshot) return false;
  return Object.values(snapshot).some(value => Array.isArray(value) && value.length > 0);
}

function applyPersistenceSnapshot(snapshot) {
  if (!snapshot) return;
  PROJECTS = Array.isArray(snapshot.projects) ? snapshot.projects : PROJECTS;
  PEOPLE = Array.isArray(snapshot.people) ? snapshot.people : PEOPLE;
  PROVIDERS = Array.isArray(snapshot.providers) ? snapshot.providers : PROVIDERS;
  EMAILS = Array.isArray(snapshot.emails) ? snapshot.emails : EMAILS;
  COMMENTS = Array.isArray(snapshot.comments) ? snapshot.comments : COMMENTS;
  TIME_ENTRIES = Array.isArray(snapshot.time_entries) ? snapshot.time_entries : TIME_ENTRIES;
  TASKS = Array.isArray(snapshot.tasks) ? snapshot.tasks : TASKS;
  RELATIONS = Array.isArray(snapshot.relations) ? snapshot.relations : RELATIONS;
  if (MY_PERSON_ID && !PEOPLE.find(person => person.person_id === MY_PERSON_ID) && PEOPLE.length) {
    MY_PERSON_ID = PEOPLE[0].person_id;
  }
}

async function loadPersistenceSnapshot() {
  const db = await openTaskFlowDb();
  if (!db) return null;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readonly');
    const snapshot = {};
    let pending = storeNames.length;
    storeNames.forEach(storeName => {
      const request = transaction.objectStore(storeName).getAll();
      request.onsuccess = () => {
        snapshot[storeName] = request.result || [];
        pending -= 1;
        if (pending === 0) resolve(snapshot);
      };
      request.onerror = () => reject(request.error || new Error('IndexedDB read failed'));
    });
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB transaction failed'));
  });
}

async function savePersistenceSnapshot() {
  const db = await openTaskFlowDb();
  if (!db) return;
  const snapshot = getPersistenceSnapshot();
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB write failed'));
    storeNames.forEach(storeName => {
      const store = transaction.objectStore(storeName);
      const clearRequest = store.clear();
      clearRequest.onsuccess = () => {
        (snapshot[storeName] || []).forEach(record => store.put(record));
      };
      clearRequest.onerror = () => reject(clearRequest.error || new Error('IndexedDB clear failed'));
    });
  });
}

function schedulePersistence() {
  if (!canUseIndexedDb()) return;
  if (TF_persistTimer) clearTimeout(TF_persistTimer);
  TF_persistTimer = setTimeout(() => {
    savePersistenceSnapshot().catch(error => console.error('TaskFlow IndexedDB save failed', error));
  }, 120);
}

function wrapPersistenceFunction(functionName) {
  const originalFunction = window[functionName];
  if (typeof originalFunction !== 'function' || originalFunction.__tfWrapped) return;
  const wrappedFunction = function(...args) {
    const result = originalFunction.apply(this, args);
    schedulePersistence();
    return result;
  };
  wrappedFunction.__tfWrapped = true;
  window[functionName] = wrappedFunction;
}

function attachPersistenceHooks() {
  if (TF_persistenceHooksAttached) return;
  TF_persistenceHooksAttached = true;
  ['toggleDone', 'linkEmailToTask', 'saveComment', 'saveTimeEntry', 'saveFollowUpTask', 'saveMeetingTask'].forEach(wrapPersistenceFunction);
}

function resetInMemoryTables() {
  PROJECTS = [];
  PROVIDERS = [];
  EMAILS = [];
  COMMENTS = [];
  TIME_ENTRIES = [];
  TASKS = [];
  RELATIONS = [];
  if (PEOPLE.length > 0 && MY_PERSON_ID) {
    PEOPLE = PEOPLE.filter(person => person.person_id === MY_PERSON_ID);
  }
}

async function clearIndexedDbStores() {
  const db = await openTaskFlowDb();
  if (!db) return;
  const storeNames = Object.keys(TF_INDEXEDDB_CONFIG.stores);
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(storeNames, 'readwrite');
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error('IndexedDB reset failed'));
    storeNames.forEach(storeName => transaction.objectStore(storeName).clear());
  });
}

function downloadSnapshotJson(snapshot) {
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'taskflow-indexeddb-backup.json';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function showMaintenanceFlash(message, kind = 'ok') {
  const flashElement = document.getElementById('db-flash');
  if (!flashElement) return;
  flashElement.className = 'cf-flash ' + kind;
  flashElement.textContent = message;
  flashElement.style.display = 'block';
  clearTimeout(flashElement._t);
  flashElement._t = setTimeout(() => { flashElement.style.display = 'none'; }, 2600);
}

function renderMaintenancePanel() {
  const stats = getPersistenceStats();
  return `
    <div class="maint-wrap">
      <div class="maint-grid">
        <button class="maint-card" onclick="exportIndexedDbSnapshot()">
          <div class="maint-title">${tr('DB_EXPORT')}</div>
          <div class="maint-sub">${tr('DB_EXPORT_SUB')}</div>
        </button>
        <button class="maint-card" onclick="triggerIndexedDbImport()">
          <div class="maint-title">${tr('DB_IMPORT')}</div>
          <div class="maint-sub">${tr('DB_IMPORT_SUB')}</div>
        </button>
        <button class="maint-card" onclick="seedIndexedDbDemoData()">
          <div class="maint-title">${tr('DB_SEED')}</div>
          <div class="maint-sub">${tr('DB_SEED_SUB')}</div>
        </button>
        <button class="maint-card" onclick="resetIndexedDbAndMemory()">
          <div class="maint-title">${tr('DB_RESET')}</div>
          <div class="maint-sub">${tr('DB_RESET_SUB')}</div>
        </button>
        <div class="maint-card full" style="cursor:default">
          <div class="maint-title">${tr('DB_STATUS')}</div>
          <div class="maint-sub">${tr('DB_STATUS_FMT')(stats)}</div>
        </div>
