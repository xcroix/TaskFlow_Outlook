let QE_ACTIVE = null;

function openQePop(type, taskId, anchorEl) {
  const pop = document.getElementById('qepop');
  QE_RETURN_FOCUS_KEY = anchorEl?.dataset?.focusKey || null;

  // Toggle: clicking again on the same task icon type closes the active qepop.
  if (pop && pop.classList.contains('open') && QE_ACTIVE && QE_ACTIVE.type === type && QE_ACTIVE.taskId === taskId) {
    closeQePop();
    return;
  }

  closeQePop();
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) return;
  expandCompactTaskCard(taskId);
  if (!pop) return;
  pop.setAttribute('role','dialog');
  pop.setAttribute('aria-modal','false');
  pop.setAttribute('tabindex','-1');
  pop.setAttribute('aria-label', tr('OV_EDIT_TASK'));
  pop.innerHTML = buildQePopContent(type, task);
  pop.style.display = 'block';

  // Position relative to .phone container
  const phoneEl = document.querySelector('.phone');
  const phoneRect = phoneEl.getBoundingClientRect();
  const aRect = anchorEl.getBoundingClientRect();
  let top = aRect.bottom - phoneRect.top + 4;
  let left = aRect.left - phoneRect.left;

  // Clamp horizontally
  pop.style.left = '0';
  pop.style.top = '0';
  const popW = pop.offsetWidth || 160;
  const popH = pop.offsetHeight || 120;
  left = Math.max(8, Math.min(left, phoneRect.width - popW - 8));

  // Prefer below the clicked icon; flip above only if there is not enough space
  if (top + popH > phoneRect.height - 12) top = aRect.top - phoneRect.top - popH - 4;
  top = Math.max(8, top);
  if (top + popH > phoneRect.height - 8) pop.style.maxHeight = Math.max(140, phoneRect.height - top - 8) + 'px';
  else pop.style.maxHeight = '';

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('open');
  QE_ACTIVE = { type, taskId };

  const inp = pop.querySelector('input[type="date"], input[type="text"], textarea, select, button');
  setTimeout(() => { if (inp) inp.focus(); else pop.focus(); }, 40);
}

// Comentarios en castellano
function showQeDateAdjustmentConfirm(kind, taskId, originalDate, adjustedDate) {
  const pop = document.getElementById('qepop');
  if (!pop) return;
  const isDue = kind === 'duedate';
  const messageKey = isDue ? 'WARN_WEEKEND_DUE_CONFIRM' : 'WARN_WEEKEND_FOLLOWUP_CONFIRM';
  const acceptFn = isDue ? 'applyQeDueDate' : 'applyQeFollowDate';
  pop.innerHTML = `
    <div class="qepop-panel">
      <div class="qepop-lbl">${escapeHtml(isDue ? tr('CF_DUE') : tr('LEG_FOLLOWUP'))}</div>
      <div class="qepop-list-item">
        <div class="qepop-list-title">${escapeHtml(tr(messageKey))}</div>
        <div class="qepop-list-sub">${escapeHtml(fmtDate(originalDate))} → <strong>${escapeHtml(fmtDate(adjustedDate))}</strong></div>
      </div>
      <div class="qepop-row">
        <button class="qepop-btn" type="button" onclick="closeQePop()">${escapeHtml(tr('BTN_CANCEL_CHANGE'))}</button>
        <button class="qepop-btn primary" type="button" onclick="${acceptFn}('${taskId}','${adjustedDate}')">${escapeHtml(tr('BTN_ACCEPT_CHANGE'))}</button>
      </div>
    </div>`;
  pop.classList.add('open');
  pop.style.display = 'block';
}

// Comentarios en castellano
function showQeDateValidationMessage(messageKey) {
  const pop = document.getElementById('qepop');
  if (!pop) return;

    </div>`;

}

// Comentarios en castellano
function applyQeDueDate(taskId, dueDate) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  if (dueDate && dueDate < todayIso()) {
    showQeDateValidationMessage('WARN_DATE_BEFORE_TODAY');
    return;
  }
  if (dueDate && task.followup_date && task.followup_date > dueDate) {
    showQeDateValidationMessage('WARN_DUE_BEFORE_FOLLOWUP_BLOCK');
    return;
  }
  const beforeState = collectTaskAuditState(taskId);
  task.due_date = dueDate || null;
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
  refreshEmailRenderCardAfterMutation(taskId);
}

// Comentarios en castellano
function applyQeFollowDate(taskId, followupDate) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  if (followupDate && followupDate < todayIso()) {
    showQeDateValidationMessage('WARN_DATE_BEFORE_TODAY');
    return;
  }
  if (followupDate && task.due_date && followupDate > task.due_date) {
    showQeDateValidationMessage('WARN_FOLLOWUP_AFTER_DUE_BLOCK');
    return;
  }
  const beforeState = collectTaskAuditState(taskId);
  if (!followupDate) {
    task.followup_date = null;
    task.followup_days = 0;
    task.followup = normalizeFollowupConfig({ enabled:false }, null, 0);
  } else {
    const followup = getTaskFollowup(task);
    task.followup_date = followupDate;
    const diff = Math.round((new Date(followupDate) - new Date(todayIso())) / 86400000);
    task.followup_days = Math.max(0, diff);
    task.followup = normalizeFollowupConfig({ ...followup, enabled:true, finalized:false, done:false, startDate: followupDate, nextDate: followupDate }, followupDate, task.followup_days);
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
  refreshEmailRenderCardAfterMutation(taskId);
}
function saveQePop(type, action, taskId) {
  const task = TASKS.find(t => t.task_id === taskId);
  if (!task) { closeQePop(); return; }
  const inp = document.getElementById('qepop-inp');

  if (type === 'duedate') {
    const rawDueDate = (action === 'clear') ? null : (inp?.value || null) || null;
    if (!rawDueDate) { applyQeDueDate(taskId, null); return; }
    const adjustedDue = adjustToWeekdayIfWeekend(rawDueDate);
    if (adjustedDue.wasWeekend) {
      showQeDateAdjustmentConfirm('duedate', taskId, rawDueDate, adjustedDue.adjusted);
      return;
    }
    applyQeDueDate(taskId, rawDueDate);
    return;
  }

  if (type === 'followdate') {
    const rawFollowupDate = (action === 'clear') ? null : (inp?.value || null) || null;
    if (!rawFollowupDate) { applyQeFollowDate(taskId, null); return; }
    const adjustedFollowupDate = nextWorkday(rawFollowupDate);
    if (adjustedFollowupDate !== rawFollowupDate) {
      showQeDateAdjustmentConfirm('followdate', taskId, rawFollowupDate, adjustedFollowupDate);
      return;
    }
    applyQeFollowDate(taskId, rawFollowupDate);
    return;
  }

  const beforeState = collectTaskAuditState(taskId);
  if (type === 'priority') {
    task.priority = parseInt(action);
  } else if (type === 'person') {
    const name = (inp?.value || '').trim();
    removeTaskRelationsByType(taskId, 'task_person');
    addRelation(taskId, MY_PERSON_ID, 'task_person');
    if (name) {
      const pid = findOrCreatePerson(name);
      if (pid && pid !== MY_PERSON_ID) addRelation(taskId, pid, 'task_person');
    }
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  closeQePop();
  try { render(); } catch(e) {}
  refreshEmailRenderCardAfterMutation(taskId);
}

function closeQePop() {
  const pop = document.getElementById('qepop');
  if (pop) { pop.classList.remove('open'); pop.style.display = 'none'; pop.style.maxHeight = ''; pop.innerHTML = ''; }
  QE_ACTIVE = null;
  focusByStoredTarget(QE_RETURN_FOCUS_KEY, null, '#cnt');
}


// Keyboard support: Escape + focus trap
function handleGlobalKeydown(event) {
  if (event.key === 'Escape') {
    const pop = document.getElementById('qepop');
    const menu = document.getElementById('sec-menu');
    const ov = document.getElementById('ov');
    const drop = document.getElementById('qa-drop');
    if (pop && pop.classList.contains('open')) { event.preventDefault(); closeQePop(); return; }
    if (menu && menu.classList.contains('open')) { event.preventDefault(); closeSecondaryMenu(); return; }
    if (drop && drop.classList.contains('open')) { event.preventDefault(); closeQaDrop(); return; }
    if (ov && ov.classList.contains('open')) { event.preventDefault(); closeOv(); return; }
  }
  if (event.key === 'Tab') {
    const pop = document.getElementById('qepop');
    const menu = document.getElementById('sec-menu');
    const ov = document.getElementById('ov');
    if (pop && pop.classList.contains('open')) { trapFocusIn(pop, event); return; }
    if (menu && menu.classList.contains('open')) { trapFocusIn(menu, event); return; }
    if (ov && ov.classList.contains('open')) { trapFocusIn(ov, event); return; }
  }
}
document.addEventListener('keydown', handleGlobalKeydown, true);

// === V340: qepop same icon capture guard for task and email rendercards ===
(function () {
  function getQeTrigger(event) {
    return event.target && event.target.closest ? event.target.closest('.ic[onclick*="openQePop("], .ic[onclick*="openEmailQePop("]') : null;
  }
  function getQeTriggerType(handler) {
    const taskMatch = handler.match(/openQePop\(['"]([^'"]+)['"]\s*,\s*['"]([^'"]+)['"]/);
    if (taskMatch) return { type: taskMatch[1], taskId: taskMatch[2] };
    const emailMatch = handler.match(/openEmailQePop\(['"]([^'"]+)['"]/);
    if (emailMatch) return { type: emailMatch[1], taskId: QE_ACTIVE ? QE_ACTIVE.taskId : null };
    return null;
  }
  document.addEventListener('click', function (event) {
    const trigger = getQeTrigger(event);
    if (!trigger) return;
    const parsed = getQeTriggerType(trigger.getAttribute('onclick') || '');
    if (!parsed || !parsed.type) return;
    const pop = document.getElementById('qepop');
    if (pop && pop.classList.contains('open') && QE_ACTIVE && QE_ACTIVE.type === parsed.type && (!parsed.taskId || QE_ACTIVE.taskId === parsed.taskId)) {
      closeQePop();
      event.preventDefault();
      event.stopImmediatePropagation();
    }
  }, true);
})();

// === V262: viewport-safe floating panel clamp ===
(function () {
  const FLOATING_PANEL_SELECTOR = [
    '.qepop.open',
    '#qa-drop.open',
    '.sec-menu.open',
    '.task-popdown:not(.hidden)',
    '.anchored-panel-qepop.open',
    '#prefs-ov.prefs-qepop.open',
    '.task-action-qepop.open',
    '.email-action-qepop.open'
  ].join(',');

  function isPanelVisible(panel) {
    if (!panel) return false;
    const style = window.getComputedStyle(panel);
    return style.display !== 'none' && style.visibility !== 'hidden' && panel.getClientRects().length > 0;
  }

  function setInnerScrollArea(panel, availableHeight) {
    const body = panel.querySelector('.anchored-qepop-body, .ovl');
    if (!body) return;
    const header = panel.querySelector('.anchored-qepop-head, .ovh');
    const headerHeight = header ? header.getBoundingClientRect().height : 0;
    body.style.maxHeight = Math.max(80, availableHeight - headerHeight) + 'px';
    body.style.overflowY = 'auto';
  }

  function movePanel(panel, axis, delta) {
    const property = axis === 'x' ? 'left' : 'top';
    const currentValue = parseFloat(panel.style[property]);
    if (Number.isNaN(currentValue)) return false;
    panel.style[property] = Math.max(8, currentValue + delta) + 'px';
    return true;
  }

  function clampFloatingPanel(panel) {
    if (!isPanelVisible(panel)) return;

    const margin = 8;
    const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
    const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
    const maxPanelHeight = Math.max(120, viewportHeight - (margin * 2));

    panel.style.maxHeight = maxPanelHeight + 'px';
    if (!panel.classList.contains('anchored-panel-qepop') && !(panel.id === 'prefs-ov' && panel.classList.contains('prefs-qepop'))) {
      panel.style.overflowY = 'auto';
    }

    let rect = panel.getBoundingClientRect();

    if (rect.right > viewportWidth - margin) {
      movePanel(panel, 'x', (viewportWidth - margin) - rect.right);
    }
    rect = panel.getBoundingClientRect();
    if (rect.left < margin) {
      movePanel(panel, 'x', margin - rect.left);
    }

    rect = panel.getBoundingClientRect();
    if (rect.bottom > viewportHeight - margin) {
      movePanel(panel, 'y', (viewportHeight - margin) - rect.bottom);
    }
    rect = panel.getBoundingClientRect();
    if (rect.top < margin) {
      movePanel(panel, 'y', margin - rect.top);
    }

    rect = panel.getBoundingClientRect();
    const availableHeight = Math.max(120, viewportHeight - Math.max(rect.top, margin) - margin);
    panel.style.maxHeight = availableHeight + 'px';
    setInnerScrollArea(panel, availableHeight);
  }

  function clampOpenFloatingPanels() {
    document.querySelectorAll(FLOATING_PANEL_SELECTOR).forEach(clampFloatingPanel);
  }

  window.TaskFlow = window.TaskFlow || {};
  window.TaskFlow.clampOpenFloatingPanels = clampOpenFloatingPanels;

  document.addEventListener('click', function () {
    requestAnimationFrame(clampOpenFloatingPanels);
  }, true);

  document.addEventListener('focusin', function () {
    requestAnimationFrame(clampOpenFloatingPanels);
  }, true);

  window.addEventListener('resize', clampOpenFloatingPanels);

// ===== TaskFlow V93 · Tiempo por defecto según origen =====
// Comentarios en castellano

const _openTimeRegister = window.openTimeRegister;

window.openTimeRegister = function () {
  const result = _openTimeRegister
    ? _openTimeRegister.apply(this, arguments)
    : null;

  try {
    const prefs = window.userPreferences;
    if (!prefs || !prefs.defaultTimeMinutes) return result;

    // Detectar input de minutos de forma robusta sin depender de helper global
    const inputMinutes = (
      document.querySelector('#time-minutes') ||
      document.querySelector('input[name="time"]') ||
      document.querySelector('input[data-role="time-minutes"]') ||
      null
    );

    if (!inputMinutes) return result;

    // No sobrescribir si el usuario ya ha introducido un valor
    if (inputMinutes.value && Number(inputMinutes.value) > 0) return result;

    // Detección de origen
    let defaultMinutes = prefs.defaultTimeMinutes.task;

    // Si el registro viene desde un email activo real, usamos getActiveEmail().
    const activeEmailForMinutes = (typeof getActiveEmail === 'function') ? getActiveEmail() : null;
    if (activeEmailForMinutes && !activeEmailForMinutes.isOutlookLoading && activeEmailForMinutes.messageId !== 'demo') {
      // Heurística simple y robusta
      const subject = (activeEmailForMinutes.subject || '').toLowerCase();

      if (subject.includes('reunió') || subject.includes('reunión') || subject.includes('meeting')) {
        defaultMinutes = prefs.defaultTimeMinutes.meeting;
      } else if (subject.includes('trucada') || subject.includes('llamada') || subject.includes('call')) {
        defaultMinutes = prefs.defaultTimeMinutes.call;
      }
    }

    inputMinutes.value = defaultMinutes || 30;

  } catch (e) {
    console.warn('[TaskFlow V111] Error tiempo por defecto según origen', e);
  }

  return result;
};

<script>
// === Preferències modal accessibility & focus management (V3-38) ===
// Comentarios en castellano
(function(){
  const modal = document.getElementById('prefs-ov');
  const backdrop = document.getElementById('prefs-bk');
  let lastFocused = null;
  if (!modal || !backdrop) return;

  function setInert(state){
    if(state){ modal.setAttribute('inert',''); backdrop.setAttribute('inert',''); backdrop.setAttribute('aria-hidden','true'); }
    else { modal.removeAttribute('inert'); backdrop.removeAttribute('inert'); backdrop.setAttribute('aria-hidden','false'); }
  }
  function isFocusable(el){ return el && typeof el.focus === 'function' && el.offsetParent !== null; }
  function focusFallback(){ const b=document.getElementById('btn-menu'); if(isFocusable(b)) b.focus(); }

  function trapFocus(e){
    if(e.key!=='Tab') return;
    const f=modal.querySelectorAll('a,button,input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!f.length) return; const first=f[0], last=f[f.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
  function escHandler(e){ if(e.key==='Escape') window.closePreferencesPanel && window.closePreferencesPanel(); }

  const origOpen = window.openPreferencesPanel;
  const origClose = window.closePreferencesPanel;

  window.openPreferencesPanel = function(){
    lastFocused = document.activeElement; setInert(false);
    origOpen && origOpen.apply(this, arguments);
    modal.addEventListener('keydown', trapFocus);
    modal.addEventListener('keydown', escHandler);
    setTimeout(()=>{ const af=modal.querySelector('button,[tabindex]:not([tabindex="-1"])'); af&&af.focus(); },0);
  };

  window.closePreferencesPanel = function(){
    if(isFocusable(lastFocused)) lastFocused.focus(); else focusFallback();
    modal.removeEventListener('keydown', trapFocus);
    modal.removeEventListener('keydown', escHandler);
    origClose && origClose.apply(this, arguments);
    setInert(true);
  };

  setInert(true);
})();
</script>

<script>
// =============================================================================
// V95 — Ajuste universal de qepop dentro de los limites visibles del panel de Outlook
// =============================================================================
// Comentarios en castellano
(function(){
  let ultimoAnclaQePop = null;

  // Nota: .phone es el contenedor principal legacy del panel, no implica uso movil.
  function obtenerRectVisiblePhone(phoneEl) {
    const phoneRect = phoneEl.getBoundingClientRect();
    const viewportW = window.innerWidth || document.documentElement.clientWidth || phoneRect.width;
    const viewportH = window.innerHeight || document.documentElement.clientHeight || phoneRect.height;
    return {
      left: Math.max(phoneRect.left, 0),
      top: Math.max(phoneRect.top, 0),
      right: Math.min(phoneRect.right, viewportW),
      bottom: Math.min(phoneRect.bottom, viewportH),
      phoneLeft: phoneRect.left,
      phoneTop: phoneRect.top,
      width: Math.max(0, Math.min(phoneRect.right, viewportW) - Math.max(phoneRect.left, 0)),
      height: Math.max(0, Math.min(phoneRect.bottom, viewportH) - Math.max(phoneRect.top, 0))
    };
  }

  window.fitQePopInsidePhone = function fitQePopInsidePhone(pop, anchorEl) {
    pop = pop || document.getElementById('qepop');
    const phoneEl = document.querySelector('.phone');
    if (!pop || !phoneEl) return;

    const margen = 8;
    const visible = obtenerRectVisiblePhone(phoneEl);
    if (visible.width <= 0 || visible.height <= 0) return;

    // Se fuerza un ancho seguro antes de medir para evitar cortes por la derecha.
    const anchoMaximo = Math.max(140, visible.width - (margen * 2));
    pop.style.boxSizing = 'border-box';
    pop.style.maxWidth = Math.min(320, anchoMaximo) + 'px';
    if (pop.classList.contains('date-confirm')) {
      pop.style.width = Math.min(320, anchoMaximo) + 'px';
    }

    // Medimos despues de aplicar ancho maximo.
    const popRectInicial = pop.getBoundingClientRect();
    let anchoPop = Math.min(popRectInicial.width || pop.offsetWidth || 160, anchoMaximo);
    let altoPop = popRectInicial.height || pop.offsetHeight || 120;

    // Posicion horizontal: se calcula en coordenadas de viewport y se convierte a coordenadas internas de .phone.
    let leftViewport;
    if (anchorEl && typeof anchorEl.getBoundingClientRect === 'function') {
      const anchorRect = anchorEl.getBoundingClientRect();
      leftViewport = anchorRect.left;
    } else {
      leftViewport = popRectInicial.left || visible.left + margen;
    }
    leftViewport = Math.max(visible.left + margen, Math.min(leftViewport, visible.right - anchoPop - margen));

    // Posicion vertical: preferimos debajo del ancla, pero si no cabe, se coloca encima.
    let topViewport;
    if (anchorEl && typeof anchorEl.getBoundingClientRect === 'function') {
      const anchorRect = anchorEl.getBoundingClientRect();
      const debajo = anchorRect.bottom + 4;
      const encima = anchorRect.top - altoPop - 4;
      topViewport = (debajo + altoPop <= visible.bottom - margen) ? debajo : encima;
    } else {
      topViewport = popRectInicial.top || visible.top + margen;
    }

    // Si aun asi se sale por abajo o por arriba, se limita al area visible.
    topViewport = Math.max(visible.top + margen, Math.min(topViewport, visible.bottom - margen - Math.min(altoPop, visible.height - (margen * 2))));

    // Ajuste final de altura para qepop grandes, como comentarios.
    const altoDisponible = Math.max(120, visible.bottom - topViewport - margen);
    if (altoPop > altoDisponible) {
      pop.style.maxHeight = altoDisponible + 'px';
      pop.style.overflowY = 'auto';
      altoPop = altoDisponible;
    } else {
      pop.style.maxHeight = Math.max(120, visible.height - (margen * 2)) + 'px';
      pop.style.overflowY = 'auto';
    }

    // Conversion a coordenadas absolutas dentro de .phone.
    pop.style.left = Math.round(leftViewport - visible.phoneLeft) + 'px';
    pop.style.top = Math.round(topViewport - visible.phoneTop) + 'px';
  };



  // Alias semantico para Outlook Add-in: mantenemos fitQePopInsidePhone por compatibilidad interna.
  window.fitQePopInsideOutlookPanel = window.fitQePopInsidePhone;

  // Wrapper del qepop principal: cubre prioridad, responsables, fechas, comentarios, tiempo, emails y proveedores.
  const openOriginal = window.openQePop;
  if (typeof openOriginal === 'function' && !openOriginal.__tfV94Wrapped) {
    const wrappedOpen = function(type, taskId, anchorEl) {

<script>
// === V323: legend icons match renderCard Task and Email icons ===
// Comments in English. Keep legend icons in sync with the actual rendered card icons.
(function () {
  'use strict';

  function cleanLegendIconClone(clone) {
    if (!clone) return null;
    clone.removeAttribute('onclick');
    clone.removeAttribute('tabindex');
    clone.removeAttribute('data-focus-key');
    clone.removeAttribute('title');
    clone.removeAttribute('aria-label');
    clone.style.cursor = 'default';
    clone.style.pointerEvents = 'none';

    clone.querySelectorAll('.it,.ppill').forEach(node => node.remove());
    clone.querySelectorAll('span').forEach(node => {
      if (!node.querySelector('img,svg') && !node.classList.contains('pb') && !node.classList.contains('av')) {
        node.remove();
      }
    });
    clone.querySelectorAll('img,svg').forEach(icon => {
      icon.removeAttribute('title');
      icon.setAttribute('aria-hidden', 'true');
      if (icon.tagName && icon.tagName.toLowerCase() === 'img') icon.setAttribute('alt', '');
    });
    return clone;
  }

  function getIconFromRenderedCards(selectors) {
    for (const selector of selectors) {
      const nodes = Array.from(document.querySelectorAll(selector));
      const source = nodes.find(node => node && node.querySelector && node.querySelector('img,svg,.pb,.aw')) || nodes[0];
      if (!source) continue;
      const clone = cleanLegendIconClone(source.cloneNode(true));
      if (clone) return clone.outerHTML;
    }
    return '';
  }

  function getFallbackLegendIcon(key) {
    if (key === 'LEG_PRIORITY') return '<div class="ic"><div class="pb p1">P1</div></div>';
    if (key === 'LEG_ASSIGNED') return '<div class="ic"><div class="aw"><div class="av" style="background:var(--ac)">XC</div></div></div>';
    if (typeof IC === 'undefined') return '';
    if (key === 'LEG_FOLLOWUP') return '<div class="ic">' + (IC.eye || '') + '</div>';
    if (key === 'LEG_DEADLINE') return '<div class="ic">' + (IC.hg || '') + '</div>';
    if (key === 'LEG_COMMENTS') return '<div class="ic">' + (IC.bbl || '') + '</div>';
    if (key === 'LEG_TIME') return '<div class="ic">' + (IC.clk || '') + '</div>';
    if (key === 'LEG_EMAILS') return '<div class="ic">' + (IC.lnk || '') + '</div>';
    if (key === 'LEG_PROVIDERS') return '<div class="ic">' + (IC.shp || '') + '</div>';
    return '';
  }

  function getLegendIconHtml(key) {
    const selectorsByKey = {
      LEG_PRIORITY: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(1)', '.email-active-card .email-task-ir .ic:nth-child(1)'],
      LEG_ASSIGNED: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(2)', '.email-active-card .email-task-ir .ic:nth-child(2)'],
      LEG_FOLLOWUP: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(3)', '.email-active-card .email-task-ir .ic:nth-child(3)'],
      LEG_DEADLINE: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(4)', '.email-active-card .email-task-ir .ic:nth-child(4)'],
      LEG_COMMENTS: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(5)', '.email-active-card .email-task-ir .ic:nth-child(5)'],
      LEG_TIME: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(6)', '.email-active-card .email-task-ir .ic:nth-child(6)'],
      LEG_EMAILS: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(7)', '.email-active-card .email-task-ir .ic:nth-child(7)'],
      LEG_PROVIDERS: ['#cnt .card:not(.email-active-card) .ir .ic:nth-child(8)', '.email-active-card .email-task-ir .ic:nth-child(8)']
    };
    return getIconFromRenderedCards(selectorsByKey[key] || []) || getFallbackLegendIcon(key);
  }

  function applyLegendTaskCardAndEmailIcons() {
    const pop = document.getElementById('legendQepop');
    if (!pop) return;
    pop.querySelectorAll('.leg-item').forEach(item => {
      const labelNode = item.querySelector('[data-i18n]');
      const key = labelNode ? labelNode.getAttribute('data-i18n') : '';
      if (!key) return;
      const iconHtml = getLegendIconHtml(key);
      if (!iconHtml) return;
      let iconWrap = item.querySelector('.legend-task-icon');
      if (!iconWrap) {
        iconWrap = document.createElement('span');
        iconWrap.className = 'legend-task-icon';
        const first = item.firstElementChild;
        if (first && first !== labelNode) first.replaceWith(iconWrap);
        else item.insertBefore(iconWrap, labelNode);
      }
      iconWrap.innerHTML = iconHtml;
    });
    try { if (typeof applyLegendIconHints === 'function') applyLegendIconHints(); } catch (e) {}
  }

  window.applyLegendTaskCardIcons = applyLegendTaskCardAndEmailIcons;
  window.applyLegendTaskCardAndEmailIcons = applyLegendTaskCardAndEmailIcons;

  if (typeof window.openLegendQepop === 'function' && !window.openLegendQepop.__v323Wrapped) {
    const originalOpenLegendQepop = window.openLegendQepop;
    const wrappedOpenLegendQepop = function () {
      const result = originalOpenLegendQepop.apply(this, arguments);
      requestAnimationFrame(applyLegendTaskCardAndEmailIcons);
      return result;
    };
    wrappedOpenLegendQepop.__v323Wrapped = true;
    window.openLegendQepop = wrappedOpenLegendQepop;
  }

  if (typeof window.render === 'function' && !window.render.__v323LegendWrapped) {
    const originalRender = window.render;
    const wrappedRender = function () {
      const result = originalRender.apply(this, arguments);
      requestAnimationFrame(applyLegendTaskCardAndEmailIcons);
      return result;
    };
    wrappedRender.__v323LegendWrapped = true;
    window.render = wrappedRender;
  }

  document.addEventListener('DOMContentLoaded', function () {
    requestAnimationFrame(applyLegendTaskCardAndEmailIcons);
  });

  requestAnimationFrame(applyLegendTaskCardAndEmailIcons);
})();
</script>

<script>
// === V325: copy buttons for active email, task titles and linked email chips ===
// Comments in English. Adds explicit copy buttons without changing existing card click behavior.
(function () {
  'use strict';

  const COPY_BUTTON_CLASS = 'copy-title-btn';
  const COPY_READY_ATTR = 'data-copy-title-ready';

  function getCleanCopyText(text) {
    return String(text || '').replace(/\s+/g, ' ').replace(/⧉|✓|!/g, '').trim();
  }

  async function copyTextToClipboard(text) {
    const value = getCleanCopyText(text);
    if (!value) return false;

    // Outlook/WebView may expose navigator.clipboard but reject writeText(). Always fall back.
    if (navigator.clipboard && window.isSecureContext) {
      try {
        await navigator.clipboard.writeText(value);
        return true;
      } catch (error) {
        // Continue to the DOM selection fallback below.
      }
    }

    return copyTextWithSelectionFallback(value);
  }

  function copyTextWithSelectionFallback(value) {
    const textarea = document.createElement('textarea');
    textarea.value = value;
    textarea.setAttribute('readonly', '');
    textarea.setAttribute('aria-hidden', 'true');
    textarea.style.position = 'fixed';
    textarea.style.left = '0';
    textarea.style.top = '0';
    textarea.style.width = '1px';
    textarea.style.height = '1px';
    textarea.style.opacity = '0';
    textarea.style.pointerEvents = 'none';
    textarea.style.zIndex = '-1';
    document.body.appendChild(textarea);

    const previousActiveElement = document.activeElement;
    const selection = window.getSelection ? window.getSelection() : null;
    const savedRanges = [];
    if (selection) {
      for (let i = 0; i < selection.rangeCount; i += 1) savedRanges.push(selection.getRangeAt(i));
    }

    textarea.focus({ preventScroll: true });
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);

    let ok = false;
    try {
      ok = document.execCommand('copy');
    } catch (error) {
      ok = false;
    }

    textarea.remove();

    try {
      if (selection) {
        selection.removeAllRanges();
        savedRanges.forEach(range => selection.addRange(range));
      }
      if (previousActiveElement && typeof previousActiveElement.focus === 'function') {
        previousActiveElement.focus({ preventScroll: true });
      }
    } catch (error) {}

    return ok;
  }

  function showCopyFeedback(button, ok) {
    if (!button) return;
    const previous = button.textContent;
    button.textContent = ok ? '✓' : '!';
    button.classList.toggle('copied', !!ok);
    button.setAttribute('aria-label', ok ? 'Copiat' : 'No s’ha pogut copiar');
    button.setAttribute('title', ok ? 'Copiat' : 'No s’ha pogut copiar');
    setTimeout(function () {
      button.textContent = previous || '⧉';
      button.classList.remove('copied');
      button.setAttribute('aria-label', 'Copiar text');
      button.setAttribute('title', 'Copiar text');
    }, 900);
  }

  function createCopyButton(getText) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = COPY_BUTTON_CLASS;
    button.textContent = '⧉';
    button.setAttribute('title', 'Copiar text');
    button.setAttribute('aria-label', 'Copiar text');
    button.addEventListener('click', async function (event) {
      event.preventDefault();
      event.stopPropagation();
      try { showCopyFeedback(button, await copyTextToClipboard(getText())); }
      catch (error) { showCopyFeedback(button, false); }
    }, true);
    return button;
  }

  function addCopyButton(target, getText) {
    if (!target || target.getAttribute(COPY_READY_ATTR) === '1') return;
    target.setAttribute(COPY_READY_ATTR, '1');
    target.appendChild(createCopyButton(getText));
  }

  function getElementTextWithoutCopyButton(element) {

<!-- TaskFlow V341 build marker: grouped task ordering by due/follow-up date and priority -->
<script>
// V341: task ordering inside grouped views.
(function () {
  'use strict';

  const previousGetGroups = window.getGroups || (typeof getGroups === 'function' ? getGroups : null);

  function getDateValue(value) {
    if (typeof getTodayGroupTaskDate === 'function') return getTodayGroupTaskDate(value) || '';
    return String(value || '').slice(0, 10);
  }

  function getPriorityValue(task) {
    if (typeof normalizeTaskPriority === 'function') return normalizeTaskPriority(task);
    const value = Number(task && task.priority);
    return Number.isFinite(value) && value >= 1 && value <= 4 ? value : 99;
  }

  function getScheduleSortValue(task) {
    const dueDate = getDateValue(task && task.due_date);
    const followupDate = getDateValue(task && task.followup_date);
    if (dueDate) return { date: dueDate, typeRank: 0 };
    if (followupDate) return { date: followupDate, typeRank: 1 };
    return { date: '9999-12-31', typeRank: 9 };
  }

  function compareTasksByScheduleDateAndPriority(a, b) {
    const scheduleA = getScheduleSortValue(a);
    const scheduleB = getScheduleSortValue(b);

    const dateDiff = scheduleA.date.localeCompare(scheduleB.date);
    if (dateDiff !== 0) return dateDiff;

    if (scheduleA.typeRank !== scheduleB.typeRank) return scheduleA.typeRank - scheduleB.typeRank;

    const priorityDiff = getPriorityValue(a) - getPriorityValue(b);
    if (priorityDiff !== 0) return priorityDiff;

    return String(a && a.title || '').localeCompare(String(b && b.title || ''), window.LANG || 'ca');
  }

  function compareTasksByPriorityOnly(a, b) {
    const priorityDiff = getPriorityValue(a) - getPriorityValue(b);
    if (priorityDiff !== 0) return priorityDiff;
    return String(a && a.title || '').localeCompare(String(b && b.title || ''), window.LANG || 'ca');
  }

  function sortTasksByScheduleDateAndPriority(tasks) {
    return (tasks || []).slice().sort(compareTasksByScheduleDateAndPriority);
  }

  function getUniqueTasks(groups) {
    const byId = new Map();
    (groups || []).forEach(group => {
      (group && Array.isArray(group.tasks) ? group.tasks : []).forEach(task => {
        if (task && task.task_id && !byId.has(task.task_id)) byId.set(task.task_id, task);
      });
    });
    return Array.from(byId.values());
  }

  function buildTodayScheduleGroups(tasks) {
    const today = typeof todayIso === 'function' ? todayIso() : new Date().toISOString().slice(0, 10);
    const tomorrow = typeof getTomorrowForTodayView === 'function' ? getTomorrowForTodayView(today) : new Date(Date.now() + 86400000).toISOString().slice(0, 10);
    const used = new Set();

    function takeTasks(predicate) {
      const selected = [];
      (tasks || []).forEach(task => {
        if (!task || used.has(task.task_id)) return;
        if (predicate(task)) {
          used.add(task.task_id);
          selected.push(task);
        }
      });
      return selected.sort(compareTasksByPriorityOnly);
    }

    const groups = [
      { k: 'due-today', l: 'DATA LÍMIT AVUI', c: '#D97706', s: '0', tasks: takeTasks(task => getDateValue(task.due_date) === today) },
      { k: 'follow-today', l: 'SEGUIMENT AVUI', c: '#D97706', s: '1', tasks: takeTasks(task => getDateValue(task.followup_date) === today) },
      { k: 'due-tomorrow', l: 'DATA LÍMIT DEMÀ', c: '#2B5CE6', s: '2', tasks: takeTasks(task => getDateValue(task.due_date) === tomorrow) },
      { k: 'follow-tomorrow', l: 'SEGUIMENT DEMÀ', c: '#2B5CE6', s: '3', tasks: takeTasks(task => getDateValue(task.followup_date) === tomorrow) }
    ];

    const visibleGroups = groups.filter(group => group.tasks.length > 0);
    return visibleGroups.length ? visibleGroups : [groups[0]];
  }

  window.sortTasksByPriorityAndDueDate = sortTasksByScheduleDateAndPriority;
  window.sortTasksByDueDateAndPriority = sortTasksByScheduleDateAndPriority;
  window.sortTasksByDueFollowupPriority = sortTasksByScheduleDateAndPriority;
  window.sortTasksByScheduleDateAndPriority = sortTasksByScheduleDateAndPriority;

  window.getGroups = function (groupBy) {
    const key = String(groupBy || 'today').toLowerCase();
    const groups = (typeof previousGetGroups === 'function') ? (previousGetGroups.apply(this, arguments) || []) : [];

    if (key === 'today') return buildTodayScheduleGroups(getUniqueTasks(groups));

    groups.forEach(group => {
      if (group && Array.isArray(group.tasks)) group.tasks = sortTasksByScheduleDateAndPriority(group.tasks);
    });

    return groups;
  };

  try { getGroups = window.getGroups; } catch (e) {}
})();
</script>

<script>

// V180 corrige V178: el RESUM depende de los filtros aplicados, no de grupos abiertos/cerrados
// ni de si una tarea compacta está expandida/replegada.
// Se calcula a partir de todas las RenderCard Task presentes en #cnt después del render filtrado.
(function initV178SummaryFromRenderedTasks(){
  function tfV178Today(){
    return (typeof todayIso === 'function') ? todayIso() : new Date().toISOString().slice(0, 10);
  }

  function tfV178Date(task, field){
    if (typeof getDailySummaryTaskDate === 'function') return getDailySummaryTaskDate(task, field);
    const value = task && task[field] ? String(task[field]) : '';
    const match = value.match(/\d{4}-\d{2}-\d{2}/);
    return match ? match[0] : '';
  }

  function tfV178PriorityWeight(task){
    if (typeof getDailySummaryTaskPriorityWeight === 'function') return getDailySummaryTaskPriorityWeight(task);
    const raw = String(task?.priority || '').trim().toUpperCase();
    if (raw === 'P1' || raw === '1') return 1;
    if (raw === 'P2' || raw === '2') return 2;
    if (raw === 'P3' || raw === '3') return 3;
    if (raw === 'P4' || raw === '4') return 4;
    return 99;
  }

  function tfV178AllTasks(){
    try { if (Array.isArray(TASKS)) return TASKS; } catch(e) {}
    return [];
  }

  function tfV178TaskById(id){
    if (!id) return null;
    return tfV178AllTasks().find(t => String(t?.task_id) === String(id)) || null;
  }

  // V180: no excloure cards per estat visual del grup ni per compact/expanded.
  // Si una RenderCard Task existeix dins #cnt, ha passat els filtres actuals i ha de comptar al RESUM.
  window.getRenderedTaskCardsForSummary = function(){
    return Array.from(document.querySelectorAll('#cnt .card[data-task-id]'));
  };

  window.getRenderedTasksForSummary = function(){
    const seen = new Set();
    return window.getRenderedTaskCardsForSummary()
      .map(card => card.getAttribute('data-task-id'))
      .filter(id => {
        if (!id || seen.has(String(id))) return false;
        seen.add(String(id));
        return true;
      })
      .map(tfV178TaskById)
      .filter(Boolean);
  };

  window.buildDailySummaryFromRenderedTasks = function(tasks){
    const today = tfV178Today();
    const renderedTasks = Array.isArray(tasks) ? tasks.filter(Boolean) : window.getRenderedTasksForSummary();

    const todayFollowups = renderedTasks.filter(t => tfV178Date(t, 'followup_date') === today);
    const overdueFollowups = renderedTasks.filter(t => {
      const d = tfV178Date(t, 'followup_date');
      return !!d && d < today;
    });
    const todayMeetings = renderedTasks.filter(t => String(t?.action_type || '').toLowerCase() === 'meeting' && tfV178Date(t, 'due_date') === today);
    const todayCalls = renderedTasks.filter(t => String(t?.action_type || '').toLowerCase() === 'call' && tfV178Date(t, 'due_date') === today);
    const todayDeadlines = renderedTasks.filter(t => {
      const actionType = String(t?.action_type || '').toLowerCase();
      return tfV178Date(t, 'due_date') === today && actionType !== 'meeting' && actionType !== 'call';
    });
    const highPriority = renderedTasks.filter(t => tfV178PriorityWeight(t) <= 2);

    return {
      today,
      renderedTasks,
      pendingCount: renderedTasks.length,
      overdueFollowupsCount: overdueFollowups.length,
      todayFollowupsCount: todayFollowups.length,
      todayMeetingsCount: todayMeetings.length,
      todayCallsCount: todayCalls.length,

  function tfV178Label(key, fallback){

      tfV178Metric('meeting', '📅', tfV178Label('SUMMARY_TODAY_MEETINGS', 'Reunions avui'), s.todayMeetingsCount),

      tfV178Metric('deadline', '⏰', tfV178Label('SUMMARY_VIEW_DEADLINES', 'Venciments avui'), s.todayDeadlinesCount),

  window.recalcDailySummaryFromRenderedTasks = function(){

// V225: All task orderings must prioritize nearest due date, then highest priority.

(function initV225UniversalDuePriorityOrdering(){
  'use strict';

  const originalSetSummaryViewFilter = window.setSummaryViewFilter;

  }

  }

  }

  function getFollowupDateSortValueSafe(task){

  }

  function getPrioritySortValue(task){
    if (typeof normalizeTaskPriority === 'function') return normalizeTaskPriority(task);
    const raw = String(task && task.priority || '').trim().toUpperCase();
    if (raw === 'P1' || raw === '1') return 1;
    if (raw === 'P2' || raw === '2') return 2;
    if (raw === 'P3' || raw === '3') return 3;
    if (raw === 'P4' || raw === '4') return 4;
    return 99;
  }

  function getResponsibleSortValueSafe(task){
    if (typeof getTaskResponsibleSortValue === 'function') return getTaskResponsibleSortValue(task);
    return 1;
  }

  function compareTasksByDueDateAndPriority(a, b){
    const dueDiff = getDueDateSortValue(a).localeCompare(getDueDateSortValue(b));
    if (dueDiff !== 0) return dueDiff;

    const priorityDiff = getPrioritySortValue(a) - getPrioritySortValue(b);
    if (priorityDiff !== 0) return priorityDiff;

    const responsibleDiff = getResponsibleSortValueSafe(a) - getResponsibleSortValueSafe(b);
    if (responsibleDiff !== 0) return responsibleDiff;

    const followupDiff = getFollowupDateSortValueSafe(a).localeCompare(getFollowupDateSortValueSafe(b));
    if (followupDiff !== 0) return followupDiff;

    return String(a && a.title || '').localeCompare(String(b && b.title || ''), window.LANG || 'ca');
  }

  function sortTasksByUniversalOrder(tasks){
    return (tasks || []).slice().sort(compareTasksByDueDateAndPriority);
  }

  window.sortTasksByPriorityAndDueDate = sortTasksByUniversalOrder;
  window.sortTasksByDueDateAndPriority = sortTasksByUniversalOrder;

  function summaryDate(task, field){
    if (typeof getDailySummaryTaskDate === 'function') return getDailySummaryTaskDate(task, field);

    const key = getActiveSummaryKey();
    if (isInactiveSummaryKey(key)) return sortedTasks;

    return sortedTasks
      .map((task, index) => ({ task, index, matched: summaryTaskMatches(task) ? 1 : 0 }))
      .sort((a, b) => {
        if (a.matched !== b.matched) return b.matched - a.matched;
        return a.index - b.index;
      })
      .map(item => item.task);

    return !!(group && Array.isArray(group.tasks) && group.tasks.some(summaryTaskMatches));
  }

      const nextGroup = Object.assign({}, group, {
        tasks: sortTasksWithSummaryAndUniversalOrder(group.tasks || [])

      return { group: nextGroup, index, matched: groupHasSummaryMatch(nextGroup) ? 1 : 0 };

      });
      index += 1;
    }

    const key = getActiveSummaryKey();
    if (isInactiveSummaryKey(key)) return;

        return a.index - b.index;
      })
      .forEach(group => {
        container.appendChild(group.header);
        container.appendChild(group.body);
      });
  }

    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { if (typeof originalApplySummaryHighlights === 'function') originalApplySummaryHighlights(); } catch(e) {}
      try { reorderRenderedCards(); } catch(e) {}
    }));
  }

  window.applySummaryHighlights = function(){
    if (typeof originalApplySummaryHighlights === 'function') originalApplySummaryHighlights.apply(this, arguments);
    reorderRenderedCards();
  };

  window.setSummaryViewFilter = function(filterKey, event){
    if (typeof originalSetSummaryViewFilter === 'function') originalSetSummaryViewFilter.apply(this, arguments);
    if (typeof render === 'function') render();
    reapplyOrderingAfterRender();
  };

  const previousRender = window.render;
  if (typeof previousRender === 'function' && !previousRender.__v225UniversalSortWrapped) {
    const wrappedRender = function(){
      const result = previousRender.apply(this, arguments);
      reapplyOrderingAfterRender();
      return result;
    };
    wrappedRender.__v225UniversalSortWrapped = true;
    window.render = wrappedRender;
  }
})();

    if (dueDiff !== 0) return dueDiff;

    const followupDiff = getFollowupDateValue(a).localeCompare(getFollowupDateValue(b));
    if (followupDiff !== 0) return followupDiff;

    const priorityDiff = getPriorityValue(a) - getPriorityValue(b);
    if (priorityDiff !== 0) return priorityDiff;

    const responsibleDiff = getResponsibleValue(a) - getResponsibleValue(b);
    if (responsibleDiff !== 0) return responsibleDiff;

    return String(a && a.title || '').localeCompare(String(b && b.title || ''), window.LANG || 'ca');
  }

  function sortTasksByDueFollowupPriority(tasks){
    return (tasks || []).slice().sort(compareTasksByDueFollowupPriority);
  }

  // Force all existing sorting entry points to use the new universal order.
  window.sortTasksByPriorityAndDueDate = sortTasksByDueFollowupPriority;
  window.sortTasksByDueDateAndPriority = sortTasksByDueFollowupPriority;
  window.sortTasksByDueFollowupPriority = sortTasksByDueFollowupPriority;

  function getTodayIsoSafe(){
    return (typeof todayIso === 'function') ? todayIso() : new Date().toISOString().slice(0, 10);
  }

  function summaryDate(task, field){
    if (typeof getDailySummaryTaskDate === 'function') return getDailySummaryTaskDate(task, field);
    return getDateForSort(task, field);
  }

  function summaryTaskMatches(task){
    const key = getActiveSummaryKey();
    if (!task || isInactiveSummaryKey(key)) return false;

    const today = getTodayIsoSafe();
    const actionType = String(task.action_type || '').toLowerCase();

    if (key === 'overdue') {
      const followupDate = summaryDate(task, 'followup_date');
      return !!followupDate && followupDate < today;
    }
    if (key === 'followup') return summaryDate(task, 'followup_date') === today;
    if (key === 'meeting') return actionType === 'meeting' && summaryDate(task, 'due_date') === today;
    if (key === 'call') return actionType === 'call' && summaryDate(task, 'due_date') === today;
    if (key === 'deadline') return summaryDate(task, 'due_date') === today && actionType !== 'meeting' && actionType !== 'call';
    if (key === 'priority') return getPriorityValue(task) <= 2;
    return false;
  }

  function sortTasksWithOptionalSummaryFirst(tasks){
    const sortedTasks = sortTasksByDueFollowupPriority(tasks);
    const key = getActiveSummaryKey();
    if (isInactiveSummaryKey(key)) return sortedTasks;

    return sortedTasks
      .map((task, index) => ({ task, index, matched: summaryTaskMatches(task) ? 1 : 0 }))
      .sort((a, b) => {
        if (a.matched !== b.matched) return b.matched - a.matched;
        return a.index - b.index;
      })
      .map(item => item.task);
  }

  function groupHasSummaryMatch(group){
    return !!(group && Array.isArray(group.tasks) && group.tasks.some(summaryTaskMatches));
  }

  window.getGroups = function(groupBy){
    const groups = (typeof previousGetGroups === 'function') ? (previousGetGroups.apply(this, arguments) || []) : [];
    const key = getActiveSummaryKey();

    const orderedGroups = groups.map((group, index) => {
      const nextGroup = Object.assign({}, group, {
        tasks: sortTasksWithOptionalSummaryFirst(group.tasks || [])
      });
      return { group: nextGroup, index, matched: groupHasSummaryMatch(nextGroup) ? 1 : 0 };
    });

    if (isInactiveSummaryKey(key)) return orderedGroups.map(item => item.group);

    return orderedGroups
      .sort((a, b) => {
        if (a.matched !== b.matched) return b.matched - a.matched;
        return a.index - b.index;
      })
      .map(item => item.group);
  };

  function findTaskById(taskId){
    try {
      return (Array.isArray(TASKS) ? TASKS : []).find(task => String(task && task.task_id) === String(taskId)) || null;
    } catch(e) {
      return null;
    }
  }

  function sortCardsByDueFollowupPriority(cards){
    const key = getActiveSummaryKey();
    return cards
      .map((card, index) => {
        const task = findTaskById(card.getAttribute('data-task-id'));
        return {
          card,
          index,
          task,
          matched: !isInactiveSummaryKey(key) && summaryTaskMatches(task) ? 1 : 0
        };
      })
      .sort((a, b) => {
        if (a.matched !== b.matched) return b.matched - a.matched;
        const taskDiff = compareTasksByDueFollowupPriority(a.task, b.task);
        if (taskDiff !== 0) return taskDiff;
        return a.index - b.index;
      })
      .map(item => item.card);
  }

  function reorderRenderedCards(){
    const container = document.getElementById('cnt');
    if (!container) return;

    const directCards = Array.from(container.querySelectorAll(':scope > .card[data-task-id]'));
    if (directCards.length) {
      sortCardsByDueFollowupPriority(directCards).forEach(card => container.appendChild(card));
      return;
    }

    const children = Array.from(container.children);
    const groupPairs = [];

    for (let index = 0; index < children.length; index += 1) {
      const header = children[index];
      const body = children[index + 1];
      if (!header || !body || !header.classList || !header.classList.contains('ghdr')) continue;

      const cards = Array.from(body.querySelectorAll(':scope > .card[data-task-id]'));
      sortCardsByDueFollowupPriority(cards).forEach(card => body.appendChild(card));

      groupPairs.push({
        header,
        body,
        index,
        matched: cards.some(card => summaryTaskMatches(findTaskById(card.getAttribute('data-task-id')))) ? 1 : 0
      });
      index += 1;
    }

    if (isInactiveSummaryKey(getActiveSummaryKey())) return;

    groupPairs
      .sort((a, b) => {
        if (a.matched !== b.matched) return b.matched - a.matched;
        return a.index - b.index;
      })
      .forEach(group => {
        container.appendChild(group.header);
        container.appendChild(group.body);
      });
  }

  function reapplyOrdering(){
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { if (typeof previousApplySummaryHighlights === 'function') previousApplySummaryHighlights(); } catch(e) {}
      try { reorderRenderedCards(); } catch(e) {}
    }));
  }

  window.applySummaryHighlights = function(){
    if (typeof previousApplySummaryHighlights === 'function') previousApplySummaryHighlights.apply(this, arguments);
    reorderRenderedCards();
  };

  window.setSummaryViewFilter = function(filterKey, event){
    if (typeof previousSetSummaryViewFilter === 'function') previousSetSummaryViewFilter.apply(this, arguments);
    if (typeof render === 'function') render();
    reapplyOrdering();
  };

  const previousRender = window.render;
  if (typeof previousRender === 'function' && !previousRender.__v227DueFollowupPrioritySortWrapped) {
    const wrappedRender = function(){
      const result = previousRender.apply(this, arguments);
      reapplyOrdering();
      return result;
    };
    wrappedRender.__v227DueFollowupPrioritySortWrapped = true;
    window.render = wrappedRender;
  }
})();
</script>

<script>
// V229: Replace legend emoji placeholders with the same icon HTML used by renderCard Task.
(function initV229LegendIconsFromTaskCard(){
  'use strict';

  function cleanClonedIcon(clone){
    if (!clone) return null;
    clone.removeAttribute('onclick');
    clone.removeAttribute('tabindex');
    clone.removeAttribute('data-focus-key');
    clone.removeAttribute('title');
    clone.removeAttribute('aria-label');
    clone.style.cursor = 'default';
    clone.style.pointerEvents = 'none';

    clone.querySelectorAll('.it,.ppill').forEach(node => node.remove());
    clone.querySelectorAll('span').forEach(node => {
      if (!node.querySelector('img,svg') && !node.classList.contains('pb') && !node.classList.contains('av')) {
        node.remove();
      }
    });
    clone.querySelectorAll('img,svg').forEach(icon => {
      icon.removeAttribute('title');
      icon.setAttribute('aria-hidden', 'true');
      if (icon.tagName && icon.tagName.toLowerCase() === 'img') icon.setAttribute('alt', '');
    });
    return clone;
  }

  function getIconFromTaskCard(selector){
    const source = document.querySelector(selector);
    if (!source) return '';
    const clone = cleanClonedIcon(source.cloneNode(true));
    return clone ? clone.outerHTML : '';
  }

  function getFallbackIcon(key){
    if (typeof IC === 'undefined') return '';
    if (key === 'LEG_FOLLOWUP') return IC.eye || '';
    if (key === 'LEG_DEADLINE') return IC.hg || '';
    if (key === 'LEG_COMMENTS') return IC.bbl || '';
    if (key === 'LEG_TIME') return IC.clk || '';
    if (key === 'LEG_EMAILS') return IC.lnk || '';
    if (key === 'LEG_PROVIDERS') return IC.shp || '';
    if (key === 'LEG_PRIORITY') return '<span class="pb p1">P1</span>';
    return '';
  }

  function getTaskCardIconHtml(key){
    const selectorByKey = {
      LEG_PRIORITY: 'Task priority',
      LEG_ASSIGNED: 'Assigned person',
      LEG_FOLLOWUP: 'Pending follow-up',
      LEG_DEADLINE: 'Due date',
      LEG_COMMENTS: 'Related comments',
      LEG_TIME: 'Logged time',
      LEG_EMAILS: 'Linked emails'emails\'"]',
      LEG_PROVIDERS: 'Linked providers'providers\'"]'
    };
    const selector = selectorByKey[key];
    return (selector ? getIconFromTaskCard(selector) : '') || getFallbackIcon(key);
  }

  window.applyLegendTaskCardIcons = function(){
    const pop = document.getElementById('legendQepop');
    if (!pop) return;

    pop.querySelectorAll('.leg-item').forEach(item => {
      const labelNode = item.querySelector('[data-i18n]');
      const key = labelNode ? labelNode.getAttribute('data-i18n') : '';
      if (!key) return;

      const iconHtml = getTaskCardIconHtml(key);
      if (!iconHtml) return;

      let iconWrap = item.querySelector('.legend-task-icon');
      if (!iconWrap) {
        iconWrap = document.createElement('span');
        iconWrap.className = 'legend-task-icon';
        const first = item.firstElementChild;
        if (first && first !== labelNode) first.replaceWith(iconWrap);
        else item.insertBefore(iconWrap, labelNode);
      }
      iconWrap.innerHTML = iconHtml;
    });

    try { if (typeof applyLegendIconHints === 'function') applyLegendIconHints(); } catch(e) {}
  };

  const previousOpenLegendQepop = window.openLegendQepop;
  window.openLegendQepop = function(triggerEl){
    if (typeof previousOpenLegendQepop === 'function') previousOpenLegendQepop.apply(this, arguments);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try { window.applyLegendTaskCardIcons(); } catch(e) {}
    }));
  };

  const previousRender = window.render;
  if (typeof previousRender === 'function' && !previousRender.__v229LegendIconsWrapped) {
    const wrappedRender = function(){
      const result = previousRender.apply(this, arguments);
      requestAnimationFrame(() => {
        try { window.applyLegendTaskCardIcons(); } catch(e) {}
      });
      return result;
    };
    wrappedRender.__v229LegendIconsWrapped = true;
    window.render = wrappedRender;
  }

  document.addEventListener('DOMContentLoaded', function(){
    requestAnimationFrame(() => {
      try { window.applyLegendTaskCardIcons(); } catch(e) {}
    });
  });
})();
</script>
<!-- === END TaskFlow V229 === -->

<!-- === TaskFlow V242: active email outline with any active task filter === -->
<script>
(function initEmailFilterDualStateV242(){
  function hasNonAllValues(values) {
    if (!Array.isArray(values)) return false;
    return values.some(value => String(value || '').toUpperCase() !== 'ALL');
  }

  function isSummaryFilterActive() {
    const key = String(window.summaryViewFilter || 'none').toLowerCase();
    return !!key && key !== 'none';
  }

  function isAnyTaskFilterActive() {
    if (isSummaryFilterActive()) return true;
    try { if (String(window.TASK_SEARCH_QUERY || '').trim()) return true; } catch (e) {}
    try { if (hasNonAllValues(window.TASK_FILTER_GROUP_VALUES)) return true; } catch (e) {}
    try { if (hasNonAllValues(window.TASK_FILTER_STATUS_VALUES)) return true; } catch (e) {}
    try {
      const todayFilter = String(window.todayViewFilter || 'all').toLowerCase();
      if (todayFilter && todayFilter !== 'all') return true;
    } catch (e) {}
    return false;
  }

  function getActiveEmailTaskIds() {
    try {
      if (typeof getSelectedEmailContextTaskIds === 'function') return getSelectedEmailContextTaskIds();
    } catch (e) {}
    return new Set();
  }

  function updateEmailFilterDualState() {
    const root = document.querySelector('.phone');
    const linkedTaskIds = getActiveEmailTaskIds();
    const dualActive = isAnyTaskFilterActive() && linkedTaskIds.size > 0;
    if (root) root.classList.toggle('email-filter-dual-active', dualActive);

    document.querySelectorAll('#cnt .card[data-task-id]').forEach(card => {
      const taskId = card.getAttribute('data-task-id');
      const linkedToActiveEmail = linkedTaskIds.has(taskId);
      const highlightedBySummary = card.classList.contains('card-summary-highlight');
      card.classList.toggle('card-email-summary-mismatch', dualActive && linkedToActiveEmail && !highlightedBySummary);
    });
  }

  window.updateEmailFilterDualState = updateEmailFilterDualState;

  function updateSoon() {
    requestAnimationFrame(() => {
      try { updateEmailFilterDualState(); } catch (e) {}
    });
  }

  const previousRender = window.render;
  if (typeof previousRender === 'function' && !previousRender.__v242EmailFilterDualWrapped) {
    const wrappedRender = function(...args) {
      const result = previousRender.apply(this, args);
      updateSoon();
      return result;
    };
    wrappedRender.__v242EmailFilterDualWrapped = true;
    window.render = wrappedRender;
  }

  const previousSetSummaryViewFilter = window.setSummaryViewFilter;
  if (typeof previousSetSummaryViewFilter === 'function' && !previousSetSummaryViewFilter.__v242EmailFilterDualWrapped) {
    const wrappedSetSummaryViewFilter = function(...args) {
      const result = previousSetSummaryViewFilter.apply(this, args);
      updateSoon();
      return result;
    };
    wrappedSetSummaryViewFilter.__v242EmailFilterDualWrapped = true;
    window.setSummaryViewFilter = wrappedSetSummaryViewFilter;
  }

  document.addEventListener('click', function(event) {
    if (event.target && event.target.closest && event.target.closest('.daily-summary-metric2,.filter-select,#task-search-clear')) {
      updateSoon();
    }
  }, true);
  document.addEventListener('input', function(event) {
    if (event.target && event.target.id === 'task-search-input') updateSoon();
  }, true);
  document.addEventListener('change', function(event) {
    if (event.target && event.target.closest && event.target.closest('.filter-select')) updateSoon();
  }, true);
  document.addEventListener('DOMContentLoaded', updateSoon);
  updateSoon();
})();
</script>
