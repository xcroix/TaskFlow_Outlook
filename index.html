// === AVUI V129: Resum com a qepop ancorat dins l'amplada de l'aplicació ===
// Comentarios en castellano
let todaySummaryLastTrigger = null;

function closeTodaySummaryQepop(returnFocus = true) {
  const pop = document.getElementById('todaySummaryQepop');
  if (!pop) return;
  pop.classList.remove('open');
  pop.setAttribute('aria-hidden', 'true');
  if (returnFocus && todaySummaryLastTrigger && typeof todaySummaryLastTrigger.focus === 'function') {
    requestAnimationFrame(() => todaySummaryLastTrigger.focus());
  }
}

function isTodaySummaryQepopOpen() {
  const pop = document.getElementById('todaySummaryQepop');
  return !!(pop && pop.classList.contains('open'));
}

function openTodaySummaryQepop(triggerEl) {
  // Si el resumen ya está abierto y se vuelve a pulsar RESUM, se cierra.
  const existingPop = document.getElementById('todaySummaryQepop');
  if (existingPop && existingPop.classList.contains('open') && todaySummaryLastTrigger === triggerEl) {
    closeTodaySummaryQepop(true);
    return;
  }
  todaySummaryLastTrigger = triggerEl;

  // Cerrar cualquier qepop abierto para evitar solapes.
  document.querySelectorAll('.qepop.open').forEach(p => {
    p.classList.remove('open');
    p.setAttribute('aria-hidden', 'true');
  });

  const pop = document.getElementById('todaySummaryQepop');
  const content = document.getElementById('todaySummaryContent');
  if (!pop || !content || !triggerEl) return;

  // Renderizar el mismo resumen diario, pero dentro del qepop y no dentro del overlay inferior.
  try {
    const summary = buildDailySummary();
    content.innerHTML = renderDailySummaryHtml(summary);
  } catch (e) {
    console.warn('[TaskFlow V129] Error renderizando resumen AVUI en qepop', e);
    content.innerHTML = '<div class="qepop-empty">No s’ha pogut carregar el resum.</div>';
  }

  const appRoot = triggerEl.closest('.phone') || document.querySelector('.phone') || document.body;
  const appRect = appRoot.getBoundingClientRect();
  const triggerRect = triggerEl.getBoundingClientRect();
  const margin = 10;
  const viewportH = window.innerHeight || document.documentElement.clientHeight;

  // Limitar la anchura al contenedor real del add-in, no al viewport completo.
  const maxAllowedWidth = Math.max(220, appRect.width - (margin * 2));
  pop.style.width = Math.min(360, maxAllowedWidth) + 'px';
  pop.style.maxWidth = maxAllowedWidth + 'px';
  pop.style.right = 'auto';
  pop.style.bottom = 'auto';

  // Abrir antes de medir para obtener dimensiones reales.
  pop.classList.add('open');
  pop.setAttribute('aria-hidden', 'false');

  const popRect = pop.getBoundingClientRect();
  const minLeft = appRect.left + margin + window.scrollX;
  const maxLeft = appRect.right - popRect.width - margin + window.scrollX;

  // Posición preferente: alineado con el botón, pero siempre dentro de .phone.
  let left = triggerRect.left + window.scrollX;
  left = Math.max(minLeft, Math.min(left, maxLeft));

  // Posición preferente: debajo del botón RESUM. Si no cabe, se abre encima.
  let top = triggerRect.bottom + window.scrollY + 6;
  if (top + popRect.height > viewportH - margin + window.scrollY) {
    top = Math.max(margin + window.scrollY, triggerRect.top + window.scrollY - popRect.height - 6);
  }

  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  requestAnimationFrame(() => pop.focus());
}

// === AVUI V129: cierre por Escape y click fuera ===

}, true);

// === V131 FIX: hints accessibles a les icones de la llegenda ===
// Comentarios en castellano
function applyLegendIconHints() {
    const fallbackLabels = {
    LEG_PRIORITY: 'Prioritat de la tasca',
    LEG_ASSIGNED: 'Persona assignada',
    LEG_FOLLOWUP: 'Seguiment pendent',
    LEG_DEADLINE: 'Data de venciment',
    LEG_COMMENTS: 'Comentaris associats',
    LEG_TIME: 'Temps registrat',
    LEG_EMAILS: 'Emails vinculats',
    LEG_PROVIDERS: 'Proveïdors vinculats'
  };

  document.querySelectorAll('#legendQepop .leg-item').forEach(item => {
    const labelNode = item.querySelector('[data-i18n]');
    const key = labelNode ? labelNode.getAttribute('data-i18n') : '';
    let label = '';

    if (labelNode) {
      label = (labelNode.textContent || '').trim();
      if (!label && typeof tr === 'function' && key) {
        label = tr(key);
        if (label && label !== key) {
          labelNode.textContent = label;
        }
      }
      if (!label || label === key) {
        label = fallbackLabels[key] || key || 'Llegenda';
        labelNode.textContent = label;
      }
    } else {
      label = (item.textContent || '').trim() || 'Llegenda';
    }

    const hint = label;
    item.setAttribute('title', hint);
    item.setAttribute('aria-label', hint);
    item.setAttribute('role', 'listitem');

    const icon = item.querySelector('img, svg');
    if (icon) {
      icon.setAttribute('title', hint);
      if (icon.tagName && icon.tagName.toLowerCase() === 'img') {
        icon.setAttribute('alt', hint);
      } else {
        icon.setAttribute('aria-label', hint);
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', function () {
  applyLegendIconHints();
});

<script>

// === V78: pop-down ancorat crear tasca ===
// Comentarios en castellano
let lastCreateButton = null;

function mountTaskFormPopdown(formConfig, panel) {
  if (!panel) return;
  panel.innerHTML = renderTaskForm(formConfig);
  captureTaskFormInitialState(panel);
  onRepeatToggle();
  onRepeatTypeChange();
  updateRepeatSummary();
  onFollowupToggle();
  onFollowupTypeChange();
  updateFollowupSummary();
  onCreateStatusChange();
  const firstField = panel.querySelector('#cf-title');
  if (firstField && typeof firstField.focus === 'function') requestAnimationFrame(() => firstField.focus());
}


// === V322: guard dirty task forms against accidental qepop close/back ===
// Comments in English. Prevent outside-click/back close after edits and warn before explicit close.
let TASK_FORM_DISCARD_CONFIRM_UNTIL = 0;

function getTaskFormFields(root) {
  if (!root) return [];
  return Array.from(root.querySelectorAll('input, textarea, select')).filter(el => {
    const type = String(el.type || '').toLowerCase();
    return type !== 'button' && type !== 'submit' && type !== 'reset';
  });
}

function getTaskFormFieldKey(el, index) {
  return el.id || el.name || `${el.tagName.toLowerCase()}_${index}`;
}

function getTaskFormFieldValue(el) {
  const type = String(el.type || '').toLowerCase();
  if (type === 'checkbox' || type === 'radio') return !!el.checked;
  return String(el.value ?? '');
}

function getTaskFormSnapshot(root) {
  const snapshot = {};
  getTaskFormFields(root).forEach((el, index) => {
    snapshot[getTaskFormFieldKey(el, index)] = getTaskFormFieldValue(el);
  });
  return snapshot;
}

function captureTaskFormInitialState(scope) {
  const form = scope && scope.querySelector ? scope.querySelector('.cf-wrap') : null;
  if (!form) return;
  form.dataset.taskFormInitial = JSON.stringify(getTaskFormSnapshot(form));
  form.dataset.taskFormDirty = 'false';
  const markDirty = () => {
    form.dataset.taskFormDirty = isTaskFormDirty(form) ? 'true' : 'false';
    TASK_FORM_DISCARD_CONFIRM_UNTIL = 0;
  };
  form.addEventListener('input', markDirty, true);
  form.addEventListener('change', markDirty, true);
}

function isTaskFormDirty(scope) {
  const form = scope && scope.matches && scope.matches('.cf-wrap')
    ? scope
    : (scope && scope.querySelector ? scope.querySelector('.cf-wrap') : null);
  if (!form || !form.dataset.taskFormInitial) return false;
  if (form.dataset.taskFormDirty === 'true') return true;
  try {
    const initial = JSON.parse(form.dataset.taskFormInitial || '{}');
    const current = getTaskFormSnapshot(form);
    return JSON.stringify(initial) !== JSON.stringify(current);
  } catch (e) {
    return false;
  }
}

function showTaskFormCloseWarning(scope) {
  const root = scope || document;
  const form = root.querySelector ? root.querySelector('.cf-wrap') : null;
  const container = form ? (form.parentElement || root) : root;
  let flash = container.querySelector ? container.querySelector('.cf-flash') : null;
  if (!flash && form) {
    flash = form.nextElementSibling && form.nextElementSibling.classList && form.nextElementSibling.classList.contains('cf-flash')
      ? form.nextElementSibling
      : null;
  }
  if (!flash) return;
  flash.className = 'cf-flash err';
  flash.setAttribute('role', 'alert');
  flash.setAttribute('aria-live', 'assertive');
  flash.textContent = 'Hi ha canvis sense desar. Si tanques, es perdran els canvis del formulari actiu. Torna a pitjar TORNAR o la X per tancar.';
  flash.style.display = 'block';
}

function canCloseDirtyTaskFormWithWarning(scope) {
  const root = scope || document;
  if (!root || !isTaskFormDirty(root)) return true;
  const now = Date.now();
  if (TASK_FORM_DISCARD_CONFIRM_UNTIL && now <= TASK_FORM_DISCARD_CONFIRM_UNTIL) {
    TASK_FORM_DISCARD_CONFIRM_UNTIL = 0;
    return true;
  }
  TASK_FORM_DISCARD_CONFIRM_UNTIL = now + 6000;
  showTaskFormCloseWarning(root);
  return false;
}

function requestTaskFormBackAction(button, actionCallback) {
  const root = button && button.closest
    ? button.closest('#qa-drop, .task-action-qepop, .email-action-qepop, #anchoredPanelQepop, #ovl, #ov')
    : null;
  if (!canCloseDirtyTaskFormWithWarning(root || document)) return false;
  if (typeof actionCallback === 'function') actionCallback();
  return false;
}

function requestCloseTaskCreatePopdown() {
  const drop = document.getElementById('qa-drop');
  if (!canCloseDirtyTaskFormWithWarning(drop)) return false;
  closeTaskCreatePopdown();
  return true;
}

function requestCloseOvWithWarning() {
  const root = document.getElementById('ovl');
  if (!canCloseDirtyTaskFormWithWarning(root)) return false;
  closeOv();
  return true;
}

function requestCloseOvFromBackdrop() {
  const root = document.getElementById('ovl');
  if (root && isTaskFormDirty(root)) return false;
  closeOv();
  return true;
}

function requestCloseTaskActionQepopWithWarning() {
  const panel = document.querySelector('.task-action-qepop.open');
  if (!canCloseDirtyTaskFormWithWarning(panel)) return false;
  closeTaskActionQepop();
  return true;
}

function requestCloseEmailActionQepopWithWarning() {
  const panel = document.querySelector('.email-action-qepop.open');
  if (!canCloseDirtyTaskFormWithWarning(panel)) return false;
  closeEmailActionQepop();
  return true;
}

function requestCloseAnchoredPanelQepopWithWarning(returnFocus = true) {
  const panel = document.getElementById('anchoredPanelQepop');
  if (!canCloseDirtyTaskFormWithWarning(panel)) return false;
  closeAnchoredPanelQepop(returnFocus);
  return true;
}

function closeTaskCreatePopdown() {
  const drop = document.getElementById('qa-drop');
  if (drop && drop.dataset.mode === 'task-create') {
    drop.classList.remove('open');
    drop.innerHTML = '';
    drop.setAttribute('role', 'menu');
    drop.setAttribute('aria-label', 'Accions ràpides');
    delete drop.dataset.mode;
    delete drop.dataset.taskId;
    delete drop.dataset.followupSourceTaskId;
    delete drop.dataset.followupSourceKind;
    drop.style.top = '';
    drop.style.bottom = '';
    drop.style.left = '';
    drop.style.right = '';
    drop.style.width = '';
    drop.style.maxHeight = '';
    drop.style.overflowY = '';
  }
  const panel = document.getElementById('taskCreatePopdown');
  if (panel) {
    panel.classList.add('hidden');
    panel.setAttribute('aria-hidden', 'true');
    panel.innerHTML = '';
  }
  if (lastCreateButton && typeof lastCreateButton.focus === 'function') requestAnimationFrame(() => lastCreateButton.focus());
}

function toggleTaskCreatePopdown(formConfig, triggerBtn) {
  const drop = document.getElementById('qa-drop');
  if (!drop) return;
  const trigger = triggerBtn || document.activeElement;
  const isOpen = drop.classList.contains('open') && drop.dataset.mode === 'task-create';
  if (isOpen) {
    closeTaskCreatePopdown();
    return;
  }
  lastCreateButton = trigger;
  try { closeOv(); } catch (e) {}
  try { closeSecondaryMenu(); } catch (e) {}
  try { closeAnchoredPanelQepop(false); } catch (e) {}
  closeQaDrop();
  drop.dataset.mode = 'task-create';
  drop.setAttribute('role', 'dialog');
  drop.setAttribute('aria-label', formConfig.overlayTitle || tr('OV_CREATE_TASK'));
  mountTaskFormPopdown(formConfig, drop);
  positionTaskCreateQaDrop(drop, trigger);
  drop.classList.add('open');
}

function positionTaskCreateQaDrop(drop, triggerEl) {
  if (!drop) return;
  const phone = document.querySelector('.phone') || document.body;
  const phoneRect = phone.getBoundingClientRect();
  const triggerRect = triggerEl && triggerEl.getBoundingClientRect ? triggerEl.getBoundingClientRect() : phoneRect;
  const margin = 10;
  const gap = 6;
  const maxWidth = Math.max(260, phoneRect.width - (margin * 2));
  const width = Math.min(430, maxWidth);
  const minLeft = margin;
  const maxLeft = Math.max(margin, phoneRect.width - width - margin);
  let left = triggerRect.left - phoneRect.left;
  left = Math.max(minLeft, Math.min(left, maxLeft));
  drop.style.left = left + 'px';
  drop.style.right = 'auto';
  drop.style.width = width + 'px';
  drop.style.bottom = 'auto';
  const viewportH = window.innerHeight || document.documentElement.clientHeight;
  const availableBelow = viewportH - triggerRect.bottom - margin;
  const availableAbove = triggerRect.top - margin;
  const maxHeight = Math.max(180, Math.min(560, Math.max(availableBelow, availableAbove) - gap));
  drop.style.maxHeight = maxHeight + 'px';
  drop.style.overflowY = 'auto';
  let top = triggerRect.bottom - phoneRect.top + gap;
  if (availableBelow < 260 && availableAbove > availableBelow) {
    top = Math.max(margin, triggerRect.top - phoneRect.top - maxHeight - gap);
  }
  drop.style.top = top + 'px';
}


document.addEventListener('click', function(ev) {
  const drop = document.getElementById('qa-drop');
  if (!drop || drop.dataset.mode !== 'task-create' || !drop.classList.contains('open')) return;
  const trigger = lastCreateButton;
  const clickedTrigger = trigger && trigger.contains && trigger.contains(ev.target);
  if (!drop.contains(ev.target) && !clickedTrigger) {
    if (isTaskFormDirty(drop)) {
      ev.preventDefault();
      ev.stopPropagation();
      return;
    }
    closeTaskCreatePopdown();
  }
});

document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') {
    const drop = document.getElementById('qa-drop');
    if (drop && drop.dataset.mode === 'task-create' && drop.classList.contains('open')) {
      ev.preventDefault();
      closeTaskCreatePopdown();
    }
  }
});

// === V128 estado busqueda y filtro origen ===
// Comentarios en castellano
if (typeof TASK_SEARCH_QUERY === 'undefined') var TASK_SEARCH_QUERY = '';
if (typeof taskSearchTimer === 'undefined') var taskSearchTimer = null;

function taskMatchesSearch(task, query) {
  if (!query) return true;
  const texts = [];
  for (const k in task) {
    const v = task[k];
    if (typeof v === 'string') texts.push(v);
    else if (Array.isArray(v)) {
      v.forEach(x => {
        if (typeof x === 'string') texts.push(x);
        else if (x && typeof x === 'object') Object.values(x).forEach(y => { if (typeof y === 'string') texts.push(y); });
      });
    }
  }
  return texts.some(t => t.toLowerCase().includes(query));
}

function getTasksForRender() {
  if (!TASK_SEARCH_QUERY) return TASKS;
  return TASKS.filter(t => taskMatchesSearch(t, TASK_SEARCH_QUERY));
}

<script>
  /* Deshabilitar dialogs bloquejants (Outlook-safe) */
  window.alert = msg => console.log('[TaskFlow]', msg);
  window.confirm = msg => { console.log('[TaskFlow confirm]', msg); return true; };
  window.prompt = msg => { console.log('[TaskFlow prompt]', msg); return null; };

  function showToast(message, type = 'info') {
    console.log('[TaskFlow toast]', type, message);
  }

  const isOutlook =
    typeof Office !== 'undefined' &&
    Office.context &&
    Office.context.mailbox;

  if (isOutlook) {
    document.documentElement.classList.add('outlook-host');
  }
let currentEmailContext = null;
  Office?.onReady?.(() => {
    if (!isOutlook) return;
    try {
      const item = Office.context.mailbox.item;
      currentEmailContext = {
        subject: item.subject || null,
        from: item.from?.emailAddress?.address || null,
        internetMessageId: item.internetMessageId || null
      };
    } catch (e) {
      console.warn('No email context', e);
    }

    // Soporte para panel anclado (SupportsPinning):
    // cuando el usuario cambia de correo sin cerrar el panel, recargamos el contexto.
    try {
      Office.context.mailbox.addHandlerAsync(
        Office.EventType.ItemChanged,
        async function () {
          try {
            const item = Office.context.mailbox.item;
            if (item) {
              currentEmailContext = {
                subject: item.subject || null,
                from: item.from?.emailAddress?.address || null,
                internetMessageId: item.internetMessageId || null
              };
              await tfLoadEmailFromOffice();
            } else {
              // Outlook puede entregar item = null durante el cambio de correo. No borramos el último email válido.
              await tfLoadEmailFromOffice(0, { reason: 'itemchanged-null-item' });
            }
          } catch (e) {
            console.warn('[TaskFlow] ItemChanged error', e);
          }
          try { render(); } catch (e) {}
        }
      );
    } catch (e) {
      console.warn('[TaskFlow] addHandlerAsync not available', e);
    }
  });
</script>

<script>
// ===== TaskFlow V111 Preferencias de usuario =====
// Comentarios en castellano

const DEFAULT_USER_PREFERENCES = {
  language: 'ca',
  defaultTimeMinutes: { meeting: 60, call: 30, task: 30 },
  outlookRules: {
    flaggedEmail: 'followup',
    pinnedEmail: 'responsible',
    categoryEmail: 'project'
  },
  defaultFollowupDays: 1,
  workHoursStart: '08:00',
  workHoursEnd: '19:00',
  meetingMinuteStep: 15,
  stickyTopEnabled: true,
  showOnlyProjectTasksWhenEmailLinked: true
};

function loadUserPreferences() {
  try {
    const raw = localStorage.getItem('taskflow_user_preferences');
    if (!raw) return structuredClone(DEFAULT_USER_PREFERENCES);

    const parsed = JSON.parse(raw) || {};
    return {
      ...DEFAULT_USER_PREFERENCES,
      ...parsed,
      defaultTimeMinutes: {
        ...DEFAULT_USER_PREFERENCES.defaultTimeMinutes,
        ...(parsed.defaultTimeMinutes || {})
      },
      outlookRules: {
        ...DEFAULT_USER_PREFERENCES.outlookRules,
        ...(parsed.outlookRules || {})
      }
    };
  } catch (e) {
    return structuredClone(DEFAULT_USER_PREFERENCES);
  }
}

function saveUserPreferences(prefs) {
  localStorage.setItem('taskflow_user_preferences', JSON.stringify(prefs));
}


// === V128 debounce busqueda ===
// Comentarios en castellano
document.addEventListener('input', function (ev) {
  if (ev.target && ev.target.id === 'task-search-input') {
    clearTimeout(taskSearchTimer);
    taskSearchTimer = setTimeout(() => {
      TASK_SEARCH_QUERY = ev.target.value.trim().toLowerCase();
      if (typeof render === 'function') render();
    }, 300);
  }
});

// ===== TaskFlow V111 · Utilities namespace =====
// Comentarios en castellano: utilidades agrupadas para evitar contaminar window.
window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.utils = window.TaskFlow.utils || {};
Object.assign(window.TaskFlow.utils, {
  getLocalNowIso() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  },

  addDaysIso(baseIso, days) {
    const d = new Date(`${baseIso}T00:00:00`);
    d.setDate(d.getDate() + days);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  },

  getActionTypeFromCategory(category) {
    const cat = String(category || '').toLowerCase();
    if (cat === 'meeting' || cat === 'reunio' || cat === 'reunión') return 'meeting';
    if (cat === 'call' || cat === 'trucada' || cat === 'llamada') return 'call';
    if (cat === 'followup' || cat === 'seguiment' || cat === 'seguimiento') return 'followup';
    return 'task';
  },

  getLegacyCategoryFromActionType(actionType) {
    const type = String(actionType || '').toLowerCase();
    if (type === 'meeting') return 'Meeting';
    if (type === 'call') return 'Call';
    return 'Task';
  },

  normalizeTaskSchema(task) {
    if (!task || typeof task !== 'object') return task;
    if (!task.action_type) {
      task.action_type = window.TaskFlow.utils.getActionTypeFromCategory(task.outlook_category || task.category || 'Task');
    }
    if (typeof task.expected_minutes !== 'number') {
      task.expected_minutes = 0;
    }
    if (typeof task.spent_minutes !== 'number') {
      task.spent_minutes = typeof task.time_minutes === 'number' ? task.time_minutes : 0;
    }
    // Alias legacy
    task.time_minutes = task.spent_minutes;
    if (!task.created_at_local) {
      task.created_at_local = task.created_at ? String(task.created_at).replace('Z', '') : window.TaskFlow.utils.getLocalNowIso();
    }
    if (!task.updated_at_local) {
      task.updated_at_local = task.updated_at ? String(task.updated_at).replace('Z', '') : task.created_at_local;
    }
    if (task.action_type === 'followup') {
      if (task.title && !/^SEGUIMENT\s*:/i.test(task.title)) {
        task.title = `SEGUIMENT: ${task.title}`;
      }
      const minDays = Math.max(1, +(window.userPreferences?.defaultFollowupDays || 1));
      if (!task.followup_date) {
        task.followup_date = window.TaskFlow.utils.addDaysIso(todayIso(), minDays);
      }
    }
    task.outlook_category = window.TaskFlow.utils.getLegacyCategoryFromActionType(task.action_type);
    return task;
  },

  migrateTaskCollections() {
    try {
      if (Array.isArray(TASKS)) TASKS.forEach(window.TaskFlow.utils.normalizeTaskSchema);
    } catch (e) {
      console.warn('[TaskFlow V111] Error normalizando tareas', e);
    }
  }
});
window.userPreferences = loadUserPreferences();

if (window.userPreferences.language) {
  try { setLanguage(window.userPreferences.language);
// === V128 i18n SEARCH ===
// Comentarios en castellano
I18N.ca.SEARCH_NO_RESULTS = 'No hi ha resultats';
I18N.es.SEARCH_NO_RESULTS = 'No hay resultados';
I18N.en.SEARCH_NO_RESULTS = 'No results';
 } catch (e) {}
}
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#F0EEE9;--sf:#FFF;--sf2:#F6F5F2;--sf3:#ECEAE5;
 --bd:#E3E0D8;--bd2:#CCC9C0;
 --t:#1C1917;--t2:#6B6760;--t3:#A8A49D;
 --ac:#2B5CE6;--ac-s:#EEF2FE;
 --re:#DC2626;--am:#D97706;--color-green:#16A34A;--pu:#7C3AED;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);margin:0;padding:0}
.phone{width:100%;max-width:480px;background:var(--bg);border-radius:18px;overflow:hidden;box-shadow:none;min-height:100vh;display:flex;flex-direction:column;position:relative}
.logo{display:flex;align-items:center;gap:7px}
.lm{width:30px;height:30px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center}
.lt{font-size:16px;font-weight:600;color:var(--t);letter-spacing:-.3px}
.gbar{padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.gl{font-size:11px;font-weight:600;color:var(--t3);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.gsw{position:relative;flex:1}
.gs{width:100%;padding:6px 28px 6px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);font-size:13px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;color:var(--t);cursor:pointer;appearance:none;outline:none;transition:border .15s}

/* === V112: Rediseño nativo de tarjetas, metadatos y elementos vinculados === */
/* Comentarios en castellano: estos estilos no modifican la leyenda ni sus iconos. */
.card{
  position:relative;
  margin:0 10px 7px;
  border:1px solid var(--bd);
  border-left-color:transparent;
  border-radius:12px;
  background:var(--sf);
  box-shadow:0 1px 2px rgba(28,25,23,.035);
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:3px;
  border-radius:999px;
  background:#D8D5CE;
}
.card.task-priority-1::before{background:#E87979;}
.card.task-priority-2::before{background:#F2A65A;}
.card.task-priority-3::before{background:#E6C15A;}
.card.task-priority-4::before{background:#C9C5BC;}
.card:hover{
  border-color:#D8DDF7;
  box-shadow:0 3px 12px rgba(28,25,23,.07);
}
.card.card-linked-from-email{
  border-color:#D8DDF7;
  box-shadow:0 3px 12px rgba(43,92,230,.08);
  background:#FCFDFF;
}
.card.card-linked-from-email::before{background:#7B8DE8;}
.fbar{
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:3px;
  height:auto;
  border-radius:999px;
  background:#C9C5BC;
  z-index:1;
}
.ci{padding:10px 11px 9px 14px;}
.cr1{gap:8px;margin-bottom:8px;align-items:flex-start;}
.ck{width:16px;height:16px;border-radius:5px;border-color:#C8C4BC;background:#fff;}
.ctit{font-size:13.25px;font-weight:650;line-height:1.35;color:var(--t);}
.ir{

  padding-left:24px;

}
.ic{

}
.ic svg,
.ic img{opacity:.72;}
.it{font-size:10.5px;color:var(--t2);font-weight:650;}
.pb{

.p3{background:#FFF7D6;color:#946200;border-color:#F2DEA3;}
.p4{background:#F0EFEC;color:#77726B;border-color:#DFDCD5;}
.av{

}

.task-rel-wrap{

/* === V112: Título y tarjeta nativa para EMAIL ACTIVO === */
/* Comentarios en castellano: se mantiene la leyenda intacta. */
.email-active-title{
  display:flex;
  align-items:center;
  gap:6px;
  padding:2px 2px 8px;
  font-size:11px;
  font-weight:800;
  color:#6B6760;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.email-active-title::before{
  content:"✉";
  color:#7C3AED;
  font-size:12px;
  line-height:1;
}
.email-active-card{
  margin:0;
  border-radius:12px;
}
.email-active-card::before{background:#9A7AEA;}


/* === V121: Vista compacta de renderCard Task con toggle por clic === */
/* Comentarios en castellano: la tarjeta muestra una fila compacta y revela la renderCard completa solo al hacer clic. */
.task-compact-row{
  display:grid;
  grid-template-columns:minmax(0,60%) minmax(78px,1fr) auto;
  align-items:center;
  gap:8px;
  min-height:39px;
  padding:9px 10px 9px 14px;
  cursor:default;
  outline:none;
}
.task-compact-row:focus-visible{
  outline:2px solid var(--ac);
  outline-offset:-2px;
  border-radius:10px;
}
.task-compact-title{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:13px;
  font-weight:700;
  color:var(--t);
  line-height:1.2;
}
.task-compact-due{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:0;
  justify-self:start;
  font-size:11px;
  font-weight:750;
  white-space:nowrap;
}
.task-compact-due svg,
.task-compact-due img{
  width:13px!important;
  height:13px!important;
  flex:0 0 auto;
  opacity:.72;
}
.task-compact-priority{
  justify-self:end;
  flex:0 0 auto;
  min-width:28px;
  height:19px;
}
.card .ci{
  display:none;
}
.card:hover .task-compact-row{
  display:none;
}
.card:hover .ci,
.card:focus-within .ci{
  display:block;
}
.card:focus-within .task-compact-row{
  border-bottom:1px solid var(--bd);
}
@media (hover:none){
  .card .ci{display:block;}
  .card .task-compact-row{display:none;}
}


/* === V115: expansión/retreure compacta por clic, no por hover === */
/* Comentarios en castellano: hover no abre la tarjeta; compact-expanded mantiene la versión completa visible hasta el siguiente clic. */
.task-compact-row{cursor:pointer;}
.card:hover .task-compact-row,
.card:focus-within .task-compact-row{
  display:grid;
}
.card:hover .ci,
.card:focus-within .ci{
  display:none;
}
.card.compact-expanded .task-compact-row,
.card.compact-expanded:hover .task-compact-row,
.card.compact-expanded:focus-within .task-compact-row{
  display:none;
}
.card.compact-expanded .ci,
.card.compact-expanded:hover .ci,
.card.compact-expanded:focus-within .ci{
  display:block;
}
.card.compact-expanded{
  box-shadow:0 3px 12px rgba(28,25,23,.07);
}


/* === V119: las tareas asociadas al email activo se muestran siempre extendidas === */
/* Comentarios en castellano: se evita que una tarea vinculada al email activo quede oculta en formato compacto. */
.card.card-linked-from-email.compact-expanded .ci{
  display:block;
}
.card.card-linked-from-email.compact-expanded .task-compact-row{
  display:none;
}


/* === V121: fix email activo visible con tarjetas compactas === */
/* Comentarios en castellano: la vista compacta solo debe afectar a renderCard Task, no a la tarjeta del email activo. */
.email-active-card .ci,
.email-active-card:hover .ci,
.email-active-card:focus-within .ci{
  display:block!important;
}
.email-active-card .task-compact-row,
.email-active-card:hover .task-compact-row,
.email-active-card:focus-within .task-compact-row{
  display:none!important;
}

/* === AVUI V129: bimbolles rectangulars lleument arrodonides a la capçalera AVUI === */
/* Comentarios en castellano: se usa una burbuja rectangular discreta para los indicadores de AVUI. */
.today-view-head-row .today-view-count,
.today-view-head-row .today-view-chip,
.today-view-head-row .today-summary-btn {

<!-- === TaskFlow V201: Sync infrastructure (no behavior change) === -->
<script>
// ===== TaskFlow V201 · Sync infrastructure =====
// Comments in English. No runtime behavior changes.

window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.sync = window.TaskFlow.sync || {};

// Global sync flags
window.TaskFlow.sync.sharepointOffline = false;
window.TaskFlow.sync.indexeddbOffline = false;

// Utility: generate UUID (client side mutation id)
window.TaskFlow.sync.generateUUID = function () {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
};

// Normalize sync fields for any entity
window.TaskFlow.sync.normalizeSyncFields = function (entity) {
  if (!entity || typeof entity !== 'object') return entity;

  return Object.assign({}, entity, {
    sync_status: entity.sync_status || 'synced',
    last_synced_at: entity.last_synced_at || null,
    last_sync_source: entity.last_sync_source || null,
    client_mutation_id: entity.client_mutation_id || window.TaskFlow.sync.generateUUID(),
    sharepoint_item_id: entity.sharepoint_item_id || null,
    sharepoint_modified_at: entity.sharepoint_modified_at || null,
    version_token: entity.version_token || null,
    deleted_flag: entity.deleted_flag === true
  });
};
</script>


<!-- === TaskFlow V203: Outbox (pending_operations) === -->
<script>
// ===== TaskFlow V203 · Outbox =====
// In-memory queue in this bundle (no persistent store yet).

window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.outbox = window.TaskFlow.outbox || {};
window.TaskFlow.outbox._queue = window.TaskFlow.outbox._queue || [];

window.TaskFlow.outbox.enqueue = async function (op) {
  if (!op || typeof op !== 'object') return;
  const record = {
    id: window.TaskFlow.sync.generateUUID(),
    entity_type: op.entity_type,
    entity_id: op.entity_id || null,
    operation: op.operation, // create | update | delete
    payload: op.payload || null,
    created_at: new Date().toISOString()
  };
  window.TaskFlow.outbox._queue.push(record);
  return record;
};

window.TaskFlow.outbox.getAll = async function () {
  return window.TaskFlow.outbox._queue.slice();
};

window.TaskFlow.outbox.removeById = async function (id) {
  const q = window.TaskFlow.outbox._queue;
  const idx = q.findIndex(x => x && x.id === id);
  if (idx >= 0) q.splice(idx, 1);
};
</script>

window.TaskFlow.sharepoint.checkHealth = async function () {

<!-- === TaskFlow V205: Push outbox to SharePoint (Graph) === -->
<script>
// ===== TaskFlow V205 · Push outbox to SharePoint =====

window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.sharepoint = window.TaskFlow.sharepoint || {};

window.TaskFlow.sharepoint.config = {
  graphBaseUrl: 'https://graph.microsoft.com/v1.0',
  tenantHost: 'grupopinero.sharepoint.com',
  sitePath: '/sites/TaskFlow_Outlook',
  lists: {
    tasks: 'TF_Tasks',
    relations: 'TF_Relations',
    comments: 'TF_Comments',
    emails: 'TF_Emails',
    people: 'TF_People',
    projects: 'TF_Projects',
    providers: 'TF_Providers',
    time_entries: 'TF_TimeEntries'
  }
};

window.TaskFlow.sharepoint.getGraphToken = function () {
  return new Promise((resolve, reject) => {
    if (typeof OfficeRuntime !== 'undefined' && OfficeRuntime.auth && typeof OfficeRuntime.auth.getAccessToken === 'function') {
      OfficeRuntime.auth.getAccessToken({ allowSignInPrompt: true }).then(resolve).catch(reject);
      return;
    }
    try {
      if (typeof Office !== 'undefined' && Office.context && Office.context.auth && typeof Office.context.auth.getAccessTokenAsync === 'function') {
        Office.context.auth.getAccessTokenAsync({ allowSignInPrompt: true }, function (res) {
          if (res && res.status === 'succeeded') resolve(res.value);
          else reject(res && res.error ? res.error : new Error('getAccessTokenAsync failed'));
        });
        return;
      }
    } catch (e) {}
    reject(new Error('No Office token provider available'));
  });
};

window.TaskFlow.sharepoint._cache = window.TaskFlow.sharepoint._cache || { siteId: null, listIds: {} };

window.TaskFlow.sharepoint.graphFetch = async function (token, path, options = {}) {
  const url = window.TaskFlow.sharepoint.config.graphBaseUrl + path;
  const headers = Object.assign({
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/json'
  }, options.headers || {});
  const res = await fetch(url, Object.assign({}, options, { headers }));
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    const err = new Error('Graph error ' + res.status + ' ' + res.statusText);
    err.status = res.status;
    err.body = txt;
    throw err;
  }
  if (res.status === 204) return null;
  return await res.json();
};

window.TaskFlow.sharepoint.resolveSiteId = async function (token) {
  if (window.TaskFlow.sharepoint._cache.siteId) return window.TaskFlow.sharepoint._cache.siteId;
  const cfg = window.TaskFlow.sharepoint.config;
  const data = await window.TaskFlow.sharepoint.graphFetch(token, `/sites/${cfg.tenantHost}:${cfg.sitePath}`, { method: 'GET' });
  window.TaskFlow.sharepoint._cache.siteId = data && data.id;
  return window.TaskFlow.sharepoint._cache.siteId;
};

window.TaskFlow.sharepoint.resolveListId = async function (token, entityType) {
  const cfg = window.TaskFlow.sharepoint.config;
  const listName = cfg.lists[entityType];
  if (!listName) throw new Error('No SharePoint list mapping for entityType: ' + entityType);
  const cached = window.TaskFlow.sharepoint._cache.listIds[listName];
  if (cached) return cached;
  const siteId = await window.TaskFlow.sharepoint.resolveSiteId(token);
  const data = await window.TaskFlow.sharepoint.graphFetch(token, `/sites/${siteId}/lists/${encodeURIComponent(listName)}`, { method: 'GET' });
  const listId = data && data.id;
  window.TaskFlow.sharepoint._cache.listIds[listName] = listId;
  return listId;
};

window.TaskFlow.sharepoint.createItem = async function (token, entityType, payload) {
  const siteId = await window.TaskFlow.sharepoint.resolveSiteId(token);
  const listId = await window.TaskFlow.sharepoint.resolveListId(token, entityType);

  const fields = Object.assign({}, payload);
  Object.keys(fields).forEach(k => {
    const v = fields[k];
    if (v && typeof v === 'object') {
      try { fields[k] = JSON.stringify(v); } catch { fields[k] = String(v); }
    }
  });

  const created = await window.TaskFlow.sharepoint.graphFetch(token, `/sites/${siteId}/lists/${listId}/items`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  return created;
};
</script>

<script>
// ===== TaskFlow V206 · Pull incremental =====

window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.db = window.TaskFlow.db || {};

window.TaskFlow.db.put = async function (storeName, obj) {
  try {
    if (typeof openTaskFlowDb !== 'function') return false;
    const db = await openTaskFlowDb();
    if (!db) return false;
    return await new Promise((resolve) => {
      const tx = db.transaction([storeName], 'readwrite');
      const store = tx.objectStore(storeName);
      const req = store.put(obj);
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch (e) {
    console.warn('[TaskFlow V206] IndexedDB put failed', e);
    return false;
  }
};

window.TaskFlow.db.getAll = async function (storeName) {
  try {
    if (typeof openTaskFlowDb !== 'function') return [];
    const db = await openTaskFlowDb();
    if (!db) return [];
    return await new Promise((resolve) => {
      const tx = db.transaction([storeName], 'readonly');
      const store = tx.objectStore(storeName);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  } catch (e) {
    console.warn('[TaskFlow V206] IndexedDB getAll failed', e);
    return [];
  }
};
</script>

<!-- === TaskFlow V208: Bootstrap IndexedDB -> SharePoint (first Outlook run) === -->
<script>
// ===== TaskFlow V208 · Bootstrap IndexedDB -> SharePoint =====
// Single responsibility: migrate existing IndexedDB entities to SharePoint on first Outlook run.
// Idempotent gate: localStorage flag sp_bootstrap_completed.
// No UI changes.

window.TaskFlow = window.TaskFlow || {};
window.TaskFlow.bootstrap = window.TaskFlow.bootstrap || {};

window.TaskFlow.bootstrap.flags = {
  completedKey: 'sp_bootstrap_completed',
  completedAtKey: 'sp_bootstrap_completed_at'
};

window.TaskFlow.bootstrap.isCompleted = function () {
  try { return localStorage.getItem(window.TaskFlow.bootstrap.flags.completedKey) === 'true'; } catch (e) { return false; }
};

window.TaskFlow.bootstrap.markCompleted = function () {
  try {
    localStorage.setItem(window.TaskFlow.bootstrap.flags.completedKey, 'true');
    localStorage.setItem(window.TaskFlow.bootstrap.flags.completedAtKey, new Date().toISOString());
  } catch (e) {}
};

window.TaskFlow.bootstrap.run = async function () {
  // Only meaningful in Outlook where we can get a token.
  const isOutlook = (typeof Office !== 'undefined' && Office.context && Office.context.mailbox) || (typeof OfficeRuntime !== 'undefined');
  if (!isOutlook) return { ok: false, reason: 'not_outlook', created: 0, skipped: 0, failed: 0 };

  if (window.TaskFlow.bootstrap.isCompleted()) {
    return { ok: true, reason: 'already_completed', created: 0, skipped: 0, failed: 0 };
  }

  if (window.TaskFlow.sync && window.TaskFlow.sync.sharepointOffline) {
    return { ok: false, reason: 'sharepoint_offline', created: 0, skipped: 0, failed: 0 };
  }

  let token;
  try {
    token = await window.TaskFlow.sharepoint.getGraphToken();
  } catch (e) {
    window.TaskFlow.sync.sharepointOffline = true;
    return { ok: false, reason: 'no_token', created: 0, skipped: 0, failed: 0 };
  }

  const storeNames = ['projects','people','providers','emails','comments','time_entries','tasks','relations'];

  let created = 0;
  let skipped = 0;
  let failed = 0;

  for (const storeName of storeNames) {
    // Store name must match sharepoint config key for list mapping.
    if (!window.TaskFlow.sharepoint.config || !window.TaskFlow.sharepoint.config.lists || !window.TaskFlow.sharepoint.config.lists[storeName]) {
      // Not mapped => skip.
      continue;
    }

    const records = await window.TaskFlow.db.getAll(storeName);
    for (const rec0 of records) {
      const rec = window.TaskFlow.sync.normalizeSyncFields(rec0 || {});

      // If already has SharePoint id, skip (idempotent)
      if (rec.sharepoint_item_id) {
        skipped += 1;
        continue;
      }

      try {
        // Mark as pending during migration attempt
        rec.sync_status = 'pending';
        rec.last_sync_source = 'indexeddb_bootstrap';

        const createdItem = await window.TaskFlow.sharepoint.createItem(token, storeName, rec);

        // Persist SharePoint identifiers back to IndexedDB
        rec.sharepoint_item_id = createdItem && createdItem.id ? String(createdItem.id) : null;

// =============================================================================
// UTILITY
// =============================================================================

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])
  );
}

function getInitials(name) {
  return String(name || '').trim().split(/\s+/).slice(0, 2)
    .map(p => p[0]?.toUpperCase() || '').join('');
}

function colorFromString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${(h % 360 + 360) % 360}, 60%, 45%)`;
}

function shortId(s) {
  if (!s) return '';
  const str = String(s);
  return str.length > 18 ? (str.slice(0,9) + '…' + str.slice(-8)) : str;
}

function dateToIsoLocal(dateObj) {
  if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return null;
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth() + 1).padStart(2, '0');
  const d = String(dateObj.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function currentDateTimeLocal() {
  const dt = new Date();
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  const hh = String(dt.getHours()).padStart(2, '0');
  const mm = String(dt.getMinutes()).padStart(2, '0');
  const ss = String(dt.getSeconds()).padStart(2, '0');
  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}
function todayIso() {
  return dateToIsoLocal(new Date());
}


// === V176: demà laboral per a la vista AVUI ===
// Comentarios en castellano: en la vista por agrupador AVUI, si hoy es viernes, sábado o domingo,
// "mañana" debe considerarse el lunes siguiente. De lunes a jueves, se mantiene mañana real.
function getTomorrowForTodayView(baseIso = todayIso()) {
  const baseDate = new Date(String(baseIso) + 'T00:00:00');
  const day = baseDate.getDay(); // 0 domingo, 1 lunes, ... 5 viernes, 6 sábado

  if (day === 5) return window.TaskFlow.utils.addDaysIso(baseIso, 3); // viernes -> lunes
  if (day === 6) return window.TaskFlow.utils.addDaysIso(baseIso, 2); // sábado -> lunes
  if (day === 0) return window.TaskFlow.utils.addDaysIso(baseIso, 1); // domingo -> lunes

  return window.TaskFlow.utils.addDaysIso(baseIso, 1);
}


// =============================================================================
// V88 — Propuesta 1.4: abrir emails vinculados en Outlook Web
// =============================================================================

// Comentarios en castellano
function getOutlookItemIdentifierForEmail(email) {
  if (!email) return '';
  return String(
    email.ews_item_id ||
    email.item_id ||
    email.rest_id ||
    email.internet_message_id ||
    ''
  ).trim();
}

// Comentarios en castellano
function openEmailInOutlookWeb(emailId) {
  const email = findById(emailId);
  const rawId = getOutlookItemIdentifierForEmail(email);
  if (!rawId) {
    try { showToast(tr('WARN_OPEN_OUTLOOK_UNAVAILABLE'), 'info'); } catch (e) {}
    return false;
  }

  let restId = rawId;
  try {
    if (typeof Office !== 'undefined' &&
        Office.context &&
        Office.context.mailbox &&
        typeof Office.context.mailbox.convertToRestId === 'function' &&
        Office.MailboxEnums &&
        Office.MailboxEnums.RestVersion) {
      restId = Office.context.mailbox.convertToRestId(rawId, Office.MailboxEnums.RestVersion.v2_0);
    }
  } catch (e) {
    restId = rawId;
  }

  const url = 'https://outlook.office.com/mail/deeplink/read/' + encodeURIComponent(restId);
  try {
    if (typeof Office !== 'undefined' &&
        Office.context &&
        Office.context.ui &&
        typeof Office.context.ui.openBrowserWindow === 'function') {
      Office.context.ui.openBrowserWindow(url);
    } else {
      window.open(url, '_blank');
    }
  } catch (e) {
    window.open(url, '_blank');
  }
  return true;
}

// =============================================================================
// V88 — Propuesta 1.5: ajustar data limite si cae en fin de semana
// =============================================================================

// Comentarios en castellano
function adjustToWeekdayIfWeekend(isoDate) {
  if (!isoDate) return { adjusted: isoDate, wasWeekend: false, original: isoDate };
  const date = new Date(isoDate + 'T00:00:00');
  const day = date.getDay();
  if (day === 6) {
    date.setDate(date.getDate() - 1);
    return { adjusted: dateToIsoLocal(date), wasWeekend: true, original: isoDate };
  }
  if (day === 0) {
    date.setDate(date.getDate() - 2);
    return { adjusted: dateToIsoLocal(date), wasWeekend: true, original: isoDate };
  }
  return { adjusted: isoDate, wasWeekend: false, original: isoDate };
}

// Comentarios en castellano


// =============================================================================
// V89 — Propuesta 1.6: mover seguimientos recurrentes de fin de semana al lunes
// =============================================================================

// Comentarios en castellano
function nextWorkday(isoDate) {
  if (!isoDate) return isoDate;
  const date = new Date(isoDate + 'T00:00:00');
  if (Number.isNaN(date.getTime())) return isoDate;
  const day = date.getDay();
  if (day === 6) date.setDate(date.getDate() + 2); // Sabado -> lunes
  if (day === 0) date.setDate(date.getDate() + 1); // Domingo -> lunes
  return dateToIsoLocal(date);
}
function showDueWeekendWarning() {
  const warn = document.getElementById('cf-due-weekend-warn');
  if (!warn) return;
  warn.textContent = tr('WARN_WEEKEND_DUE');
  warn.style.display = 'block';
  clearTimeout(warn._t);
  warn._t = setTimeout(() => { warn.style.display = 'none'; }, 5000);
}

// Comentarios en castellano


// Comentarios en castellano
function notifyWeekendAdjustment(messageKey) {
  try { showToast(tr(messageKey), 'info'); } catch (e) {}
}
function handleDueDateChange(inputEl) {
  const input = inputEl || document.getElementById('cf-due');
  if (!input) return;
  const result = adjustToWeekdayIfWeekend(input.value);
  if (result.wasWeekend) {
    input.value = result.adjusted;
    showDueWeekendWarning();
  }
  updateFollowupSummary();
}

const LANGS = ['ca','es','en'];
let LANG = 'ca';
function tr(key) { return (I18N[LANG] && I18N[LANG][key] != null) ? I18N[LANG][key] : (I18N.ca[key] || key); }

function setLanguage(lang, opts = {}) {
  const next = (LANGS && LANGS.includes(lang)) ? lang : 'ca';
  LANG = next;
  document.querySelector('html').setAttribute('lang', next);
  if (window.userPreferences && opts.persist !== false) {
    window.userPreferences.language = next;
    try { saveUserPreferences(window.userPreferences); } catch (e) {}
  }
  applyI18n();
  if (typeof applyPreferencesI18n === 'function') {
    try { applyPreferencesI18n(); } catch (e) {}
  }
  if (opts.render !== false && typeof render === 'function') {
    try { render(); } catch (e) {}
  }
  return next;
}
window.setLanguage = setLanguage;

function cycleLang() {
  const currentPrefs = (window.userPreferences && typeof window.userPreferences === 'object')
    ? window.userPreferences
    : structuredClone(DEFAULT_USER_PREFERENCES);
  const currentLang = currentPrefs.language || LANG || 'ca';
  const next = LANGS[(LANGS.indexOf(currentLang) + 1) % LANGS.length];
  window.userPreferences = {
    ...structuredClone(DEFAULT_USER_PREFERENCES),
    ...currentPrefs,
    language: next,
    defaultTimeMinutes: {
      ...DEFAULT_USER_PREFERENCES.defaultTimeMinutes,
      ...((currentPrefs && currentPrefs.defaultTimeMinutes) || {})
    },
    outlookRules: {
      ...DEFAULT_USER_PREFERENCES.outlookRules,
      ...((currentPrefs && currentPrefs.outlookRules) || {})
    }
  };
  try { saveUserPreferences(window.userPreferences); } catch (e) {}
  setLanguage(next, { persist: false });
  return next;
}

function applyI18n() {
 document.querySelector('html').setAttribute('lang', LANG);
 document.querySelectorAll('[data-i18n]').forEach(el => {
  const val = tr(el.getAttribute('data-i18n'));
  if (val != null) el.textContent = val;
 });
 document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
  const val = tr(el.getAttribute('data-i18n-placeholder'));
  if (val != null) el.setAttribute('placeholder', val);
 });
 document.querySelectorAll('[data-i18n-title]').forEach(el => {
  const val = tr(el.getAttribute('data-i18n-title'));
  if (val != null) el.setAttribute('title', val);
 });
 document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
  const val = tr(el.getAttribute('data-i18n-aria-label'));
  if (val != null) el.setAttribute('aria-label', val);
 });
 const qa = document.getElementById('btn-plus-qa');
 if (qa) {
  const v = tr('QUICK_ACTIONS');
  qa.setAttribute('aria-label', v);
  qa.setAttribute('title', v);
 }
 const menuBtn = document.getElementById('btn-menu');
 if (menuBtn) {
  const v = tr('MENU_SECONDARY');
  menuBtn.setAttribute('aria-label', v);
  menuBtn.setAttribute('title', v);
 }
 if (typeof updateTasksViewHeading === 'function') updateTasksViewHeading();
}

// =============================================================================
// INDEPENDENT DATA TABLES  (all IDs use 3-char prefix + 6-digit zero-padded number)
// =============================================================================

/* ── Projects ── */
let PROJECTS = [];

/* ── People ── */
let PEOPLE = []; // populated at init — current user is always PRS000001

/* ── Providers ── */
let PROVIDERS = [];

/* ── Emails (one record per unique email) ── */
let EMAILS = [];

/* ── Comments ── */
let COMMENTS = [];

/* ── Time entries ── */
let TIME_ENTRIES = [];

/* ── Tasks (core fields only — relationships managed via RELATIONS) ── */
let TASKS = [];

/* ── Relations (central table — all cross-table links) ── */
let RELATIONS = [];

// =============================================================================
// ID SYSTEM — prefixed IDs with zero-padded 6-digit numbers
// =============================================================================

// Map prefix → table array and primary key field name
const TABLE_MAP = {
  TSK: { table: () => TASKS,        pk: 'task_id'     },
  PRJ: { table: () => PROJECTS,     pk: 'project_id'  },
  PRS: { table: () => PEOPLE,       pk: 'person_id'   },
  PRV: { table: () => PROVIDERS,    pk: 'provider_id' },
  EML: { table: () => EMAILS,       pk: 'email_id'    },
  CMT: { table: () => COMMENTS,     pk: 'comment_id'  },
  TIM: { table: () => TIME_ENTRIES, pk: 'entry_id'    },
  REL: { table: () => RELATIONS,    pk: 'relation_id' },
};

// Generate the next available prefixed ID for a given prefix
function nextId(prefix) {
  const cfg = TABLE_MAP[prefix];
  if (!cfg) return prefix + '000001';
  const table = cfg.table();
  const pk = cfg.pk;
  const max = table.reduce((m, r) => Math.max(m, parseInt(String(r[pk]).slice(3)) || 0), 0);
  return prefix + String(max + 1).padStart(6, '0');
}

// Find any record by its prefixed ID across all tables
function findById(id) {
  if (!id) return null;
  if (String(id).startsWith('MAIL')) return TASKS.find(r => r.task_id === id) || null;
  const prefix = String(id).slice(0, 3);
  const cfg = TABLE_MAP[prefix];
  if (!cfg) return null;
  const table = cfg.table();
  const pk = cfg.pk;
  return table.find(r => r[pk] === id) || null;
}

// =============================================================================
// RELATIONS API — all cross-table links go through RELATIONS
// =============================================================================

// Get IDs of records related FROM sourceId with a given relation type
function getRelatedIds(sourceId, relType) {
  return RELATIONS
    .filter(r => r.relation_type === relType && r.related1_id === sourceId)
    .map(r => r.related2_id);
}

// Get fully resolved records related to sourceId
function getRelated(sourceId, relType) {
  return getRelatedIds(sourceId, relType).map(findById).filter(Boolean);
}

// Check whether a relation already exists
function relationExists(id1, id2, relType) {
  return RELATIONS.some(r =>
    r.related1_id === id1 && r.related2_id === id2 && r.relation_type === relType
  );
}

// Add a new relation (returns the new relation_id, or null if it already exists)
function addRelation(id1, id2, relType) {
  if (relationExists(id1, id2, relType)) return null;
  const relId = nextId('REL');
  RELATIONS.push({ relation_id: relId, related1_id: id1, related2_id: id2, relation_type: relType });
  return relId;
}

// Remove a specific relation
function removeRelation(id1, id2, relType) {
  const before = RELATIONS.length;
  RELATIONS = RELATIONS.filter(r =>
    !(r.related1_id === id1 && r.related2_id === id2 && r.relation_type === relType)
  );
  return RELATIONS.length !== before;
}

// Find or create a project by name; returns its project_id
function findOrCreateProject(name, color) {
  const normalized = String(name || '').trim() || tr('NO_PROJECT');
  const existing = PROJECTS.find(p => p.name.toLowerCase() === normalized.toLowerCase());
  if (existing) return existing.project_id;
  const newId = nextId('PRJ');
  PROJECTS.push({ project_id: newId, name: normalized, color: color || colorFromString(normalized) });
  return newId;
}

// Find or create a person by name; returns their person_id
function findOrCreatePerson(name, phone) {
  const normalized = String(name || '').trim();
  const normalizedPhone = String(phone || '').trim();
  if (!normalized) return null;
  const existing = PEOPLE.find(p => String(p.name || '').toLowerCase() === normalized.toLowerCase());
  if (existing) {
    if (normalizedPhone) existing.phone = normalizedPhone;
    return existing.person_id;
  }
  const newId = nextId('PRS');
  const person = { person_id: newId, name: normalized, color: colorFromString(normalized) };
  if (normalizedPhone) person.phone = normalizedPhone;
  PEOPLE.push(person);
  return newId;
}


// Find or create a provider by name; returns their provider_id
function findOrCreateProvider(name) {
  const normalized = String(name || '').trim();
  if (!normalized) return null;
  const existing = PROVIDERS.find(p => p.name.toLowerCase() === normalized.toLowerCase());
  if (existing) return existing.provider_id;
  const newId = nextId('PRV');
  const abbr = normalized.split(/\s+/).slice(0, 3).map(w => w[0]?.toUpperCase() || '').join('') || 'PR';
  PROVIDERS.push({ provider_id: newId, name: normalized, type: 'Altres', color: colorFromString(normalized), abbr });
  return newId;
}

// Find or create an email record; returns its email_id
// Deduplication: (1) by internet_message_id if provided, (2) by subject+from_address
function findOrCreateEmail(subject, fromAddress, fromName, dateLabel, attachments, messageId) {
  const subj  = String(subject || '').trim();
  const msgId = String(messageId || '').trim();
  const addr  = String(fromAddress || '').trim();
  // Deduplicate by internetMessageId
  if (msgId) {
    const byMsgId = EMAILS.find(e => e.internet_message_id === msgId);
    if (byMsgId) return byMsgId.email_id;
  }
  // Deduplicate by subject + from_address (fallback)
  if (subj && addr) {
    const bySubj = EMAILS.find(e => e.subject === subj && e.from_address === addr);
    if (bySubj) return bySubj.email_id;
  }
  const newId = nextId('EML');
  EMAILS.push({
    email_id:            newId,
    internet_message_id: msgId || '',   // internetMessageId from Outlook (PK semàntic)
    subject:             subj,
    from_address:        addr,          // email address (e.g. user@domain.com)
    from_name:           String(fromName || ''),
    date_label:          String(dateLabel || ''),
    attachments:         attachments || 0,
  });
  return newId;
}

function findExistingEmailId(subject, fromAddress, messageId) {
  const subj  = String(subject || '').trim();
  const msgId = String(messageId || '').trim();
  const addr  = String(fromAddress || '').trim();
  if (msgId) {
    const byMsgId = EMAILS.find(e => e.internet_message_id === msgId);
    if (byMsgId) return byMsgId.email_id;
  }
  if (subj && addr) {
    const bySubj = EMAILS.find(e => e.subject === subj && e.from_address === addr);
    if (bySubj) return bySubj.email_id;
  }
  return null;
}
function getTasksLinkedToEmailId(emailId) {

    card.classList.toggle('compact-expanded', isLinkedToActiveEmail || isCompactTaskCardExpanded(task.task_id));
    const compactRow = card.querySelector('.task-compact-row');
    if (compactRow) compactRow.setAttribute('aria-expanded', (isLinkedToActiveEmail || isCompactTaskCardExpanded(task.task_id)) ? 'true' : 'false');

    const ci = card.querySelector('.ci');
    if (!ci) return;

    const old = ci.querySelector('.task-rel-wrap');
    if (old) old.remove();

    const linkedTasks = getLinkedTasksForTask(task.task_id).filter(t => t.task_id !== task.task_id);
    const linkedEmails = getTaskEmails(task.task_id);

    if (!linkedTasks.length && !linkedEmails.length) return;

    const activeEmail = getActiveEmail();
    const activeEmailId = activeEmail
      ? findOrCreateEmail(activeEmail.subject, activeEmail.from, activeEmail.fromName, activeEmail.dateLabel, activeEmail.attachments, activeEmail.messageId)
      : null;

    const linkedTasksRowsHtml = linkedTasks.map((lt, idx) => `
      <div class="task-rel-row task-rel-row-single">
        <span class="task-rel-label">${idx === 0 ? tr('REL_TASKS') : ''}</span>
        <span class="email-link-actions task-link-actions" aria-label="${escapeHtml(tr('TASK_LINKED_ARIA'))}">
          <a href="#" class="task-rel-chip task-rel-chip-task" onclick="event.preventDefault();event.stopPropagation();openEditTask('${lt.task_id}')" title="${escapeHtml(lt.title || '')}">
            <span class="task-rel-ico" aria-hidden="true">🔗</span><span class="task-rel-text">${escapeHtml(lt.title || '')}</span>
          </a>
          <a href="#" class="email-unlink-link email-unlink-x" title="${escapeHtml(tr('UNLINK_TASK'))}" aria-label="${escapeHtml(tr('UNLINK_TASK'))}" onclick="event.preventDefault();event.stopPropagation();unlinkLinkedTaskFromTask('${task.task_id}','${lt.task_id}')">×</a>
        </span>
      </div>
    `).join('');

    const linkedEmailsRowsHtml = linkedEmails.map((e, idx) => {
      const isActiveLinkedEmail = !!activeEmailId && e.email_id === activeEmailId;
      return `
      <div class="task-rel-row task-rel-row-single">
        <span class="task-rel-label">${idx === 0 ? tr('REL_EMAILS') : ''}</span>
        <span class="email-link-actions${isActiveLinkedEmail ? ' email-link-actions-active' : ''}" ${isActiveLinkedEmail ? `data-linked-email-id="${e.email_id}" onmouseenter="setTaskLinkedEmailHover('${e.email_id}', true)" onmouseleave="setTaskLinkedEmailHover('${e.email_id}', false)" onfocusin="setTaskLinkedEmailHover('${e.email_id}', true)" onfocusout="setTaskLinkedEmailHover('${e.email_id}', false)"` : ''} aria-label="${escapeHtml(tr('EMAIL_LINKED_ARIA'))}">
          <span class="task-rel-chip task-rel-chip-email" title="${escapeHtml(e.subject || '')}">
            <span class="task-rel-ico" aria-hidden="true">🔗</span><span class="task-rel-text">${escapeHtml(e.subject || tr('NO_SUBJECT'))}</span>
          </span>
          ${selectedTaskIds.has(task.task_id) && isActiveLinkedEmail && getTaskTypeValue(task) !== 'email' ? `<a href="#" class="email-unlink-link email-unlink-x" title="${escapeHtml(tr('UNLINK_EMAIL'))}" aria-label="${escapeHtml(tr('UNLINK_EMAIL'))}" onclick="event.preventDefault();event.stopPropagation();unlinkActiveEmailFromTask('${task.task_id}')">×</a>` : ''}
          <a href="#" class="email-unlink-link email-open-link" title="${escapeHtml(tr('OPEN_OUTLOOK'))}" aria-label="${escapeHtml(tr('OPEN_OUTLOOK'))}" onclick="event.preventDefault();event.stopPropagation();openEmailInOutlookWeb('${e.email_id}')">↗</a>
        </span>
      </div>
    `;
    }).join('');

    const rel = document.createElement('div');
    rel.className = 'task-rel-wrap';
    rel.innerHTML = `${linkedTasksRowsHtml}${linkedEmailsRowsHtml}`;

    ci.appendChild(rel);
  });
}

const TF_CONFIG = {
  apiBaseUrl: '', // e.g. https://api.taskflow.company.com/v1 — leave empty for demo mode
  tenantId:   '',
  clientId:   '',

let TF_msal = null;
let TF_account = null;

// =============================================================================

let MY_PERSON_ID = null; // person_id of the authenticated user (e.g. 'PRS000001')

// Ensure the authenticated user exists in PEOPLE as the first record.
// Called once during Office.onReady / demo boot.
function ensureCurrentUserInPeople(displayName, email, color) {
  const safeName  = String(displayName || 'Unknown User').trim();
  const safeEmail = String(email || '').trim().toLowerCase();
  const safeColor = color || '#2B5CE6';

  // Already exists? (subsequent sessions)
  if (safeEmail) {
    const existing = PEOPLE.find(p => (p.email || '').toLowerCase() === safeEmail);
    if (existing) { MY_PERSON_ID = existing.person_id; return; }
  }

  // First run: insert as PRS000001 (table must be empty at this point)
  const newId = nextId('PRS'); // → PRS000001 when table is empty
  PEOPLE.unshift({
    person_id: newId,
    name:      safeName,
    color:     safeColor,
    email:     safeEmail,
  });
  MY_PERSON_ID = newId;
}

// Toggle task status between 'completed' and 'pending'
function toggleDone(taskId) {
  const t = TASKS.find(t => t.task_id === taskId);
  if (!t) return;
  const beforeState = collectTaskAuditState(taskId);
  const nextStatus = (t.status === 'completed') ? 'pending' : 'completed';
  t.status = nextStatus;
  if (nextStatus === 'completed') {
    t.followup = normalizeFollowupConfig({ enabled:false }, null, 0);
    t.followup_date = null;
    t.repeat = { enabled: false };
  } else {
    syncTaskFollowupFields(t);
  }
  const afterState = collectTaskAuditState(taskId);
  logTaskAuditChanges(taskId, beforeState, afterState);
  schedulePersistence();
  try { render(); } catch(e) {}
}

function tfHasAuth() {
  return !!(TF_CONFIG.clientId && TF_CONFIG.tenantId && TF_CONFIG.scopes.length);
}

async function tfInitAuth() {
  if (!tfHasAuth() || typeof msal === 'undefined') return;
  if (TF_msal) return;
  TF_msal = new msal.PublicClientApplication({
    auth: { clientId: TF_CONFIG.clientId, authority: `https://login.microsoftonline.com/${TF_CONFIG.tenantId}`, redirectUri: window.location.href },
    cache: { cacheLocation: 'sessionStorage' }
  });
}

async function tfGetToken() {
  await tfInitAuth();
  if (!TF_msal) return null;
  if (!TF_account) {
    const login = await TF_msal.loginPopup({ scopes: TF_CONFIG.scopes });
    TF_account = login.account;
  }
  try {
    const t = await TF_msal.acquireTokenSilent({ scopes: TF_CONFIG.scopes, account: TF_account });
    return t.accessToken;
  } catch(e) {
    const t = await TF_msal.acquireTokenPopup({ scopes: TF_CONFIG.scopes });
    return t.accessToken;
  }
}

async function tfFetchJson(url, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (TF_CONFIG.apiBaseUrl && tfHasAuth()) {
    const token = await tfGetToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
  }
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (!res.ok) { const txt = await res.text(); throw new Error(`API ${res.status}: ${txt}`); }
  return res.json();
}

let CURRENT_EMAIL = null;
let LAST_VALID_EMAIL = null;
let OUTLOOK_EMAIL_SYNC_STATE = 'idle';
let OUTLOOK_EMAIL_RETRY_TIMER = null;
const FALLBACK_EMAIL = { subject:'(Demo) Email de prova', from:'demo@company.com', fromName:'Demo', dateLabel:'', attachments:0, messageId:'demo', messageIdShort:'demo', receivedAt:null };
const OUTLOOK_LOADING_EMAIL = { subject:'Carregant email d’Outlook…', from:'Sincronitzant amb Outlook', fromName:'Outlook', dateLabel:'', attachments:0, messageId:'outlook-loading', messageIdShort:'outlook-loading', receivedAt:null, isOutlookLoading:true };

function isTaskFlowOutlookHost() {
  return typeof Office !== 'undefined' && !!(Office.context && Office.context.mailbox);
}

function getActiveEmail() {
  if (CURRENT_EMAIL) return CURRENT_EMAIL;
  if (isTaskFlowOutlookHost()) return LAST_VALID_EMAIL || OUTLOOK_LOADING_EMAIL;
  return FALLBACK_EMAIL;
}

function normalizeOfficeEmailAddress(value) {
  // Normaliza formatos diferentes de Office.js: string, objeto EmailAddressDetails o estructura parcial.
  if (!value) return '';
  if (typeof value === 'string') return value;
  return value.address || value.emailAddress || value.mail || '';
}

function buildEmailFromOfficeItem(item) {
  // Construye un email interno solo cuando Outlook ya ha entregado un item suficientemente estable.
  if (!item) return null;
  const internetMessageId = item.internetMessageId || null;
  const itemId = item.itemId || null;
  const messageId = internetMessageId || itemId || '';
  const fromAddress = normalizeOfficeEmailAddress(item.from?.emailAddress || item.from);
  const fromName = item.from?.displayName || item.sender?.displayName || '';
  const receivedAt = item.dateTimeCreated || item.dateTimeReceived || null;
  const attachmentCount = Array.isArray(item.attachments) ? item.attachments.length : (item.attachments?.length || 0);

  if (!messageId && !item.subject && !fromAddress) return null;

  return {
    subject:         item.subject || '',
    from:            fromAddress,
    fromName:        fromName,
    receivedAt:      receivedAt,
    dateLabel:       receivedAt ? new Date(receivedAt).toLocaleDateString() : '',
    attachments:     attachmentCount,
    attachmentsLabel: attachmentCount ? (attachmentCount + ' adjunt(s)') : '',
    messageId,
    threadId:         item.conversationId || item.conversationIndex || messageId || '',
    conversationId:   item.conversationId || '',
    messageIdShort:  shortId(messageId || item.subject || 'outlook')
  };
}

function scheduleOutlookEmailRetry(reason, retry) {
  // Evita mostrar el email Demo cuando Outlook todavía no ha entregado el contexto real.
  OUTLOOK_EMAIL_SYNC_STATE = 'loading';
  if (OUTLOOK_EMAIL_RETRY_TIMER) clearTimeout(OUTLOOK_EMAIL_RETRY_TIMER);
  if (!CURRENT_EMAIL && !LAST_VALID_EMAIL) {
    try { renderEmailPanel(); } catch(e) {}
  }
  if (retry >= 8) {
    console.warn('[TaskFlow V132] No se ha podido resolver el email activo de Outlook:', reason);
    return false;
  }
  OUTLOOK_EMAIL_RETRY_TIMER = setTimeout(function () {
    tfLoadEmailFromOffice(retry + 1, { reason });
  }, 160 + (retry * 140));
  return false;
}

async function tfLoadEmailFromOffice(retry = 0, opts = {}) {
  try {
    if (!isTaskFlowOutlookHost()) return false;
    const item = Office.context.mailbox.item;
    const email = buildEmailFromOfficeItem(item);

    if (!email) {
      return scheduleOutlookEmailRetry(opts.reason || 'office-item-not-ready', retry);
    }

    CURRENT_EMAIL = email;
    LAST_VALID_EMAIL = email;
    OUTLOOK_EMAIL_SYNC_STATE = 'ready';
    if (OUTLOOK_EMAIL_RETRY_TIMER) {
      clearTimeout(OUTLOOK_EMAIL_RETRY_TIMER);
      OUTLOOK_EMAIL_RETRY_TIMER = null;
    }

    currentEmailContext = {
      subject: email.subject || null,
      from: email.from || null,
      internetMessageId: item.internetMessageId || null
    };

    // Resolve current user from Graph API and ensure they exist in PEOPLE
    if (!MY_PERSON_ID && tfHasAuth()) {
      try {
        const me = await tfFetchJson('https://graph.microsoft.com/v1.0/me');
        ensureCurrentUserInPeople(me.displayName, me.mail || me.userPrincipalName, '#2B5CE6');
      } catch(e) {
        // Fallback: use Outlook profile identity as approximation
        ensureCurrentUserInPeople(
          Office.context.mailbox.userProfile?.displayName || 'Unknown',
          Office.context.mailbox.userProfile?.emailAddress || '',
          '#2B5CE6'
        );
      }
    }

    try { renderEmailPanel(); } catch(e) {}
    try { render(); } catch(e) {}
    return true;
  } catch(e) {
    console.warn('[TaskFlow V132] Error cargando email desde Outlook', e);
    return scheduleOutlookEmailRetry('exception', retry);
  }
}

async function tfLoadTasksForEmail() {
  // In demo mode, keep mock data and render
  if (!TF_CONFIG.apiBaseUrl) { render(); return; }
  try {
    const ae = getActiveEmail();
    // 1) Resolve email entity on backend
    const email = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/emails/resolve`, {
      method: 'POST',
      body: JSON.stringify({ messageId: ae.messageId, subject: ae.subject, from: ae.from, receivedAt: ae.receivedAt })
    });
    // 2) Fetch all relations for this email
    const rels = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/relations?entityId=${encodeURIComponent(email.uid)}&relationType=task_email`);
    // 3) Hydrate tasks linked to this email
    const taskIds = (rels || []).map(r => r.related1_id || r.related2_id).filter(Boolean);
    for (const uid of taskIds) {
      if (!TASKS.find(t => t.task_id === uid)) {
        const t = await tfFetchJson(`${TF_CONFIG.apiBaseUrl}/tasks/${encodeURIComponent(uid)}`);
        // Map API shape → internal TASKS shape
        const taskId = t.uid || uid;
    // V215: native Email → Task relation (no hook)
    if (formConfig && formConfig.emailContext && formConfig.emailContext.internetMessageId) {
      try {
        const emailId = formConfig.emailContext.internetMessageId;
        if (window.TaskFlow && TaskFlow.relations && typeof TaskFlow.relations.createEmailTaskRelation === 'function') {
          if (typeof TaskFlow.relations.existsEmailTaskRelation === 'function') {
            const exists = await TaskFlow.relations.existsEmailTaskRelation(emailId, taskId);
            if (!exists) await TaskFlow.relations.createEmailTaskRelation(emailId, taskId);
          } else {
            await TaskFlow.relations.createEmailTaskRelation(emailId, taskId);
          }
        }
      } catch (e) {}
    }

        const projId = findOrCreateProject(t.projectName || tr('NO_PROJECT'), '#2B5CE6');
        TASKS.push({
          task_id:          taskId,
          title:            t.title,
          priority:         ({ URGENT:1, HIGH:2, MEDIUM:3, LOW:4 }[t.priority] || 3),
          status:           (t.status || 'pending').toLowerCase(),
          due_date:         t.dates?.duePlanned || null,
          followup_date:    t.followUp?.nextDate || null,
          followup_days:    0,
          time_minutes:     t.time?.totalMinutes || 0,
          comment_count:    0,
          outlook_category: 'Task',
          notes:            '',
          repeat:           { enabled: false },
          created_at:       new Date().toISOString(),
        });
        addRelation(taskId, projId, 'task_project');
        addRelation(taskId, MY_PERSON_ID, 'task_person'); // loaded task linked to current user
      }
    }
    render();
  } catch(e) {
    try { render(); } catch(_) {}
  }
}

if (typeof Office !== 'undefined') {
  Office.onReady(async () => {
    await tfInitAuth();
    await tfLoadEmailFromOffice();
    // If MSAL was not available, try to resolve user via Office profile
    if (!MY_PERSON_ID) {
      const profile = Office.context.mailbox?.userProfile;
      ensureCurrentUserInPeople(
        profile?.displayName || 'User',
        profile?.emailAddress || '',
        '#2B5CE6'
      );
    }
    // Re-render now that MY_PERSON_ID is resolved (bootTaskFlowApp already
    // did a first render with MY_PERSON_ID = null; this corrects it)
    try { render(); } catch(e) {}
    await tfLoadTasksForEmail();
  });
} else {
  // Demo mode (no Office): boot with a temporary user as PRS000001
  ensureCurrentUserInPeople('Demo User', 'demo@local', '#2B5CE6');
}

function fmtDate(d) {
  if (!d) return null;
  const months = tr('MONTHS');
  const [, mm, dd] = d.split('-');
  return dd + ' ' + months[+mm - 1];
}

function dateStatus(d) {
  const today = todayIso();
  if (!d) return 'n';
  if (d < today) return 'ov';
  if (d === today) return 'td';
  if (new Date(d) - new Date(today) < 2 * 86400000) return 'sn';
  return 'n';
}

function fmtTime(minutes) {
  if (!minutes) return null;
  if (minutes < 60) return minutes + 'm';
  const h = Math.floor(minutes / 60), m = minutes % 60;
  return m ? h + 'h ' + m + 'm' : h + 'h';
}

function minutesFrom(val, unit) {
  const v = parseInt(val || '0', 10) || 0;
  if (unit === 'h') return v * 60;
  if (unit === 'd') return v * 8 * 60;
  return v;
}

// ===== TaskFlow V121 · Estado de tarjetas compactas =====
// Comentarios en castellano: mantiene abiertas las tarjetas compactas y permite expandir/retreer por clic.
window.TASKFLOW_COMPACT_EXPANDED = window.TASKFLOW_COMPACT_EXPANDED || new Set();
function isCompactTaskCardExpanded(taskId) {
  return !!(window.TASKFLOW_COMPACT_EXPANDED && window.TASKFLOW_COMPACT_EXPANDED.has(taskId));
}
function isTaskLinkedToActiveEmail(taskId) {
  try {
    return !!(taskId && getSelectedEmailContextTaskIds().has(taskId));
  } catch (e) {
    return false;
  }
}
function shouldRenderTaskCardExpanded(taskId) {
  return isCompactTaskCardExpanded(taskId) || isTaskLinkedToActiveEmail(taskId);
}
function isTaskQePopOpen(taskId) {
  const pop = document.getElementById('qepop');
  return !!(pop && pop.classList.contains('open') && QE_ACTIVE && QE_ACTIVE.taskId === taskId);
}
function setCompactTaskCardExpanded(taskId, expanded) {
  if (!taskId) return;
  const shouldExpand = !!expanded;
  if (shouldExpand) window.TASKFLOW_COMPACT_EXPANDED.add(taskId);
  else window.TASKFLOW_COMPACT_EXPANDED.delete(taskId);
  const card = document.querySelector(`.card[data-task-id="${taskId}"]`);
  if (!card) return;
  card.classList.toggle('compact-expanded', shouldExpand);
  const row = card.querySelector('.task-compact-row');
  if (row) row.setAttribute('aria-expanded', shouldExpand ? 'true' : 'false');
}
function expandCompactTaskCard(taskId, ev) {
  if (ev) {
    ev.preventDefault();
    ev.stopPropagation();
  }
  setCompactTaskCardExpanded(taskId, true);
}
function collapseCompactTaskCard(taskId, ev) {
  if (ev) {
    ev.preventDefault();
    ev.stopPropagation();
  }
  // Si hay un qepop abierto o la tarea pertenece al email activo, la tarjeta debe seguir extendida.
  if (isTaskQePopOpen(taskId) || isTaskLinkedToActiveEmail(taskId)) return;
  setCompactTaskCardExpanded(taskId, false);
}
function shouldIgnoreCompactToggleEvent(ev) {
  const target = ev && ev.target;
  if (!target || typeof target.closest !== 'function') return false;
  return !!target.closest('button,a,input,select,textarea,label,.ic,.ck,.cedit,.task-rel-chip,.email-link-actions,.qepop,.qepop-item,.qepop-btn,.qepop-date,.qepop-inp,.qepop-textarea');
}
function toggleCompactTaskCard(taskId, ev) {
  if (ev) {
    ev.preventDefault();
    ev.stopPropagation();
  }
  if (!taskId || shouldIgnoreCompactToggleEvent(ev)) return;
  if (isCompactTaskCardExpanded(taskId)) collapseCompactTaskCard(taskId);
  else expandCompactTaskCard(taskId);
}
function onCompactTaskCardKeydown(taskId, ev) {
  if (!ev) return;
  if (ev.key === 'Enter' || ev.key === ' ') {
    toggleCompactTaskCard(taskId, ev);
  }
}


function isSummaryViewFilterActive() {
  const activeFilter = String(window.summaryViewFilter || 'none').toLowerCase();
  return !!activeFilter && activeFilter !== 'none';
}

function taskMatchesActiveSummaryView(task) {
  if (!isSummaryViewFilterActive()) return false;
  if (typeof window.summaryTaskMatchesFilter === 'function') {
    return window.summaryTaskMatchesFilter(task, window.summaryViewFilter);
  }
  return true;
}

let LEGEND_COLLAPSED = true;

let LAST_FOCUS_ID = null;
let QE_RETURN_FOCUS_KEY = null;
let OV_RETURN_FOCUS_KEY = null;
let OV_RETURN_FOCUS_ID = null;
function rememberFocusTarget(el) {
  if (!el) { LAST_FOCUS_KEY = null; LAST_FOCUS_ID = null; return; }
  LAST_FOCUS_KEY = el.dataset?.focusKey || null;
  LAST_FOCUS_ID = el.id || null;
}
function focusByStoredTarget(key, id, fallbackSelector) {
  const target = (key ? document.querySelector(`[data-focus-key="${key}"]`) : null) || (id ? document.getElementById(id) : null) || (fallbackSelector ? document.querySelector(fallbackSelector) : null);
  if (target && typeof target.focus === 'function') setTimeout(() => { try { target.focus(); } catch(e) {} }, 0);
}
function loadLegendState() {
  try {
    const saved = window.localStorage.getItem('taskflow.legend.collapsed');
    if (saved != null) LEGEND_COLLAPSED = saved === 'true';
  } catch(e) {}
}
function persistLegendState() {
  try { window.localStorage.setItem('taskflow.legend.collapsed', String(LEGEND_COLLAPSED)); } catch(e) {}
}
function syncLegendUi() {
  const body = document.getElementById('legend-body');
  const toggle = document.getElementById('legend-toggle');
  const head = document.getElementById('legend-head');
  if (body) body.classList.toggle('collapsed', LEGEND_COLLAPSED);
  if (toggle) toggle.classList.toggle('open', !LEGEND_COLLAPSED);
  if (head) head.setAttribute('aria-expanded', String(!LEGEND_COLLAPSED));
}
function toggleLegend() {
  LEGEND_COLLAPSED = !LEGEND_COLLAPSED;
  persistLegendState();
  syncLegendUi();
}
function getFocusableElements(container) {
  if (!container) return [];
  return Array.from(container.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')).filter(el => !el.disabled && el.offsetParent !== null);
}
function trapFocusIn(container, event) {
  const focusables = getFocusableElements(container);
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
  else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
}
function toggleSecondaryMenu(event) {
  if (event) event.stopPropagation();
  const menu = document.getElementById('sec-menu');
  const btn = document.getElementById('btn-menu');
  if (!menu || !btn) return;
  const willOpen = !menu.classList.contains('open');
  if (willOpen) {
    rememberFocusTarget(btn);
    menu.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
    const firstItem = menu.querySelector('[role="menuitem"]');
    if (firstItem) setTimeout(() => firstItem.focus(), 0);
  } else {
    closeSecondaryMenu();
  }
}
function closeSecondaryMenu() {
  const menu = document.getElementById('sec-menu');
  const btn = document.getElementById('btn-menu');
  if (menu) menu.classList.remove('open');
  if (btn) btn.setAttribute('aria-expanded', 'false');
  focusByStoredTarget(LAST_FOCUS_KEY, LAST_FOCUS_ID, '#btn-menu');
}
