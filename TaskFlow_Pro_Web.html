<style>

rid;grid-template-rows:46px 1fr;box-shadow:0 1px 2px rgba(15,23,42,.035)}.head{display:flex;justify-content:space-between;align-items:center;padding:0 12px;border-bottom:1px solid #d7dde7;font-weight:900;color:#273242}.head .count{background:#fff;border:1px solid #cfd6e3;border-radius:5px;padding:3px 8px;font-size:12px;color:#475569}.body{overflow:auto;padding:8px}.p1 .head{background:#f8eef0;border-top:3px solid var(--red)}.p2 .head{background:#f8f1e8;border-top:3px solid var(--orange)}.p3 .head{background:#f1f4e8;border-top:3px solid var(--olive)}.none .head{background:#f3f5f8;border-top:3px solid var(--slate)}.card{position:relative;margin-bottom:7px;background:#fff;border:1px solid #d9dee7;border-radius:7px;padding:9px 10px 9px 14px;min-height:70px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.card:before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:4px;border-radius:99px;background:var(--pc)}.card.sel{border-color:var(--a);box-shadow:0 0 0 2px rgba(37,99,235,.18)}.title{font-size:14px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row{display:flex;align-items:center;gap:7px;margin-top:8px;color:var(--m);font-size:12px;font-weight:780}.badge{margin-left:auto;border-radius:6px;min-width:30px;height:21px;display:grid;place-items:center;font-size:11px;font-weight:950}.b1{background:#f8e6e7;color:#9f1f2d}.b2{background:#f7ead8;color:#9a5700}.b3{background:#eef3d7;color:#6f7400}.bn{background:#edf0f4;color:#64748b}.tags{display:flex;gap:5px;margin-top:7px}.tag{height:20px;border:1px solid var(--b);border-radius:6px;background:var(--s2);padding:0 7px;color:var(--m);font-size:11px;font-weight:780}.empty{padding:30px;color:#94a0ad;text-align:center;font-weight:800}.detail{min-height:0;border:1px solid var(--b);border-radius:11px;background:#fff;box-shadow:0 12px 34px rgba(15,23,42,.10);display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.dh{display:flex;gap:10px;padding:14px 15px;border-bottom:1px solid var(--b)}.dt{font- html, body, button, input, select, textarea {
  font-family: "Segoe UI Variable", "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif !important;

<style>
/* Header del panel */
.dh{padding:8px 10px;gap:8px}
.dt{font-size:16px;line-height:1.15}
.sub{margin-top:2px;font-size:11px}
.x{width:26px;height:26px;border-radius:6px}

.cf-wrap{padding:8px 10px}
.cf-section{margin-bottom:6px}
.cf-label{font-size:9px;letter-spacing:.06em;margin-bottom:3px}

.cf-input,.cf-select{height:28px;padding:0 8px;font-size:12.5px}
.cf-textarea{min-height:52px;padding:6px 8px;font-size:12.5px}

.cf-check{gap:6px;font-size:12px}
.cf-note{padding:6px 8px;font-size:11.5px}

/* Grids */
.cf-grid2{gap:6px}

.cf-box{padding:8px}

/* Footer accions */
.actions{padding:6px 10px;gap:8px}
.primary,.secondary{height:32px;font-size:12.5px}
</style>

function recurrenceSummaryText(t){if(!t.repeat_enabled)return '—';let freq=t.repeat_frequency||'weekly',interval=t.repeat_interval||1,until=t.repeat_until?` · ${tr('until')} ${fmt(t.repeat_until)}`:'',wk=t.repeat_weekend_policy==='nextWorkday'?` · ${tr('nextWorkday')}`:'';return `${interval} · ${tr(freq)}${until}${wk}`}
function form(t,mode){return `<div class="cf-wrap"><div class="cf-section" data-panel-section="identity"><div class="cf-label">${tr('identity')}</div><input class="cf-input" data-edit="title" value="${safeVal(t.title)}" placeholder="${tr('title')}"></div><div class="cf-section" data-panel-section="identity-notes"><div class="cf-label">${tr('notes')}</div><textarea class="cf-textarea" data-edit="notes" placeholder="${tr('notes')}">${safeVal(t.notes)}</textarea></div><div class="cf-section" data-panel-section="context"><div class="cf-label">${tr('context')}</div><div class="cf-grid2"><div><div class="cf-label">${tr('actionType')}</div><select class="cf-select" data-edit="type"><option value="task" ${t.type==='task'?'selected':''}>Tasca</option><option value="follow" ${t.type==='follow'?'selected':''}>${tr('followup')}</option><option value="call" ${t.type==='call'?'selected':''}>${tr('calls')}</option><option value="meeting" ${t.type==='meeting'?'selected':''}>${tr('meetings')}</option></select></div><div><div class="cf-label">${tr('priority')}</div><select class="cf-select" data-edit="priority"><option value="P1" ${t.priority==='P1'?'selected':''}>P1</option><option value="P2" ${t.priority==='P2'?'selected':''}>P2</option><option value="P3" ${t.priority==='P3'?'selected':''}>P3</option><option value="None" ${t.priority==='None'?'selected':''}>—</option></select></div></div><div class="cf-grid2" style="margin-top:6px"><div><div class="cf-label">${tr('project')}</div><select class="cf-select" data-edit="project">${opts(tasks.map(x=>x.project).concat(['Comercial','KIP','Seguiments','Clients','Formacio']),t.project)}</select></div><div><div class="cf-label">${tr('provider')}</div><select class="cf-select" data-edit="provider">${opts(tasks.map(x=>x.provider).concat(['Amex','Adyen','Amazon','Founderz']),t.provider)}</select></div></div><div class="cf-section" style="margin-top:6px;margin-bottom:0"><div class="cf-label">${tr('person')}</div><select class="cf-select" data-edit="person">${opts(tasks.map(x=>x.person).concat(['Xavier','Juan','Marta','Jose Maria']),t.person)}</select></div></div><div class="cf-section" data-panel-section="planning"><div class="cf-label">${tr('planning')}</div><div class="cf-grid2"><div><div class="cf-label">${tr('date')}</div><input class="cf-input" type="date" data-edit="due" value="${safeVal(t.due)}"></div><div><div class="cf-label">${tr('status')}</div><select class="cf-select" data-edit="status"><option value="pending" ${t.status==='pending'?'selected':''}>${tr('pending')}</option><option value="progress" ${t.status==='progress'?'selected':''}>${tr('progress')}</option><option value="done" ${t.status==='done'?'selected':''}>${tr('done')}</option></select></div></div><div class="cf-section" style="margin-top:6px;margin-bottom:0"><div class="cf-label">${tr('estimatedTime')}</div><input class="cf-input" type="number" min="0" step="0.25" data-edit="estimated_hours" value="${safeVal(t.estimated_hours)}" placeholder="0 ${tr('hours')}"></div></div><div class="cf-section" data-panel-section="followup"><div class="cf-label">${tr('followup')}</div><div class="cf-box"><label class="cf-check"><input type="checkbox" data-edit-bool="followup_enabled" ${t.followup_enabled?'checked':''}> ${tr('followup')}</label><div class="cf-grid2" style="margin-top:8px"><div><div class="cf-label">${tr('followupType')}</div><select class="cf-select" data-edit="followup_mode"><option value="once" ${(t.followup_mode||'once')==='once'?'selected':''}>${tr('oneTime')}</option><option value="periodic" ${t.followup_mode==='periodic'?'selected':''}>${tr('periodic')}</option></select></div><div><div class="cf-label">${tr('followupDate')}</div><input class="cf-input" type="date" data-edit="followup_date" value="${safeVal(t.followup_date)}"></div></div><div class="cf-grid2" style="margin-top:6px"><div><div class="cf-label">${tr('followupInterval')}</div><input class="cf-input" type="number" min="1" step="1" data-edit="followup_interval" value="${safeVal(t.followup_interval,1)}"></div><div><div class="cf-label">${tr('followupSummary')}</div><div class="cf-note">${esc(followupSummaryText(t))}</div></div></div></div></div><div class="cf-section" data-panel-section="recurrence"><div class="cf-label">${tr('recurrence')}</div><div class="cf-box"><label class="cf-check"><input type="checkbox" data-edit-bool="repeat_enabled" ${t.repeat_enabled?'checked':''}> ${tr('recurrence')}</label><div class="cf-grid2" style="margin-top:8px"><div><div class="cf-label">${tr('recurrencePattern')}</div><select class="cf-select" data-edit="repeat_frequency"><option value="daily" ${t.repeat_frequency==='daily'?'selected':''}>${tr('daily')}</option><option value="weekly" ${t.repeat_frequency==='weekly'?'selected':''}>${tr('weekly')}</option><option value="monthly" ${t.repeat_frequency==='monthly'?'selected':''}>${tr('monthly')}</option></select></div><div><div class="cf-label">${tr('recurrenceInterval')}</div><input class="cf-input" type="number" min="1" step="1" data-edit="repeat_interval" value="${safeVal(t.repeat_interval,1)}"></div></div><div class="cf-grid2" style="margin-top:6px"><div><div class="cf-label">${tr('weekendAdjustment')}</div><select class="cf-select" data-edit="repeat_weekend_policy"><option value="keep" ${(t.repeat_weekend_policy||'keep')==='keep'?'selected':''}>${tr('keepDate')}</option><option value="nextWorkday" ${t.repeat_weekend_policy==='nextWorkday'?'selected':''}>${tr('nextWorkday')}</option></select></div><div><div class="cf-label">${tr('until')}</div><input class="cf-input" type="date" data-edit="repeat_until" value="${safeVal(t.repeat_until)}"></div></div><div class="cf-section" style="margin-top:6px;margin-bottom:0"><div class="cf-label">${tr('recurrenceSummary')}</div><div class="cf-note">${esc(recurrenceSummaryText(t))}</div></div></div></div><div class="cf-section" data-panel-section="linked"><div class="cf-label">${tr('linkedItems')}</div>${mode==='create'?`<div class="cf-note">${tr('noEmail')}</div>`:`<div class="email"><div class="et">${esc(t.emailSubject||tr('linkedEmail'))}<div class="em">De: ${esc(t.emailFrom||'')}</div></div><div class="eb">${esc(t.emailBody||'')}</div></div>`}<div class="cf-note" style="margin-top:6px">${tr('relatedTasks')}: ${tr('noRelatedTasks')}</div></div></div>`}
function detailRender(){let d=document.getElementById('detail'),t=creating?draft:tasks.find(x=>x.id===sel);if(!t){d.hidden=true;d.innerHTML='';return}let mode=creating?'create':'edit';d.hidden=false;d.innerHTML=`<div class="dh"><div><div class="meta" style="margin:0 0 5px 0">${creating?tr('createTaskTitle'):tr('details')}</div><div class="dt">${esc(t.title||tr('createTaskTitle'))}</div>${creating?`<div class="sub">${tr('createTaskSub')}</div>`:''}</div><button class="x" id="close">×</button></div>${form(t,mode)}<div class="actions"><button id="${creating?'saveCreate':'done'}" class="primary">${creating?tr('saveTask'):tr('complete')}</button><button id="closeSecondary" class="secondary">${creating?'Cancel·lar':tr('reply')}</button></div>`}
function openPop(type,anchor){let vals=type==='priority'?['P1','P2','P3','None']:type==='project'?[...new Set(tasks.map(t=>t.project))]:type==='provider'?[...new Set(tasks.map(t=>t.provider))]:type==='person'?[...new Set(tasks.map(t=>t.person))]:type==='type'?[...new Set(tasks.map(t=>t.type).concat(['task','follow','call','meeting']).filter(Boolean))]:['today','week','none'];let selected=filters[type];let p=document.getElementById('pop');p.dataset.openFilter=type;p.innerHTML=vals.map(v=>`<button data-f="${type}" data-v="${esc(v)}" class="${selected.has(v)?'on':''}"><span class="box">${selected.has(v)?'✓':''}</span><span>${type==='limit'?limitLabel(v):type==='type'?typeLabel(v):(v==='None'?tr('noPriority'):esc(v))}</span>${selected.has(v)?'<span class="pop-count">actiu</span>':''}</button>`).join('')+`<button data-clear="${type}"><span class="box">×</span><span>${tr('all')} / ${tr('resetFilters')}</span>${selected.size?`<span class="pop-count">${selected.size}</span>`:''}</button>`;let r=anchor.getBoundingClientRect();p.style.left=Math.min(r.left,innerWidth-330)+'px';p.style.top=(r.bottom+8)+'px';p.classList.add('open')}
async function persist(t){await saveTaskToTaskFlowLocalDb(t)}
function bindControls(){/* v026: els clicks de checks i multiselectors es gestionen per delegació global per evitar pèrdua d'events després de render() */}
document.addEventListener('click',async e=>{
  let groupBtn=e.target.closest('.group-toggle');
  if(groupBtn){e.preventDefault();e.stopPropagation();closePop();groupBy=groupBtn.dataset.group;localStorage.tf_groupBy=groupBy;start=0;render();return}
  let filterBtn=e.target.closest('.filter-open');
  if(filterBtn){e.preventDefault();e.stopPropagation();let p=document.getElementById('pop'),type=filterBtn.dataset.filter;if(p.classList.contains('open')&&p.dataset.openFilter===type){closePop();return}closePop();openPop(type,filterBtn.closest('.chip'));return}
  let reset=e.target.closest('#resetFilters');if(reset){resetAllFilters();return}
  let create=e.target.closest('#createTask');if(create){creating=true;sel=null;draft={id:'t'+Date.now(),title:'',priority:'P2',project:'Comercial',provider:'',person:'Xavier',due:'',status:'pending',type:'task',notes:'',estimated_hours:'',followup_enabled:false,followup_mode:'once',followup_date:'',followup_interval:1,repeat_enabled:false,repeat_frequency:'weekly',repeat_interval:1,repeat_weekend_policy:'keep',repeat_until:'',emailSubject:'',emailFrom:'',emailBody:''};render();return}
  let item=e.target.closest('[data-f]');if(item){let set=filters[item.dataset.f],v=item.dataset.v;set.has(v)?set.delete(v):set.add(v);let type=item.dataset.f;render();let btn=document.querySelector(`.filter-open[data-filter="${type}"]`);if(btn)openPop(type,btn.closest('.chip'));return}
  let clear=e.target.closest('[data-clear]');if(clear){filters[clear.dataset.clear].clear();closePop();render();return}
  let card=e.target.closest('.card');if(card){creating=false;draft=null;sel=card.dataset.id;render();return}
  if(e.target.id==='close'||e.target.id==='closeSecondary'){sel=null;creating=false;draft=null;render();return}
  if(e.target.id==='saveCreate'){if(draft&&draft.title.trim()){tasks.unshift(draft);await persist(draft);sel=draft.id;creating=false;draft=null;render()}return}
  if(e.target.id==='done'){let t=tasks.find(x=>x.id===sel);if(t){t.status='done';await persist(t);render()}return}
  if(!e.target.closest('#pop'))closePop()
});
document.addEventListener('input',async e=>{if(e.target.id==='q'){q=e.target.value;render();return}let ed=e.target.closest('[data-edit]');if(ed){let t=creating?draft:tasks.find(x=>x.id===sel);if(t){t[ed.dataset.edit]=ed.value;if(!creating)await persist(t)}}});document.addEventListener('change',async e=>{let bool=e.target.closest('[data-edit-bool]');if(bool){let t=creating?draft:tasks.find(x=>x.id===sel);if(t){t[bool.dataset.editBool]=bool.checked;if(!creating)await persist(t);render()}return}let ed=e.target.closest('[data-edit]');if(ed){let t=creating?draft:tasks.find(x=>x.id===sel);if(t){t[ed.dataset.edit]=ed.value;if(!creating)await persist(t);render()}return}if(e.target.id==='lang'){lang=e.target.value;localStorage.tf_lang=lang;render();return}});
document.getElementById('prev').onclick=()=>{start=Math.max(0,start-1);render()};document.getElementById('next').onclick=()=>{start=Math.min(Math.max(0,groupsFor().length-3),start+1);render()};document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePop();sel=null;creating=false;draft=null;render()}});
bindControls();initTaskFlowLocalDb();
</script>
</body></html>
